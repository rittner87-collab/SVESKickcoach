function AdminPlatzverwaltung({profile, show}) {
  const [tab,        setTab]        = useState('platz');
  const [teams,      setTeams]      = useState([]);
  const [platzbel,   setPlatzbel]   = useState([]);
  const [kabinenbel, setKabinenbel] = useState([]);
  const [maengel,    setMaengel]    = useState([]);
  const [form,       setForm]       = useState(null);
  const [kabiForm,   setKabiForm]   = useState(null);
  const [delId,      setDelId]      = useState(null);
  const [saving,     setSaving]     = useState(false);

  useEffect(()=>{
    const u1=col('teams').onSnapshot(s=>setTeams(s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>a.name.localeCompare(b.name))));
    const u2=col('platzbelegung').onSnapshot(s=>setPlatzbel(s.docs.map(d=>({id:d.id,...d.data()}))));
    const u3=col('kabinenbelegung').onSnapshot(s=>setKabinenbel(s.docs.map(d=>({id:d.id,...d.data()}))));
    const u4=col('maengel').onSnapshot(s=>setMaengel(s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0))));
    return ()=>{u1();u2();u3();u4();};
  },[]);

  const tName = (id) => teams.find(t=>t.id===id)?.name||id;
  const toggleTag = (arr,tag) => arr.includes(tag)?arr.filter(x=>x!==tag):[...arr,tag];

  // Platzbelegung — multiple Tage → je ein Dokument
  const savePlatz = async () => {
    if(!form.teamId||!(form.tage||[]).length||!(form.plaetze||[]).length) return;
    setSaving(true);
    try {
      const plaetze = form.plaetze||[];
      const platz = plaetze.join(', ');
      if(form.id){
        await col('platzbelegung').doc(form.id).update({
          teamId:form.teamId,teamName:tName(form.teamId),tag:form.tage[0],
          plaetze,platz,uhrzeitVon:form.uhrzeitVon||'',uhrzeitBis:form.uhrzeitBis||''
        });
      } else {
        await Promise.all((form.tage).map(tag=>
          col('platzbelegung').add({teamId:form.teamId,teamName:tName(form.teamId),tag,plaetze,platz,uhrzeitVon:form.uhrzeitVon||'',uhrzeitBis:form.uhrzeitBis||'',createdAt:ts()})
        ));
      }
      show('Gespeichert ✅'); setForm(null);
    } catch(e){show(e.message,'error');}
    setSaving(false);
  };

  // Kabinenbelegung — multiple Tage (fest) / Wochend-Event (flexibel)
  const saveKabine = async () => {
    if(!kabiForm.teamId||!kabiForm.heimKabine && kabiForm.typ==='flexibel') return;
    if(kabiForm.typ==='fest' && !kabiForm.kabine) return;
    setSaving(true);
    try {
      if(kabiForm.id){
        if(kabiForm.typ==='fest'){
          const tag=(kabiForm.tage||[])[0]||'';
          await col('kabinenbelegung').doc(kabiForm.id).update({
            teamId:kabiForm.teamId,teamName:tName(kabiForm.teamId),kabine:kabiForm.kabine,
            typ:'fest',tag,datum:'',uhrzeit:kabiForm.uhrzeit||''
          });
        } else {
          await col('kabinenbelegung').doc(kabiForm.id).update({
            teamId:kabiForm.teamId,teamName:tName(kabiForm.teamId),
            typ:'flexibel',eventTyp:kabiForm.eventTyp||'spiel',
            datum:kabiForm.datum||'',uhrzeit:kabiForm.uhrzeit||'',
            heimKabine:kabiForm.heimKabine||'',
            gaeste:(kabiForm.gaeste||[]).filter(g=>g.name?.trim()),
            kabine:kabiForm.heimKabine||'' // compat field
          });
        }
      } else if(kabiForm.typ==='fest'){
        await Promise.all((kabiForm.tage||[]).map(tag=>
          col('kabinenbelegung').add({teamId:kabiForm.teamId,teamName:tName(kabiForm.teamId),kabine:kabiForm.kabine,typ:'fest',tag,datum:'',uhrzeit:kabiForm.uhrzeit||'',createdAt:ts()})
        ));
      } else {
        await col('kabinenbelegung').add({
          teamId:kabiForm.teamId,teamName:tName(kabiForm.teamId),
          typ:'flexibel',eventTyp:kabiForm.eventTyp||'spiel',
          datum:kabiForm.datum||'',uhrzeit:kabiForm.uhrzeit||'',
          heimKabine:kabiForm.heimKabine||'',
          gaeste:(kabiForm.gaeste||[]).filter(g=>g.name?.trim()),
          kabine:kabiForm.heimKabine||'', // compat
          createdAt:ts()
        });
      }
      show('Gespeichert ✅'); setKabiForm(null);
    } catch(e){show(e.message,'error');}
    setSaving(false);
  };

  const setMaengelStatus = async (id,status) => {
    await col('maengel').doc(id).update({status,erledigt_by:profile.name,erledigt_at:ts()});
    show('Status aktualisiert ✅');
  };

  const doDelConfirm = async () => {
    const [coll,id]=delId;
    await col(coll).doc(id).delete();
    setDelId(null);
  };

  const TabBtn = ({id,label}) => (
    <button onClick={()=>setTab(id)} className={`flex-1 py-2 text-xs font-semibold rounded-lg transition-all ${tab===id?'bg-purple-600 text-white':'bg-gray-100 text-gray-500 hover:bg-gray-200'}`}>{label}</button>
  );

  // Grid data
  const platzGrid = platzbel.map(e=>({...e,label:e.teamName,sublabel:`📍${platzLabel(e)}${e.uhrzeitVon?` ${e.uhrzeitVon}-${e.uhrzeitBis}`:''}`,color:teamColor(e.teamName)}));
  const kabiGrid  = kabinenbel.filter(k=>k.typ==='fest').map(e=>({...e,label:e.teamName,sublabel:`🚿${e.kabine}${e.uhrzeit?` ${e.uhrzeit}`:''}`,color:teamColor(e.teamName)}));

  return (
    <div className="p-4">
      {delId && (
        <Modal title="Eintrag löschen?" onClose={()=>setDelId(null)}>
          <div className="flex gap-2 mt-2">
            <Btn variant="secondary" className="flex-1" onClick={()=>setDelId(null)}>Abbrechen</Btn>
            <button onClick={doDelConfirm} className="flex-1 py-2 rounded-xl bg-red-600 text-white text-sm font-semibold">Löschen</button>
          </div>
        </Modal>
      )}

      <h1 className="text-lg font-semibold mb-1">Platz- & Objektverwaltung</h1>
      <p className="text-xs text-gray-400 mb-3">Belegungspläne und Mängelmeldungen</p>
      <div className="flex gap-1.5 mb-4">
        <TabBtn id="platz" label="⚽ Platz"/>
        <TabBtn id="kabine" label="🚿 Kabinen"/>
        <TabBtn id="maengel" label="🔧 Mängel"/>
      </div>

      {/* ── PLATZBELEGUNG ── */}
      {tab==='platz' && (
        <>
          {form && (
            <Modal title={form.id?'Eintrag bearbeiten':'Platzbelegung eintragen'} onClose={()=>setForm(null)}>
              <div className="mb-2">
                <label className="block text-xs font-medium text-gray-600 mb-1">Team</label>
                <select value={form.teamId||''} onChange={e=>setForm(p=>({...p,teamId:e.target.value}))}
                  className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-purple-500">
                  <option value="">— Team wählen —</option>
                  {teams.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}
                </select>
              </div>
              <div className="mb-2">
                <label className="block text-xs font-medium text-gray-600 mb-1">{form.id?'Wochentag':'Wochentage (Mehrfach möglich)'}</label>
                <div className="flex gap-1 flex-wrap">
                  {WOCHENTAGE.map(t=>{
                    const sel=(form.tage||[]).includes(t);
                    return <button key={t} type="button"
                      onClick={()=>setForm(p=>({...p,tage:toggleTag(p.tage||[],t)}))}
                      className={`px-3 py-1.5 rounded-lg text-xs font-semibold border-2 transition-all ${sel?'border-purple-500 bg-purple-50 text-purple-700':'border-gray-200 text-gray-500'}`}>{t}</button>;
                  })}
                </div>
              </div>
              <div className="mb-2">
                <label className="block text-xs font-medium text-gray-600 mb-1">Platz / Feld (Mehrfach möglich)</label>
                <div className="flex gap-1 flex-wrap">
                  {PLAETZE_OPTIONS.map(p=>{
                    const sel=(form.plaetze||[]).includes(p);
                    return <button key={p} type="button"
                      onClick={()=>setForm(f=>({...f,plaetze:toggleTag(f.plaetze||[],p)}))}
                      className={`px-3 py-1.5 rounded-lg text-xs font-semibold border-2 transition-all ${sel?'border-purple-500 bg-purple-50 text-purple-700':'border-gray-200 text-gray-500'}`}>{p}</button>;
                  })}
                </div>
              </div>
              <div className="grid grid-cols-2 gap-2">
                <div><label className="block text-xs font-medium text-gray-600 mb-1">Von</label><input type="time" value={form.uhrzeitVon||''} onChange={e=>setForm(p=>({...p,uhrzeitVon:e.target.value}))} className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-purple-500"/></div>
                <div><label className="block text-xs font-medium text-gray-600 mb-1">Bis</label><input type="time" value={form.uhrzeitBis||''} onChange={e=>setForm(p=>({...p,uhrzeitBis:e.target.value}))} className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-purple-500"/></div>
              </div>
              <div className="flex gap-2 mt-3">
                <Btn variant="secondary" className="flex-1" onClick={()=>setForm(null)}>Abbrechen</Btn>
                <Btn className="flex-1" onClick={savePlatz} disabled={!form.teamId||!(form.tage||[]).length||!(form.plaetze||[]).length||saving}>{saving?'…':'Speichern'}</Btn>
              </div>
            </Modal>
          )}
          <div className="flex justify-between items-center mb-2">
            <div className="text-sm font-semibold">Platzbelegungsplan</div>
            <button onClick={()=>setForm({teamId:'',tage:[],plaetze:[],uhrzeitVon:'',uhrzeitBis:''})} className="px-3 py-1.5 rounded-xl bg-purple-600 text-white text-xs font-semibold hover:bg-purple-700">+ Eintrag</button>
          </div>
          <WochenGrid data={platzGrid}
            onEdit={e=>setForm({...e,tage:[e.tag],plaetze:e.plaetze||[]})}
            onDelete={id=>setDelId(['platzbelegung',id])}
            emptyText="Noch keine Platzbelegung eingetragen."/>
        </>
      )}

      {/* ── KABINENBELEGUNG ── */}
      {tab==='kabine' && (
        <>
          {kabiForm && (
            <Modal title={kabiForm.id?'Eintrag bearbeiten':'Kabinenbelegung eintragen'} onClose={()=>setKabiForm(null)}>
              <div className="mb-3">
                <label className="block text-xs font-medium text-gray-600 mb-1">Art</label>
                <div className="grid grid-cols-2 gap-2">
                  {[['fest','🗓 Fest (Wochentag)'],['flexibel','📅 Wochend-Event']].map(([v,l])=>(
                    <button key={v} type="button" onClick={()=>setKabiForm(p=>({...p,typ:v}))}
                      className={`py-2 rounded-lg border-2 text-xs font-semibold transition-all ${kabiForm.typ===v?'border-purple-500 bg-purple-50 text-purple-700':'border-gray-200 text-gray-500'}`}>{l}</button>
                  ))}
                </div>
              </div>
              {kabiForm.typ==='fest' ? (<>
                <div className="mb-2">
                  <label className="block text-xs font-medium text-gray-600 mb-1">Team</label>
                  <select value={kabiForm.teamId||''} onChange={e=>setKabiForm(p=>({...p,teamId:e.target.value}))}
                    className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-purple-500">
                    <option value="">— Team wählen —</option>
                    {teams.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}
                  </select>
                </div>
                <Inp label="Kabine / Umkleide" value={kabiForm.kabine||''} onChange={e=>setKabiForm(p=>({...p,kabine:e.target.value}))} placeholder="z.B. Kabine 1"/>
                <div className="mb-2">
                  <label className="block text-xs font-medium text-gray-600 mb-1">{kabiForm.id?'Wochentag':'Wochentage (Mehrfach möglich)'}</label>
                  <div className="flex gap-1 flex-wrap">
                    {WOCHENTAGE.map(t=>{
                      const sel=(kabiForm.tage||[]).includes(t);
                      return <button key={t} type="button"
                        onClick={()=>setKabiForm(p=>({...p,tage:toggleTag(p.tage||[],t)}))}
                        className={`px-3 py-1.5 rounded-lg text-xs font-semibold border-2 transition-all ${sel?'border-purple-500 bg-purple-50 text-purple-700':'border-gray-200 text-gray-500'}`}>{t}</button>;
                    })}
                  </div>
                </div>
                <Inp label="Uhrzeit" type="time" value={kabiForm.uhrzeit||''} onChange={e=>setKabiForm(p=>({...p,uhrzeit:e.target.value}))}/>
              </>) : (<>
                {/* Flexibel: Wochend-Event mit Gegnerteams */}
                <div className="mb-2">
                  <label className="block text-xs font-medium text-gray-600 mb-1">Art des Events</label>
                  <div className="grid grid-cols-2 gap-2">
                    {[['spiel','⚔️ Spiel'],['festival','🏆 Kleinfeldturnier']].map(([v,l])=>(
                      <button key={v} type="button" onClick={()=>setKabiForm(p=>({...p,eventTyp:v,gaeste:p.gaeste?.length?p.gaeste:[{name:'',kabine:''}]}))}
                        className={`py-2 rounded-lg border-2 text-xs font-semibold transition-all ${(kabiForm.eventTyp||'spiel')===v?'border-purple-500 bg-purple-50 text-purple-700':'border-gray-200 text-gray-500'}`}>{l}</button>
                    ))}
                  </div>
                </div>
                <div className="grid grid-cols-2 gap-2">
                  <Inp label="Datum" type="date" value={kabiForm.datum||''} onChange={e=>setKabiForm(p=>({...p,datum:e.target.value}))}/>
                  <Inp label="Uhrzeit" type="time" value={kabiForm.uhrzeit||''} onChange={e=>setKabiForm(p=>({...p,uhrzeit:e.target.value}))}/>
                </div>
                <div className="mb-3 p-3 bg-blue-50 rounded-xl border border-blue-100">
                  <div className="text-xs font-semibold text-blue-700 mb-2">🏠 Unser Team</div>
                  <div className="grid grid-cols-2 gap-2">
                    <div>
                      <label className="block text-xs font-medium text-gray-600 mb-1">Team</label>
                      <select value={kabiForm.teamId||''} onChange={e=>setKabiForm(p=>({...p,teamId:e.target.value}))}
                        className="w-full border border-gray-200 rounded-lg px-2 py-1.5 text-xs focus:outline-none focus:ring-2 focus:ring-purple-500">
                        <option value="">— Team —</option>
                        {teams.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}
                      </select>
                    </div>
                    <div>
                      <label className="block text-xs font-medium text-gray-600 mb-1">Kabine</label>
                      <input value={kabiForm.heimKabine||''} onChange={e=>setKabiForm(p=>({...p,heimKabine:e.target.value}))} placeholder="Kabine 1"
                        className="w-full border border-gray-200 rounded-lg px-2 py-1.5 text-xs focus:outline-none focus:ring-2 focus:ring-purple-500"/>
                    </div>
                  </div>
                </div>
                <div className="mb-3">
                  <div className="flex items-center justify-between mb-2">
                    <div className="text-xs font-semibold text-gray-600">⚔️ {(kabiForm.eventTyp||'spiel')==='festival'?'Gastteams':'Gegner'}</div>
                    {(kabiForm.eventTyp||'spiel')==='festival' && (
                      <button type="button" onClick={()=>setKabiForm(p=>({...p,gaeste:[...(p.gaeste||[]),{name:'',kabine:''}]}))}
                        className="text-xs text-purple-600 font-semibold hover:text-purple-800">+ Team hinzufügen</button>
                    )}
                  </div>
                  {(kabiForm.gaeste||[{name:'',kabine:''}]).map((g,i)=>(
                    <div key={i} className="flex gap-2 mb-2 items-start">
                      <div className="flex-1 grid grid-cols-2 gap-2">
                        <input value={g.name||''} onChange={e=>setKabiForm(p=>{const g2=[...(p.gaeste||[])];g2[i]={...g2[i],name:e.target.value};return {...p,gaeste:g2};})}
                          placeholder="Teamname (Gegner)" className="border border-gray-200 rounded-lg px-2 py-1.5 text-xs focus:outline-none focus:ring-2 focus:ring-purple-500"/>
                        <input value={g.kabine||''} onChange={e=>setKabiForm(p=>{const g2=[...(p.gaeste||[])];g2[i]={...g2[i],kabine:e.target.value};return {...p,gaeste:g2};})}
                          placeholder="Kabine" className="border border-gray-200 rounded-lg px-2 py-1.5 text-xs focus:outline-none focus:ring-2 focus:ring-purple-500"/>
                      </div>
                      {(kabiForm.gaeste||[]).length>1 && (
                        <button type="button" onClick={()=>setKabiForm(p=>({...p,gaeste:(p.gaeste||[]).filter((_,j)=>j!==i)}))}
                          className="mt-1 text-gray-300 hover:text-red-400 text-sm">✕</button>
                      )}
                    </div>
                  ))}
                </div>
              </>)}
              <div className="flex gap-2 mt-3">
                <Btn variant="secondary" className="flex-1" onClick={()=>setKabiForm(null)}>Abbrechen</Btn>
                <Btn className="flex-1" onClick={saveKabine} disabled={saving}>{saving?'…':'Speichern'}</Btn>
              </div>
            </Modal>
          )}
          <div className="flex justify-between items-center mb-2">
            <div className="text-sm font-semibold">Kabinenbelegungsplan</div>
            <button onClick={()=>setKabiForm({teamId:'',kabine:'',typ:'fest',tage:[],datum:'',uhrzeit:'',eventTyp:'spiel',heimKabine:'',gaeste:[{name:'',kabine:''}]})} className="px-3 py-1.5 rounded-xl bg-purple-600 text-white text-xs font-semibold hover:bg-purple-700">+ Eintrag</button>
          </div>
          {/* Fest-Wochengitter */}
          <div className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1.5">Fest (Wochentage)</div>
          <WochenGrid data={kabiGrid}
            onEdit={e=>setKabiForm({...e,tage:[e.tag],eventTyp:'spiel',heimKabine:e.kabine||'',gaeste:[{name:'',kabine:''}]})}
            onDelete={id=>setDelId(['kabinenbelegung',id])}
            emptyText="Noch keine feste Kabinenbelegung."/>
          {/* Flexibel-Wochenendevents */}
          <div className="mt-4">
            <div className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Wochenend-Events</div>
            {kabinenbel.filter(k=>k.typ==='flexibel').length===0 ? (
              <div className="text-center text-gray-400 py-4 text-xs">Noch keine Wochenend-Events eingetragen.</div>
            ) : (
              <div className="space-y-2">
                {kabinenbel.filter(k=>k.typ==='flexibel').sort((a,b)=>(a.datum||'').localeCompare(b.datum||'')).map(e=>(
                  <WochenendEventCard key={e.id} e={e}
                    onEdit={()=>setKabiForm({...e,tage:[],eventTyp:e.eventTyp||'spiel',heimKabine:e.heimKabine||e.kabine||'',gaeste:e.gaeste?.length?e.gaeste:[{name:'',kabine:''}]})}
                    onDelete={()=>setDelId(['kabinenbelegung',e.id])}/>
                ))}
              </div>
            )}
          </div>
        </>
      )}

      {/* ── MÄNGELMELDUNGEN ── */}
      {tab==='maengel' && (
        <div className="space-y-3">
          <div className="text-sm font-semibold mb-1">Mängelmeldungen vom Trainer</div>
          {maengel.length===0 ? (
            <div className="text-center text-gray-400 py-10 text-sm">Keine Meldungen.</div>
          ) : maengel.map(m=>(
            <div key={m.id} className={`bg-white border rounded-xl p-4 ${m.status==='erledigt'?'border-green-200 opacity-70':'border-amber-200'}`}>
              <div className="flex items-start justify-between gap-2">
                <div className="flex-1">
                  <div className="flex gap-2 mb-1 flex-wrap">
                    <span className={`text-[10px] font-semibold px-2 py-0.5 rounded-full ${m.status==='erledigt'?'bg-green-100 text-green-700':'bg-amber-100 text-amber-700'}`}>{m.status==='erledigt'?'✓ Erledigt':'⚠️ Offen'}</span>
                    {m.prioritaet&&<span className="text-[10px] font-semibold px-2 py-0.5 rounded-full bg-red-100 text-red-700">{m.prioritaet}</span>}
                  </div>
                  <div className="text-sm font-medium">{m.beschreibung}</div>
                  {m.ort&&<div className="text-xs text-gray-500 mt-0.5">📍 {m.ort}</div>}
                  <div className="text-xs text-gray-400 mt-1">Von: {m.createdBy}</div>
                </div>
                {m.status!=='erledigt'&&<button onClick={()=>setMaengelStatus(m.id,'erledigt')} className="flex-shrink-0 px-3 py-1.5 rounded-lg bg-green-600 text-white text-xs font-semibold hover:bg-green-700">✓ Erledigt</button>}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function TrainerPlatzverwaltung({profile, show}) {
  const [tab,        setTab]        = useState('platz');
  const [platzbel,   setPlatzbel]   = useState([]);
  const [kabinenbel, setKabinenbel] = useState([]);
  const [maengel,    setMaengel]    = useState([]);
  const [mForm,      setMForm]      = useState(null);
  const [saving,     setSaving]     = useState(false);

  useEffect(()=>{
    const u1=col('platzbelegung').onSnapshot(s=>setPlatzbel(s.docs.map(d=>({id:d.id,...d.data()}))));
    const u2=col('kabinenbelegung').onSnapshot(s=>setKabinenbel(s.docs.map(d=>({id:d.id,...d.data()}))));
    const u3=col('maengel').onSnapshot(s=>setMaengel(s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0))));
    return ()=>{u1();u2();u3();};
  },[]);

  const saveMaengel = async () => {
    if(!mForm.beschreibung?.trim()) return;
    setSaving(true);
    try {
      await col('maengel').add({beschreibung:mForm.beschreibung.trim(),ort:mForm.ort||'',prioritaet:mForm.prioritaet||'Normal',status:'offen',createdBy:profile.name,teamId:profile.teamId,createdAt:ts()});
      show('Mängelmeldung eingereicht ✅'); setMForm(null);
    } catch(e){show(e.message,'error');}
    setSaving(false);
  };

  const TabBtn = ({id,label}) => (
    <button onClick={()=>setTab(id)} className={`flex-1 py-2 text-xs font-semibold rounded-lg transition-all ${tab===id?'bg-red-600 text-white':'bg-gray-100 text-gray-500 hover:bg-gray-200'}`}>{label}</button>
  );

  const platzGrid = platzbel.map(e=>({...e,label:e.teamName,sublabel:`📍${platzLabel(e)}${e.uhrzeitVon?` ${e.uhrzeitVon}-${e.uhrzeitBis}`:''}`,color:teamColor(e.teamName)}));
  const kabiGrid  = kabinenbel.filter(k=>k.typ==='fest').map(e=>({...e,label:e.teamName,sublabel:`🚿${e.kabine}${e.uhrzeit?` ${e.uhrzeit}`:''}`,color:teamColor(e.teamName)}));

  return (
    <div className="p-4">
      <h1 className="text-lg font-semibold mb-1">Platz- & Objektverwaltung</h1>
      <p className="text-xs text-gray-400 mb-3">Belegungspläne & Mängel melden</p>
      <div className="flex gap-1.5 mb-4">
        <TabBtn id="platz" label="⚽ Platz"/>
        <TabBtn id="kabine" label="🚿 Kabinen"/>
        <TabBtn id="maengel" label="🔧 Mängel"/>
      </div>

      {tab==='platz' && (
        <>
          <div className="text-sm font-semibold mb-2">Platzbelegungsplan</div>
          <WochenGrid data={platzGrid} emptyText="Noch kein Platzbelegungsplan eingetragen."/>
        </>
      )}

      {tab==='kabine' && (
        <>
          <div className="text-sm font-semibold mb-2">Kabinenbelegungsplan</div>
          <div className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1.5">Fest (Wochentage)</div>
          <WochenGrid data={kabiGrid} emptyText="Noch keine feste Kabinenbelegung."/>
          <div className="mt-4">
            <div className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Wochenend-Events</div>

                  <WochenendEventCard key={e.id} e={e}/>
                ))}
              </div>
            )}
          </div>
        </>

      {tab==='maengel' && (
        <>
          {mForm && (
            <Modal title="Mängel melden" onClose={()=>setMForm(null)}>
              <div className="mb-2">
                <label className="block text-xs font-medium text-gray-600 mb-1">Beschreibung *</label>
                <textarea rows={3} value={mForm.beschreibung||''} onChange={e=>setMForm(p=>({...p,beschreibung:e.target.value}))}
                  placeholder="Was ist aufgefallen?"
                  className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-red-500"/>
              </div>
              <Inp label="Ort / Bereich" value={mForm.ort||''} onChange={e=>setMForm(p=>({...p,ort:e.target.value}))} placeholder="z.B. Hauptplatz, Kabine 1"/>
              <div className="mb-3">
                <label className="block text-xs font-medium text-gray-600 mb-1">Priorität</label>
                <div className="grid grid-cols-3 gap-2">
                  {['Normal','Hoch','Dringend'].map(p=>(
                    <button key={p} type="button" onClick={()=>setMForm(f=>({...f,prioritaet:p}))}
                      className={`py-2 rounded-lg border-2 text-xs font-semibold transition-all ${mForm.prioritaet===p?'border-red-500 bg-red-50 text-red-700':'border-gray-200 text-gray-500'}`}>{p}</button>
                  ))}
                </div>
              </div>
              <div className="flex gap-2">
                <Btn variant="secondary" className="flex-1" onClick={()=>setMForm(null)}>Abbrechen</Btn>
                <Btn className="flex-1" onClick={saveMaengel} disabled={!mForm.beschreibung?.trim()||saving}>{saving?'…':'Melden'}</Btn>
              </div>
            </Modal>
          )}
          <div className="flex justify-between items-center mb-3">
            <div className="text-sm font-semibold">Meine Meldungen</div>
            <button onClick={()=>setMForm({beschreibung:'',ort:'',prioritaet:'Normal'})} className="px-3 py-1.5 rounded-xl bg-red-600 text-white text-xs font-semibold hover:bg-red-700">+ Melden</button>
          </div>
          {maengel.filter(m=>m.createdBy===profile.name).length===0 ? (
            <div className="text-center text-gray-400 py-10 text-sm">Noch keine Meldungen.</div>
          ) : (
            <div className="space-y-2">
              {maengel.filter(m=>m.createdBy===profile.name).map(m=>(
                <div key={m.id} className={`bg-white border rounded-xl p-4 ${m.status==='erledigt'?'border-green-200 opacity-70':'border-amber-200'}`}>
                  <div className="flex gap-2 mb-1 flex-wrap">
                    <span className={`text-[10px] font-semibold px-2 py-0.5 rounded-full ${m.status==='erledigt'?'bg-green-100 text-green-700':'bg-amber-100 text-amber-700'}`}>{m.status==='erledigt'?'✓ Erledigt':'⚠️ Offen'}</span>
                    {m.prioritaet&&<span className="text-[10px] px-2 py-0.5 rounded-full bg-gray-100 text-gray-500">{m.prioritaet}</span>}
                  </div>
                  <div className="text-sm">{m.beschreibung}</div>
                  {m.ort&&<div className="text-xs text-gray-500 mt-0.5">📍 {m.ort}</div>}
                </div>
              ))}
            </div>
          )}
        </>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
//  ADMIN — SPONSOREN
// ═══════════════════════════════════════════════════════════════════
function AdminSponsoren({show}) {
  const [sponsoren, setSponsoren] = useState([]);
  const [form, setForm] = useState(null); // null | {} | sponsor-obj
  const [delId, setDelId] = useState(null);
  const [saving, setSaving] = useState(false);
  const EMPTY = {name:'',kontakt:'',email:'',telefon:'',leistungen:'',vertragsStart:'',vertragsEnde:'',werbeflaechen:'',notizen:''};

  useEffect(()=>{
    return col('sponsoren').onSnapshot(s=>
      setSponsoren(s.docs.map(d=>({id:d.id,...d.data()}))
        .sort((a,b)=>a.name.localeCompare(b.name)))
    );
  },[]);

  const daysUntil = (dateStr) => {
    if(!dateStr) return null;
    const diff = Math.ceil((new Date(dateStr)-new Date())/86400000);
    return diff;
  };

  const statusBadge = (dateStr) => {
    const d = daysUntil(dateStr);
    if(d===null) return null;
    if(d < 0)   return {label:'Abgelaufen',  bg:'bg-red-100',   text:'text-red-700'};
    if(d <= 30) return {label:`${d}T verbleibend`, bg:'bg-amber-100', text:'text-amber-700'};
    if(d <= 90) return {label:`${d}T verbleibend`, bg:'bg-yellow-100',text:'text-yellow-700'};
    return       {label:'Aktiv', bg:'bg-green-100', text:'text-green-700'};
  };

  const save = async () => {
    if(!form.name?.trim()) return;
    setSaving(true);
    try {
      const data = {...form, name:form.name.trim()};
      if(form.id) await col('sponsoren').doc(form.id).update(data);
      else        await col('sponsoren').add({...data, createdAt:ts()});
      show(form.id?'Sponsor aktualisiert ✅':'Sponsor gespeichert ✅');
      setForm(null);
    } catch(e){ show(e.message,'error'); }
    setSaving(false);
  };

  const doDelete = async () => {
    await col('sponsoren').doc(delId).delete();
    show('Sponsor gelöscht'); setDelId(null);
  };

  const expiringCount = sponsoren.filter(s=>{ const d=daysUntil(s.vertragsEnde); return d!==null&&d>=0&&d<=30; }).length;
  const expiredCount  = sponsoren.filter(s=>{ const d=daysUntil(s.vertragsEnde); return d!==null&&d<0; }).length;

  return (
    <div className="p-4">
      {/* Delete Modal */}
      {delId && (
        <Modal title="Sponsor löschen?" onClose={()=>setDelId(null)}>
          <p className="text-sm text-gray-600 mb-4">Diesen Sponsor wirklich löschen?</p>
          <div className="flex gap-2">
            <Btn variant="secondary" className="flex-1" onClick={()=>setDelId(null)}>Abbrechen</Btn>
            <button onClick={doDelete} className="flex-1 py-2 rounded-xl bg-red-600 text-white text-sm font-semibold">Löschen</button>
          </div>
        </Modal>
      )}

      {/* Edit/Add Modal */}
      {form && (
        <Modal title={form.id?'Sponsor bearbeiten':'Neuer Sponsor'} onClose={()=>setForm(null)}>
          <div className="space-y-1 max-h-[70vh] overflow-y-auto">
            <Inp label="Sponsorname *" value={form.name||''} onChange={e=>setForm(p=>({...p,name:e.target.value}))} placeholder="Firma / Person"/>
            <Inp label="Ansprechpartner" value={form.kontakt||''} onChange={e=>setForm(p=>({...p,kontakt:e.target.value}))} placeholder="Max Mustermann"/>
            <Inp label="E-Mail" type="email" value={form.email||''} onChange={e=>setForm(p=>({...p,email:e.target.value}))}/>
            <Inp label="Telefon" value={form.telefon||''} onChange={e=>setForm(p=>({...p,telefon:e.target.value}))}/>
            <div className="grid grid-cols-2 gap-2">
              <Inp label="Vertrag von" type="date" value={form.vertragsStart||''} onChange={e=>setForm(p=>({...p,vertragsStart:e.target.value}))}/>
              <Inp label="Vertrag bis" type="date" value={form.vertragsEnde||''} onChange={e=>setForm(p=>({...p,vertragsEnde:e.target.value}))}/>
            </div>
            <div className="mb-2">
              <label className="block text-xs font-medium text-gray-600 mb-1">Sponsorenleistungen</label>
              <textarea rows={2} value={form.leistungen||''} onChange={e=>setForm(p=>({...p,leistungen:e.target.value}))}
                placeholder="z.B. Trikotsponsor, Bandenwerbung …"
                className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-purple-500"/>
            </div>
            <div className="mb-2">
              <label className="block text-xs font-medium text-gray-600 mb-1">Werbeflächen</label>
              <textarea rows={2} value={form.werbeflaechen||''} onChange={e=>setForm(p=>({...p,werbeflaechen:e.target.value}))}
                placeholder="z.B. Bande Seite A, Vereinsheft Rückseite …"
                className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-purple-500"/>
            </div>
            <div className="mb-3">
              <label className="block text-xs font-medium text-gray-600 mb-1">Notizen</label>
              <textarea rows={2} value={form.notizen||''} onChange={e=>setForm(p=>({...p,notizen:e.target.value}))}
                className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-purple-500"/>
            </div>
          </div>
          <div className="flex gap-2 mt-2">
            <Btn variant="secondary" className="flex-1" onClick={()=>setForm(null)}>Abbrechen</Btn>
            <Btn className="flex-1" onClick={save} disabled={!form.name?.trim()||saving}>{saving?'…':'Speichern'}</Btn>
          </div>
        </Modal>
      )}

      <div className="flex items-center justify-between mb-4">
        <div>
          <h1 className="text-lg font-semibold">Sponsoren</h1>
          <p className="text-xs text-gray-400">{sponsoren.length} Sponsor{sponsoren.length!==1?'en':''}</p>
        </div>
        <button onClick={()=>setForm({...EMPTY})}
          className="px-3 py-2 rounded-xl bg-purple-600 text-white text-sm font-semibold hover:bg-purple-700 transition-colors">
          + Neu
        </button>
      </div>

      {/* Hinweis-Banner */}
      {(expiringCount>0||expiredCount>0) && (
        <div className={`mb-4 rounded-xl px-4 py-3 text-sm font-medium flex items-center gap-2 ${expiredCount>0?'bg-red-50 text-red-700 border border-red-200':'bg-amber-50 text-amber-700 border border-amber-200'}`}>
          ⚠️ {expiredCount>0 && `${expiredCount} Vertrag${expiredCount>1?'träge':''} abgelaufen. `}
          {expiringCount>0 && `${expiringCount} Vertrag${expiringCount>1?'träge':''} läuft bald ab.`}
        </div>
      )}

      {sponsoren.length===0 ? (
        <div className="text-center text-gray-400 py-12 text-sm">Noch keine Sponsoren eingetragen.</div>
      ) : (
        <div className="space-y-3">
          {sponsoren.map(s=>{
            const badge = statusBadge(s.vertragsEnde);
            return (
              <div key={s.id} className="bg-white border border-gray-200 rounded-xl p-4">
                <div className="flex items-start justify-between gap-2 mb-2">
                  <div className="flex-1 min-w-0">
                    <div className="font-semibold text-sm">{s.name}</div>
                    {s.kontakt && <div className="text-xs text-gray-500">👤 {s.kontakt}</div>}
                    {s.email   && <div className="text-xs text-gray-500">✉️ {s.email}</div>}
                    {s.telefon && <div className="text-xs text-gray-500">📞 {s.telefon}</div>}
                  </div>
                  <div className="flex items-center gap-1 flex-shrink-0">
                    {badge && <span className={`text-[10px] font-semibold px-2 py-0.5 rounded-full ${badge.bg} ${badge.text}`}>{badge.label}</span>}
                    <button onClick={()=>setForm({...s})} className="p-1.5 rounded-lg hover:bg-purple-50 text-purple-500 text-sm">✏️</button>
                    <button onClick={()=>setDelId(s.id)} className="p-1.5 rounded-lg hover:bg-red-50 text-gray-400 hover:text-red-500 text-sm">🗑</button>
                  </div>
                </div>
                {(s.vertragsStart||s.vertragsEnde) && (
                  <div className="text-[11px] text-gray-500 mb-1.5">
                    📅 {s.vertragsStart&&fmtDate(s.vertragsStart)} {s.vertragsStart&&s.vertragsEnde&&'→'} {s.vertragsEnde&&fmtDate(s.vertragsEnde)}
                  </div>
                )}
                {s.leistungen && (
                  <div className="text-[11px] bg-purple-50 text-purple-700 rounded-lg px-2 py-1 mb-1">🎁 {s.leistungen}</div>
                )}
                {s.werbeflaechen && (
                  <div className="text-[11px] bg-gray-50 text-gray-600 rounded-lg px-2 py-1 mb-1">📋 {s.werbeflaechen}</div>
                )}
                {s.notizen && (
                  <div className="text-[11px] text-gray-400 mt-1 italic">{s.notizen}</div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
//  ADMIN — AUFGABEN
// ═══════════════════════════════════════════════════════════════════
function AdminAufgaben({profile, show}) {
  const [aufgaben, setAufgaben] = useState([]);
  const [trainer,  setTrainer]  = useState([]);
  const [form,     setForm]     = useState(null);
  const [delId,    setDelId]    = useState(null);
  const [saving,   setSaving]   = useState(false);
  const [filter,   setFilter]   = useState('alle'); // 'alle'|'offen'|'in_bearbeitung'|'erledigt'
  const EMPTY = {titel:'',beschreibung:'',verantwortlicherId:'',verantwortlicherName:'',frist:'',status:'offen',prioritaet:'mittel'};

  const PRIO  = {hoch:{l:'Hoch',bg:'bg-red-100',text:'text-red-700'},mittel:{l:'Mittel',bg:'bg-yellow-100',text:'text-yellow-700'},niedrig:{l:'Niedrig',bg:'bg-green-100',text:'text-green-700'}};
  const STATUS= {offen:{l:'Offen',bg:'bg-gray-100',text:'text-gray-600'},in_bearbeitung:{l:'In Bearbeitung',bg:'bg-blue-100',text:'text-blue-700'},erledigt:{l:'Erledigt',bg:'bg-green-100',text:'text-green-700'}};

  useEffect(()=>{
    const u1 = col('aufgaben').onSnapshot(s=>
      setAufgaben(s.docs.map(d=>({id:d.id,...d.data()}))
        .sort((a,b)=>(a.frist||'').localeCompare(b.frist||'')))
    );
    col('users').where('status','==','active').get().then(s=>{
      setTrainer(s.docs.map(d=>({id:d.id,...d.data()}))
        .filter(u=>u.role==='trainer'||u.role==='dual'||u.role==='vorstand_trainer'));
    });
    return ()=>u1();
  },[]);

  const save = async () => {
    if(!form.titel?.trim()) return;
    setSaving(true);
    try {
      const data = {
        ...form, titel:form.titel.trim(),
        createdBy: profile.name, updatedAt: ts()
      };
      let aufgabeId;
      if(form.id){
        await col('aufgaben').doc(form.id).update(data);
        aufgabeId = form.id;
        show('Aufgabe aktualisiert ✅');
      } else {
        data.createdAt = ts(); data.status = 'offen';
        const ref = await col('aufgaben').add(data);
        aufgabeId = ref.id;
        // In-App-Benachrichtigung für Trainer
        await col('benachrichtigungen').add({
          typ: 'aufgabe', aufgabeId,
          titel: `Neue Aufgabe: ${data.titel}`,
          nachricht: data.beschreibung||'',
          frist: data.frist||'',
          verantwortlicherName: data.verantwortlicherName||'Alle',
          gelesenVon: [],
          createdAt: ts(), createdBy: profile.name
        });
        show('Aufgabe erstellt & Trainer benachrichtigt ✅');
      }
      setForm(null);
    } catch(e){ show(e.message,'error'); }
    setSaving(false);
  };

  const updateStatus = async (id, status) => {
    await col('aufgaben').doc(id).update({status, updatedAt:ts()});
  };

  const doDelete = async () => {
    await col('aufgaben').doc(delId).delete();
    show('Aufgabe gelöscht'); setDelId(null);
  };

  const daysUntil = (d) => d ? Math.ceil((new Date(d)-new Date())/86400000) : null;

  const filtered = filter==='alle' ? aufgaben : aufgaben.filter(a=>a.status===filter);

  const counts = {
    offen:          aufgaben.filter(a=>a.status==='offen').length,
    in_bearbeitung: aufgaben.filter(a=>a.status==='in_bearbeitung').length,
    erledigt:       aufgaben.filter(a=>a.status==='erledigt').length,
  };

  return (
    <div className="p-4">
      {/* Delete Modal */}
      {delId && (
        <Modal title="Aufgabe löschen?" onClose={()=>setDelId(null)}>
          <p className="text-sm text-gray-600 mb-4">Diese Aufgabe wirklich löschen?</p>
          <div className="flex gap-2">
            <Btn variant="secondary" className="flex-1" onClick={()=>setDelId(null)}>Abbrechen</Btn>
            <button onClick={doDelete} className="flex-1 py-2 rounded-xl bg-red-600 text-white text-sm font-semibold">Löschen</button>
          </div>
        </Modal>
      )}

      {/* Form Modal */}
      {form && (
        <Modal title={form.id?'Aufgabe bearbeiten':'Neue Aufgabe'} onClose={()=>setForm(null)}>
          <div className="space-y-1 max-h-[70vh] overflow-y-auto">
            <Inp label="Titel *" value={form.titel||''} onChange={e=>setForm(p=>({...p,titel:e.target.value}))} placeholder="Aufgabentitel"/>
            <div className="mb-2">
              <label className="block text-xs font-medium text-gray-600 mb-1">Beschreibung</label>
              <textarea rows={3} value={form.beschreibung||''} onChange={e=>setForm(p=>({...p,beschreibung:e.target.value}))}
                className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-purple-500"/>
            </div>
            <div className="mb-2">
              <label className="block text-xs font-medium text-gray-600 mb-1">Verantwortlich</label>
              <select value={form.verantwortlicherId||''} onChange={e=>{
                  const u=trainer.find(t=>t.id===e.target.value);
                  setForm(p=>({...p,verantwortlicherId:e.target.value,verantwortlicherName:u?.name||''}));
                }}
                className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-purple-500">
                <option value="">— Alle Trainer —</option>
                {trainer.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}
              </select>
            </div>
            <Inp label="Frist" type="date" value={form.frist||''} onChange={e=>setForm(p=>({...p,frist:e.target.value}))}/>
            <div className="mb-3">
              <label className="block text-xs font-medium text-gray-600 mb-1">Priorität</label>
              <div className="grid grid-cols-3 gap-2">
                {Object.entries(PRIO).map(([k,v])=>(
                  <button key={k} onClick={()=>setForm(p=>({...p,prioritaet:k}))}
                    className={`py-2 rounded-lg border-2 text-xs font-semibold transition-all ${form.prioritaet===k?`border-purple-500 ${v.bg} ${v.text}`:'border-gray-200 text-gray-500 hover:border-gray-300'}`}>
                    {v.l}
                  </button>
                ))}
              </div>
            </div>
          </div>
          {!form.id && <p className="text-[11px] text-purple-500 mb-2">📬 Alle Trainer werden benachrichtigt.</p>}
          <div className="flex gap-2">
            <Btn variant="secondary" className="flex-1" onClick={()=>setForm(null)}>Abbrechen</Btn>
            <Btn className="flex-1" onClick={save} disabled={!form.titel?.trim()||saving}>{saving?'…':'Speichern'}</Btn>
          </div>
        </Modal>
      )}

      <div className="flex items-center justify-between mb-4">
        <div>
          <h1 className="text-lg font-semibold">Aufgaben</h1>
          <p className="text-xs text-gray-400">{aufgaben.length} Aufgabe{aufgaben.length!==1?'n':''}</p>
        </div>
        <button onClick={()=>setForm({...EMPTY})}
          className="px-3 py-2 rounded-xl bg-purple-600 text-white text-sm font-semibold hover:bg-purple-700 transition-colors">
          + Neu
        </button>
      </div>

      {/* Status-Übersicht */}
      <div className="grid grid-cols-3 gap-2 mb-4">
        {[['offen','🔴','Offen'],['in_bearbeitung','🔵','Läuft'],['erledigt','🟢','Erledigt']].map(([k,e,l])=>(
          <button key={k} onClick={()=>setFilter(filter===k?'alle':k)}
            className={`text-center py-2.5 rounded-xl border-2 transition-all ${filter===k?'border-purple-500 bg-purple-50':'border-gray-200 bg-white hover:border-gray-300'}`}>
            <div className="text-lg">{e}</div>
            <div className="text-base font-bold">{counts[k]}</div>
            <div className="text-[10px] text-gray-500">{l}</div>
          </button>
        ))}
      </div>

      {filtered.length===0 ? (
        <div className="text-center text-gray-400 py-10 text-sm">Keine Aufgaben.</div>
      ) : (
        <div className="space-y-3">
          {filtered.map(a=>{
            const prio = PRIO[a.prioritaet]||PRIO.mittel;
            const stat = STATUS[a.status]||STATUS.offen;
            const days = daysUntil(a.frist);
            const overdue = days!==null && days<0 && a.status!=='erledigt';
            return (
              <div key={a.id} className={`bg-white border rounded-xl p-4 ${overdue?'border-red-300':'border-gray-200'}`}>
                <div className="flex items-start justify-between gap-2 mb-2">
                  <div className="flex-1 min-w-0">
                    <div className="flex flex-wrap gap-1.5 mb-1">
                      <span className={`text-[10px] font-semibold px-2 py-0.5 rounded-full ${prio.bg} ${prio.text}`}>{prio.l}</span>
                      <span className={`text-[10px] font-semibold px-2 py-0.5 rounded-full ${stat.bg} ${stat.text}`}>{stat.l}</span>
                      {overdue && <span className="text-[10px] font-semibold px-2 py-0.5 rounded-full bg-red-100 text-red-700">⚠️ Überfällig</span>}
                    </div>
                    <div className="font-semibold text-sm">{a.titel}</div>
                    {a.beschreibung && <div className="text-xs text-gray-500 mt-0.5">{a.beschreibung}</div>}
                  </div>
                  <div className="flex items-center gap-1 flex-shrink-0">
                    <button onClick={()=>setForm({...a})} className="p-1.5 rounded-lg hover:bg-purple-50 text-purple-500 text-sm">✏️</button>
                    <button onClick={()=>setDelId(a.id)} className="p-1.5 rounded-lg hover:bg-red-50 text-gray-400 hover:text-red-500 text-sm">🗑</button>
                  </div>
                </div>
                <div className="flex flex-wrap gap-3 text-[11px] text-gray-500 mb-2">
                  {a.verantwortlicherName && <span>👤 {a.verantwortlicherName}</span>}
                  {a.frist && <span className={overdue?'text-red-600 font-semibold':''}>{overdue?'⚠️':''} Frist: {fmtDate(a.frist)}{days!==null&&!overdue&&days<=7?` (${days}T)`:''}  </span>}
                  {a.createdBy && <span>Erstellt von {a.createdBy}</span>}
                </div>
                {/* Status-Wechsel */}
                <div className="flex gap-1.5">
                  {Object.entries(STATUS).map(([k,v])=>(
                    <button key={k} onClick={()=>updateStatus(a.id,k)} disabled={a.status===k}
                      className={`flex-1 py-1 rounded-lg text-[10px] font-semibold transition-all border
                        ${a.status===k?`${v.bg} ${v.text} border-transparent`:'border-gray-200 text-gray-400 hover:border-gray-300 hover:text-gray-600'}`}>
                      {v.l}
                    </button>
                  ))}
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function EmailSettings({show}) {
  const EMPTY = {publicKey:'', serviceId:'', tplTraining:'', tplSpiel:'', tplAnnouncement:''};
  const [form, setForm] = useState(EMPTY);
  const [loading, setLoading] = useState(true);
  const [saving, setSaving] = useState(false);
  const [tested, setTested] = useState(null);

  useEffect(()=>{
    col('config').doc('emailjs').get().then(snap=>{
      if(snap.exists) setForm({...EMPTY,...snap.data()});
      setLoading(false);
    });
  },[]);

  const save = async (e) => {
    e.preventDefault(); setSaving(true);
    await col('config').doc('emailjs').set(form, {merge:true});
    _ejsConfig = null; // Cache zurücksetzen
    show('E-Mail Einstellungen gespeichert ✅');
    setSaving(false);
  };

  const testEmail = async () => {
    setTested(null);
    const cfg = await getEmailConfig();
    if (!cfg?.publicKey || !cfg?.serviceId || !cfg?.tplAnnouncement) {
      setTested('error'); return;
    }
    try {
      const user = firebase.auth().currentUser;
      await emailjs.send(cfg.serviceId, cfg.tplAnnouncement, {
        to_email: user.email,
        ankuendigung_titel: '✅ Test-E-Mail von KickCoach',
        ankuendigung_text: 'EmailJS ist korrekt eingerichtet! Benachrichtigungen funktionieren.',
        absender: 'KickCoach System',
      }, cfg.publicKey);
      setTested('ok');
    } catch(e) { setTested('error'); }
  };

  const Inp2 = ({label, field, placeholder=''}) => (
    <div>
      <label className="block text-xs font-medium text-gray-600 mb-1">{label}</label>
      <input value={form[field]} onChange={e=>setForm(f=>({...f,[field]:e.target.value}))}
        placeholder={placeholder}
        className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-500"/>
    </div>
  );

  if (loading) return <Spinner/>;

  return (
    <div className="p-4 max-w-xl">
      <h1 className="text-lg font-semibold mb-1">✉️ E-Mail Benachrichtigungen</h1>
      <p className="text-xs text-gray-400 mb-4">Träge hier deine EmailJS-Zugangsdaten ein. Einmalig einrichten — danach laufen Benachrichtigungen automatisch.</p>

      {/* Setup-Anleitung */}
      <div className="bg-blue-50 border border-blue-200 rounded-xl p-3 mb-4 text-xs text-blue-800 space-y-1">
        <div className="font-semibold mb-1">📋 Schnell-Anleitung EmailJS (5 Minuten):</div>
        <div>1. Konto erstellen auf <span className="font-mono bg-blue-100 px-1 rounded">emailjs.com</span> (kostenlos)</div>
        <div>2. <strong>Email Services</strong> → Gmail / Outlook verbinden → Service ID notieren</div>
        <div>3. <strong>Email Templates</strong> → 3 Templates anlegen (Training, Spiel, Ankündigung)</div>
        <div>4. <strong>Account → API Keys</strong> → Public Key kopieren</div>
        <div className="mt-1 font-semibold">Template-Variablen für jedes Template:</div>
        <div className="font-mono bg-blue-100 rounded p-1.5 text-[11px] leading-relaxed">
          To Email: {'{{to_email}}'}<br/>
          Training: {'{{training_datum}}'} {'{{training_zeit}}'} {'{{training_ort}}'} {'{{training_notizen}}'}<br/>
          Spiel: {'{{spiel_gegner}}'} {'{{spiel_datum}}'} {'{{spiel_anstoss}}'} {'{{spiel_treffzeit}}'} {'{{spiel_treffpunkt}}'} {'{{spiel_trikot}}'}<br/>
          Ankündigung: {'{{ankuendigung_titel}}'} {'{{ankuendigung_text}}'}<br/>
          Alle Templates: {'{{absender}}'}
        </div>
      </div>

      <form onSubmit={save} className="space-y-3">
        <Inp2 label="Public Key" field="publicKey" placeholder="user_xxxxxxxxxxxxxx"/>
        <Inp2 label="Service ID" field="serviceId" placeholder="service_xxxxxxx"/>
        <div className="border-t border-gray-100 pt-3">
          <div className="text-xs font-semibold text-gray-500 mb-2">Template IDs</div>
          <div className="space-y-2">
            <Inp2 label="🏃 Training Template ID" field="tplTraining" placeholder="template_xxxxxxx"/>
            <Inp2 label="⚽ Spiel Template ID" field="tplSpiel" placeholder="template_xxxxxxx"/>
            <Inp2 label="📢 Ankündigung Template ID" field="tplAnnouncement" placeholder="template_xxxxxxx"/>
          </div>
        </div>
        <div className="flex gap-2 pt-2">
          <Btn type="submit" className="flex-1" disabled={saving}>{saving ? 'Speichert…' : 'Speichern'}</Btn>
          <Btn type="button" variant="secondary" onClick={testEmail}>Test senden</Btn>
        </div>
        {tested==='ok' && <div className="text-xs text-green-600 bg-green-50 rounded-lg px-3 py-2">✅ Test-E-Mail gesendet! Prüfe dein Postfach.</div>}
        {tested==='error' && <div className="text-xs text-red-600 bg-red-50 rounded-lg px-3 py-2">❌ Fehler — prüfe Public Key, Service ID und Template ID für Ankündigungen.</div>}
      </form>
    </div>
  );
}

//  PROFIL VERVOLLSTÄNDIGEN (Auth vorhanden, aber kein Firestore-Doc)
// ═══════════════════════════════════════════════════════════════════
function CompleteProfile({user, onDone}) {
  const ADMIN_EMAIL = 'finanzmakler.rittner@gmail.com';
  const ROLES = [
    {v:'player',           l:'Spieler',            icon:'⚽', desc:'Training, Wellness, Chat'},
    {v:'trainer',          l:'Trainer',            icon:'📋', desc:'Kader, Training, Taktik'},
    {v:'dual',             l:'Trainer & Spieler',  icon:'🔄', desc:'Zwei Teams, zwei Rollen'},
    {v:'vorstand',         l:'Vorstand',           icon:'🏟️',desc:'Genehmigung erforderlich 🔒'},
    {v:'vorstand_trainer', l:'Vorstand & Trainer', icon:'🎯', desc:'Genehmigung erforderlich 🔒', wide:true},
  ];

  // step: 'role' | 'team' | 'name' | 'dob' | 'trainer_team' | 'nonplayer'
  const [step,           setStep]           = useState('role');
  const [role,           setRole]           = useState('player');
  const [teams,          setTeams]          = useState([]);
  const [selectedTeam,   setSelectedTeam]   = useState(null); // for player
  const [trainerTeam,    setTrainerTeam]    = useState(null); // for trainer/dual/vt
  const [slots,          setSlots]          = useState([]);
  const [loadingSlots,   setLoadingSlots]   = useState(false);
  const [selectedSlot,   setSelectedSlot]   = useState(null);
  const [dob,            setDob]            = useState('');
  const [name,           setName]           = useState(user.displayName||'');
  const [npDob,          setNpDob]          = useState('');
  const [saving,         setSaving]         = useState(false);
  const [msg,            setMsg]            = useState('');

  // Load teams once
  useEffect(()=>{
    col('teams').orderBy('name').get().then(s=>setTeams(s.docs.map(d=>({id:d.id,...d.data()}))));
  },[]);

  // Load player slots when player team selected
  useEffect(()=>{
    if(!selectedTeam) return;
    setLoadingSlots(true); setSlots([]);
    const unsub = col('users')
      .where('teamId','==',selectedTeam.id)
      .onSnapshot(s=>{
        const unclaimed = s.docs.map(d=>({id:d.id,...d.data()}))
          .filter(u=>u.role==='player' && u.claimed===false && u.id!==user.uid)
          .sort((a,b)=>(a.name||'').localeCompare(b.name||''));
        setSlots(unclaimed);
        setLoadingSlots(false);
      });
    return ()=>unsub();
  },[selectedTeam?.id]);

  // Load trainer slots when trainer team selected
  useEffect(()=>{
    if(!trainerTeam) return;
    setLoadingSlots(true); setSlots([]);
    const unsub = col('users')
      .where('trainerTeamId','==',trainerTeam.id)
      .onSnapshot(s=>{
        setSlots(s.docs.map(d=>({id:d.id,...d.data()})));
        setLoadingSlots(false);
      });
    return ()=>unsub();
  },[trainerTeam?.id]);

  const savePlayer = async (slot) => {
    const s = slot || selectedSlot;
    if(!s) return;
    setSaving(true);
    try {
      // Slot-Daten ins Auth-UID-Dokument übertragen
      await col('users').doc(user.uid).set({
        name:      s.name,
        email:     user.email||'',
        role:      'player',
        status:    'active',
        teamId:    selectedTeam.id,
        trainerTeamId: '',
        position:  s.position||'',
        number:    s.number||'',
        color:     s.color||randColor(),
        dob:       s.dob||'',
        mitgliedStatus: s.mitgliedStatus||'',
        claimed:   true,
        claimedAt: ts(),
        createdAt: ts(),
      });
      // Alten Slot löschen → kein doppelter Eintrag
      await col('users').doc(s.id).delete();
      onDone();
    } catch(e){ setMsg(e.message); }
    setSaving(false);
  };

  const saveNonPlayer = async (e) => {
    e.preventDefault(); setSaving(true); setMsg('');
    try {
      const email = user.email||'';
      const existing = await col('users').limit(2).get();
      const isFirst  = existing.docs.filter(d=>d.id!==user.uid).length === 0;
      const isAdmin2 = isFirst || email.toLowerCase()===ADMIN_EMAIL;
      const finalRole = isAdmin2 ? 'vorstand' : role;
      const needsApproval2 = !isAdmin2 && (finalRole==='vorstand'||finalRole==='vorstand_trainer');
      await col('users').doc(user.uid).set({
        name, email, role: finalRole,
        status: needsApproval2 ? 'pending' : 'active',
        teamId: '',
        trainerTeamId: trainerTeam?.id || '',
        dob: '',
        color: randColor(), createdAt: ts(),
        claimed: true,
      });
      onDone();
    } catch(err){ setMsg(err.message); }
    setSaving(false);
  };

  const bg = {background:'linear-gradient(160deg,#1a0505 0%,#0d0d0d 45%,#0a0a0a 100%)'};
  const cardCls = "w-full max-w-sm rounded-2xl overflow-hidden shadow-2xl p-5 space-y-3";
  const cardStyle = {background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.08)'};
  const inputCls2 = "w-full rounded-xl px-4 py-3 text-sm bg-white/5 border border-white/10 text-white placeholder-gray-500 focus:outline-none focus:border-red-500 focus:ring-1 focus:ring-red-500 transition-colors";
  const labelCls2 = "block text-xs font-medium text-gray-400 mb-1.5";
  const btnPrimary = "w-full py-3 rounded-xl font-bold text-sm text-white transition-all disabled:opacity-40";
  const btnPrimaryStyle = {background:'linear-gradient(135deg,#CC0000,#990000)',boxShadow:'0 4px 20px rgba(204,0,0,0.3)'};

  const Header = ({icon,title,sub}) => (
    <div className="text-center mb-5">
      <div className="text-4xl mb-2">{icon}</div>
      <h1 className="text-xl font-black text-white">{title}</h1>
      {sub&&<p className="text-xs mt-1" style={{color:'rgba(255,255,255,0.35)'}}>{sub}</p>}
    </div>
  );

  // ── STEP: role ──────────────────────────────────────────────────
  if(step==='role') return (
    <div className="min-h-screen flex flex-col items-center justify-center p-4" style={bg}>
      <Header icon="⚽" title="Willkommen!" sub={user.email}/>
      <div className={cardCls} style={cardStyle}>
        <p className={labelCls2}>Ich bin…</p>
        <div className="grid grid-cols-2 gap-2">
          {ROLES.map(r=>(
            <button key={r.v} type="button"
              onClick={()=>{
                setRole(r.v);
                if(r.v==='player') setStep('team');
                else if(r.v==='trainer'||r.v==='dual'||r.v==='vorstand_trainer') setStep('trainer_team');
                else setStep('nonplayer');
              }}
              className={`flex flex-col items-center gap-1 py-3 px-2 rounded-xl border text-center transition-all ${r.wide?'col-span-2':''}`}
              style={{borderColor:'rgba(255,255,255,0.08)',background:'rgba(255,255,255,0.03)'}}>
              <span className="text-lg">{r.icon}</span>
              <span className="text-xs font-semibold text-white">{r.l}</span>
              <span className="text-[9px] leading-tight" style={{color:'rgba(255,255,255,0.4)'}}>{r.desc}</span>
            </button>
          ))}
        </div>
        <button onClick={()=>auth.signOut()} className="w-full text-xs text-center pt-1" style={{color:'rgba(255,255,255,0.25)'}}>Abmelden</button>
      </div>
    </div>
  );

  // ── STEP: team (player only) ─────────────────────────────────────
  if(step==='team') return (
    <div className="min-h-screen flex flex-col items-center justify-center p-4" style={bg}>
      <Header icon="🏟️" title="Dein Team" sub="Wähle das Team aus, in dem du spielst"/>
      <div className={cardCls} style={cardStyle}>
        {teams.length===0
          ? <div className="text-center py-6 text-gray-400 text-sm">Noch keine Teams angelegt.</div>
          : <div className="space-y-2">
              {teams.map(t=>(
                <button key={t.id} onClick={()=>{setSelectedTeam(t);setSelectedSlot(null);setStep('name');}}
                  className="w-full flex items-center gap-3 rounded-xl px-4 py-3 text-left transition-all"
                  style={{border:'1px solid rgba(255,255,255,0.1)',background:'rgba(255,255,255,0.04)'}}>
                  <span className="text-2xl">⚽</span>
                  <div>
                    <div className="text-sm font-semibold text-white">{t.name}</div>
                    {t.category&&<div className="text-xs" style={{color:'rgba(255,255,255,0.4)'}}>{t.category}</div>}
                  </div>
                </button>
              ))}
            </div>
        }
        <button onClick={()=>setStep('role')} className="w-full text-xs text-center pt-1" style={{color:'rgba(255,255,255,0.3)'}}>← Zurück</button>
      </div>
    </div>
  );

  // ── STEP: name (player picks from slot list) ─────────────────────
  if(step==='name') return (
    <div className="min-h-screen flex flex-col items-center justify-center p-4" style={bg}>
      <Header icon="🔍" title="Wähle deinen Namen" sub={`Team: ${selectedTeam?.name}`}/>
      <div className={cardCls} style={cardStyle}>
        {loadingSlots ? <Spinner/> : slots.length===0 ? (
          <div className="text-center py-6">
            <div className="text-3xl mb-2">🤔</div>
            <p className="text-sm text-gray-400 mb-1">Noch kein Name für dich angelegt.</p>
            <p className="text-xs" style={{color:'rgba(255,255,255,0.3)'}}>Bitte den Trainer, deinen Namen im Kader einzutragen.</p>
          </div>
        ) : (
          <div className="space-y-2 max-h-72 overflow-y-auto">
            {slots.map(s=>(
              <button key={s.id} onClick={()=>savePlayer(s)}
                className="w-full flex items-center gap-3 rounded-xl px-4 py-3 text-left transition-all"
                style={{border:'1px solid rgba(255,255,255,0.1)',background:'rgba(255,255,255,0.04)'}}>
                <div className="w-9 h-9 rounded-full flex items-center justify-center text-white text-xs font-bold flex-shrink-0"
                  style={{background:s.color||'#CC0000'}}>
                  {s.number||initials(s.name)}
                </div>
                <div>
                  <div className="text-sm font-semibold text-white">{s.name}</div>
                  <div className="text-xs" style={{color:'rgba(255,255,255,0.4)'}}>{s.position||'—'}</div>
                </div>
              </button>
            ))}
          </div>
        )}
        <button onClick={()=>setStep('team')} className="w-full text-xs text-center pt-2" style={{color:'rgba(255,255,255,0.3)'}}>← Zurück</button>
      </div>
    </div>
  );

  // ── STEP: dob (confirm identity) ─────────────────────────────────
  // ── STEP: trainer_team (trainer / dual / vorstand_trainer) ─────────
  if(step==='trainer_team') return (
    <div className="min-h-screen flex flex-col items-center justify-center p-4" style={bg}>
      <Header icon="📋" title="Dein Trainer-Team"
        sub={role==='dual'?'Welches Team trainierst du?':role==='vorstand_trainer'?'Welches Team betreust du?':'Welches Team trainierst du?'}/>
      <div className={cardCls} style={cardStyle}>
        {teams.length===0
          ? <div className="text-center py-6 text-gray-400 text-sm">Noch keine Teams angelegt.</div>
          : <div className="space-y-2">
              {teams.map(t=>(
                <button key={t.id} onClick={()=>{setTrainerTeam(t);setStep(role==='trainer'?'trainer_name':'nonplayer');}}
                  className="w-full flex items-center gap-3 rounded-xl px-4 py-3 text-left transition-all"
                  style={{border:'1px solid rgba(255,255,255,0.1)',background:'rgba(255,255,255,0.04)'}}>
                  <span className="text-2xl">📋</span>
                  <div>
                    <div className="text-sm font-semibold text-white">{t.name}</div>
                    {t.category&&<div className="text-xs" style={{color:'rgba(255,255,255,0.4)'}}>{t.category}</div>}
                  </div>
                </button>
              ))}
            </div>
        }
        <button onClick={()=>setStep('role')} className="w-full text-xs text-center pt-1" style={{color:'rgba(255,255,255,0.3)'}}>← Zurück</button>
      </div>
    </div>
  );

  // ── STEP: trainer_name (trainer picks from slot list) ───────────
  if(step==='trainer_name') {
    const trainerSlots = slots.filter(s=>s.role==='trainer'&&s.claimed===false&&s.id!==user.uid);

    const saveTrainer = async (s) => {
      setSaving(true);
      try {
        await col('users').doc(user.uid).set({
          name:      s.name,
          email:     user.email||'',
          role:      'trainer',
          status:    'active',
          teamId:    trainerTeam.id,
          trainerTeamId: trainerTeam.id,
          trainerTeamIds: [trainerTeam.id],
          color:     s.color||randColor(),
          claimed:   true,
          slotId:    s.id,
          claimedAt: ts(),
          createdAt: ts(),
        });
        // Alten Slot löschen → kein doppelter Eintrag
        await col('users').doc(s.id).delete();
        onDone();
      } catch(e){ setMsg(e.message); }
      setSaving(false);
    };

    return (
      <div className="min-h-screen flex flex-col items-center justify-center p-4" style={bg}>
        <Header icon="📋" title="Wähle deinen Namen" sub={`Team: ${trainerTeam?.name}`}/>
        <div className={cardCls} style={cardStyle}>
          {loadingSlots ? <Spinner/> : trainerSlots.length===0 ? (
            <div className="text-center py-6">
              <div className="text-3xl mb-2">🤔</div>
              <p className="text-sm text-gray-400 mb-1">Noch kein Trainer-Slot angelegt.</p>
              <p className="text-xs" style={{color:'rgba(255,255,255,0.3)'}}>Bitte den Vorstand, deinen Namen einzutragen.</p>
            </div>
          ) : (
            <div className="space-y-2 max-h-72 overflow-y-auto">
              {trainerSlots.map(s=>(
                <button key={s.id} onClick={()=>saveTrainer(s)} disabled={saving}
                  className="w-full flex items-center gap-3 rounded-xl px-4 py-3 text-left transition-all disabled:opacity-50"
                  style={{border:'1px solid rgba(255,255,255,0.1)',background:'rgba(255,255,255,0.04)'}}>
                  <div className="w-9 h-9 rounded-full flex items-center justify-center text-white text-xs font-bold flex-shrink-0"
                    style={{background:s.color||'#CC0000'}}>
                    {initials(s.name)}
                  </div>
                  <div className="text-sm font-semibold text-white">{s.name}</div>
                </button>
              ))}
            </div>
          )}
          {msg&&<p className="text-xs rounded-xl px-4 py-2.5 mt-2" style={{background:'rgba(204,0,0,0.15)',border:'1px solid rgba(204,0,0,0.3)',color:'#ff8080'}}>{msg}</p>}
          <button onClick={()=>setStep('trainer_team')} className="w-full text-xs text-center pt-2" style={{color:'rgba(255,255,255,0.3)'}}>← Zurück</button>
        </div>
      </div>
    );
  }

  // ── STEP: nonplayer (vorstand / dual / vorstand_trainer) ─────────
  return (
    <div className="min-h-screen flex flex-col items-center justify-center p-4" style={bg}>
      <Header icon={role==='trainer'?'📋':role==='dual'?'🔄':'🏟️'} title="Profil einrichten" sub={user.email}/>
      <div className={cardCls} style={cardStyle}>
        <form onSubmit={saveNonPlayer} className="space-y-3">
          <div>
            <label className={labelCls2}>Vollständiger Name</label>
            <input className={inputCls2} value={name} onChange={e=>setName(e.target.value)} placeholder="Max Mustermann" required/>
          </div>
          {msg&&<p className="text-xs rounded-xl px-4 py-2.5" style={{background:'rgba(204,0,0,0.15)',border:'1px solid rgba(204,0,0,0.3)',color:'#ff8080'}}>{msg}</p>}
          <button type="submit" disabled={saving||!name.trim()}
            className={btnPrimary} style={btnPrimaryStyle}>
            {saving?'⏳ Speichern…':'Profil speichern'}
          </button>
          <button type="button"
            onClick={()=>setStep(role==='trainer'||role==='dual'||role==='vorstand_trainer'?'trainer_team':'role')}
            className="w-full text-xs text-center" style={{color:'rgba(255,255,255,0.25)'}}>← Zurück</button>
        </form>
      </div>
    </div>
  );
}

//  SPIELER VERKNÜPFEN (Fallback für alte Accounts ohne teamId)
// ═══════════════════════════════════════════════════════════════════
function ClaimPlayer({authUser, profile, onClaimed}) {
  const [teams,       setTeams]       = useState([]);
  const [selectedTeam,setSelectedTeam]= useState(null);
  const [slots,       setSlots]       = useState([]);
  const [loading,     setLoading]     = useState(false);
  const [saving,      setSaving]      = useState(false);
  const [pendingSlot, setPendingSlot] = useState(null);

  useEffect(()=>{
    col('teams').orderBy('name').get().then(s=>setTeams(s.docs.map(d=>({id:d.id,...d.data()}))));
  },[]);

  useEffect(()=>{
    if(!selectedTeam) return;
    setLoading(true);
    const unsub = col('users').where('teamId','==',selectedTeam.id).onSnapshot(s=>{
      const unclaimed = s.docs.map(d=>({id:d.id,...d.data()}))
        .filter(u=>u.role==='player'&&u.claimed===false&&u.id!==authUser.uid)
        .sort((a,b)=>(a.name||'').localeCompare(b.name||''));
      setSlots(unclaimed); setLoading(false);
    });
    return ()=>unsub();
  },[selectedTeam?.id]);

  const claim = async (slot) => {
    const s = slot || pendingSlot;
    if(!s) return;
    setSaving(true);
    try {
      // Slot-Daten ins bestehende Auth-UID-Dokument übertragen
      await col('users').doc(authUser.uid).update({
        name:s.name, position:s.position||'',
        number:s.number||'', color:s.color||randColor(),
        teamId:selectedTeam.id, dob:s.dob||'',
        mitgliedStatus:s.mitgliedStatus||'',
        claimed:true, claimedAt:ts(),
      });
      // Alten Slot löschen → kein doppelter Eintrag
      await col('users').doc(s.id).delete();
      onClaimed();
    } catch(e){alert(e.message);}
    setSaving(false);
  };

  return (
    <div className="min-h-screen bg-gradient-to-br from-red-900 to-gray-950 flex items-center justify-center p-4">
      <div className="w-full max-w-sm">
        <div className="text-center mb-6">
          <div className="text-5xl mb-2">🔗</div>
          <h1 className="text-2xl font-bold text-white">Account verknüpfen</h1>
          <p className="text-red-200 text-sm mt-1">Wähle zuerst dein Team, dann deinen Namen.</p>
        </div>
        <div className="bg-white rounded-2xl shadow-2xl p-5 space-y-3">
          {/* Team picker */}
          {!selectedTeam ? (
            <>
              <p className="text-xs font-semibold text-gray-500 uppercase tracking-wider">Dein Team</p>
              <div className="space-y-2">
                {teams.map(t=>(
                  <button key={t.id} onClick={()=>{setSelectedTeam(t);setSlots([]);setPendingSlot(null);}}
                    className="w-full flex items-center gap-3 border border-gray-200 hover:border-red-500 hover:bg-red-50 rounded-xl px-4 py-3 text-left transition-all">
                    <span className="text-xl">⚽</span>
                    <div>
                      <div className="text-sm font-semibold">{t.name}</div>
                      {t.category&&<div className="text-xs text-gray-400">{t.category}</div>}
                    </div>
                  </button>
                ))}
              </div>
            </>
          ) : (
            <>
              <div className="flex items-center justify-between">
                <p className="text-xs font-semibold text-gray-500 uppercase tracking-wider">Team: {selectedTeam.name}</p>
                <button onClick={()=>setSelectedTeam(null)} className="text-xs text-red-500 hover:underline">Ändern</button>
              </div>
              {loading ? <Spinner/> : slots.length===0 ? (
                <div className="text-center py-6">
                  <div className="text-3xl mb-2">🤔</div>
                  <p className="text-sm text-gray-600">Noch keine freien Plätze in diesem Team.</p>
                  <p className="text-xs text-gray-400 mt-1">Bitte den Trainer, deinen Namen anzulegen.</p>
                </div>
              ) : (
                <div className="space-y-2">
                  {slots.map(s=>(
                    <button key={s.id} onClick={()=>claim(s)} disabled={saving}
                      className="w-full flex items-center gap-3 border border-gray-200 hover:border-red-500 hover:bg-red-50 rounded-xl px-4 py-3 text-left transition-all disabled:opacity-50">
                      <div className="w-9 h-9 rounded-full flex items-center justify-center text-white text-xs font-bold flex-shrink-0" style={{background:s.color||'#CC0000'}}>
                        {s.number||initials(s.name)}
                      </div>
                      <div><div className="text-sm font-semibold">{s.name}</div>
                        <div className="text-xs text-gray-400">{s.position||'—'}</div>
                      </div>
                    </button>
                  ))}
                </div>
              )}
            </>
          )}
          <button onClick={()=>auth.signOut()} className="w-full text-xs text-gray-400 hover:text-gray-600 text-center pt-1">Abmelden</button>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
//  ADMIN — GENEHMIGUNGEN
// ═══════════════════════════════════════════════════════════════════
function AdminGenehmigungen({show}) {
  const [pending, setPending] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(()=>{
    return col('users').where('status','==','pending')
      .onSnapshot(s=>{
        setPending(s.docs.map(d=>({id:d.id,...d.data()})));
        setLoading(false);
      });
  },[]);

  const approve = async (u) => {
    await col('users').doc(u.id).update({status:'active'});
    show(`${u.name} genehmigt ✅`);
  };
  const reject = async (u) => {
    await col('users').doc(u.id).update({status:'rejected', role:'player'});
    show(`${u.name} abgelehnt`,'error');
  };

  if(loading) return <Spinner/>;

  return (
    <div className="p-4">
      <div className="mb-4">
        <h1 className="text-lg font-semibold">Registrierungs-Anfragen</h1>
        <p className="text-xs text-gray-400">Vorstand- und Trainer-Accounts müssen genehmigt werden</p>
      </div>
      {pending.length===0 ? (
        <div className="text-center text-gray-400 py-16">
          <div className="text-4xl mb-2">✅</div>
          <p className="text-sm">Keine ausstehenden Anfragen.</p>
        </div>
      ) : (
        <div className="space-y-3">
          {pending.map(u=>(
            <div key={u.id} className="bg-white border border-amber-200 rounded-xl p-4 shadow-sm">
              <div className="flex items-start gap-3 mb-3">
                <div className="w-10 h-10 rounded-full flex items-center justify-center text-white text-sm font-bold flex-shrink-0" style={{background:u.color||'#CC0000'}}>
                  {initials(u.name)}
                </div>
                <div className="flex-1 min-w-0">
                  <div className="font-semibold text-sm">{u.name}</div>
                  <div className="text-xs text-gray-400">{u.email}</div>
                  <div className="text-xs text-amber-600 font-medium mt-0.5">
                    {u.role==='vorstand_trainer'?'Vorstand & Trainer':'Vorstand'}
                  </div>
                </div>
                <span className="text-xs bg-amber-100 text-amber-700 px-2 py-0.5 rounded-full font-medium">Ausstehend</span>
              </div>
              <div className="flex gap-2">
                <button onClick={()=>reject(u)} className="flex-1 py-2 rounded-lg border border-gray-200 text-xs font-medium text-gray-600 hover:bg-gray-50 transition-colors">
                  ✕ Ablehnen
                </button>
                <button onClick={()=>approve(u)} className="flex-1 py-2 rounded-lg bg-green-600 hover:bg-green-700 text-white text-xs font-medium transition-colors">
                  ✓ Genehmigen
                </button>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}
