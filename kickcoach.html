function TrainerKasse({profile, show}) {
  const [tab,         setTab]         = useState('uebersicht'); // uebersicht|beitraege|katalog|strafen|buch
  const [players,     setPlayers]     = useState([]);
  const [katalog,     setKatalog]     = useState([]);
  const [strafen,     setStrafen]     = useState([]);
  const [buch,        setBuch]        = useState([]);
  const [beitraege,   setBeitraege]   = useState([]);

  // Katalog-Formular
  const EK = {name:'', amount:'', description:''};
  const [katForm,     setKatForm]     = useState(EK);
  const [katEditing,  setKatEditing]  = useState(null);
  const [katOpen,     setKatOpen]     = useState(false);

  // Strafe zuweisen
  const ES = {playerId:'', fineName:'', amount:'', note:''};
  const [strafForm,   setStrafForm]   = useState(ES);
  const [strafOpen,   setStrafOpen]   = useState(false);

  // Kassenbuch-Eintrag
  const EB = {type:'einnahme', amount:'', description:'', date: new Date().toISOString().slice(0,10)};
  const [buchForm,    setBuchForm]    = useState(EB);
  const [buchOpen,    setBuchOpen]    = useState(false);

  // Filter Strafen
  const [filterSt, setFilterSt] = useState('offen'); // offen|bezahlt|alle

  useEffect(()=>{
    const u1 = col('users').where('teamId','==',profile.teamId)
      .onSnapshot(s=>setPlayers(s.docs.map(d=>({id:d.id,...d.data()})).filter(p=>p.role==='player'||p.role==='dual').sort((a,b)=>a.name?.localeCompare(b.name||''))));
    const u2 = col('fines').where('teamId','==',profile.teamId)
      .onSnapshot(s=>setKatalog(s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0))));
    const u3 = col('playerFines').where('teamId','==',profile.teamId)
      .onSnapshot(s=>setStrafen(s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.assignedAt?.seconds||0)-(a.assignedAt?.seconds||0))));
    const u4 = col('kassenbuch').where('teamId','==',profile.teamId)
      .onSnapshot(s=>setBuch(s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>b.date?.localeCompare(a.date||''))));
    const u5 = col('beitraege').where('teamId','==',profile.teamId)
      .onSnapshot(s=>setBeitraege(s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0))));
    return ()=>{u1();u2();u3();u4();u5();};
  },[]);

  // Kassenstand berechnen
  const paid       = strafen.filter(s=>s.paid);
  const strafSum   = paid.reduce((s,x)=>s+Number(x.amount||0), 0);
  const einnahmen  = buch.filter(b=>b.type==='einnahme').reduce((s,x)=>s+Number(x.amount||0),0);
  const ausgaben   = buch.filter(b=>b.type==='ausgabe').reduce((s,x)=>s+Number(x.amount||0),0);
  const kassenstand = strafSum + einnahmen - ausgaben;
  const offenSum   = strafen.filter(s=>!s.paid).reduce((s,x)=>s+Number(x.amount||0),0);

  const fmt = (n) => Number(n).toFixed(2).replace('.',',') + ' €';

  // Katalog speichern
  const saveKat = async (e) => {
    e.preventDefault();
    const data = {teamId:profile.teamId, name:katForm.name, amount:Number(katForm.amount), description:katForm.description, createdAt:ts()};
    if(katEditing) await col('fines').doc(katEditing).update(data);
    else           await col('fines').add(data);
    show(katEditing?'Aktualisiert ✅':'Strafe hinzugefügt ✅');
    setKatForm(EK); setKatEditing(null); setKatOpen(false);
  };
  const deleteKat = async (id) => {
    if(!window.confirm('Strafe aus Katalog löschen?')) return;
    await col('fines').doc(id).delete();
    show('Gelöscht');
  };

  // Strafe zuweisen
  const saveStraf = async (e) => {
    e.preventDefault();
    const player = players.find(p=>p.id===strafForm.playerId);
    await col('playerFines').add({
      teamId: profile.teamId,
      playerId: strafForm.playerId,
      playerName: player?.name||'',
      fineName: strafForm.fineName,
      amount: Number(strafForm.amount),
      note: strafForm.note,
      paid: false,
      assignedAt: ts(),
      assignedBy: profile.name,
    });
    show('Strafe eingetragen ✅');
    setStrafForm(ES); setStrafOpen(false);
  };
  const togglePaid = async (straf) => {
    await col('playerFines').doc(straf.id).update({paid:!straf.paid, paidAt: !straf.paid ? ts() : null});
  };
  const deleteStraf = async (id) => {
    if(!window.confirm('Strafe wirklich löschen?')) return;
    await col('playerFines').doc(id).delete();
    show('Strafe gelöscht');
  };

  // Kassenbuch
  const saveBuch = async (e) => {
    e.preventDefault();
    await col('kassenbuch').add({
      teamId: profile.teamId,
      type: buchForm.type,
      amount: Number(buchForm.amount),
      description: buchForm.description,
      date: buchForm.date,
      createdAt: ts(),
      addedBy: profile.name,
    });
    show('Eintrag gespeichert ✅');
    setBuchForm(EB); setBuchOpen(false);
  };
  const deleteBuch = async (id) => {
    if(!window.confirm('Eintrag löschen?')) return;
    await col('kassenbuch').doc(id).delete();
    show('Gelöscht');
  };

  // ── Beiträge / Spargeld ──────────────────────────────────────────
  const EB2 = {playerId:'',typ:'Spargeld',betrag:'',faelligAm:'',notiz:''};
  const [beitragForm, setBeitragForm] = React.useState(EB2);
  const [beitragOpen, setBeitragOpen] = React.useState(false);
  const BEITRAG_TYPEN = ['Spargeld','Monatsbeitrag','Turnierbeitrag','Ausrüstung','Sonstiges'];
  const beitragOffenSum = beitraege.filter(b=>!b.bezahlt).reduce((s,x)=>s+Number(x.betrag||0),0);
  const beitragBezahltSum = beitraege.filter(b=>b.bezahlt).reduce((s,x)=>s+Number(x.betrag||0),0);

  const saveBeitrag = async (e) => {
    e.preventDefault();
    const player = players.find(p=>p.id===beitragForm.playerId);
    await col('beitraege').add({teamId:profile.teamId,playerId:beitragForm.playerId,playerName:player?.name||'',typ:beitragForm.typ,betrag:Number(beitragForm.betrag),faelligAm:beitragForm.faelligAm,notiz:beitragForm.notiz,bezahlt:false,createdAt:ts(),createdBy:profile.name});
    show('Beitrag eingetragen ✅'); setBeitragForm(EB2); setBeitragOpen(false);
  };
  const toggleBeitragPaid = async (b) => { await col('beitraege').doc(b.id).update({bezahlt:!b.bezahlt}); };
  const deleteBeitrag = async (id) => { if(!window.confirm('Löschen?')) return; await col('beitraege').doc(id).delete(); show('Gelöscht'); };

  const TabBtn = ({id, label}) => (
    <button onClick={()=>setTab(id)}
      className={`flex-1 py-2 text-xs font-semibold rounded-lg transition-all ${tab===id?'bg-red-600 text-white':'text-gray-500 hover:text-gray-700'}`}>
      {label}
    </button>
  );

  const filteredStrafen = strafen.filter(s=>{
    if(filterSt==='offen')   return !s.paid;
    if(filterSt==='bezahlt') return s.paid;
    return true;
  });

  return (
    <div className="p-4">
      <h1 className="text-lg font-bold text-white mb-3">💰 Mannschaftskasse</h1>

      {/* Tab-Navigation */}
      <div className="flex gap-1 bg-gray-100 rounded-xl p-1 mb-4">
        <TabBtn id="uebersicht" label="Übersicht"/>
        <TabBtn id="beitraege"  label="Beiträge"/>
        <TabBtn id="strafen"   label="Strafen"/>
        <TabBtn id="buch"      label="Kassenbuch"/>
        <TabBtn id="katalog"   label="Katalog"/>
      </div>

      {/* ── ÜBERSICHT ── */}
      {tab==='uebersicht' && (
        <div className="space-y-4">
          {/* Kassenstand */}
          <div className={`rounded-2xl p-5 text-white text-center shadow-lg ${kassenstand>=0?'bg-gradient-to-br from-green-600 to-green-700':'bg-gradient-to-br from-red-600 to-red-700'}`}>
            <div className="text-xs font-semibold uppercase tracking-wider opacity-80 mb-1">Kassenstand</div>
            <div className="text-4xl font-bold">{fmt(kassenstand)}</div>
            <div className="text-xs opacity-70 mt-1">{kassenstand>=0?'✓ Positiver Saldo':'⚠ Negativer Saldo'}</div>
          </div>
          <div className="grid grid-cols-3 gap-2">
            <div className="glass-card rounded-xl p-3 text-center">
              <div className="text-lg font-bold text-green-600">{fmt(strafSum+einnahmen)}</div>
              <div className="text-[10px] text-gray-400 mt-0.5">Einnahmen gesamt</div>
            </div>
            <div className="glass-card rounded-xl p-3 text-center">
              <div className="text-lg font-bold text-red-500">{fmt(ausgaben)}</div>
              <div className="text-[10px] text-gray-400 mt-0.5">Ausgaben gesamt</div>
            </div>
            <div className="bg-amber-50 border border-amber-200 rounded-xl p-3 text-center">
              <div className="text-lg font-bold text-amber-600">{fmt(offenSum)}</div>
              <div className="text-[10px] text-amber-500 mt-0.5">Offen</div>
            </div>
          </div>

          {/* Offene Strafen Top */}
          {strafen.filter(s=>!s.paid).length>0 && (
            <div className="glass-card rounded-2xl p-4">
              <div className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">⚠️ Offene Strafen ({strafen.filter(s=>!s.paid).length})</div>
              <div className="space-y-2">
                {strafen.filter(s=>!s.paid).slice(0,5).map(s=>(
                  <div key={s.id} className="flex items-center gap-2 text-sm">
                    <div className="flex-1">
                      <span className="font-medium">{s.playerName}</span>
                      <span className="text-gray-400 ml-1">— {s.fineName}</span>
                    </div>
                    <span className="font-bold text-red-600">{fmt(s.amount)}</span>
                    <button onClick={()=>togglePaid(s)} className="text-[10px] bg-green-100 text-green-700 px-2 py-0.5 rounded-full font-semibold hover:bg-green-200">✓ Zahlt</button>
                  </div>
                ))}
                {strafen.filter(s=>!s.paid).length>5 && <div className="text-xs text-gray-400 text-center">+ {strafen.filter(s=>!s.paid).length-5} weitere</div>}
              </div>
            </div>
          )}

          <div className="flex gap-2">
            <Btn size="sm" className="flex-1" onClick={()=>{setStrafForm(ES);setStrafOpen(true)}}>+ Strafe eintragen</Btn>
            <Btn size="sm" variant="secondary" className="flex-1" onClick={()=>{setBuchForm(EB);setBuchOpen(true)}}>+ Kasseneintrag</Btn>
          </div>
        </div>
      )}

      {/* ── STRAFKATALOG ── */}
      {tab==='katalog' && (
        <div className="space-y-3">
          <Btn size="sm" onClick={()=>{setKatForm(EK);setKatEditing(null);setKatOpen(true)}}>+ Strafe anlegen</Btn>
          {katalog.length===0 && <div className="text-center text-gray-400 py-10 text-sm">Noch keine Strafen im Katalog.</div>}
          {katalog.map(k=>(
            <div key={k.id} className="glass-card rounded-xl p-3 flex items-start gap-3">
              <div className="flex-1">
                <div className="text-sm font-semibold">{k.name}</div>
                {k.description && <div className="text-xs text-gray-400 mt-0.5">{k.description}</div>}
              </div>
              <div className="text-sm font-bold text-red-600 flex-shrink-0">{fmt(k.amount)}</div>
              <div className="flex gap-1 flex-shrink-0">
                <button onClick={()=>{setKatForm({name:k.name,amount:String(k.amount),description:k.description||''});setKatEditing(k.id);setKatOpen(true)}}
                  className="text-xs text-gray-400 hover:text-red-600 px-1.5 py-0.5 rounded">✏️</button>
                <button onClick={()=>deleteKat(k.id)} className="text-xs text-gray-400 hover:text-red-600 px-1.5 py-0.5 rounded">🗑</button>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* ── STRAFEN ── */}
      {tab==='strafen' && (
        <div className="space-y-3">
          <div className="flex gap-2 items-center">
            <Btn size="sm" onClick={()=>{setStrafForm(ES);setStrafOpen(true)}}>+ Strafe eintragen</Btn>
            <div className="flex gap-1 ml-auto">
              {['offen','bezahlt','alle'].map(f=>(
                <button key={f} onClick={()=>setFilterSt(f)}
                  className={`text-[11px] px-2.5 py-1 rounded-lg font-semibold capitalize transition-all ${filterSt===f?'bg-red-600 text-white':'bg-gray-100 text-gray-500'}`}>{f}</button>
              ))}
            </div>
          </div>
          {filteredStrafen.length===0 && <div className="text-center text-gray-400 py-10 text-sm">Keine Einträge.</div>}
          {filteredStrafen.map(s=>(
            <div key={s.id} className={`bg-white border rounded-xl p-3 ${s.paid?'border-green-200 opacity-70':'border-gray-200'}`}>
              <div className="flex items-start gap-2">
                <div className="flex-1">
                  <div className="flex items-center gap-2">
                    <span className="text-sm font-semibold">{s.playerName}</span>
                    <span className={`text-[10px] px-1.5 py-0.5 rounded-full font-semibold ${s.paid?'bg-green-100 text-green-700':'bg-amber-100 text-amber-700'}`}>
                      {s.paid?'Bezahlt':'Offen'}
                    </span>
                  </div>
                  <div className="text-xs text-gray-500 mt-0.5">{s.fineName}{s.note?' · '+s.note:''}</div>
                  <div className="text-[10px] text-gray-400 mt-0.5">{s.assignedAt?.toDate?.()?.toLocaleDateString('de-DE')||''}  {s.assignedBy?'· von '+s.assignedBy:''}</div>
                </div>
                <div className="text-sm font-bold text-red-600 flex-shrink-0">{fmt(s.amount)}</div>
              </div>
              <div className="flex gap-2 mt-2">
                <button onClick={()=>togglePaid(s)}
                  className={`flex-1 text-xs py-1.5 rounded-lg font-semibold transition-all ${s.paid?'bg-gray-100 text-gray-500 hover:bg-amber-50 hover:text-amber-700':'bg-green-100 text-green-700 hover:bg-green-200'}`}>
                  {s.paid?'↩ Als offen markieren':'✓ Als bezahlt markieren'}
                </button>
                <button onClick={()=>deleteStraf(s.id)} className="text-xs px-3 py-1.5 rounded-lg bg-gray-100 text-gray-400 hover:bg-red-50 hover:text-red-600 transition-all">🗑</button>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* ── KASSENBUCH ── */}
      {tab==='buch' && (
        <div className="space-y-3">
          <Btn size="sm" onClick={()=>{setBuchForm(EB);setBuchOpen(true)}}>+ Eintrag hinzufügen</Btn>
          {buch.length===0 && strafen.filter(s=>s.paid).length===0 && (
            <div className="text-center text-gray-400 py-10 text-sm">Noch keine Einträge.</div>
          )}
          {/* Bezahlte Strafen als Einnahmen */}
          {paid.map(s=>(
            <div key={'s-'+s.id} className="bg-green-50 border border-green-200 rounded-xl p-3 flex items-center gap-2">
              <div className="flex-1">
                <div className="text-xs font-semibold text-green-800">Strafe: {s.playerName}</div>
                <div className="text-[10px] text-green-600">{s.fineName}{s.note?' · '+s.note:''}</div>
              </div>
              <div className="text-sm font-bold text-green-700">+{fmt(s.amount)}</div>
            </div>
          ))}
          {/* Manuelle Kassenbuch-Einträge */}
          {buch.map(b=>(
            <div key={b.id} className={`border rounded-xl p-3 flex items-center gap-2 ${b.type==='einnahme'?'bg-green-50 border-green-200':'bg-red-50 border-red-200'}`}>
              <div className="flex-1">
                <div className={`text-xs font-semibold ${b.type==='einnahme'?'text-green-800':'text-red-800'}`}>{b.description}</div>
                <div className="text-[10px] text-gray-400">{fmtDate(b.date)}{b.addedBy?' · '+b.addedBy:''}</div>
              </div>
              <div className={`text-sm font-bold flex-shrink-0 ${b.type==='einnahme'?'text-green-700':'text-red-600'}`}>
                {b.type==='einnahme'?'+':'-'}{fmt(b.amount)}
              </div>
              <button onClick={()=>deleteBuch(b.id)} className="text-gray-300 hover:text-red-500 text-xs px-1">🗑</button>
            </div>
          ))}
        </div>
      )}

      {/* ── MODAL: Katalog ── */}
      {katOpen && (
        <Modal title={katEditing?'Strafe bearbeiten':'Strafe anlegen'} onClose={()=>{setKatOpen(false);setKatEditing(null);}}>
          <form onSubmit={saveKat}>
            <Inp label="Bezeichnung" value={katForm.name} onChange={e=>setKatForm(f=>({...f,name:e.target.value}))} placeholder="z.B. Zu spät erschienen" required/>
            <Inp label="Betrag (€)" type="number" step="0.01" min="0" value={katForm.amount} onChange={e=>setKatForm(f=>({...f,amount:e.target.value}))} placeholder="5.00" required/>
            <Inp label="Beschreibung (optional)" value={katForm.description} onChange={e=>setKatForm(f=>({...f,description:e.target.value}))} placeholder="Details zur Strafe"/>
            <div className="flex gap-2">
              <Btn type="button" variant="secondary" className="flex-1" onClick={()=>{setKatOpen(false);setKatEditing(null);}}>Abbrechen</Btn>
              <Btn type="submit" className="flex-1">Speichern</Btn>
            </div>
          </form>
        </Modal>
      )}

      {/* ── MODAL: Strafe zuweisen ── */}
      {strafOpen && (
        <Modal title="Strafe eintragen" onClose={()=>setStrafOpen(false)}>
          <form onSubmit={saveStraf}>
            <div className="mb-3">
              <label className="block text-xs font-medium text-gray-600 mb-1">Spieler</label>
              <select value={strafForm.playerId} onChange={e=>setStrafForm(f=>({...f,playerId:e.target.value}))}
                className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-500" required>
                <option value="">Spieler wählen…</option>
                {players.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
              </select>
            </div>
            <div className="mb-3">
              <label className="block text-xs font-medium text-gray-600 mb-1">Strafe aus Katalog (oder manuell eingeben)</label>
              <select onChange={e=>{
                const k=katalog.find(x=>x.id===e.target.value);
                if(k) setStrafForm(f=>({...f,fineName:k.name,amount:String(k.amount)}));
              }} className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-500 mb-2">
                <option value="">Aus Katalog wählen…</option>
                {katalog.map(k=><option key={k.id} value={k.id}>{k.name} ({fmt(k.amount)})</option>)}
              </select>
            </div>
            <Inp label="Bezeichnung" value={strafForm.fineName} onChange={e=>setStrafForm(f=>({...f,fineName:e.target.value}))} placeholder="z.B. Zu spät erschienen" required/>
            <Inp label="Betrag (€)" type="number" step="0.01" min="0" value={strafForm.amount} onChange={e=>setStrafForm(f=>({...f,amount:e.target.value}))} placeholder="5.00" required/>
            <Inp label="Notiz (optional)" value={strafForm.note} onChange={e=>setStrafForm(f=>({...f,note:e.target.value}))} placeholder="z.B. 10 Min zu spät"/>
            <div className="flex gap-2">
              <Btn type="button" variant="secondary" className="flex-1" onClick={()=>setStrafOpen(false)}>Abbrechen</Btn>
              <Btn type="submit" className="flex-1">Eintragen</Btn>
            </div>
          </form>
        </Modal>
      )}


      {/* ── TAB: BEITRÄGE ── */}
      {tab==='beitraege' && (
        <div>
          <div className="flex items-center justify-between mb-4">
            <div>
              <h2 className="text-base font-bold text-white">💰 Beiträge & Spargeld</h2>
              <p className="text-xs mt-0.5" style={{color:'rgba(255,255,255,0.4)'}}>Monatsbeiträge, Spargeld & sonstige Beiträge</p>
            </div>
            <Btn size="sm" onClick={()=>setBeitragOpen(true)}>+ Eintrag</Btn>
          </div>
          <div className="grid grid-cols-2 gap-2 mb-4">
            <div className="glass-card rounded-2xl p-4 text-center">
              <div className="text-xl font-black text-amber-400">{fmt(beitragOffenSum)}</div>
              <div className="text-[11px] mt-1 font-medium" style={{color:'rgba(255,255,255,0.4)'}}>⏳ Ausstehend</div>
            </div>
            <div className="glass-card rounded-2xl p-4 text-center">
              <div className="text-xl font-black text-green-400">{fmt(beitragBezahltSum)}</div>
              <div className="text-[11px] mt-1 font-medium" style={{color:'rgba(255,255,255,0.4)'}}>✅ Bezahlt</div>
            </div>
          </div>
          {beitraege.length===0 ? (
            <div className="text-center py-10" style={{color:'rgba(255,255,255,0.3)'}}>
              <div className="text-4xl mb-3">💸</div>
              <p className="text-sm font-medium">Noch keine Einträge.</p>
            </div>
          ) : (
            <div className="space-y-2">
              {beitraege.filter(b=>!b.bezahlt).map(b=>(
                <div key={b.id} className="glass-card rounded-2xl px-4 py-3 flex items-center gap-3">
                  <div style={{flex:1,minWidth:0}}>
                    <div className="text-sm font-bold text-white truncate">{b.playerName}</div>
                    <div className="text-xs mt-0.5" style={{color:'rgba(255,255,255,0.4)'}}>{b.typ}{b.faelligAm && <> · fällig {fmtDate(b.faelligAm)}</>}</div>
                    {b.notiz && <div className="text-[11px] italic mt-0.5" style={{color:'rgba(255,255,255,0.3)'}}>{b.notiz}</div>}
                  </div>
                  <div className="text-base font-black text-amber-400 flex-shrink-0">{fmt(b.betrag)}</div>
                  <button onClick={()=>toggleBeitragPaid(b)} className="px-2 py-1 rounded-lg bg-green-600 text-white text-xs font-bold flex-shrink-0">✓</button>
                  <button onClick={()=>deleteBeitrag(b.id)} className="text-red-400 text-sm flex-shrink-0">🗑</button>
                </div>
              ))}
              {beitraege.filter(b=>b.bezahlt).length>0 && (
                <div className="mt-3 opacity-50">
                  {beitraege.filter(b=>b.bezahlt).map(b=>(
                    <div key={b.id} className="glass-card rounded-2xl px-4 py-3 flex items-center gap-3 mb-2">
                      <div style={{flex:1,minWidth:0}}>
                        <div className="text-sm font-semibold text-white truncate">{b.playerName}</div>
                        <div className="text-xs mt-0.5" style={{color:'rgba(255,255,255,0.4)'}}>{b.typ} · ✅ bezahlt</div>
                      </div>
                      <div className="text-base font-bold text-green-400 flex-shrink-0">{fmt(b.betrag)}</div>
                      <button onClick={()=>toggleBeitragPaid(b)} className="text-xs flex-shrink-0" style={{color:'rgba(255,255,255,0.3)'}}>↩</button>
                      <button onClick={()=>deleteBeitrag(b.id)} className="text-red-400 text-sm flex-shrink-0">🗑</button>
                    </div>
                  ))}
                </div>
              )}
            </div>
          )}
        </div>
      )}

      {/* ── MODAL: Beitrag ── */}
      {beitragOpen && (
        <Modal title="💰 Beitrag eintragen" onClose={()=>setBeitragOpen(false)}>
          <form onSubmit={saveBeitrag}>
            <Sel label="Spieler" value={beitragForm.playerId} onChange={e=>setBeitragForm(f=>({...f,playerId:e.target.value}))} required>
              <option value="">Spieler wählen…</option>
              {players.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
            </Sel>
            <Sel label="Art" value={beitragForm.typ} onChange={e=>setBeitragForm(f=>({...f,typ:e.target.value}))}>
              {BEITRAG_TYPEN.map(t=><option key={t} value={t}>{t}</option>)}
            </Sel>
            <Inp label="Betrag (€)" type="number" step="0.01" min="0" value={beitragForm.betrag} onChange={e=>setBeitragForm(f=>({...f,betrag:e.target.value}))} placeholder="0.00" required/>
            <Inp label="Fällig am" type="date" value={beitragForm.faelligAm} onChange={e=>setBeitragForm(f=>({...f,faelligAm:e.target.value}))}/>
            <Inp label="Notiz" value={beitragForm.notiz} onChange={e=>setBeitragForm(f=>({...f,notiz:e.target.value}))} placeholder="z.B. Monat Juni"/>
            <div className="flex gap-2 pt-1">
              <Btn type="button" variant="secondary" className="flex-1" onClick={()=>setBeitragOpen(false)}>Abbrechen</Btn>
              <Btn type="submit" className="flex-1">Speichern</Btn>
            </div>
          </form>
        </Modal>
      )}

      {/* ── MODAL: Kassenbuch ── */}
      {buchOpen && (
        <Modal title="Kasseneintrag" onClose={()=>setBuchOpen(false)}>
          <form onSubmit={saveBuch}>
            <div className="mb-3">
              <label className="block text-xs font-medium text-gray-600 mb-1">Typ</label>
              <div className="flex gap-2">
                {[{v:'einnahme',l:'Einnahme'},{v:'ausgabe',l:'Ausgabe'}].map(({v,l})=>(
                  <button key={v} type="button" onClick={()=>setBuchForm(f=>({...f,type:v}))}
                    className={`flex-1 py-2 rounded-xl text-sm font-semibold transition-all ${buchForm.type===v?v==='einnahme'?'bg-green-600 text-white':'bg-red-600 text-white':'bg-gray-100 text-gray-500'}`}>{l}</button>
                ))}
              </div>
            </div>
            <Inp label="Beschreibung" value={buchForm.description} onChange={e=>setBuchForm(f=>({...f,description:e.target.value}))} placeholder="z.B. Trikots, Turnier-Startgeld…" required/>
            <Inp label="Betrag (€)" type="number" step="0.01" min="0" value={buchForm.amount} onChange={e=>setBuchForm(f=>({...f,amount:e.target.value}))} placeholder="0.00" required/>
            <Inp label="Datum" type="date" value={buchForm.date} onChange={e=>setBuchForm(f=>({...f,date:e.target.value}))} required/>
            <div className="flex gap-2">
              <Btn type="button" variant="secondary" className="flex-1" onClick={()=>setBuchOpen(false)}>Abbrechen</Btn>
              <Btn type="submit" className="flex-1">Speichern</Btn>
            </div>
          </form>
        </Modal>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
//  MANNSCHAFTSKASSE — SPIELER
// ═══════════════════════════════════════════════════════════════════
function PlayerKasse({profile}) {
  const [katalog,    setKatalog]    = useState([]);
  const [strafen,    setStrafen]    = useState([]);
  const [allStrafen, setAllStrafen] = useState([]); // alle Team-Strafen für Kassenstand
  const [buch,       setBuch]       = useState([]);

  useEffect(()=>{
    const u1 = col('fines').where('teamId','==',profile.teamId)
      .onSnapshot(s=>setKatalog(s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0))));
    const u2 = col('playerFines').where('playerId','==',profile.id)
      .onSnapshot(s=>setStrafen(s.docs.map(d=>({id:d.id,...d.data()}))
        .filter(x=>x.teamId===profile.teamId)
        .sort((a,b)=>(b.assignedAt?.seconds||0)-(a.assignedAt?.seconds||0))));
    // Alle bezahlten Team-Strafen für Gesamtkassenstand
    const u3 = col('playerFines').where('teamId','==',profile.teamId)
      .onSnapshot(s=>setAllStrafen(s.docs.map(d=>({id:d.id,...d.data()}))));
    const u4 = col('kassenbuch').where('teamId','==',profile.teamId)
      .onSnapshot(s=>setBuch(s.docs.map(d=>({id:d.id,...d.data()}))));
    return ()=>{u1();u2();u3();u4();};
  },[]);

  const strafSum  = allStrafen.filter(s=>s.paid).reduce((s,x)=>s+Number(x.amount||0),0);
  const einnahmen = buch.filter(b=>b.type==='einnahme').reduce((s,x)=>s+Number(x.amount||0),0);
  const ausgaben  = buch.filter(b=>b.type==='ausgabe').reduce((s,x)=>s+Number(x.amount||0),0);
  const kassenstand = strafSum + einnahmen - ausgaben;

  const fmt = (n) => Number(n).toFixed(2).replace('.',',') + ' €';
  const offen   = strafen.filter(s=>!s.paid);
  const bezahlt = strafen.filter(s=>s.paid);
  const offenSum = offen.reduce((s,x)=>s+Number(x.amount||0),0);

  return (
    <div className="p-4 space-y-4">
      <h1 className="text-lg font-bold text-white">💰 Mannschaftskasse</h1>

      {/* Kassenstand */}
      <div className={`rounded-2xl p-5 text-white text-center shadow-lg ${kassenstand>=0?'bg-gradient-to-br from-green-600 to-green-700':'bg-gradient-to-br from-red-600 to-red-700'}`}>
        <div className="text-xs font-semibold uppercase tracking-wider opacity-80 mb-1">Aktueller Kassenstand</div>
        <div className="text-4xl font-bold">{fmt(kassenstand)}</div>
        <div className="text-xs opacity-70 mt-1">{kassenstand>=0?'✓ Positiver Saldo':'⚠ Negativer Saldo'}</div>
      </div>

      {/* Meine offenen Strafen prominent */}
      {offen.length>0 && (
        <div className="bg-amber-50 border border-amber-300 rounded-2xl p-4">
          <div className="text-xs font-semibold text-amber-700 uppercase tracking-wider mb-3">⚠️ Meine offenen Strafen</div>
          <div className="space-y-2">
            {offen.map(s=>(
              <div key={s.id} className="flex items-center justify-between text-sm">
                <div>
                  <div className="font-semibold text-amber-900">{s.fineName}</div>
                  {s.note && <div className="text-xs text-amber-600">{s.note}</div>}
                  <div className="text-[10px] text-amber-500">{s.assignedAt?.toDate?.()?.toLocaleDateString('de-DE')||''}</div>
                </div>
                <div className="font-bold text-red-600">{fmt(s.amount)}</div>
              </div>
            ))}
            <div className="border-t border-amber-200 pt-2 flex justify-between text-sm font-bold">
              <span className="text-amber-800">Gesamt offen</span>
              <span className="text-red-600">{fmt(offenSum)}</span>
            </div>
          </div>
        </div>
      )}

      {offen.length===0 && (
        <div className="bg-green-50 border border-green-200 rounded-2xl p-4 text-center">
          <div className="text-2xl mb-1">✅</div>
          <div className="text-sm font-semibold text-green-700">Keine offenen Strafen!</div>
        </div>
      )}

      {/* Strafkatalog */}
      <div className="glass-card rounded-2xl p-4">
        <div className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">📋 Strafkatalog</div>
        {katalog.length===0 ? (
          <p className="text-xs text-gray-400">Noch kein Strafkatalog vorhanden.</p>
        ) : (
          <div className="space-y-2">
            {katalog.map(k=>(
              <div key={k.id} className="flex items-center justify-between">
                <div>
                  <div className="text-sm font-medium">{k.name}</div>
                  {k.description && <div className="text-xs text-gray-400">{k.description}</div>}
                </div>
                <div className="text-sm font-bold text-red-600">{fmt(k.amount)}</div>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Bezahlte Strafen */}
      {bezahlt.length>0 && (
        <div className="glass-card rounded-2xl p-4">
          <div className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">✅ Bezahlte Strafen</div>
          <div className="space-y-2">
            {bezahlt.map(s=>(
              <div key={s.id} className="flex items-center justify-between text-sm opacity-70">
                <div>
                  <div className="font-medium line-through">{s.fineName}</div>
                  <div className="text-[10px] text-gray-400">{s.assignedAt?.toDate?.()?.toLocaleDateString('de-DE')||''}</div>
                </div>
                <div className="font-bold text-green-600">{fmt(s.amount)}</div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
//  TRAINER — BENACHRICHTIGUNGEN
// ═══════════════════════════════════════════════════════════════════
function TrainerPinnwand({profile}) {
  const [posts, setPosts] = useState([]);
  const CAT_COLORS = {'Allgemein':'bg-gray-100 text-gray-600','Ankündigung':'bg-blue-100 text-blue-700','Wichtig':'bg-red-100 text-red-600','Veranstaltung':'bg-red-100 text-red-700'};

  useEffect(()=>{
    return col('news').limit(40).onSnapshot(s=>{
      const all = s.docs.map(d=>({id:d.id,...d.data()}))
        .sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
      const visible = all.filter(p=>!p.recipientIds?.length||p.recipientIds.includes(profile.id));
      setPosts(visible.slice(0,30));
      // Beim Öffnen der Pinnwand-Seite alles als gelesen markieren
      visible.forEach(p=>{
        if(p.readBy&&p.readBy[profile.id]) return;
        col('news').doc(p.id).update({[`readBy.${profile.id}`]:true}).catch(()=>{});
      });
    });
  },[]);

  return (
    <div className="p-4">
      <h1 className="text-lg font-bold text-white mb-4">📌 Pinnwand</h1>
      {posts.length===0 && (
        <div className="text-center text-gray-400 py-12 text-sm">Keine Beiträge vorhanden.</div>
      )}
      <div className="space-y-3">
        {posts.map(p=>(
          <div key={p.id} className="glass-card rounded-xl p-4">
            <div className="flex items-center justify-between mb-2">
              <span className={`text-[10px] font-semibold px-2 py-0.5 rounded-full ${CAT_COLORS[p.category]||CAT_COLORS['Allgemein']}`}>{p.category||'Allgemein'}</span>
              <span className="text-[10px] text-gray-400">{fmtAgo(p.createdAt)}</span>
            </div>
            <div className="text-sm font-bold text-white mb-1">{p.title}</div>
            <p className="text-sm text-gray-600 leading-relaxed">{p.content}</p>
            <div className="text-[10px] text-gray-400 mt-2">— {p.authorName}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

  const content = {

    uebungen:      <UebungenDB profile={profile} show={show}/>,
    verletzungen:  <><TeamSwitcher/><TrainerVerletzungen  key={activeTeamId} profile={activeProfile} show={show}/></>,
    beurteilungen: <><TeamSwitcher/><TrainerBeurteilungen key={activeTeamId} profile={activeProfile} show={show}/></>,
    abwesenheiten: <><TeamSwitcher/><TrainerAbwesenheiten key={activeTeamId} profile={activeProfile}/></>,

    busplanung:         <TrainerBusplanung profile={activeProfile} show={show}/>,

// ═══════════════════════════════════════════════════════════════════
//  SPIELER — TRAINING
// ═══════════════════════════════════════════════════════════════════
function PlayerTraining({profile}) {
  const [sessions,   setSessions]   = useState([]);
  const [attendance, setAttendance] = useState({}); // sessionId → {status, reason}
  const [absences,   setAbsences]   = useState([]);
  const [detailSession, setDetailSession] = useState(null);

  // Urlaub-Check: ist das Datum in einer Abwesenheit?
  const getAbsence = (date) => absences.find(a=>date>=a.from&&date<=a.to)||null;

  useEffect(()=>{
    const u1 = col('sessions').where('teamId','==',profile.teamId)
      .onSnapshot(async s=>{
        const sess=s.docs.map(d=>({id:d.id,...d.data()}));
        setSessions(sess);
        const att={};
        await Promise.all(sess.filter(x=>x.date>=todayStr()).map(async s=>{
          const snap=await col('attendance').where('sessionId','==',s.id).where('userId','==',profile.id).limit(1).get();
          att[s.id]=snap.empty?null:{status:snap.docs[0].data().status, reason:snap.docs[0].data().reason||''};
        }));
        setAttendance(att);
      });
    const u2 = col('abwesenheiten').where('userId','==',profile.id)
      .onSnapshot(s=>setAbsences(s.docs.map(d=>({id:d.id,...d.data()}))));
    return ()=>{u1();u2();};
  },[]);

  const setStatus = async (sessionId, status) => {
    const existing=await col('attendance').where('sessionId','==',sessionId).where('userId','==',profile.id).limit(1).get();
    if(existing.empty) await col('attendance').add({sessionId,userId:profile.id,playerName:profile.name,status,reason:'',teamId:profile.teamId,updatedAt:ts()});
    else await existing.docs[0].ref.update({status,reason:'',updatedAt:ts()});
    setAttendance(a=>({...a,[sessionId]:{status,reason:''}}));
  };

  const upcoming = sessions.filter(s=>s.date>=todayStr()).sort((a,b)=>a.date.localeCompare(b.date)||(a.time||'').localeCompare(b.time||''));
  const past     = sessions.filter(s=>s.date<todayStr()).sort((a,b)=>b.date.localeCompare(a.date)||(b.time||'').localeCompare(a.time||''));

  return (
    <div className="p-4">
      <h1 className="text-xl font-extrabold text-white mb-4 drop-shadow-sm">📅 Meine Trainings</h1>

      {/* Detail-Modal (read-only) für Spieler */}
      {detailSession && (
        <SessionDetail
          session={detailSession}
          drillMap={{}}
          players={[]}
          att={{yes:0,no:0,maybe:0,byPlayer:{}}}
          onSetStatus={()=>{}}
          onEdit={()=>{}}
          onClose={()=>setDetailSession(null)}
          readOnly={true}
        />
      )}

      {sessions.length===0 ? <div className="text-center text-gray-400 py-16"><div className="text-4xl mb-2">📅</div><p className="text-sm">Noch keine Trainings geplant.</p></div> : (
        <div className="space-y-2">
          {upcoming.length>0&&<><div className="text-[11px] font-bold text-white/60 uppercase tracking-[0.12em] mb-2">Bevorstehend</div>
            {upcoming.map(s=>(
              <div key={s.id} className="glass-card rounded-2xl overflow-hidden">
                <div className="p-4 cursor-pointer hover:bg-gray-50 transition-colors" onClick={()=>setDetailSession(s)}>
                  <div className="text-sm font-semibold">{fmtDate(s.date)} · {s.time} Uhr</div>
                  <div className="text-xs text-gray-400">{s.duration} Min{s.location?' · '+s.location:''}</div>
                  {fmtDeadlineLabel(s) && <div className="text-[10px] text-amber-600 mt-0.5">⏰ Abmeldefrist: {fmtDeadlineLabel(s)}</div>}
                  {s.notes&&<p className="text-xs text-gray-500 mt-1 line-clamp-2">{s.notes}</p>}
                  <div className="text-[10px] text-gray-400 mt-1.5">📎 Tippen für Details & Anhänge</div>
                </div>
                {/* Proforma: Spieler sind automatisch zugesagt — nur abmelden nötig */}
                <div className="flex items-center gap-2 px-4 pb-3" onClick={e=>e.stopPropagation()}>
                  {(() => {
                    const att = attendance[s.id];
                    const st  = att?.status || att; // backward compat (old: string)
                    const deadlinePassed = isDeadlinePassed(s);
                    const absence = getAbsence(s.date);
                    // WICHTIG: 'yes' hat immer Vorrang — auch über Abwesenheit
                    // (Spieler hat "Trotzdem anmelden" geklickt)
                    if (st !== 'yes' && (absence || (st==='no' && att?.reason==='Urlaub'))) {
                      const label = absence?.reason || att?.reason || 'Urlaub';
                      return <>
                        <span className="text-xs font-semibold text-amber-600">🏖️ {label}</span>
                        <button onClick={()=>setStatus(s.id,'yes')}
                          className="ml-auto px-3 py-1.5 rounded-xl bg-gray-100 text-gray-600 hover:bg-green-50 hover:text-green-700 text-xs font-bold transition-colors">
                          Trotzdem anmelden
                        </button>
                      </>;
                    }
                    if (st==='maybe') {
                      return <>
                        <span className="text-xs font-semibold text-amber-500">❓ Noch unsicher</span>
                        {!deadlinePassed && <div className="ml-auto flex gap-1.5">
                          <button onClick={()=>setStatus(s.id,'yes')}
                            className="px-3 py-1.5 rounded-xl bg-green-100 text-green-700 hover:bg-green-600 hover:text-white text-xs font-bold transition-colors">
                            ✓ Zusagen
                          </button>
                          <button onClick={()=>setStatus(s.id,'no')}
                            className="px-3 py-1.5 rounded-xl bg-gray-100 text-gray-500 hover:bg-red-50 hover:text-red-600 text-xs font-bold transition-colors">
                            Abmelden
                          </button>
                        </div>}
                      </>;
                    }
                    if (st==='no') {
                      return <>
                        <span className="text-xs font-semibold text-red-600">❌ Abgemeldet</span>
                        <button onClick={()=>setStatus(s.id,'yes')}
                          className="ml-auto px-4 py-2 rounded-xl bg-green-600 text-white text-xs font-bold hover:bg-green-700 transition-colors">
                          ✓ Wieder anmelden
                        </button>
                      </>;
                    }
                    return <>
                      <span className="text-xs font-semibold text-green-600">✅ Zugesagt</span>
                      {deadlinePassed
                        ? <span className="ml-auto text-[10px] text-gray-400 italic">Abmeldefrist abgelaufen</span>
                        : <div className="ml-auto flex gap-1.5">
                            <button onClick={()=>setStatus(s.id,'maybe')}
                              className="px-3 py-1.5 rounded-xl bg-amber-100 text-amber-600 hover:bg-amber-500 hover:text-white text-xs font-bold transition-colors">
                              ❓ Noch unsicher
                            </button>
                            <button onClick={()=>setStatus(s.id,'no')}
                              className="px-3 py-1.5 rounded-xl bg-gray-100 text-gray-600 hover:bg-red-50 hover:text-red-600 text-xs font-bold transition-colors">
                              Abmelden
                            </button>
                          </div>
                      }
                    </>;
                  })()}
                </div>
              </div>
            ))}
          </>}
          {past.length>0&&<><div className="text-[11px] font-bold text-white/40 uppercase tracking-[0.12em] mb-2 mt-5">Vergangen</div>
            {past.map(s=>(
              <div key={s.id} className="glass-card rounded-2xl p-3 opacity-50 text-sm cursor-pointer hover:opacity-70 transition-opacity"
                onClick={()=>setDetailSession(s)}>
                {fmtDate(s.date)} · {s.time} · <span className="text-xs text-gray-400">📎 Anhänge</span>
              </div>
            ))}
          </>}
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
//  SPIELER — SPIELTAGE (RSVP + MITFAHRT)
// ═══════════════════════════════════════════════════════════════════
function PlayerSpiele({profile}) {
  const [games,     setGames]     = useState([]);
  const [myRsvp,    setMyRsvp]    = useState({}); // gameId → {status, mitfahrt, reason, docId}
  const [myRatings, setMyRatings] = useState({}); // gameId → rating doc
  const [absences,  setAbsences]  = useState([]);
  const [saving,    setSaving]    = useState({});
  const [detailRating, setDetailRating] = useState(null);

  const getAbsence = (date) => absences.find(a=>date>=a.from&&date<=a.to)||null;

  useEffect(()=>{
    const u1 = col('games').where('teamId','==',profile.teamId)
      .onSnapshot(s=>setGames(s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>a.date?.localeCompare(b.date||''))));
    const u2 = col('gameAttendance').where('teamId','==',profile.teamId).where('userId','==',profile.id)
      .onSnapshot(s=>{
        const map={};
        s.docs.forEach(d=>{const r=d.data(); map[r.gameId]={status:r.status,mitfahrt:r.mitfahrt,reason:r.reason||'',docId:d.id};});
        setMyRsvp(map);
      });
    // Trainer-Feedback für diesen Spieler laden (kein Composite-Index nötig)
    const u3 = col('ratings').where('playerId','==',profile.id)
      .onSnapshot(s=>{
        const map={};
        s.docs.forEach(d=>{const r={id:d.id,...d.data()}; if(r.type==='game'&&r.gameId) map[r.gameId]=r;});
        setMyRatings(map);
      });
    const u4 = col('abwesenheiten').where('userId','==',profile.id)
      .onSnapshot(s=>setAbsences(s.docs.map(d=>({id:d.id,...d.data()}))));
    return ()=>{u1();u2();u3();u4();};
  },[]);

  const saveRsvp = async (gameId, patch) => {
    setSaving(v=>({...v,[gameId]:true}));
    const existing = myRsvp[gameId];
    const data = {gameId,userId:profile.id,playerName:profile.name,teamId:profile.teamId,updatedAt:ts(),...(existing||{}), ...patch};
    delete data.docId;
    if(existing?.docId) await col('gameAttendance').doc(existing.docId).update(patch);
    else                await col('gameAttendance').add(data);
    setSaving(v=>({...v,[gameId]:false}));
  };

  const upcoming = games.filter(g=>g.date>=todayStr()).sort((a,b)=>a.date.localeCompare(b.date)||(a.time||'').localeCompare(b.time||''));
  const past     = games.filter(g=>g.date<todayStr()).sort((a,b)=>b.date.localeCompare(a.date)||(b.time||'').localeCompare(a.time||''));

  const GameRsvpCard = ({g}) => {
    const rsvp    = myRsvp[g.id]||{};
    const absence = getAbsence(g.date);
    const isUrlaub = absence || (rsvp.status==='no' && rsvp.reason==='Urlaub');
    return (
      <div className={`bg-white border rounded-xl p-4 ${isUrlaub?'border-amber-200':'border-gray-200'}`}>
        {isUrlaub && (
          <div className="mb-2 flex items-center gap-1.5 bg-amber-50 border border-amber-200 rounded-lg px-2.5 py-1.5 text-xs text-amber-700 font-semibold">
            🏖️ {absence?.reason || rsvp.reason || 'Urlaub'} – du bist für dieses Spiel abgemeldet
          </div>
        )}
        <div className="mb-3">
          <div className="flex items-center gap-2 mb-1">
            <span className="font-semibold text-sm">vs. {g.opponent}</span>
            <span className="text-xs text-gray-400">{g.home?'🏠 Heim':'✈️ Auswärts'}</span>
          </div>
          <div className="grid grid-cols-2 gap-x-3 gap-y-1 text-xs text-gray-600 mt-1.5">
            <div><span className="text-gray-400">📅 Datum:</span> {fmtDate(g.date)}</div>
            <div><span className="text-gray-400">⚽ Anstoß:</span> {g.time||'—'} Uhr</div>
            {g.treffzeit&&<div><span className="text-gray-400">🕐 Treff:</span> {g.treffzeit} Uhr</div>}
            {g.treffpunkt&&<div className="col-span-2"><span className="text-gray-400">📍 Treffpunkt:</span> {g.treffpunkt}</div>}
            {g.location&&<div className="col-span-2"><span className="text-gray-400">🏟 Ort:</span> {g.location}</div>}
            {g.trikot&&<div className="col-span-2"><span className="text-gray-400">👕 Trikot:</span> {g.trikot}</div>}
          </div>
          {g.besonderheiten&&<div className="mt-2 text-xs bg-amber-50 border border-amber-200 rounded-lg px-2.5 py-1.5 text-amber-800">
            <span className="font-semibold">⚠️ Besonderheiten:</span> {g.besonderheiten}
          </div>}
        </div>
        {/* RSVP */}
        <div className="mb-3">
          <div className="text-[10px] font-semibold text-gray-400 uppercase tracking-wider mb-1.5">Deine Rückmeldung</div>
          {isUrlaub ? (
            <button disabled={saving[g.id]} onClick={()=>saveRsvp(g.id,{status:'yes',reason:''})}
              className="w-full py-2 rounded-xl bg-gray-100 text-gray-500 hover:bg-green-50 hover:text-green-700 text-xs font-semibold transition-colors">
              ✓ Trotzdem zusagen (Urlaub überschreiben)
            </button>
          ) : (
            <div className="flex gap-2">
              {[
                {st:'yes',   icon:'✓', label:'Zusagen', on:'bg-green-600 text-white', off:'bg-gray-100 text-gray-500 hover:bg-green-50 hover:text-green-700'},
                {st:'no',    icon:'✕', label:'Absagen',  on:'bg-red-600 text-white',   off:'bg-gray-100 text-gray-500 hover:bg-red-50 hover:text-red-600'},
                {st:'maybe', icon:'?', label:'Unsicher', on:'bg-amber-500 text-white', off:'bg-gray-100 text-gray-500 hover:bg-amber-50 hover:text-amber-600'},
              ].map(({st,icon,label,on,off})=>(
                <button key={st} disabled={saving[g.id]} onClick={()=>saveRsvp(g.id,{status:st,reason:''})}
                  className={`flex-1 flex flex-col items-center gap-0.5 py-2.5 rounded-xl font-bold transition-all ${rsvp.status===st?on:off}`}>
                  <span className="text-lg leading-none">{icon}</span>
                  <span className="text-[10px] font-medium">{label}</span>
                </button>
              ))}
            </div>
          )}
        </div>
        {/* Mitfahrgelegenheit */}
        <div className="border-t border-gray-100 pt-3">
          <div className="text-[10px] font-semibold text-gray-400 uppercase tracking-wider mb-1.5">🚗 Mitfahrgelegenheit</div>
          <div className="flex gap-2">
            {[
              {v:false, label:'Nicht nötig', on:'bg-blue-600 text-white', off:'bg-gray-100 text-gray-500 hover:bg-blue-50 hover:text-blue-600'},
              {v:true,  label:'Ich benötige eine', on:'bg-orange-500 text-white', off:'bg-gray-100 text-gray-500 hover:bg-orange-50 hover:text-orange-600'},
            ].map(({v,label,on,off})=>(
              <button key={String(v)} disabled={saving[g.id]} onClick={()=>saveRsvp(g.id,{mitfahrt:v})}
                className={`flex-1 py-2 rounded-xl text-xs font-semibold transition-all ${rsvp.mitfahrt===v?on:off}`}>
                {label}
              </button>
            ))}
          </div>
        </div>
      </div>
    );
  };

  return (
    <div className="p-4">
      <h1 className="text-lg font-bold text-white mb-4">Spieltage</h1>
      {games.length===0 ? (
        <div className="text-center text-gray-400 py-16"><div className="text-4xl mb-2">🏆</div><p className="text-sm">Noch keine Spiele eingetragen.</p></div>
      ) : (
        <div className="space-y-2">
          {upcoming.length>0&&<>
            <div className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Bevorstehend</div>
            {upcoming.map(g=><GameRsvpCard key={g.id} g={g}/>)}
          </>}
          {past.length>0&&<>
            <div className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2 mt-4">Vergangen</div>
            {past.map(g=>{
              const fb = myRatings[g.id];
              return (
                <div key={g.id} className={`bg-white border rounded-xl overflow-hidden ${fb?'border-amber-200':'border-gray-200'}`}>
                  <div className="p-3 flex items-center justify-between">
                    <div>
                      <div className="text-sm font-semibold">vs. {g.opponent}</div>
                      <div className="text-xs text-gray-400">{fmtDate(g.date)}{g.ergebnis?' · '+g.ergebnis:''}</div>
                    </div>
                    {fb ? (
                      <button onClick={()=>setDetailRating(fb)}
                        className="flex items-center gap-1.5 bg-amber-50 border border-amber-200 rounded-lg px-3 py-1.5 hover:bg-amber-100 transition-colors">
                        <span className="text-amber-500 text-base">★</span>
                        <span className="text-sm font-bold text-amber-600">{fb.avg}</span>
                        <span className="text-[10px] text-amber-500 font-semibold">Feedback</span>
                      </button>
                    ) : (
                      <span className="text-[10px] text-gray-300">kein Feedback</span>
                    )}
                  </div>
                  {fb && (
                    <div className="px-3 pb-3 flex gap-3 border-t border-amber-100 pt-2">
                      {RATING_CATS.map(cat=>(
                        <div key={cat} className="flex-1 text-center">
                          <div className="text-xs font-bold text-amber-600">{fb.scores?.[cat]??'—'}</div>
                          <div className="text-[9px] text-gray-400">{cat.slice(0,3)}</div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              );
            })}
          </>}
        </div>
      )}

      {/* Feedback-Detail-Modal */}
      {detailRating && (
        <div className="fixed inset-0 bg-black/60 z-50 flex items-end md:items-center justify-center p-0 md:p-4" onClick={()=>setDetailRating(null)}>
          <div className="bg-white light-sheet w-full md:max-w-sm md:rounded-2xl rounded-t-2xl shadow-2xl" onClick={e=>e.stopPropagation()}>
            <div className="flex items-center justify-between px-5 py-4 border-b border-gray-100">
              <div>
                <div className="font-bold">vs. {detailRating.gameOpponent||'—'}</div>
                <div className="text-xs text-gray-400">{fmtDate(detailRating.gameDate)}{detailRating.trainerName?' · '+detailRating.trainerName:''}</div>
              </div>
              <button onClick={()=>setDetailRating(null)} className="w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 text-gray-500">✕</button>
            </div>
            <div className="px-5 py-4 space-y-4">
              <div className="text-center">
                <div className="text-5xl font-bold text-amber-500">{detailRating.avg}</div>
                <div className="flex justify-center gap-0.5 my-1">
                  {[1,2,3,4,5].map(i=><span key={i} className={`text-xl ${i<=Math.round(detailRating.avg)?'text-amber-400':'text-gray-200'}`}>★</span>)}
                </div>
                <div className="text-sm text-gray-400">Gesamtbewertung / 5</div>
              </div>
              <div className="bg-gray-50 light-sheet rounded-xl p-4 space-y-2.5">
                {RATING_CATS.map(cat=>(
                  <div key={cat} className="flex items-center gap-3">
                    <span className="text-sm text-gray-600 w-20">{cat}</span>
                    <div className="flex-1 h-2 bg-gray-200 rounded-full overflow-hidden">
                      <div className="h-full bg-amber-400 rounded-full" style={{width:`${((detailRating.scores?.[cat]||0)/5)*100}%`}}/>
                    </div>
                    <span className="text-sm font-bold text-gray-800 w-4 text-right">{detailRating.scores?.[cat]??'—'}</span>
                  </div>
                ))}
              </div>
              {detailRating.notes && (
                <div className="bg-blue-50 border border-blue-100 rounded-xl px-4 py-3">
                  <div className="text-xs font-semibold text-blue-600 mb-1">💬 Kommentar</div>
                  <p className="text-sm text-gray-700 leading-relaxed">{detailRating.notes}</p>
                </div>
              )}
              <Btn className="w-full" onClick={()=>setDetailRating(null)}>Schließen</Btn>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
//  SPIELER — ABWESENHEITEN (Urlaub etc.)
// ═══════════════════════════════════════════════════════════════════
function PlayerAbwesenheiten({profile}) {
  const [absences, setAbsences] = useState([]);
  const [open, setOpen]         = useState(false);
  const [form, setForm]         = useState({from:'', to:'', reason:'Urlaub'});
  const [saving, setSaving]     = useState(false);
  const {show, Container}       = useToast();

  useEffect(()=>{
    return col('abwesenheiten').where('userId','==',profile.id)
      .onSnapshot(s=>setAbsences(s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>a.from.localeCompare(b.from))));
  },[]);

  const save = async (e) => {
    e.preventDefault();
    if(form.from > form.to){ show('Von-Datum muss vor Bis-Datum liegen ❌'); return; }
    setSaving(true);
    try {
      // 1. Abwesenheit speichern
      await col('abwesenheiten').add({
        userId:profile.id, playerName:profile.name, teamId:profile.teamId,
        from:form.from, to:form.to, reason:form.reason||'Urlaub', createdAt:ts()
      });
      // 2. Alle Trainings im Zeitraum abmelden
      const [sessSnap, gameSnap] = await Promise.all([
        col('sessions').where('teamId','==',profile.teamId).get(),
        col('games').where('teamId','==',profile.teamId).get(),
      ]);
      const inRange = d => d >= form.from && d <= form.to;
      const sessions = sessSnap.docs.map(d=>({id:d.id,...d.data()})).filter(s=>s.date&&inRange(s.date));
      const games    = gameSnap.docs.map(d=>({id:d.id,...d.data()})).filter(g=>g.date&&inRange(g.date));
      await Promise.all([
        ...sessions.map(async s=>{
          const ex = await col('attendance').where('sessionId','==',s.id).where('userId','==',profile.id).limit(1).get();
          if(ex.empty) await col('attendance').add({sessionId:s.id,userId:profile.id,playerName:profile.name,status:'no',reason:'Urlaub',teamId:profile.teamId,updatedAt:ts()});
          else         await ex.docs[0].ref.update({status:'no',reason:'Urlaub',updatedAt:ts()});
        }),
        ...games.map(async g=>{
          const ex = await col('gameAttendance').where('gameId','==',g.id).where('userId','==',profile.id).limit(1).get();
          if(ex.empty) await col('gameAttendance').add({gameId:g.id,userId:profile.id,playerName:profile.name,status:'no',reason:'Urlaub',teamId:profile.teamId,updatedAt:ts()});
          else         await ex.docs[0].ref.update({status:'no',reason:'Urlaub',updatedAt:ts()});
        }),
      ]);
      show(`Abwesenheit eingetragen ✅ – ${sessions.length} Training(s) und ${games.length} Spiel(e) abgemeldet`);
      setOpen(false); setForm({from:'',to:'',reason:'Urlaub'});
    } catch(err){ show('Fehler beim Speichern ❌'); console.error(err); }
    setSaving(false);
  };

  const deleteAbsence = async (id) => {
    if(!confirm('Abwesenheit löschen? Die Abmeldungen für Trainings/Spiele bleiben bestehen.')) return;
    await col('abwesenheiten').doc(id).delete().catch(()=>{});
    show('Abwesenheit gelöscht');
  };

  const upcoming = absences.filter(a=>a.to>=todayStr());
  const past     = absences.filter(a=>a.to<todayStr());

  return (
    <div className="p-4">
      <div className="flex items-center justify-between mb-4">
        <div>
          <h1 className="text-lg font-bold text-white">Meine Abwesenheiten</h1>
          <p className="text-xs text-gray-400">Urlaub, Krank, Sonstiges</p>
        </div>
        <button onClick={()=>setOpen(true)}
          className="px-3 py-1.5 bg-blue-600 text-white text-xs font-bold rounded-xl hover:bg-blue-700 transition-colors">
          + Eintragen
        </button>
      </div>

      {open && (
        <Modal title="🏖️ Abwesenheit eintragen" onClose={()=>setOpen(false)}>
          <form onSubmit={save} className="space-y-3">
            <Inp label="Von" type="date" value={form.from} onChange={e=>setForm({...form,from:e.target.value})} required/>
            <Inp label="Bis" type="date" value={form.to}   onChange={e=>setForm({...form,to:e.target.value})}   required/>
            <Inp label="Grund" value={form.reason} onChange={e=>setForm({...form,reason:e.target.value})} placeholder="z.B. Urlaub, Krank …"/>
            <div className="bg-blue-50 border border-blue-200 rounded-xl px-3 py-2 text-xs text-blue-700">
              Du wirst automatisch für alle Trainings und Spiele in diesem Zeitraum abgemeldet – mit dem Hinweis <b>"{form.reason||'Urlaub'}"</b>.
            </div>
            <div className="flex gap-2 pt-1">
              <Btn type="button" variant="secondary" className="flex-1" onClick={()=>setOpen(false)}>Abbrechen</Btn>
              <Btn type="submit" variant="blue" className="flex-1" disabled={saving}>{saving?'Speichern…':'Speichern'}</Btn>
            </div>
          </form>
        </Modal>
      )}

      {absences.length===0 ? (
        <div className="text-center text-gray-400 py-16">
          <div className="text-4xl mb-3">🏖️</div>
          <p className="text-sm font-medium">Keine geplanten Abwesenheiten</p>
          <p className="text-xs mt-1">Trage Urlaub ein, um automatisch abgemeldet zu werden.</p>
        </div>
      ) : (
        <div className="space-y-3">
          {upcoming.length>0&&<>
            <div className="text-xs font-semibold text-gray-400 uppercase tracking-wider">Bevorstehend</div>
            {upcoming.map(a=>(
              <div key={a.id} className="bg-white border border-amber-200 rounded-xl p-4 flex items-center justify-between">
                <div>
                  <div className="text-sm font-semibold">🏖️ {a.reason||'Urlaub'}</div>
                  <div className="text-xs text-gray-500">{fmtDate(a.from)} – {fmtDate(a.to)}</div>
                  {a.from<=todayStr()&&a.to>=todayStr()&&<span className="text-[10px] bg-amber-100 text-amber-700 px-1.5 py-0.5 rounded-full font-semibold">Läuft gerade</span>}
                </div>
                <button onClick={()=>deleteAbsence(a.id)} className="text-gray-300 hover:text-red-500 transition-colors text-lg leading-none">✕</button>
              </div>
            ))}
          </>}
          {past.length>0&&<>
            <div className="text-xs font-semibold text-gray-400 uppercase tracking-wider mt-3">Vergangen</div>
            {past.map(a=>(
              <div key={a.id} className="bg-gray-50 border border-gray-100 rounded-xl p-3 flex items-center justify-between opacity-60">
                <div>
                  <div className="text-sm font-medium">🏖️ {a.reason||'Urlaub'}</div>
                  <div className="text-xs text-gray-400">{fmtDate(a.from)} – {fmtDate(a.to)}</div>
                </div>
                <button onClick={()=>deleteAbsence(a.id)} className="text-gray-300 hover:text-red-400 transition-colors">✕</button>
              </div>
            ))}
          </>}
        </div>
      )}
      <Container/>
    </div>
  );
}

//  TRAINER — GEPLANTE ABWESENHEITEN
// ═══════════════════════════════════════════════════════════════════
function TrainerAbwesenheiten({profile}) {
  const [absences, setAbsences] = useState([]);

  useEffect(()=>{
    return col('abwesenheiten').where('teamId','==',profile.teamId)
      .onSnapshot(s=>{
        const all = s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>a.from.localeCompare(b.from));
        setAbsences(all);
      });
  },[profile.teamId]);

  const upcoming = absences.filter(a=>a.to>=todayStr());
  const past     = absences.filter(a=>a.to<todayStr());

  return (
    <div className="p-4">
      <h1 className="text-lg font-bold text-white mb-1">Geplante Abwesenheiten</h1>
      <p className="text-xs text-gray-400 mb-4">Urlaubsmeldungen deiner Spieler</p>

      {absences.length===0 ? (
        <div className="text-center text-gray-400 py-16">
          <div className="text-4xl mb-3">🏖️</div>
          <p className="text-sm">Keine geplanten Abwesenheiten.</p>
        </div>
      ) : (
        <div className="space-y-3">
          {upcoming.length>0&&<>
            <div className="text-xs font-semibold text-gray-400 uppercase tracking-wider">Bevorstehend & Aktuell</div>
            {upcoming.map(a=>(
              <div key={a.id} className="bg-white border border-amber-200 rounded-xl p-4">
                <div className="flex items-center justify-between">
                  <div>
                    <div className="text-sm font-semibold">{a.playerName}</div>
                    <div className="text-xs text-gray-500">🏖️ {a.reason||'Urlaub'} &nbsp;·&nbsp; {fmtDate(a.from)} – {fmtDate(a.to)}</div>
                  </div>
                  {a.from<=todayStr()&&a.to>=todayStr()
                    ? <span className="px-2 py-0.5 bg-amber-100 text-amber-700 text-xs rounded-full font-semibold">Jetzt</span>
                    : <span className="text-xs text-gray-400">{a.from}</span>
                  }
                </div>
              </div>
            ))}
          </>}
          {past.length>0&&<>
            <div className="text-xs font-semibold text-gray-400 uppercase tracking-wider mt-4">Vergangen</div>
            {past.map(a=>(
              <div key={a.id} className="bg-gray-50 border border-gray-100 rounded-xl p-3 opacity-60">
                <div className="text-sm font-medium">{a.playerName}</div>
                <div className="text-xs text-gray-400">🏖️ {a.reason||'Urlaub'} &nbsp;·&nbsp; {fmtDate(a.from)} – {fmtDate(a.to)}</div>
              </div>
            ))}
          </>}
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
//  SPIELER — WELLNESS
// ═══════════════════════════════════════════════════════════════════
function PlayerWellness({profile}) {
  const [vals,    setVals]    = useState({mood:3,energy:3,sleep:3,soreness:3});
  const [notes,   setNotes]   = useState('');
  const [saved,   setSaved]   = useState(false);
  const [history, setHistory] = useState([]);

  const METRICS = [
    {key:'mood',    label:'Stimmung',    low:'😔',high:'😄'},
    {key:'energy',  label:'Energie',     low:'🪫',high:'⚡'},
    {key:'sleep',   label:'Schlaf',      low:'😪',high:'😌'},
    {key:'soreness',label:'Muskelkater', low:'😖',high:'✅'},
  ];

  useEffect(()=>{
    return col('wellness').where('userId','==',profile.id).limit(20)
      .onSnapshot(s=>setHistory(s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>b.createdAt?.seconds-a.createdAt?.seconds)));
  },[]);

  const todayEntry = history.find(h=>h.date===todayStr());

  const submit = async (e) => {
    e.preventDefault();
    await col('wellness').add({...vals,notes,userId:profile.id,playerName:profile.name,teamId:profile.teamId,date:todayStr(),createdAt:ts()});
    setSaved(true); setNotes(''); setTimeout(()=>setSaved(false),2000);
  };

  return (
    <div className="p-4">
      <h1 className="text-lg font-bold text-white mb-1">Wellness Check-In</h1>
      <p className="text-xs text-gray-400 mb-4">Wie geht's dir heute?</p>
      {todayEntry ? (
        <div className="bg-red-50 border border-red-200 rounded-2xl p-5 text-center mb-4">
          <div className="text-3xl mb-1">✅</div>
          <div className="text-sm font-semibold text-red-800">Heute bereits eingecheckt!</div>
          <div className="text-xs text-red-600 mt-1">Ø {((todayEntry.mood+todayEntry.energy+todayEntry.sleep+todayEntry.soreness)/4).toFixed(1)}/5</div>
        </div>
      ) : (
        <form onSubmit={submit} className="mb-4">
          <div className="glass-card rounded-2xl p-5 mb-3">
            {METRICS.map(m=>(
              <div key={m.key} className="mb-4">
                <div className="flex justify-between items-center mb-1.5">
                  <span className="text-sm font-medium text-gray-700">{m.label}</span>
                  <span className="text-sm font-bold text-red-600">{vals[m.key]}/5</span>
                </div>
                <div className="flex items-center gap-2">
                  <span className="text-base">{m.low}</span>
                  <input type="range" min={1} max={5} value={vals[m.key]} onChange={e=>setVals(v=>({...v,[m.key]:Number(e.target.value)}))} className="flex-1 accent-red-600"/>
                  <span className="text-base">{m.high}</span>
                </div>
              </div>
            ))}
            <textarea rows={2} placeholder="Notiz (optional)" value={notes} onChange={e=>setNotes(e.target.value)}
              className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-red-500"/>
          </div>
          <Btn type="submit" size="lg" className={`w-full ${saved?'bg-red-800':''}`}>{saved?'✓ Gespeichert!':'Check-In senden'}</Btn>
        </form>
      )}
      {history.length>0&&(
        <div>
          <div className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Verlauf</div>
          {history.slice(0,7).map(h=>(
            <div key={h.id} className="glass-card rounded-xl px-4 py-3 flex justify-between items-center mb-1.5">
              <span className="text-sm text-gray-600">{fmtDate(h.date)}</span>
              <div className="flex gap-4">
                {METRICS.map(m=><div key={m.key} className="text-center"><div className="text-xs font-bold text-gray-800">{h[m.key]}</div><div className="text-[9px] text-gray-400">{m.label.slice(0,3)}</div></div>)}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
//  SPIELER — STATS
// ═══════════════════════════════════════════════════════════════════
function PlayerStats({profile}) {
  const [ratings,        setRatings]        = useState([]);
  const [gameRsvps,      setGameRsvps]      = useState([]);
  const [games,          setGames]          = useState([]);
  const [trainingAtt,    setTrainingAtt]    = useState([]);
  const [sessions,       setSessions]       = useState([]);

  useEffect(()=>{
    const u1 = col('ratings').where('playerId','==',profile.id)
      .onSnapshot(s=>setRatings(s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>b.createdAt?.seconds-a.createdAt?.seconds)));
    const u2 = col('gameAttendance').where('userId','==',profile.id)
      .onSnapshot(s=>setGameRsvps(s.docs.map(d=>({id:d.id,...d.data()}))));
    const u3 = col('games').where('teamId','==',profile.teamId)
      .onSnapshot(s=>setGames(s.docs.map(d=>({id:d.id,...d.data()}))));
    const u4 = col('attendance').where('userId','==',profile.id)
      .onSnapshot(s=>setTrainingAtt(s.docs.map(d=>({id:d.id,...d.data()}))));
    const u5 = col('sessions').where('teamId','==',profile.teamId)
      .onSnapshot(s=>setSessions(s.docs.map(d=>({id:d.id,...d.data()}))));
    return ()=>{u1();u2();u3();u4();u5();};
  },[]);

  // Spiel-Statistik
  const totalGames   = games.length;
  const gYes   = gameRsvps.filter(r=>r.status==='yes').length;
  const gNo    = gameRsvps.filter(r=>r.status==='no').length;
  const gMaybe = gameRsvps.filter(r=>r.status==='maybe').length;
  const gNone  = totalGames - gameRsvps.length;
  const gRate  = totalGames>0 ? Math.round((gYes/totalGames)*100) : null;

  // Training-Statistik (Spieler nutzt 'attend'/'cancel'/'unsure', Trainer 'yes'/'no'/'maybe')
  const totalSessions   = sessions.length;
  const tYes   = trainingAtt.filter(a=>a.status==='yes'||a.status==='attend').length;
  const tNo    = trainingAtt.filter(a=>a.status==='no'||a.status==='cancel').length;
  const tMaybe = trainingAtt.filter(a=>a.status==='maybe'||a.status==='unsure').length;
  const tNone  = totalSessions - trainingAtt.length;
  const tRate  = totalSessions>0 ? Math.round((tYes/totalSessions)*100) : null;

  // Bewertungen aufteilen: Spiel-Feedback vs. allgemeine Beurteilungen
  const gameRatings    = ratings.filter(r=>r.type==='game');
  const generalRatings = ratings.filter(r=>r.type!=='game');

  // Gesamtbewertung Spiel-Feedback
  const gameAvg = gameRatings.length>0 ? (gameRatings.reduce((s,r)=>s+r.avg,0)/gameRatings.length).toFixed(1) : null;
  const gameCatAvgs = RATING_CATS.map(cat=>({cat,val:gameRatings.length>0?(gameRatings.reduce((s,r)=>s+(r.scores?.[cat]||0),0)/gameRatings.length).toFixed(1):null}));

  // Allgemeine Trainer-Bewertungen
  const avg = generalRatings.length>0 ? (generalRatings.reduce((s,r)=>s+r.avg,0)/generalRatings.length).toFixed(2) : null;
  const catAvgs = RATING_CATS.map(cat=>({cat,val:generalRatings.length>0?(generalRatings.reduce((s,r)=>s+(r.scores?.[cat]||0),0)/generalRatings.length).toFixed(1):null}));

  const StatBar = ({pct, color='bg-red-500'}) => (
    <div className="flex-1 h-2 bg-gray-100 rounded-full overflow-hidden">
      <div className={`h-full ${color} rounded-full transition-all`} style={{width:`${pct}%`}}/>
    </div>
  );

  const BigNum = ({value, label, sub, color='text-red-600'}) => (
    <div className="flex-1 text-center">
      <div className={`text-3xl font-bold ${color}`}>{value??'—'}</div>
      <div className="text-xs font-semibold text-gray-700 mt-0.5">{label}</div>
      {sub && <div className="text-[10px] text-gray-400">{sub}</div>}
    </div>
  );

  return (
    <div className="p-4 space-y-4">
      <h1 className="text-lg font-bold text-white">📊 Meine Statistiken</h1>

      {/* ── SPIELTAGE ── */}
      <div className="glass-card rounded-2xl p-4">
        <div className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">⚽ Spieltage</div>
        <div className="flex gap-2 mb-4">
          <BigNum value={gYes}   label="Zugesagt"  color="text-green-600"/>
          <BigNum value={gNo}    label="Abgesagt"  color="text-red-500"/>
          <BigNum value={gMaybe} label="Vielleicht" color="text-amber-500"/>
          <BigNum value={gNone}  label="Offen"     color="text-gray-400"/>
        </div>
        {gRate !== null && (
          <div className="flex items-center gap-2">
            <span className="text-xs text-gray-500 w-20">Zusagequote</span>
            <StatBar pct={gRate} color="bg-green-500"/>
            <span className="text-xs font-bold text-gray-700 w-8 text-right">{gRate}%</span>
          </div>
        )}
        <div className="text-[11px] text-gray-400 mt-2">{totalGames} Spieltage insgesamt</div>
      </div>

      {/* ── TRAININGS ── */}
      <div className="glass-card rounded-2xl p-4">
        <div className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">🏃 Training</div>
        <div className="flex gap-2 mb-4">
          <BigNum value={tYes}   label="Zugesagt"  color="text-green-600"/>
          <BigNum value={tNo}    label="Abgesagt"  color="text-red-500"/>
          <BigNum value={tMaybe} label="Vielleicht" color="text-amber-500"/>
          <BigNum value={tNone}  label="Offen"     color="text-gray-400"/>
        </div>
        {tRate !== null && (
          <div className="flex items-center gap-2">
            <span className="text-xs text-gray-500 w-20">Anwesenheit</span>
            <StatBar pct={tRate} color="bg-blue-500"/>
            <span className="text-xs font-bold text-gray-700 w-8 text-right">{tRate}%</span>
          </div>
        )}
        <div className="text-[11px] text-gray-400 mt-2">{totalSessions} Trainingseinheiten insgesamt</div>
      </div>

      {/* ── SPIEL-FEEDBACK GESAMTBEWERTUNG ── */}
      {gameRatings.length>0 && (
        <div className="glass-card rounded-2xl p-4">
          <div className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">🏆 Spiel-Feedback Gesamtbewertung</div>
          <div className="text-center mb-4">
            <div className="text-4xl font-bold text-amber-500">{gameAvg}</div>
            <div className="flex justify-center gap-0.5 my-1">
              {[1,2,3,4,5].map(i=>(
                <span key={i} className={`text-lg ${i<=Math.round(gameAvg)?'text-amber-400':'text-gray-200'}`}>★</span>
              ))}
            </div>
            <div className="text-xs text-gray-400">{gameRatings.length} Spiel{gameRatings.length!==1?'e':''} bewertet · Schnitt /5</div>
          </div>
          {gameCatAvgs.map(({cat,val})=>(
            <div key={cat} className="flex items-center gap-3 mb-2">
              <div className="w-20 text-xs text-gray-600">{cat}</div>
              <StatBar pct={(val/5)*100} color="bg-amber-400"/>
              <div className="text-xs font-bold text-gray-800 w-6 text-right">{val}</div>
            </div>
          ))}
        </div>
      )}

      {/* ── ALLGEMEINE TRAINER-BEWERTUNGEN ── */}
      {generalRatings.length>0 && (
        <div className="glass-card rounded-2xl p-4">
          <div className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">⭐ Trainer-Beurteilungen</div>
          <div className="text-center mb-4">
            <div className="text-4xl font-bold text-red-600">{avg}</div>
            <div className="text-xs text-gray-400 mt-1">{generalRatings.length} Beurteilung{generalRatings.length!==1?'en':''} · Schnitt /5</div>
          </div>
          {catAvgs.map(({cat,val})=>(
            <div key={cat} className="flex items-center gap-3 mb-2">
              <div className="w-20 text-xs text-gray-600">{cat}</div>
              <StatBar pct={(val/5)*100}/>
              <div className="text-xs font-bold text-gray-800 w-6 text-right">{val}</div>
            </div>
          ))}
          <div className="mt-3 border-t border-gray-100 pt-3 space-y-1">
            {generalRatings.slice(0,5).map(r=>(
              <div key={r.id} className="flex justify-between items-center text-xs">
                <span className="text-gray-500">{fmtDate(r.date)}</span>
                {r.notes&&<span className="text-gray-400 italic truncate mx-2 flex-1">{r.notes}</span>}
                <span className="font-bold text-red-600">{r.avg}/5</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {gameRatings.length===0 && generalRatings.length===0 && totalGames===0 && totalSessions===0 && (
        <div className="text-center text-gray-400 py-16">
          <div className="text-4xl mb-2">📊</div>
          <p className="text-sm">Noch keine Daten vorhanden.</p>
        </div>
      )}
    </div>
  );
}
