<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#CC0000"/>
  <style>
body{margin:0;padding:0}
*{-webkit-tap-highlight-color:transparent}
@keyframes slideIn{from{transform:translateX(-100%);opacity:0}to{transform:translateX(0);opacity:1}}
@keyframes fadeUp{from{transform:translateY(14px);opacity:0}to{transform:translateY(0);opacity:1}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
.animate-slideIn{animation:slideIn 0.25s cubic-bezier(.25,.46,.45,.94)}
.animate-fadeUp{animation:fadeUp 0.22s cubic-bezier(.25,.46,.45,.94)}
/* Glassmorphism card — subtle frosted glass on background image */
.glass-card-text-fix .text-gray-900,.glass-card .text-gray-900{color:#fff!important}
.glass-card .text-gray-800{color:#fff!important}
.glass-card .text-gray-700{color:rgba(255,255,255,0.8)!important}
.glass-card .text-gray-600{color:rgba(255,255,255,0.65)!important}
.glass-card .text-gray-500{color:rgba(255,255,255,0.5)!important}
.glass-card .text-gray-400{color:rgba(255,255,255,0.4)!important}
.glass-card .border-gray-100,.glass-card .border-gray-200{border-color:rgba(255,255,255,0.1)!important}
.glass-card .hover\:bg-gray-50:hover,.glass-card .hover\:bg-red-50:hover{background:rgba(204,0,0,0.15)!important}
.glass-card{background:rgba(18,0,0,0.62);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border:1px solid rgba(255,60,60,0.18);box-shadow:0 8px 32px rgba(0,0,0,0.5),inset 0 1px 0 rgba(255,255,255,0.05)}
/* Darker glass variant for stats/info blocks */
.glass-dark{background:rgba(0,0,0,0.45);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,0.1);box-shadow:0 4px 24px rgba(0,0,0,0.3)}
/* Red accent card */
.card-red{background:linear-gradient(135deg,#cc0000,#8b0000);box-shadow:0 4px 20px rgba(180,0,0,0.35)}
/* Scrollbar */

/* ── Globale Schriftfarben ────────────────────────────── */
/* Dunkler Body-Hintergrund → Standard weiß */
body{color:#111}
/* body ist jetzt dunkel-default (#111), explizit weiß auf dunklem BG */
/* Helle Hintergründe → dunkle Schrift (Standard durch body:#111) */
/* Inline-Style weiße Hintergründe (Bottom-Sheets, Modals) */
.light-sheet{color:#111}
.light-sheet .text-gray-400{color:#6b7280!important}
.light-sheet .text-gray-500{color:#6b7280!important}
.light-sheet .text-gray-600{color:#4b5563!important}
.light-sheet .text-gray-700{color:#374151!important}
.light-sheet .text-gray-900{color:#111827!important}
/* Modal-inner (rote Schrift für Modale) */
.modal-inner{color:#cc0000}
.modal-inner .text-gray-900,.modal-inner .text-gray-800{color:#991111!important}
.modal-inner .text-gray-700,.modal-inner .text-gray-600{color:#b91c1c!important}
.modal-inner .text-gray-500,.modal-inner .text-gray-400{color:#ef4444!important}
.modal-inner .text-green-600{color:#16a34a!important}
.modal-inner .text-red-500,.modal-inner .text-red-600{color:#dc2626!important}
/* Inputs immer lesbar */
input,select,textarea{color:#111!important}
input::placeholder,textarea::placeholder{color:#9ca3af!important}
/* Glass-cards: weiße Schrift */
.glass-card,.glass-dark{color:#fff}
.glass-card .text-gray-900,.glass-card .text-gray-800,.glass-card .text-gray-700{color:#fff!important}
.glass-card .text-gray-600,.glass-card .text-gray-500{color:rgba(255,255,255,0.55)!important}
.glass-card .text-gray-400,.glass-card .text-gray-300{color:rgba(255,255,255,0.35)!important}
/* Elemente mit hellem Hintergrund INNERHALB glass-card: dunkel machen */
.glass-card [class~="bg-gray-100"]{background:rgba(255,255,255,0.12)!important;color:rgba(255,255,255,0.75)!important}
.glass-card [class~="bg-gray-50"]{background:rgba(255,255,255,0.08)!important;color:rgba(255,255,255,0.65)!important}
.glass-card [class~="bg-amber-50"]{background:rgba(251,191,36,0.2)!important;color:#fbbf24!important}
.glass-card [class~="bg-green-50"]{background:rgba(34,197,94,0.15)!important;color:#4ade80!important}
.glass-card [class~="bg-red-50"]{background:rgba(239,68,68,0.15)!important;color:#f87171!important}
.glass-card [class~="bg-blue-50"]{background:rgba(59,130,246,0.15)!important;color:#93c5fd!important}
/* Buttons im off-Zustand (bg-gray-100) innerhalb glass-card */
.glass-card button[class~="bg-gray-100"]{background:rgba(255,255,255,0.1)!important;color:rgba(255,255,255,0.5)!important}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,0.2);border-radius:4px}
::-webkit-scrollbar-thumb:hover{background:rgba(0,0,0,0.35)}
/* Smooth transitions everywhere */
button{transition-property:color,background-color,border-color,box-shadow,transform,opacity;transition-duration:140ms;transition-timing-function:cubic-bezier(.4,0,.2,1)}
button:active:not(:disabled){transform:scale(0.96)}
input,textarea,select{transition:border-color 150ms,box-shadow 150ms,background-color 150ms}
input:focus,textarea:focus,select:focus{}
/* Section page content fade-in */
main > div > div{animation:fadeUp 0.18s cubic-bezier(.25,.46,.45,.94);color:#fff}
/* Buttons und Badges mit hellem BG im Hauptinhalt: immer dunkle Schrift */
main button[class~="bg-gray-100"],main button[class~="bg-white"],main button[class~="bg-amber-100"]{color:#374151!important}
main span[class~="bg-gray-100"],main span[class~="bg-amber-100"],main span[class~="bg-green-100"],main span[class~="bg-blue-100"],main span[class~="bg-red-100"],main span[class~="bg-orange-100"],main span[class~="bg-pink-100"]{color:#374151!important}
/* Sidebar: immer weiße Schrift */
nav{color:#fff}
/* Sidebar hover background */
.hover\:bg-white\/6:hover{background:rgba(255,255,255,0.06)}
</style>

function fmtDeadlineLabel(s) {
  if (s.cancelDaysBefore === null || s.cancelDaysBefore === undefined || s.cancelDaysBefore === '') return null;
  const n = Number(s.cancelDaysBefore);
  const t = s.cancelByTime || '23:59';
  if (n === 0) return `Am Trainingstag bis ${t} Uhr`;
  return `${n} Tag${n===1?'':'e'} vor dem Training bis ${t} Uhr`;
}
function isDeadlinePassed(s) {
  if (s.cancelDaysBefore === null || s.cancelDaysBefore === undefined || s.cancelDaysBefore === '' || !s.date) return false;
  const d = new Date(s.date + 'T' + (s.cancelByTime||'23:59') + ':00');
  d.setDate(d.getDate() - Number(s.cancelDaysBefore));
  return new Date() > d;
}
function getRecurringDates(fromDate, weekday, count) {
  const dates = [];
  const d = new Date(fromDate + 'T12:00:00');
  const diff = (weekday - d.getDay() + 7) % 7;
  d.setDate(d.getDate() + diff);
  for (let i = 0; i < count; i++) {
    dates.push(d.toISOString().split('T')[0]);
    d.setDate(d.getDate() + 7);
  }
  return dates;
}
const fmtDate  = (s) => s ? new Date(s+'T12:00:00').toLocaleDateString('de-DE',{weekday:'short',day:'2-digit',month:'2-digit',year:'numeric'}) : '';

  return d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});

const fmtAgo   = (ts) => {
  if(!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const h = Math.floor((Date.now()-d.getTime())/3600000);
  if(h<1) return 'Gerade eben'; if(h<24) return `vor ${h}h`;

};

async function createNotificationsForTeam(teamId, {type, title, body}, excludeUid=null) {
  try {
    const [players, trainers] = await Promise.all([
      col('users').where('teamId','==',teamId).get(),
      col('users').where('trainerTeamId','==',teamId).get(),
    ]);
    const seen = new Set();
    const docs = [...players.docs, ...trainers.docs].filter(d=>{
      if(seen.has(d.id)||d.id===excludeUid) return false;
      seen.add(d.id); return true;
    });
    await Promise.all(docs.map(d=>col('notifications').add({
      userId:d.id, type, title, body, read:false, createdAt:ts()
    })));
  } catch(e){ console.warn('Notification error', e); }
}

async function createNotificationsForAll({type, title, body}, excludeUid=null) {
  try {
    const snap = await col('users').get();
    await Promise.all(snap.docs.filter(d=>d.id!==excludeUid).map(d=>col('notifications').add({
      userId:d.id, type, title, body, read:false, createdAt:ts()
    })));
  } catch(e){ console.warn('Notification error', e); }
}

  const s = size==='sm' ? 'px-3 py-1.5 text-xs' : size==='lg' ? 'px-5 py-2.5 text-base' : 'px-4 py-2.5 text-sm';
  return <button className={`${v[variant]||v.primary} ${s} rounded-xl font-semibold transition-all disabled:opacity-40 ${className}`} {...p}>{children}</button>;
};
const Avatar = ({name, color='#CC0000', size='md', photo=null, number=null}) => {
  const s = {
    xs:  'w-6 h-6 text-[9px]',
    sm:  'w-7 h-7 text-xs',
    md8: 'w-8 h-8 text-xs',
    md:  'w-9 h-9 text-sm',
    md10:'w-10 h-10 text-sm',
    lg:  'w-12 h-12 text-lg',
    xl:  'w-14 h-14 text-xl',
  }[size]||'w-9 h-9 text-sm';
  if(photo) return <img src={photo} className={`${s} rounded-full object-cover flex-shrink-0`} alt={name}/>;
  return <div className={`${s} rounded-full flex items-center justify-center font-bold text-white flex-shrink-0`} style={{background:color||'#CC0000'}}>{number||initials(name)}</div>;
};

// ─── Toast ──────────────────────────────────────────────────────────
function Toast({msg, type='success', onClose}) {
  useEffect(() => { const t=setTimeout(onClose,3200); return ()=>clearTimeout(t); }, []);
  const c = {success:'bg-red-600', error:'bg-red-600', info:'bg-blue-600', warning:'bg-amber-500'};
  return (
    <div className={`${c[type]||c.info} text-white px-4 py-3 rounded-xl shadow-lg text-sm flex items-center gap-3`}>
      <span className="flex-1">{msg}</span>
      <button onClick={onClose} className="opacity-70 hover:opacity-100 flex-shrink-0">✕</button>
    </div>
  );
}
function useToast() {
  const [toasts, setToasts] = useState([]);
  const show = useCallback((msg, type='success') => setToasts(t=>[...t,{id:Date.now(),msg,type}]), []);
  const rm   = useCallback((id) => setToasts(t=>t.filter(x=>x.id!==id)), []);
  const Container = () => (
    <div className="fixed bottom-5 right-5 z-[100] flex flex-col gap-2 max-w-xs">
      {toasts.map(t=><Toast key={t.id} msg={t.msg} type={t.type} onClose={()=>rm(t.id)}/>)}
    </div>
  );
  return {show, Container};
}

// ═══════════════════════════════════════════════════════════════════
//  TEAM AUSWAHL (nach Registrierung / wenn kein Team zugewiesen)
// ═══════════════════════════════════════════════════════════════════
function TeamPicker({profile, onTeamSelected}) {
  const [teams,          setTeams]          = useState([]);
  const [loading,        setLoading]        = useState(true);
  const [saving,         setSaving]         = useState(false);
  // Für Dual-Rolle: Schritt 1 = Spieler-Team, Schritt 2 = Trainer-Team
  const [step,           setStep]           = useState(1);
  const [playerTeamId,   setPlayerTeamId]   = useState('');

  const isDual   = profile.role === 'dual';
  const isVT     = profile.role === 'vorstand_trainer';

  useEffect(()=>{ getDocs_(col('teams').orderBy('name')).then(t=>{ setTeams(t); setLoading(false); }); },[]);

  const pick = async (teamId) => {
    if (isDual && step === 1) {
      setPlayerTeamId(teamId);
      setStep(2);
      return;
    }
    setSaving(true);
    if (isDual) {
      const trainerTeamId = teamId;
      await col('users').doc(profile.id).update({ teamId: playerTeamId, trainerTeamId });
      onTeamSelected({ teamId: playerTeamId, trainerTeamId });
    } else if (isVT) {
      // Vorstand & Trainer: nur trainerTeamId nötig
      await col('users').doc(profile.id).update({ trainerTeamId: teamId });
      onTeamSelected({ trainerTeamId: teamId });
    } else {
      await col('users').doc(profile.id).update({ teamId });
      onTeamSelected({ teamId });
    }
    setSaving(false);
  };

  const ROLE_LABEL = {player:'Spieler', trainer:'Trainer', vorstand:'Vorstand', dual:'Trainer & Spieler', vorstand_trainer:'Vorstand & Trainer'};
  const stepLabel  = isDual
    ? (step===1 ? '⚽ Als welches Team spielst du selbst?' : '📋 Welches Team trainierst du?')
    : isVT ? '🎯 Welches Team trainierst du?'
    : 'Welchem Team gehörst du an?';
  const stepHint   = isDual && step===2 ? `Spieler bei: ${teams.find(t=>t.id===playerTeamId)?.name||''}` : null;

  return (
    <div className="min-h-screen bg-gradient-to-br from-red-800 to-gray-950 flex items-center justify-center p-4">
      <div className="w-full max-w-sm">
        <div className="text-center mb-6">
          <div className="text-5xl mb-2">⚽</div>
          <h1 className="text-2xl font-bold text-white">Team wählen</h1>
          <p className="text-red-200 text-sm mt-1">Hallo {profile.name} · {ROLE_LABEL[profile.role]||profile.role}</p>
          {isDual && (
            <div className="flex justify-center gap-1.5 mt-3">
              {[1,2].map(s=>(
                <div key={s} className={`h-1.5 w-8 rounded-full transition-all ${step>=s?'bg-red-400':'bg-white/20'}`}/>
              ))}
            </div>
          )}
        </div>
        <div className="bg-white light-sheet rounded-2xl shadow-2xl p-5">
          {loading ? <Spinner/> : teams.length === 0 ? (
            <div className="text-center py-8">
              <div className="text-4xl mb-3">🏟️</div>
              <p className="text-sm text-gray-600 mb-2">Noch keine Teams vorhanden.</p>
              <p className="text-xs text-gray-400">Der Vorstand muss zuerst Teams anlegen.</p>
              <button onClick={()=>auth.signOut()} className="mt-4 text-xs text-gray-400 underline">Abmelden</button>
            </div>
          ) : (
            <>
              <p className="text-sm font-medium text-gray-700 mb-1">{stepLabel}</p>
              {stepHint && <p className="text-xs text-red-500 mb-3">✓ {stepHint}</p>}
              <div className="space-y-2 mt-3">
                {teams.map(t=>(
                  <button key={t.id} onClick={()=>pick(t.id)} disabled={saving || (isDual && step===2 && t.id===playerTeamId)}
                    className="w-full flex items-center gap-3 border-2 border-gray-200 hover:border-red-500 hover:bg-red-50 rounded-xl px-4 py-3.5 text-left transition-all disabled:opacity-30">
                    <div className="w-10 h-10 rounded-xl bg-red-100 flex items-center justify-center text-lg flex-shrink-0">🏟️</div>
                    <div>
                      <div className="text-sm font-semibold">{t.name}</div>
                      {t.category&&<div className="text-xs text-gray-400">{t.category}</div>}
                      {isDual && step===2 && t.id===playerTeamId && <div className="text-xs text-gray-300">Bereits als Spieler gewählt</div>}
                    </div>
                  </button>
                ))}
              </div>
              {isDual && step===2 && (
                <button onClick={()=>setStep(1)} className="mt-3 text-xs text-gray-400 hover:text-gray-600">← Zurück</button>
              )}
              <button onClick={()=>auth.signOut()} className="mt-4 w-full text-xs text-gray-400 hover:text-gray-600 text-center">Abmelden</button>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

//  SHARED LAYOUT (Sidebar + Mobile Toggle)
// ═══════════════════════════════════════════════════════════════════
function NotificationBell({profile, setPage}) {
  const [items, setItems] = useState([]);
  const [open, setOpen]   = useState(false);

  useEffect(()=>{
    if(!profile?.id) return;
    const uid  = profile.id;
    const role = profile.role||'';
    const isReceiver = ['trainer','player','dual','vorstand_trainer'].includes(role);

    // Helper: merge + sort all notification sources
    let newsItems=[], broadcastItems=[], perUserItems=[];
    const merge = () => {
      const all = [...newsItems, ...broadcastItems, ...perUserItems];
      all.sort((a,b)=>{
        const ta=a._ms||0, tb=b._ms||0; return tb-ta;
      });
      setItems(all.slice(0,30));
    };

    // Source 1: col('news') — Pinnwand-Posts ungelesen
    const u1 = isReceiver ? col('news').limit(40).onSnapshot(s=>{
      const now = Date.now();
      newsItems = s.docs.map(d=>({id:d.id,...d.data()}))
        .filter(p=>{
          if(p.readBy?.[uid]) return false;
          if(p.recipientIds?.length && !p.recipientIds.includes(uid)) return false;
          return true;
        })
        .map(p=>({
          _src:'news', _docId:p.id, _ms:p.createdAt?.toMillis?.()||0,
          type:'pinnwand', title:'📌 Pinnwand-Nachricht', body:p.title||p.content?.slice(0,80)||'Neuer Beitrag', _read:false
        }));
      merge();
    }) : ()=>{};

    // Source 2: col('notifBroadcasts') — Dokument + Kalender Broadcasts vom Vorstand
    const u2 = isReceiver ? col('notifBroadcasts').limit(30).onSnapshot(s=>{
      broadcastItems = s.docs.map(d=>({id:d.id,...d.data()}))
        .filter(b=>!(b.readBy?.[uid]))
        .map(b=>({
          _src:'broadcast', _docId:b.id, _ms:b.createdAt?.toMillis?.()||0,
          type:b.type||'news', title:b.title||'🔔 Neu', body:b.body||'', _read:false
        }));
      merge();
    }) : ()=>{};

    // Source 3: col('notifications') — Training/Spiel per-user Notifs (legacy)
    const u3 = col('notifications').where('userId','==',uid).limit(20).onSnapshot(s=>{
      perUserItems = s.docs.map(d=>({id:d.id,...d.data()}))
        .filter(n=>!n.read)
        .map(n=>({
          _src:'peruser', _docId:n.id, _ms:n.createdAt?.toMillis?.()||0,
          type:n.type||'news', title:n.title||'🔔', body:n.body||'', _read:n.read||false
        }));
      merge();
    });

    return ()=>{ u1(); u2(); u3(); };
  },[profile?.id, profile?.role]);

  const unread = items.filter(n=>!n._read).length;

  const markRead = async (item) => {
    if(item._src==='news')      await col('news').doc(item._docId).update({[`readBy.${profile.id}`]:true}).catch(()=>{});
    if(item._src==='broadcast') await col('notifBroadcasts').doc(item._docId).update({[`readBy.${profile.id}`]:true}).catch(()=>{});
    if(item._src==='peruser')   await col('notifications').doc(item._docId).update({read:true}).catch(()=>{});
  };

  const markAllRead = () => items.forEach(i=>markRead(i));

  const handleOpen = () => setOpen(o=>!o);

  const handleItemClick = (item) => {
    markRead(item);
    setOpen(false);
    if(!setPage) return;
    if(item.type==='pinnwand' || item.type==='news') setPage('pinnwand');
    else if(item.type==='dokument') setPage('dokumente');
    else if(item.type==='kalender') setPage('kalender');
  };

  const TYPE_ICON = {training:'🏃', spiel:'⚽', news:'📢', pinnwand:'📌', dokument:'📁', kalender:'📆'};

  return (
    <div className="relative">
      <button onClick={handleOpen}
        className="relative flex items-center justify-center w-8 h-8 rounded-lg text-white/40 hover:text-white hover:bg-white/10 transition-colors">
        🔔
        {unread>0 && (
          <span className="absolute -top-0.5 -right-0.5 w-4 h-4 bg-red-500 rounded-full text-[10px] font-bold text-white flex items-center justify-center">
            {unread>9?'9+':unread}
          </span>
        )}
      </button>
      {open && (
        <div className="fixed inset-0 z-[200] flex items-center justify-center p-4" style={{background:'rgba(0,0,0,0.7)',backdropFilter:'blur(6px)'}}>
          <div className="absolute inset-0" onClick={()=>setOpen(false)}/>
          <div className="relative w-full max-w-sm rounded-3xl overflow-hidden animate-popIn" style={{background:'#1a0000',border:'1px solid rgba(255,60,60,0.25)',boxShadow:'0 25px 80px rgba(0,0,0,0.6)',maxHeight:'80vh',display:'flex',flexDirection:'column'}}>
            <div style={{background:'linear-gradient(135deg,#cc0000,#880000)',padding:'18px 20px 14px'}}>
              <div className="flex items-center justify-between">
                <div>
                  <div style={{fontSize:17,fontWeight:800,color:'#fff'}}>🔔 Benachrichtigungen</div>
                  <div style={{fontSize:11,color:'rgba(255,255,255,0.55)',marginTop:2}}>{unread>0?`${unread} neu`:'Alles gelesen'}</div>
                </div>
                <div className="flex items-center gap-2">
                  {items.length>0 && <button onClick={markAllRead} style={{fontSize:11,color:'rgba(255,255,255,0.65)',background:'rgba(255,255,255,0.15)',border:'none',borderRadius:16,padding:'4px 10px',cursor:'pointer',fontWeight:600}}>✓ Alle</button>}
                  <button onClick={()=>setOpen(false)} style={{width:30,height:30,borderRadius:999,background:'rgba(255,255,255,0.15)',border:'none',color:'#fff',fontSize:15,cursor:'pointer',display:'flex',alignItems:'center',justifyContent:'center'}}>✕</button>
                </div>
              </div>
            </div>
            <div style={{overflowY:'auto',flex:1}}>
              {items.length===0 && (
                <div style={{padding:'40px 24px',textAlign:'center'}}>
                  <div style={{fontSize:36,marginBottom:10}}>🔕</div>
                  <div style={{fontSize:13,fontWeight:600,color:'rgba(255,255,255,0.3)'}}>Keine Benachrichtigungen</div>
                </div>
              )}
              {items.map((n,i)=>(
                <div key={n._docId+i} onClick={()=>handleItemClick(n)}
                  style={{display:'flex',alignItems:'flex-start',gap:12,padding:'12px 18px',borderBottom:'1px solid rgba(255,255,255,0.06)',cursor:'pointer'}}
                  onMouseEnter={e=>e.currentTarget.style.background='rgba(204,0,0,0.15)'}
                  onMouseLeave={e=>e.currentTarget.style.background='transparent'}>
                  <div style={{width:36,height:36,borderRadius:10,background:'rgba(204,0,0,0.3)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:16,flexShrink:0}}>{TYPE_ICON[n.type]||'🔔'}</div>
                  <div style={{flex:1,minWidth:0}}>
                    <div style={{fontSize:13,fontWeight:700,color:'#fff',whiteSpace:'nowrap',overflow:'hidden',textOverflow:'ellipsis'}}>{n.title}</div>
                    <div style={{fontSize:11,color:'rgba(255,255,255,0.45)',lineHeight:1.4,marginTop:2}}>{n.body}</div>
                    {n._ms>0 && <div style={{fontSize:10,color:'rgba(255,255,255,0.2)',marginTop:3}}>{fmtAgo({toDate:()=>new Date(n._ms)})}</div>}
                  </div>
                  <button onClick={e=>{e.stopPropagation();markRead(n);}} style={{color:'rgba(255,255,255,0.25)',background:'none',border:'none',fontSize:13,cursor:'pointer',flexShrink:0}}>✓</button>
                </div>
              ))}
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

const fmtAge = (dob) => {
  if(!dob) return null;
  const today = new Date(), birth = new Date(dob);
  let age = today.getFullYear() - birth.getFullYear();
  const m = today.getMonth() - birth.getMonth();
  if(m<0||(m===0&&today.getDate()<birth.getDate())) age--;
  return age;
};
const fmtDob = (dob) => {
  if(!dob) return '';
  const d = new Date(dob+'T12:00:00');
  return d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'});
};

const ALL_POSITIONS = ['Torwart','Abwehr','Mittelfeld','Sturm','offen'];
const getPositions = (p) => {
  if(p.positions?.length) return p.positions;
  if(p.position) return [p.position];
  return ['offen'];
};

function TrainerKader({profile, show}) {
  const EMPTY = {name:'',positions:[],number:'',dob:''};
  const [players,          setPlayers]          = useState([]);
  const [open,             setOpen]             = useState(false);
  const [editing,          setEditing]          = useState(null);
  const [form,             setForm]             = useState(EMPTY);
  const [loading,          setLoading]          = useState(false);
  const [delId,            setDelId]            = useState(null);
  const [detail,           setDetail]           = useState(null);
  const [abwesenheitPlayer,setAbwesenheitPlayer]= useState(null); // player für Abwesenheitsmodal
  const [abwForm,          setAbwForm]          = useState({from:'',to:'',reason:'Urlaub'});
  const [abwSaving,        setAbwSaving]        = useState(false);

  useEffect(()=>{
    return col('users').where('teamId','==',profile.teamId).where('role','==','player')
      .onSnapshot(s=>setPlayers(s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>{const ai=ALL_POSITIONS.indexOf(getPositions(a)[0]);const bi=ALL_POSITIONS.indexOf(getPositions(b)[0]);return (ai===-1?99:ai)-(bi===-1?99:bi)||(a.name||'').localeCompare(b.name||'');})));
  },[]);

  const openNew  = () => { setEditing(null); setForm(EMPTY); setOpen(true); };
  const openEdit = (p) => { setEditing(p.id); setForm({name:p.name||'',positions:getPositions(p),number:p.number||'',dob:p.dob||''}); setOpen(true); };
  const togglePos = (pos) => setForm(f=>({...f, positions: f.positions.includes(pos)?f.positions.filter(x=>x!==pos):[...f.positions,pos]}));

  const save = async (e) => {
    e.preventDefault(); setLoading(true);
    try {
      const positions = form.positions.length ? form.positions : ['offen'];
      if (editing) {
        await col('users').doc(editing).update({
          name: form.name.trim(), positions, position: positions[0],
          number: form.number, dob: form.dob,
        });
        show('Spieler aktualisiert ✅');
      } else {
        await col('users').add({
          name: form.name.trim(), role: 'player',
          teamId: profile.teamId, positions, position: positions[0],
          number: form.number, dob: form.dob,
          color: randColor(), claimed: false, uid: '', email: '', createdAt: ts()
        });
        show('Spieler angelegt ✅ — Spieler muss sich noch registrieren und verknüpfen.');
      }
      setForm(EMPTY); setOpen(false); setEditing(null);
    } catch(err) { show(err.message,'error'); }
    setLoading(false);
  };

  const doDelete = async () => {
    await col('users').doc(delId).delete();
    show('Spieler entfernt'); setDelId(null);
  };

  const saveTrainerAbwesenheit = async (e) => {
    e.preventDefault();
    if(!abwForm.from||!abwForm.to){ show('Bitte Von und Bis angeben ❌'); return; }
    if(abwForm.from>abwForm.to){ show('Von-Datum muss vor Bis-Datum liegen ❌'); return; }
    setAbwSaving(true);
    try {
      const p = abwesenheitPlayer;
      await col('abwesenheiten').add({
        userId:p.id, playerName:p.name, teamId:profile.teamId,
        from:abwForm.from, to:abwForm.to, reason:abwForm.reason||'Urlaub',
        addedByTrainer:true, createdAt:ts()
      });
      const [sessSnap, gameSnap] = await Promise.all([
        col('sessions').where('teamId','==',profile.teamId).get(),
        col('games').where('teamId','==',profile.teamId).get(),
      ]);
      const inRange = d=>d>=abwForm.from&&d<=abwForm.to;
      const sessions = sessSnap.docs.map(d=>({id:d.id,...d.data()})).filter(s=>s.date&&inRange(s.date));
      const games    = gameSnap.docs.map(d=>({id:d.id,...d.data()})).filter(g=>g.date&&inRange(g.date));
      await Promise.all([
        ...sessions.map(async s=>{
          const ex=await col('attendance').where('sessionId','==',s.id).where('userId','==',p.id).limit(1).get();
          if(ex.empty) await col('attendance').add({sessionId:s.id,userId:p.id,playerName:p.name,status:'no',reason:abwForm.reason||'Urlaub',teamId:profile.teamId,updatedAt:ts()});
          else         await ex.docs[0].ref.update({status:'no',reason:abwForm.reason||'Urlaub',updatedAt:ts()});
        }),
        ...games.map(async g=>{
          const ex=await col('gameAttendance').where('gameId','==',g.id).where('userId','==',p.id).limit(1).get();
          if(ex.empty) await col('gameAttendance').add({gameId:g.id,userId:p.id,playerName:p.name,status:'no',reason:abwForm.reason||'Urlaub',teamId:profile.teamId,updatedAt:ts()});
          else         await ex.docs[0].ref.update({status:'no',reason:abwForm.reason||'Urlaub',updatedAt:ts()});
        }),
      ]);
      show(`${p.name}: ${sessions.length} Training(s) + ${games.length} Spiel(e) abgemeldet ✅`);
      setAbwesenheitPlayer(null); setAbwForm({from:'',to:'',reason:'Urlaub'});
    } catch(err){ show('Fehler ❌'); console.error(err); }
    setAbwSaving(false);
  };

  return (
    <div className="p-4">
      <div className="flex items-center justify-between mb-4">
        <div>
          <h1 className="text-xl font-black text-white drop-shadow">👥 Kader</h1>
          <p className="text-xs text-white/50 mt-0.5">{players.filter(p=>p.claimed).length}/{players.length} Spieler verknüpft</p>
        </div>
      </div>

      {delId && (
        <Modal title="Spieler entfernen?" onClose={()=>setDelId(null)}>
          <p className="text-sm text-gray-600 mb-4">Diesen Spieler aus dem Kader entfernen?</p>
          <div className="flex gap-2">
            <Btn variant="secondary" className="flex-1" onClick={()=>setDelId(null)}>Abbrechen</Btn>
            <Btn className="flex-1 bg-red-700" onClick={doDelete}>Entfernen</Btn>
          </div>
        </Modal>
      )}

      {detail && (
        <TrainerPlayerDetail
          player={{...detail, _trainerName: profile.name}}
          onClose={()=>setDetail(null)}
          show={show}
        />
      )}

      {abwesenheitPlayer && (
        <Modal title={`🏖️ Abwesenheit – ${abwesenheitPlayer.name}`} onClose={()=>setAbwesenheitPlayer(null)}>
          <form onSubmit={saveTrainerAbwesenheit} className="space-y-3">
            <Inp label="Von" type="date" value={abwForm.from} onChange={e=>setAbwForm(f=>({...f,from:e.target.value}))} required/>
            <Inp label="Bis" type="date" value={abwForm.to}   onChange={e=>setAbwForm(f=>({...f,to:e.target.value}))}   required/>
            <Inp label="Grund" value={abwForm.reason} onChange={e=>setAbwForm(f=>({...f,reason:e.target.value}))} placeholder="z.B. Urlaub, Verletzung …"/>
            <div className="bg-blue-50 border border-blue-200 rounded-xl px-3 py-2 text-xs text-blue-700">
              {abwesenheitPlayer.name} wird automatisch für alle Trainings und Spiele in diesem Zeitraum abgemeldet.
            </div>
            <div className="flex gap-2 pt-1">
              <Btn type="button" variant="secondary" className="flex-1" onClick={()=>setAbwesenheitPlayer(null)}>Abbrechen</Btn>
              <Btn type="submit" className="flex-1" disabled={abwSaving}>{abwSaving?'Speichern…':'Speichern'}</Btn>
            </div>
          </form>
        </Modal>
      )}

      {open && (
        <Modal title={editing ? 'Spieler bearbeiten' : 'Spieler anlegen'} onClose={()=>{setOpen(false);setEditing(null);}}>
          {!editing && (
            <p className="text-xs text-gray-500 mb-3 bg-blue-50 border border-blue-100 rounded-lg px-3 py-2">
              ℹ️ Nur Name und Position eintragen. Der Spieler registriert sich selbst und sucht dann seinen Namen.
            </p>
          )}
          <form onSubmit={save}>
            <Inp label="Name" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Max Mustermann" required/>
            <Inp label="Geburtsdatum" type="date" value={form.dob} onChange={e=>setForm({...form,dob:e.target.value})}/>
            <div className="mb-3">
              <label className="block text-xs font-medium text-gray-600 mb-1.5">Position(en)</label>
              <div className="flex flex-wrap gap-1.5">
                {ALL_POSITIONS.map(p=>{
                  const sel=(form.positions||[]).includes(p);
                  return <button key={p} type="button" onClick={()=>togglePos(p)}
                    className={`px-3 py-1.5 rounded-lg text-xs font-medium border-2 transition-all ${sel?'border-red-500 bg-red-50 text-red-700':'border-gray-200 text-gray-500 hover:border-gray-300'}`}>{p}</button>;
                })}
              </div>
            </div>
            <div className="w-24 mb-3">
              <label className="block text-xs font-medium text-gray-600 mb-1">Nr.</label>
              <input value={form.number} onChange={e=>setForm({...form,number:e.target.value})} placeholder="#"
                className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm text-center focus:outline-none focus:ring-2 focus:ring-red-500"/>
            </div>
            <div className="flex gap-2 mt-1">
              <Btn type="button" variant="secondary" className="flex-1" onClick={()=>{setOpen(false);setEditing(null);}}>Abbrechen</Btn>
              <Btn type="submit" className="flex-1" disabled={loading}>{loading?'…':editing?'Speichern':'Anlegen'}</Btn>
            </div>
          </form>
        </Modal>
      )}

      {players.length===0 ? (
        <div className="text-center text-gray-400 py-16"><div className="text-4xl mb-2">👥</div><p className="text-sm">Noch keine Spieler im Kader.</p></div>
      ) : (
        <div className="space-y-1.5">
          {players.map(p=>{
            const pos = getPositions(p);
            return (
              <div key={p.id} onClick={()=>setDetail(p)}
                className="flex items-center gap-3 glass-card rounded-2xl px-3 py-3 cursor-pointer hover:shadow-lg hover:scale-[1.01] transition-all duration-150">
                <Avatar name={p.name} color={p.color} size="md8" photo={p.photoUrl} number={p.number}/>
                <div className="min-w-0 flex-1">
                  <div className="text-sm font-medium truncate">{p.name}</div>
                  <div className="flex flex-wrap gap-1 mt-0.5">
                    {pos.map(po=><span key={po} className="text-[10px] bg-gray-100 text-gray-500 px-1.5 py-0.5 rounded">{po}</span>)}
                    {p.dob && <span className="text-[10px] text-gray-400">{fmtAge(p.dob)} J.</span>}
                    {p.empfehlung?.team && <span className="text-[10px] text-blue-600">📋 {p.empfehlung.team}</span>}
                  </div>
                </div>
                <div className="flex gap-1 flex-shrink-0 items-center">
                  {!p.claimed && <span className="text-[10px] bg-amber-100 text-amber-600 px-2 py-0.5 rounded-full">Ausstehend</span>}
                  <button onClick={e=>{e.stopPropagation();setAbwesenheitPlayer(p);setAbwForm({from:'',to:'',reason:'Urlaub'});}} className="text-gray-400 hover:text-amber-600 px-1.5 py-1 rounded-lg hover:bg-amber-50 text-xs" title="Abwesenheit eintragen">🏖️</button>
                  <button onClick={e=>{e.stopPropagation();openEdit(p);}} className="text-gray-400 hover:text-red-600 px-1.5 py-1 rounded-lg hover:bg-red-50 text-xs">✏️</button>
                  <button onClick={e=>{e.stopPropagation();setDelId(p.id);}} className="text-gray-400 hover:text-red-600 px-1.5 py-1 rounded-lg hover:bg-red-50 text-xs">🗑</button>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function TrainerTraining({profile, show}) {
  const EMPTY = {date:'',time:'18:00',duration:'90',location:'',notes:'',drillIds:[],uebungIds:[],cancelDaysBefore:'',cancelByTime:'18:00',serie:false,serieWeekday:2,serieCount:8};
  const [sessions,   setSessions]  = useState([]);
  const [drills,     setDrills]    = useState([]);
  const [uebungen,   setUebungen]  = useState([]);
  const [players,    setPlayers]   = useState([]);
  const [attMap,     setAttMap]    = useState({});
  const [open,       setOpen]      = useState(false);
  const [editing,    setEditing]   = useState(null);
  const [form,       setForm]      = useState(EMPTY);
  const [deleting,   setDeleting]  = useState(null);
  const [detail,     setDetail]    = useState(null);
  const [uebSearch,  setUebSearch] = useState('');

  useEffect(()=>{
    const u1=col('sessions').where('teamId','==',profile.teamId)
      .onSnapshot(s=>setSessions(s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>a.date?.localeCompare(b.date||''))));
    const u2=col('drills').where('teamId','==',profile.teamId)
      .onSnapshot(s=>setDrills(s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a.name||'').localeCompare(b.name||''))));
    const u3=col('users').where('teamId','==',profile.teamId)
      .onSnapshot(s=>setPlayers(s.docs.map(d=>({id:d.id,...d.data()})).filter(p=>p.role==='player'||p.role==='dual')));
    const u4=col('attendance').where('teamId','==',profile.teamId)
      .onSnapshot(s=>{
        const map={};
        s.docs.forEach(d=>{
          const {sessionId,userId,status}=d.data();
          if(!map[sessionId]) map[sessionId]={yes:0,no:0,maybe:0,byPlayer:{}};
          if(status==='yes')   map[sessionId].yes++;
          if(status==='no')    map[sessionId].no++;
          if(status==='maybe') map[sessionId].maybe++;
          map[sessionId].byPlayer[userId]=status;
        });
        setAttMap(map);
      });
    const u5=col('uebungen').orderBy('title')
      .onSnapshot(s=>setUebungen(s.docs.map(d=>({id:d.id,...d.data()}))));
    return ()=>{u1();u2();u3();u4();u5();};
  },[]);

  const openNew  = () => { setEditing(null); setForm(EMPTY); setUebSearch(''); setOpen(true); };
  const openEdit = (s) => { setEditing(s.id); setForm({date:s.date||'',time:s.time||'18:00',duration:s.duration||'90',location:s.location||'',notes:s.notes||'',drillIds:s.drillIds||[],uebungIds:s.uebungIds||[],cancelDaysBefore:s.cancelDaysBefore!==undefined&&s.cancelDaysBefore!==''?String(s.cancelDaysBefore):'',cancelByTime:s.cancelByTime||'18:00',serie:false,serieWeekday:2,serieCount:8}); setUebSearch(''); setOpen(true); };

  const save = async (e) => {
    e.preventDefault();
    const {serie, serieWeekday, serieCount, cancelDaysBefore, cancelByTime, ...baseForm} = form;
    const deadlineData = cancelDaysBefore !== '' ? {cancelDaysBefore: Number(cancelDaysBefore), cancelByTime} : {cancelDaysBefore: null, cancelByTime: null};
    if (editing) {
      await col('sessions').doc(editing).update({...baseForm, ...deadlineData});
      show('Trainingseinheit aktualisiert ✅');
    } else if (serie && !editing) {
      const serieId = `serie_${Date.now()}_${Math.random().toString(36).slice(2,7)}`;
      const dates = getRecurringDates(baseForm.date||todayStr(), serieWeekday, serieCount);
      for (const date of dates) {
        const ref = await col('sessions').add({...baseForm, ...deadlineData, date, serieId, teamId:profile.teamId, createdAt:ts()});
        notifyNewTraining({...baseForm, date, teamId:profile.teamId, id:ref.id}).catch(()=>{});
      }
      show(`${dates.length} Trainingseinheiten erstellt ✅`);
    } else {
      const ref = await col('sessions').add({...baseForm, ...deadlineData, teamId:profile.teamId, createdAt:ts()});
      show('Trainingseinheit gespeichert ✅');
      notifyNewTraining({...baseForm, teamId:profile.teamId, id:ref.id}).catch(()=>{});
    }
    setForm(EMPTY); setOpen(false); setEditing(null);
  };

  const doDelete = async () => {
    await col('sessions').doc(deleting.id).delete();
    show('Einheit gelöscht'); setDeleting(null);
  };

  const doDeleteSerie = async () => {
    const snap = await col('sessions').where('serieId','==',deleting.serieId).get();
    const batch = firebase.firestore().batch();
    snap.docs.forEach(d => batch.delete(d.ref));
    await batch.commit();
    show(`${snap.docs.length} Serieneinheiten gelöscht ✅`); setDeleting(null);
  };

  // Trainer setzt Status für einen Spieler
  const setPlayerStatus = async (sessionId, playerId, playerName, status) => {
    const existing = await col('attendance')
      .where('sessionId','==',sessionId).where('userId','==',playerId).limit(1).get();
    if (existing.empty) {
      await col('attendance').add({sessionId, userId:playerId, playerName, status, teamId:profile.teamId, setByTrainer:true, updatedAt:ts()});
    } else {
      await existing.docs[0].ref.update({status, setByTrainer:true, updatedAt:ts()});
    }
  };

  const toggleDrill   = (id) => setForm(f=>({...f, drillIds:  f.drillIds.includes(id) ?f.drillIds.filter(x=>x!==id) :[...f.drillIds,id]}));
  const toggleUebung  = (id) => setForm(f=>({...f, uebungIds: f.uebungIds.includes(id)?f.uebungIds.filter(x=>x!==id):[...f.uebungIds,id]}));
  const drillMap    = Object.fromEntries(drills.map(d=>[d.id,d]));
  const uebungenMap = Object.fromEntries(uebungen.map(u=>[u.id,u]));
  const filteredUeb = uebungen.filter(u=>!uebSearch||(u.title||'').toLowerCase().includes(uebSearch.toLowerCase())||(u.category||'').toLowerCase().includes(uebSearch.toLowerCase()));
  const upcoming = sessions.filter(s=>s.date>=todayStr());
  const past     = sessions.filter(s=>s.date<todayStr());

  return (
    <div className="p-4">
      <div className="flex items-center justify-between mb-4">
        <h1 className="text-lg font-bold text-white">Trainingsplan</h1>
        <Btn size="sm" onClick={openNew}>+ Einheit</Btn>
      </div>

      {deleting && (
        <Modal title="Einheit löschen?" onClose={()=>setDeleting(null)}>
          {deleting.serieId ? (
            <>
              <p className="text-sm text-gray-600 mb-1">
                <strong>{fmtDate(deleting.date)} · {deleting.time} Uhr</strong>
              </p>
              <p className="text-sm text-gray-600 mb-4">Dieser Termin gehört zu einer Serie. Was soll gelöscht werden?</p>
              <div className="space-y-2">
                <Btn variant="secondary" className="w-full text-left justify-start" onClick={doDelete}>
                  🗑 Nur diesen Termin löschen
                </Btn>
                <Btn className="w-full bg-red-700 text-left justify-start" onClick={doDeleteSerie}>
                  🗑🗑 Komplette Serie löschen
                </Btn>
                <Btn variant="secondary" className="w-full" onClick={()=>setDeleting(null)}>Abbrechen</Btn>
              </div>
            </>
          ) : (
            <>
              <p className="text-sm text-gray-600 mb-4">Diese Trainingseinheit wirklich löschen?</p>
              <div className="flex gap-2">
                <Btn variant="secondary" className="flex-1" onClick={()=>setDeleting(null)}>Abbrechen</Btn>
                <Btn className="flex-1 bg-red-700" onClick={doDelete}>Löschen</Btn>
              </div>
            </>
          )}
        </Modal>
      )}

      {/* Detailansicht */}
      {detail && (
        <SessionDetail
          session={detail}
          drillMap={drillMap}
          uebungenMap={uebungenMap}
          players={players}
          att={attMap[detail.id]||{yes:0,no:0,maybe:0,byPlayer:{}}}
          onSetStatus={setPlayerStatus}
          onEdit={(s)=>{setDetail(null);openEdit(s);}}
          onClose={()=>setDetail(null)}
          show={show}
        />
      )}

      {open && (
        <Modal title={editing ? 'Einheit bearbeiten' : 'Trainingseinheit'} onClose={()=>{setOpen(false);setEditing(null);}}>
          <form onSubmit={save}>
            {/* Serientermin Toggle — nur bei Neuanlage */}
            {!editing && (
              <div className="mb-3 bg-red-50 border border-red-200 rounded-xl p-3">
                <label className="flex items-center gap-2 cursor-pointer mb-2">
                  <input type="checkbox" checked={form.serie} onChange={e=>setForm({...form,serie:e.target.checked})} className="accent-red-600 w-4 h-4"/>
                  <span className="text-xs font-semibold text-red-700">🔄 Serientermin erstellen</span>
                </label>
                {form.serie && (
                  <div className="space-y-2 mt-2">
                    <div>
                      <div className="text-[10px] text-red-600 font-medium mb-1">Wochentag</div>
                      <div className="flex gap-1 flex-wrap">
                        {WEEKDAYS_DE.map((d,i)=>(
                          <button key={i} type="button" onClick={()=>setForm(f=>({...f,serieWeekday:i}))}
                            className={`px-2 py-1 rounded-lg text-xs font-semibold border transition-all ${form.serieWeekday===i?'bg-red-600 text-white border-red-600':'bg-white text-red-700 border-red-200 hover:bg-red-50'}`}>{d}</button>
                        ))}
                      </div>
                    </div>
                    <div className="flex gap-2 items-center">
                      <label className="text-[10px] text-red-600 font-medium whitespace-nowrap">Ab Datum</label>
                      <input type="date" value={form.date} onChange={e=>setForm({...form,date:e.target.value})} required
                        className="flex-1 border border-red-200 rounded-lg px-2 py-1.5 text-xs focus:outline-none focus:ring-1 focus:ring-red-400"/>
                    </div>
                    <div className="flex gap-2 items-center">
                      <label className="text-[10px] text-red-600 font-medium whitespace-nowrap">Wiederholungen</label>
                      <input type="number" value={form.serieCount} min="1" max="52"
                        onChange={e=>setForm({...form,serieCount:parseInt(e.target.value)||1})}
                        className="w-20 border border-red-200 rounded-lg px-2 py-1.5 text-xs focus:outline-none focus:ring-1 focus:ring-red-400"/>
                      <span className="text-[10px] text-red-500">= {form.serieCount}×{WEEKDAYS_DE[form.serieWeekday]} ab {form.date||'?'}</span>
                    </div>
                  </div>
                )}
              </div>
            )}
            <div className="flex gap-2">
              {(!form.serie || editing) && <Inp label="Datum" type="date" value={form.date} onChange={e=>setForm({...form,date:e.target.value})} required/>}
              <Inp label="Zeit" type="time" value={form.time} onChange={e=>setForm({...form,time:e.target.value})}/>
            </div>
            <div className="flex gap-2">
              <Inp label="Dauer (Min)" value={form.duration} onChange={e=>setForm({...form,duration:e.target.value})}/>
              <Inp label="Ort" value={form.location} onChange={e=>setForm({...form,location:e.target.value})} placeholder="Platz 1"/>
            </div>
            <div className="mb-3">
              <label className="block text-xs font-medium text-gray-600 mb-1.5">Abmeldefrist</label>
              <div className="flex gap-2 items-center flex-wrap">
                <select value={form.cancelDaysBefore} onChange={e=>setForm({...form,cancelDaysBefore:e.target.value})}
                  className="border border-gray-200 rounded-lg px-2 py-2 text-xs focus:outline-none focus:ring-1 focus:ring-red-500 bg-white">
                  <option value="">Keine Frist</option>
                  <option value="0">Am Trainingstag</option>
                  <option value="1">1 Tag vorher</option>
                  <option value="2">2 Tage vorher</option>
                  <option value="3">3 Tage vorher</option>
                  <option value="5">5 Tage vorher</option>
                  <option value="7">7 Tage vorher</option>
                </select>
                {form.cancelDaysBefore !== '' && <>
                  <span className="text-xs text-gray-500">bis</span>
                  <input type="time" value={form.cancelByTime} onChange={e=>setForm({...form,cancelByTime:e.target.value})}
                    className="border border-gray-200 rounded-lg px-2 py-2 text-xs focus:outline-none focus:ring-1 focus:ring-red-500"/>
                  <span className="text-xs text-gray-500">Uhr</span>
                </>}
              </div>
            </div>
            <Txt label="Notizen / Inhalte" value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})}/>
            {drills.length>0 && (
              <div className="mb-3">
                <label className="block text-xs font-medium text-gray-600 mb-2">Taktik-Übungen (Taktikboard)</label>
                <div className="space-y-1 max-h-28 overflow-y-auto border border-gray-100 rounded-lg p-2">
                  {drills.map(d=>(
                    <label key={d.id} className="flex items-center gap-2 text-xs cursor-pointer hover:bg-gray-50 rounded px-1 py-0.5">
                      <input type="checkbox" checked={form.drillIds.includes(d.id)} onChange={()=>toggleDrill(d.id)} className="accent-red-600"/>
                      {d.imageData && <img src={d.imageData} className="w-8 h-5 object-cover rounded" alt=""/>}
                      <span>{d.name}</span>
                    </label>
                  ))}
                </div>
              </div>
            )}
            {uebungen.length>0 && (
              <div className="mb-3">
                <label className="block text-xs font-medium text-gray-600 mb-2">
                  Übungsdatenbank {form.uebungIds.length>0 && <span className="text-red-600">({form.uebungIds.length} gewählt)</span>}
                </label>
                <input value={uebSearch} onChange={e=>setUebSearch(e.target.value)} placeholder="🔍 Suche…"
                  className="w-full border border-gray-100 rounded-lg px-2 py-1.5 text-xs mb-2 focus:outline-none focus:ring-1 focus:ring-red-500"/>
                <div className="space-y-1 max-h-36 overflow-y-auto border border-gray-100 rounded-lg p-2">
                  {filteredUeb.map(u=>(
                    <label key={u.id} className={`flex items-center gap-2 text-xs cursor-pointer rounded px-1 py-1 transition-colors ${form.uebungIds.includes(u.id)?'bg-red-50':'hover:bg-gray-50'}`}>
                      <input type="checkbox" checked={form.uebungIds.includes(u.id)} onChange={()=>toggleUebung(u.id)} className="accent-red-600 flex-shrink-0"/>
                      {u.imageData && <img src={u.imageData} className="w-8 h-6 object-cover rounded flex-shrink-0" alt=""/>}
                      <div className="min-w-0">
                        <div className="font-medium truncate">{u.title}</div>
                        <div className="text-gray-400">{u.category} · {u.ageRange}{u.duration?' · '+u.duration+' Min':''}</div>
                      </div>
                    </label>
                  ))}
                  {filteredUeb.length===0 && <div className="text-xs text-gray-400 text-center py-2">Keine Übungen gefunden</div>}
                </div>
              </div>
            )}
            <div className="flex gap-2">
              <Btn type="button" variant="secondary" className="flex-1" onClick={()=>{setOpen(false);setEditing(null);}}>Abbrechen</Btn>
              <Btn type="submit" className="flex-1">{editing?'Aktualisieren':'Speichern'}</Btn>
            </div>
          </form>
        </Modal>
      )}

      {sessions.length===0 ? (
        <div className="text-center text-gray-400 py-16"><div className="text-4xl mb-2">📅</div><p className="text-sm">Noch keine Einheiten geplant.</p></div>
      ) : (
        <div className="space-y-2">
          {upcoming.length>0 && <>
            <div className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Bevorstehend</div>
            {upcoming.map(s=><SessionCard key={s.id} s={s} drillMap={drillMap} att={attMap[s.id]} totalPlayers={players.length} onDetail={()=>setDetail(s)} onEdit={openEdit} onDelete={()=>setDeleting(s)}/>)}
          </>}
          {past.length>0 && <>
            <div className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2 mt-4">Vergangen</div>
            {past.map(s=><SessionCard key={s.id} s={s} drillMap={drillMap} att={attMap[s.id]} faded totalPlayers={players.length} onDetail={()=>setDetail(s)} onEdit={openEdit} onDelete={()=>setDeleting(s)}/>)}
          </>}
        </div>
      )}
    </div>
  );
}

const SessionCard = ({s, drillMap, att, faded=false, totalPlayers=0, onDetail, onEdit, onDelete}) => (
  <div className={`border rounded-xl overflow-hidden ${faded?'bg-gray-50 border-gray-200 opacity-80':'bg-white border-gray-200'}`}>
    {/* Anklickbarer Hauptbereich */}
    <div className="p-4 cursor-pointer hover:bg-gray-50 transition-colors" onClick={onDetail}>
      <div className="flex items-start justify-between gap-2">
        <div>
          <div className="flex items-center gap-2 flex-wrap">
            <div className="font-semibold text-sm">{fmtDate(s.date)} · {s.time} Uhr</div>
            {s.serieId && <span className="text-[10px] bg-red-50 text-red-700 border border-red-200 px-1.5 py-0.5 rounded-full font-semibold">🔄 Serie</span>}
          </div>
          <div className="text-xs text-gray-400 mt-0.5">{s.duration} Min{s.location?' · '+s.location:''}</div>
        </div>
        {/* Zusagen-Badges (proforma: alle zugesagt außer explizit abgemeldet) */}
        <div className="flex gap-1 flex-shrink-0">
          {totalPlayers > 0 ? <>
            <span className="text-[11px] bg-green-100 text-green-700 px-2 py-0.5 rounded-full font-medium">✅ {totalPlayers-(att?.no||0)}</span>
            {(att?.no||0)>0 && <span className="text-[11px] bg-red-100 text-red-600 px-2 py-0.5 rounded-full font-medium">❌ {att.no}</span>}
          </> : null}
        </div>
      </div>
      {fmtDeadlineLabel(s) && <div className="text-[10px] text-amber-600 mt-1">⏰ Abmeldefrist: {fmtDeadlineLabel(s)}</div>}
      {s.notes && <p className="text-xs text-gray-600 mt-1.5 leading-relaxed line-clamp-2">{s.notes}</p>}
      {s.drillIds?.length>0 && (
        <div className="flex gap-1.5 mt-2 flex-wrap">
          {s.drillIds.slice(0,3).map(id=>drillMap[id]&&(
            <span key={id} className="text-[10px] bg-blue-50 text-blue-600 border border-blue-100 rounded px-1.5 py-0.5">{drillMap[id].name}</span>
          ))}
          {s.drillIds.length>3&&<span className="text-[10px] text-gray-400">+{s.drillIds.length-3} weitere</span>}
        </div>
      )}
    </div>
    {/* Aktionen */}
    <div className="flex border-t border-gray-100">
      <button onClick={onDetail} className="flex-1 py-2 text-xs text-gray-500 hover:bg-gray-50 hover:text-red-600 transition-colors">👁 Details</button>
      <button onClick={()=>onEdit(s)} className="flex-1 py-2 text-xs text-gray-500 hover:bg-gray-50 hover:text-red-600 transition-colors border-l border-gray-100">✏️ Bearbeiten</button>
      <button onClick={onDelete} className={`flex-1 py-2 text-xs transition-colors border-l border-gray-100 hover:bg-red-50 hover:text-red-600 ${s.serieId?'text-red-500':'text-gray-500'}`}>
        {s.serieId ? '🔄 Serie' : '🗑 Löschen'}
      </button>
    </div>
  </div>
);

function SessionDetail({session, drillMap, uebungenMap={}, players, att, onSetStatus, onEdit, onClose, show, readOnly=false}) {
  const [saving,    setSaving]   = useState({});
  const [media,     setMedia]    = useState([]);
  const [attSort,   setAttSort]  = useState('lastname'); // 'lastname' | 'firstname' | 'status'
  const [uploading, setUploading]= useState(false);
  const [uploadErr, setUploadErr]= useState('');
  const [viewer,    setViewer]   = useState(null); // {name, type, data} inline viewer
  const [uebImgViewer, setUebImgViewer] = useState(null); // fullscreen exercise image
  const fileRef = useRef();

  // Lade Anhänge aus Firestore-Subcollection (kein Firebase Storage nötig)
  useEffect(()=>{
    return col('sessionMedia').where('sessionId','==',session.id)
      .onSnapshot(s=>setMedia(s.docs.map(d=>({id:d.id,...d.data()}))));
  },[session.id]);

  const setStatus = async (player, status) => {
    setSaving(v=>({...v,[player.id]:true}));
    await onSetStatus(session.id, player.id, player.name, status);
    setSaving(v=>({...v,[player.id]:false}));
  };

  // Upload: Datei → Base64 → Firestore (max 700KB, kein Firebase Storage)
  const uploadFile = async (e) => {
    const file = e.target.files?.[0]; if(!file) return;
    if(file.size > 700*1024) {
      setUploadErr(`Datei zu groß (${Math.round(file.size/1024)} KB). Maximal 700 KB erlaubt.`);
      e.target.value=''; return;
    }
    setUploading(true); setUploadErr('');
    try {
      const data = await new Promise((res,rej)=>{
        const r = new FileReader();
        r.onload = ()=>res(r.result.split(',')[1]);
        r.onerror = rej;
        r.readAsDataURL(file);
      });
      await col('sessionMedia').add({
        sessionId: session.id,
        teamId: session.teamId||'',
        name: file.name,
        type: file.type,
        data,
        size: file.size,
        uploadedAt: new Date().toISOString(),
      });
      if(show) show('Datei hochgeladen ✅');
    } catch(err){ setUploadErr(err.message||'Upload fehlgeschlagen'); }
    setUploading(false);
    e.target.value='';
  };

  const deleteFile = async (m) => {
    if(!window.confirm(`"${m.name}" wirklich löschen?`)) return;
    await col('sessionMedia').doc(m.id).delete();
  };

  // Inline-Viewer öffnen
  const openViewer = (m) => setViewer(m);

  // Base64 → Blob-URL für iframe (PDF)
  const blobUrl = React.useMemo(()=>{
    if(!viewer || !viewer.type.includes('pdf')) return null;
    try {
      const bytes = atob(viewer.data);
      const arr = new Uint8Array(bytes.length);
      for(let i=0;i<bytes.length;i++) arr[i]=bytes.charCodeAt(i);
      return URL.createObjectURL(new Blob([arr],{type:'application/pdf'}));
    } catch(e){ return null; }
  },[viewer]);

  const fileIcon = (type='') => {
    if(type.startsWith('image/')) return '🖼️';
    if(type.includes('pdf'))      return '📄';
    if(type.includes('word')||type.includes('document')) return '📝';
    return '📎';
  };

  const images = media.filter(m=>m.type?.startsWith('image/'));
  const docs   = media.filter(m=>!m.type?.startsWith('image/'));

  const STATUS_OPTS = [
    {v:'yes',   icon:'✅', on:'bg-green-600 text-white', off:'bg-gray-100 text-gray-500 hover:bg-green-50'},
    {v:'maybe', icon:'❓', on:'bg-amber-500 text-white', off:'bg-gray-100 text-gray-500 hover:bg-amber-50'},
    {v:'no',    icon:'❌', on:'bg-red-600 text-white',   off:'bg-gray-100 text-gray-500 hover:bg-red-50'},
  ];

  return (
    <>
    <div className="fixed inset-0 bg-black/60 z-50 flex items-end md:items-center justify-center p-0 md:p-4" onClick={onClose}>
      <div className="bg-white light-sheet w-full md:max-w-lg md:rounded-2xl rounded-t-2xl max-h-[90vh] flex flex-col shadow-2xl" onClick={e=>e.stopPropagation()}>
        {/* Header */}
        <div className="flex items-center justify-between px-5 py-4 border-b border-gray-100">
          <div>
            <div className="font-bold text-base">{fmtDate(session.date)} · {session.time} Uhr</div>
            <div className="text-xs text-gray-400">{session.duration} Min{session.location?' · '+session.location:''}</div>
          </div>
          <div className="flex gap-2">
            {!readOnly && <button onClick={()=>onEdit(session)} className="text-xs text-gray-500 hover:text-red-600 px-2 py-1.5 border border-gray-200 rounded-lg">✏️ Bearbeiten</button>}
            <button onClick={onClose} className="w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 text-gray-500 hover:bg-gray-200">✕</button>
          </div>
        </div>

        <div className="overflow-y-auto flex-1 p-5 space-y-5">
          {/* Rückmeldungen — nur für Trainer */}
          {!readOnly && (
            <div>
              <div className="flex items-center justify-between mb-3">
                <div className="text-xs font-semibold text-gray-400 uppercase tracking-wider">Rückmeldungen</div>
                <div className="flex gap-1">
                  {[['lastname','Nachname'],['firstname','Vorname'],['status','Status']].map(([v,l])=>(
                    <button key={v} onClick={()=>setAttSort(v)}
                      className={`px-2.5 py-1 rounded-full text-[10px] font-semibold transition-colors ${attSort===v?'bg-red-600 text-white':'bg-gray-100 text-gray-500 hover:bg-gray-200'}`}>
                      {l}
                    </button>
                  ))}
                </div>
              </div>
              <div className="flex gap-3 mb-4">
                <div className="flex-1 bg-green-50 border border-green-200 rounded-xl p-3 text-center">
                  <div className="text-2xl font-bold text-green-600">{att.yes}</div>
                  <div className="text-[10px] text-green-500 font-medium">Zusagen</div>
                </div>
                <div className="flex-1 bg-amber-50 border border-amber-200 rounded-xl p-3 text-center">
                  <div className="text-2xl font-bold text-amber-500">{att.maybe}</div>
                  <div className="text-[10px] text-amber-400 font-medium">Vielleicht</div>
                </div>
                <div className="flex-1 bg-red-50 border border-red-200 rounded-xl p-3 text-center">
                  <div className="text-2xl font-bold text-red-600">{att.no}</div>
                  <div className="text-[10px] text-red-400 font-medium">Absagen</div>
                </div>
              </div>
              <div className="space-y-2">
                {[...players].sort((a,b)=>{
                  if(attSort==='status'){const SO={yes:0,maybe:1,no:2};const sa=SO[att.byPlayer?.[a.id]]??3,sb=SO[att.byPlayer?.[b.id]]??3;return sa-sb||byLastName(a,b);}

                    <div key={p.id} className="flex items-center gap-2">

            <div>

          {/* Übungen aus Datenbank */}
          {session.uebungIds?.length>0 && (

              <div className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">📚 Übungsdatenbank ({session.uebungIds.length})</div>

                  const u = uebungenMap[id]; if(!u) return null;

                        <div className="absolute inset-0 group-hover:bg-black/20 transition-colors flex items-center justify-center">

                        <div className="flex items-start gap-2 mb-1.5">
                          <div className="font-semibold text-sm flex-1">{u.title}</div>

            <div className="flex items-center justify-between mb-3">

              {!readOnly && (
                <>
                  <button onClick={()=>fileRef.current?.click()} disabled={uploading}
                    className="flex items-center gap-1 px-3 py-1.5 rounded-lg bg-red-600 text-white text-xs font-semibold hover:bg-red-700 disabled:opacity-50">
                    {uploading ? '⏳ Lädt…' : '📎 Hochladen'}

                  <input ref={fileRef} type="file" accept="image/*,.pdf,.doc,.docx,.txt"
                    className="hidden" onChange={uploadFile}/>

            {uploadErr && <div className="mb-3 p-3 bg-red-50 border border-red-200 rounded-xl text-xs text-red-600">{uploadErr}</div>}

            {media.length===0 && (
              <div className="text-center py-6 text-gray-300 text-sm border-2 border-dashed border-gray-200 rounded-xl">
                {readOnly ? 'Keine Anhänge vorhanden' : 'Noch keine Dateien · max. 700 KB pro Datei'}

            {/* Bilder als Grid */}
            {images.length>0 && (
              <div className="grid grid-cols-2 gap-2 mb-3">
