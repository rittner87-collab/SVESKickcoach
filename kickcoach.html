function LineupBuilder({game, players, profile, onClose, show}) {
  const [formation,  setFormation]  = useState('4-3-3');
  const [lineup,     setLineup]     = useState(game.lineup||[]);  // [{slotId, playerId, name}]
  const [selected,   setSelected]   = useState(null); // slotId being filled
  const [attPlayers, setAttPlayers] = useState([]);
  const [saving,     setSaving]     = useState(false);

  // Lade Zusagen für dieses Spiel (Spieler die zugesagt haben oder alle wenn keine Zusagen)
  useEffect(()=>{
    col('attendance').where('sessionId','==',game.id).where('status','==','yes')
      .get().then(snap=>{
        if(snap.empty) {
          // Keine Zusagen → alle Spieler anzeigen
          setAttPlayers(players);
        } else {
          const yesIds = new Set(snap.docs.map(d=>d.data().userId));
          setAttPlayers(players.filter(p=>yesIds.has(p.id)));
        }
      });
  },[game.id, players]);

  const slots    = FORMATIONS[formation].slots;
  const assigned = Object.fromEntries(lineup.map(l=>[l.slotId,l]));
  const usedIds  = new Set(lineup.map(l=>l.playerId));

  const clickSlot = (slot) => {
    if (selected === slot.id) { setSelected(null); return; }
    setSelected(slot.id);
  };

  const assignPlayer = (player) => {
    if (!selected) return;
    setLineup(prev=>{
      const without = prev.filter(l=>l.slotId!==selected && l.playerId!==player.id);
      return [...without, {slotId:selected, playerId:player.id, name:player.name, number:player.number, color:player.color}];
    });
    setSelected(null);
  };

  const removeSlot = (slotId, e) => {
    e.stopPropagation();
    setLineup(prev=>prev.filter(l=>l.slotId!==slotId));
  };

  const saveLineup = async () => {
    setSaving(true);
    await col('games').doc(game.id).update({lineup, formation});
    show('Aufstellung gespeichert ✅');
    setSaving(false);
    onClose();
  };

  const freePlayers = attPlayers.filter(p=>!usedIds.has(p.id));

  return (
    <div className="fixed inset-0 bg-black/70 z-50 flex items-center justify-center p-2" onClick={onClose}>
      <div className="bg-white w-full max-w-2xl rounded-2xl shadow-2xl flex flex-col overflow-hidden" style={{maxHeight:'95vh'}} onClick={e=>e.stopPropagation()}>
        {/* Header */}
        <div className="flex items-center justify-between px-4 py-3 border-b border-gray-100 flex-shrink-0">
          <div>
            <div className="font-bold text-sm">Aufstellung — vs. {game.opponent}</div>
            <div className="text-xs text-gray-400">{fmtDate(game.date)}</div>
          </div>
          <div className="flex items-center gap-2">
            <select value={formation} onChange={e=>{setFormation(e.target.value);setLineup([]);setSelected(null);}}
              className="text-xs border border-gray-200 rounded-lg px-2 py-1.5 bg-white focus:outline-none focus:ring-2 focus:ring-red-500">
              {Object.entries(FORMATIONS).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}
            </select>
            <button onClick={onClose} className="w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 text-gray-500 hover:bg-gray-200 text-sm">✕</button>
          </div>
        </div>

        <div className="flex flex-1 overflow-hidden min-h-0">
          {/* Fußballfeld */}
          <div className="flex-1 relative overflow-hidden" style={{minWidth:0}}>
            {/* Feld-Hintergrund */}
            <div className="absolute inset-0 flex flex-col" style={{background:'linear-gradient(180deg,#2e7d32 0%,#388e3c 50%,#2e7d32 100%)'}}>
              {/* Streifen */}
              {Array.from({length:8}).map((_,i)=>(
                <div key={i} style={{flex:1,background:i%2===0?'rgba(0,0,0,0.05)':'rgba(255,255,255,0.05)'}}/>
              ))}
            </div>
            {/* Feldlinien SVG */}
            <svg className="absolute inset-0 w-full h-full" viewBox="0 0 100 100" preserveAspectRatio="none">
              <g stroke="rgba(255,255,255,0.8)" strokeWidth="0.5" fill="none">
                <rect x="5" y="3" width="90" height="94"/>
                <line x1="5" y1="50" x2="95" y2="50"/>
                <circle cx="50" cy="50" r="10"/>
                <circle cx="50" cy="50" r="0.8" fill="rgba(255,255,255,0.8)"/>
                {/* Strafräume */}
                <rect x="27" y="3" width="46" height="18"/>
                <rect x="34" y="3" width="32" height="10"/>
                <rect x="27" y="79" width="46" height="18"/>
                <rect x="34" y="87" width="32" height="10"/>
                {/* Halbkreise Strafraum */}
                <path d="M 35 21 A 10 10 0 0 0 65 21" strokeDasharray="1,0.5"/>
                <path d="M 35 79 A 10 10 0 0 1 65 79" strokeDasharray="1,0.5"/>
                {/* Strafstoß-Punkt */}
                <circle cx="50" cy="14" r="0.8" fill="rgba(255,255,255,0.8)" stroke="none"/>
                <circle cx="50" cy="86" r="0.8" fill="rgba(255,255,255,0.8)" stroke="none"/>
                {/* Eckbögen */}
                <path d="M 5 5 Q 7 3 9 5"/><path d="M 91 5 Q 93 3 95 5"/>
                <path d="M 5 95 Q 7 97 9 95"/><path d="M 91 95 Q 93 97 95 95"/>
              </g>
            </svg>

            {/* Anweisung */}
            {selected && (
              <div className="absolute top-2 left-1/2 -translate-x-1/2 bg-black/70 text-white text-[10px] px-3 py-1 rounded-full z-10 whitespace-nowrap">
                Spieler aus der Liste rechts auswählen
              </div>
            )}

            {/* Spieler-Slots */}
            {slots.map(slot=>{
              const a = assigned[slot.id];
              const isSelected = selected === slot.id;
              return (
                <div key={slot.id}
                  onClick={()=>clickSlot(slot)}
                  className="absolute flex flex-col items-center cursor-pointer"
                  style={{left:`${slot.x}%`,top:`${slot.y}%`,transform:'translate(-50%,-50%)'}}>
                  <div className={`w-9 h-9 rounded-full flex items-center justify-center text-[10px] font-bold border-2 transition-all shadow-lg
                    ${isSelected?'border-yellow-400 ring-2 ring-yellow-300 scale-110':'border-white/60 hover:border-white hover:scale-105'}
                    ${a ? '' : 'border-dashed'}`}
                    style={{background:a?a.color||'#CC0000':'rgba(0,0,0,0.45)'}}>
                    {a
                      ? <span className="text-white drop-shadow">{a.number||initials(a.name)}</span>
                      : <span className="text-white/60 text-[9px]">{slot.label}</span>
                    }
                    {a && (
                      <button onClick={e=>removeSlot(slot.id,e)}
                        className="absolute -top-1 -right-1 w-4 h-4 bg-red-600 text-white rounded-full text-[9px] flex items-center justify-center hover:bg-red-700 shadow">✕</button>
                    )}
                  </div>
                  <div className="text-[9px] text-white/90 font-semibold mt-0.5 drop-shadow max-w-14 truncate text-center">
                    {a ? a.name.split(' ').pop() : slot.label}
                  </div>
                </div>
              );
            })}
          </div>

          {/* Spieler-Liste */}
          <div className="w-36 flex flex-col border-l border-gray-100 bg-gray-50 flex-shrink-0 overflow-hidden">
            <div className="px-3 py-2 border-b border-gray-100 flex-shrink-0">
              <div className="text-[10px] font-semibold text-gray-500 uppercase tracking-wider">Spieler</div>
              <div className="text-[9px] text-gray-400">{attPlayers.length} verfügbar</div>
            </div>
            <div className="overflow-y-auto flex-1 p-2 space-y-1">
              {attPlayers.map(p=>{
                const inUse = usedIds.has(p.id);
                return (
                  <button key={p.id}
                    onClick={()=>selected && !inUse && assignPlayer(p)}
                    disabled={!selected || inUse}
                    className={`w-full flex items-center gap-1.5 px-2 py-1.5 rounded-lg text-left transition-all text-xs
                      ${inUse?'opacity-40 cursor-default':selected?'hover:bg-red-50 hover:border-red-400 cursor-pointer border border-transparent':'cursor-default border border-transparent'}
                      ${selected&&!inUse?'border-red-200 bg-white shadow-sm':''}`}>
                    <div className="w-6 h-6 rounded-full flex items-center justify-center text-white text-[9px] font-bold flex-shrink-0"
                      style={{background:p.color||'#CC0000'}}>
                      {p.number||initials(p.name)}
                    </div>
                    <span className="truncate font-medium text-gray-700">{p.name.split(' ').pop()}</span>
                    {inUse && <span className="text-[8px] text-green-500 ml-auto flex-shrink-0">✓</span>}
                  </button>
                );
              })}
              {attPlayers.length===0&&(
                <p className="text-[10px] text-gray-400 text-center py-4">Keine Spieler haben zugesagt.</p>
              )}
            </div>
            <div className="p-2 flex-shrink-0 border-t border-gray-100 space-y-1.5">
              <div className="text-[9px] text-gray-400 text-center">{lineup.length}/11 gesetzt</div>
              <Btn size="sm" className="w-full" onClick={saveLineup} disabled={saving}>
                {saving?'…':'💾 Speichern'}
              </Btn>
              <button onClick={()=>setLineup([])} className="w-full text-[10px] text-gray-400 hover:text-gray-600">Zurücksetzen</button>
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
//  TRAINER — SPIELE
// ═══════════════════════════════════════════════════════════════════
function TrainerSpiele({profile, show}) {
  const EMPTY_G = {date:'',time:'15:00',treffzeit:'',treffpunkt:'',trikot:'',opponent:'',location:'',home:true,scoreHome:'',scoreAway:'',besonderheiten:''};
  const [games,      setGames]      = useState([]);
  const [players,    setPlayers]    = useState([]);
  const [open,       setOpen]       = useState(false);
  const [editing,    setEditing]    = useState(null);
  const [form,       setForm]       = useState(EMPTY_G);
  const [delGame,    setDelGame]    = useState(null);
  const [lineup,     setLineup]     = useState(null);
  const [detailGame,  setDetailGame]  = useState(null);
  const [gameRsvp,    setGameRsvp]    = useState([]);
  const [gameRatings, setGameRatings] = useState([]); // Bewertungen für detailGame
  const [feedbackPlayer, setFeedbackPlayer] = useState(null); // {id, name} — Spieler wird gerade bewertet
  const [fbScores,    setFbScores]    = useState({Technik:3,Ausdauer:3,Taktik:3,Einsatz:3,Teamgeist:3});
  const [fbNotes,     setFbNotes]     = useState('');
  const [fbSaving,    setFbSaving]    = useState(false);

  useEffect(()=>{
    const u1=col('games').where('teamId','==',profile.teamId).onSnapshot(s=>setGames(s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>b.date?.localeCompare(a.date||''))));
    const u2=col('users').where('teamId','==',profile.teamId).onSnapshot(s=>setPlayers(s.docs.map(d=>({id:d.id,...d.data()})).filter(p=>p.role==='player'||p.role==='dual')));
    return ()=>{u1();u2();};
  },[]);

  useEffect(()=>{
    if(!detailGame) return;
    const u1 = col('gameAttendance').where('gameId','==',detailGame.id)
      .onSnapshot(s=>setGameRsvp(s.docs.map(d=>({id:d.id,...d.data()}))));
    const u2 = col('ratings').where('gameId','==',detailGame.id)
      .onSnapshot(s=>setGameRatings(s.docs.map(d=>({id:d.id,...d.data()}))));
    return ()=>{u1();u2();};
  },[detailGame?.id]);

  const [rsvpSaving, setRsvpSaving] = useState({});

  const setGameStatus = async (player, status) => {
    setRsvpSaving(v=>({...v,[player.id]:true}));
    const existing = gameRsvp.find(r=>r.userId===player.id);
    if(existing) {
      await col('gameAttendance').doc(existing.id).update({status, updatedAt:ts()});
    } else {
      await col('gameAttendance').add({
        gameId: detailGame.id, userId: player.id, playerName: player.name,
        teamId: profile.teamId, status, updatedAt: ts(),
      });
    }
    setRsvpSaving(v=>({...v,[player.id]:false}));
  };

  const RSVP_OPTS = [
    {v:'yes',   icon:'✅', on:'bg-green-600 text-white', off:'bg-gray-100 text-gray-500 hover:bg-green-50'},
    {v:'maybe', icon:'❓', on:'bg-amber-500 text-white', off:'bg-gray-100 text-gray-500 hover:bg-amber-50'},
    {v:'no',    icon:'❌', on:'bg-red-600 text-white',   off:'bg-gray-100 text-gray-500 hover:bg-red-50'},
  ];

  const openFeedback = (player) => {
    const existing = gameRatings.find(r=>r.playerId===player.id);
    setFbScores(existing?.scores || {Technik:3,Ausdauer:3,Taktik:3,Einsatz:3,Teamgeist:3});
    setFbNotes(existing?.notes || '');
    setFeedbackPlayer(player);
  };

  const saveFeedback = async (e) => {
    e.preventDefault(); if(!feedbackPlayer||!detailGame) return;
    setFbSaving(true);
    const avg = (Object.values(fbScores).reduce((a,b)=>a+b,0)/RATING_CATS.length).toFixed(1);
    const data = {
      playerId: feedbackPlayer.id, playerName: feedbackPlayer.name,
      teamId: profile.teamId, gameId: detailGame.id,
      gameOpponent: detailGame.opponent||'', gameDate: detailGame.date||'',
      scores: fbScores, avg: Number(avg), notes: fbNotes,
      type: 'game', trainerName: profile.name, createdAt: ts(),
    };
    const existing = gameRatings.find(r=>r.playerId===feedbackPlayer.id);
    if(existing) await col('ratings').doc(existing.id).update(data);
    else         await col('ratings').add(data);
    show('Feedback gespeichert ✅');
    setFeedbackPlayer(null); setFbSaving(false);
  };

  const openNew  = () => { setEditing(null); setForm(EMPTY_G); setOpen(true); };
  const openEdit = (g) => { setEditing(g.id); setForm({date:g.date||'',time:g.time||'15:00',treffzeit:g.treffzeit||'',treffpunkt:g.treffpunkt||'',trikot:g.trikot||'',opponent:g.opponent||'',location:g.location||'',home:!!g.home,scoreHome:g.scoreHome??'',scoreAway:g.scoreAway??'',besonderheiten:g.besonderheiten||''}); setOpen(true); };

  const save = async (e) => {
    e.preventDefault();
    if (editing) {
      await col('games').doc(editing).update(form);
      show('Spiel aktualisiert ✅');
    } else {
      const ref = await col('games').add({...form, teamId:profile.teamId, lineup:[], createdAt:ts()});
      show('Spiel eingetragen ✅');
      notifyNewGame({...form, teamId:profile.teamId, id:ref.id}).catch(()=>{});
    }
    setForm(EMPTY_G); setOpen(false); setEditing(null);
  };

  const doDelete = async () => {
    await col('games').doc(delGame).delete();
    show('Spiel gelöscht'); setDelGame(null);
  };

  const badge = (g) => {
    if(g.scoreHome===''||g.scoreHome===undefined||g.scoreHome===null) return null;
    const won = g.home ? Number(g.scoreHome)>Number(g.scoreAway) : Number(g.scoreAway)>Number(g.scoreHome);
    const draw = Number(g.scoreHome)===Number(g.scoreAway);
    return <div className={`text-xs font-bold px-2.5 py-1 rounded-full ${draw?'bg-gray-100 text-gray-600':won?'bg-green-100 text-green-700':'bg-red-100 text-red-600'}`}>{g.scoreHome}:{g.scoreAway} {draw?'U':won?'✓':'✗'}</div>;
  };

  const upcoming = games.filter(g=>g.date>=todayStr());
  const past     = games.filter(g=>g.date<todayStr());

  return (
    <div className="p-4">
      <div className="flex items-center justify-between mb-4">
        <h1 className="text-lg font-semibold">Spiele</h1>
        <Btn size="sm" onClick={openNew}>+ Spiel</Btn>
      </div>

      {delGame && (
        <Modal title="Spiel löschen?" onClose={()=>setDelGame(null)}>
          <p className="text-sm text-gray-600 mb-4">Dieses Spiel wirklich löschen?</p>
          <div className="flex gap-2">
            <Btn variant="secondary" className="flex-1" onClick={()=>setDelGame(null)}>Abbrechen</Btn>
            <Btn className="flex-1 bg-red-700" onClick={doDelete}>Löschen</Btn>
          </div>
        </Modal>
      )}

      {lineup && (
        <LineupBuilder game={lineup} players={players} profile={profile} onClose={()=>setLineup(null)} show={show}/>
      )}

      {/* ── SPIEL-DETAIL: RSVP + MITFAHRT ── */}
      {detailGame && (
        <div className="fixed inset-0 bg-black/60 z-50 flex items-end md:items-center justify-center p-0 md:p-4" onClick={()=>setDetailGame(null)}>
          <div className="bg-white w-full md:max-w-lg md:rounded-2xl rounded-t-2xl max-h-[85vh] flex flex-col shadow-2xl" onClick={e=>e.stopPropagation()}>
            <div className="flex items-center justify-between px-5 py-4 border-b border-gray-100">
              <div>
                <div className="font-bold text-base">vs. {detailGame.opponent}</div>
                <div className="text-xs text-gray-400">{fmtDate(detailGame.date)} · ⚽ {detailGame.time} Uhr{detailGame.treffzeit?' · 🕐 Treff '+detailGame.treffzeit+' Uhr':''}</div>
                {detailGame.treffpunkt&&<div className="text-xs text-gray-400">📍 {detailGame.treffpunkt}</div>}
                {detailGame.trikot&&<div className="text-xs text-gray-400">👕 {detailGame.trikot}</div>}
                {detailGame.besonderheiten&&<div className="text-xs text-amber-600 font-medium mt-0.5">⚠️ {detailGame.besonderheiten}</div>}
              </div>
              <button onClick={()=>setDetailGame(null)} className="w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 text-gray-500">✕</button>
            </div>
            <div className="overflow-y-auto flex-1 p-5 space-y-5">
              {/* Übersicht-Kacheln */}
              {(()=>{
                const yes=gameRsvp.filter(r=>r.status==='yes');
                const no=gameRsvp.filter(r=>r.status==='no');
                const maybe=gameRsvp.filter(r=>r.status==='maybe');
                const mitfahrt=gameRsvp.filter(r=>r.mitfahrt===true);
                return (<>
                  <div className="grid grid-cols-4 gap-2">
                    {[
                      {label:'Zusagen',  val:yes.length,    bg:'bg-green-50 border-green-200',  txt:'text-green-600'},
                      {label:'Absagen',  val:no.length,     bg:'bg-red-50 border-red-200',      txt:'text-red-600'},
                      {label:'Unsicher', val:maybe.length,  bg:'bg-amber-50 border-amber-200',  txt:'text-amber-500'},
                      {label:'🚗 Mitfahrt',val:mitfahrt.length,bg:'bg-orange-50 border-orange-200',txt:'text-orange-600'},
                    ].map(t=>(
                      <div key={t.label} className={`border rounded-xl p-2 text-center ${t.bg}`}>
                        <div className={`text-xl font-bold ${t.txt}`}>{t.val}</div>
                        <div className="text-[10px] text-gray-500 font-medium">{t.label}</div>
                      </div>
                    ))}
                  </div>

                  {/* Spielerliste — mit manueller Statusänderung */}
                  <div>
                    <div className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Rückmeldungen</div>
                    <div className="space-y-2">
                      {players.map(p=>{
                        const r   = gameRsvp.find(x=>x.userId===p.id);
                        const cur = r?.status||null;
                        return (
                          <div key={p.id} className="flex items-center gap-2">
                            <div className="w-7 h-7 rounded-full flex items-center justify-center text-white text-[10px] font-bold flex-shrink-0" style={{background:p.color||'#CC0000'}}>
                              {p.number||initials(p.name)}
                            </div>
                            <div className="flex-1 min-w-0">
                              <div className="text-xs font-medium truncate">{p.name}</div>
                              {r?.mitfahrt===true && <span className="text-[9px] text-orange-600">🚗 Mitfahrt</span>}
                            </div>
                            <div className="flex gap-1">
                              {RSVP_OPTS.map(opt=>(
                                <button key={opt.v} onClick={()=>setGameStatus(p, opt.v)} disabled={rsvpSaving[p.id]}
                                  className={`text-[10px] px-2 py-1 rounded-lg font-medium transition-all ${cur===opt.v?opt.on:opt.off}`}>
                                  {opt.icon}
                                </button>
                              ))}
                            </div>
                          </div>
                        );
                      })}
                      {players.length===0 && <p className="text-xs text-gray-400">Keine Spieler im Team.</p>}
                    </div>
                  </div>

                  {/* Mitfahrt-Zusammenfassung */}
                  {mitfahrt.length>0 && (
                    <div className="bg-orange-50 border border-orange-200 rounded-xl p-4">
                      <div className="text-xs font-semibold text-orange-700 mb-2">🚗 Mitfahrgelegenheit benötigt ({mitfahrt.length})</div>
                      <div className="space-y-1">
                        {mitfahrt.map(r=>(
                          <div key={r.id} className="text-sm text-orange-800 font-medium">{r.playerName}</div>
                        ))}
                      </div>
                    </div>
                  )}

                  {/* ── SPIELER-FEEDBACK ── */}
                  <div>
                    <div className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">⭐ Spieler-Feedback</div>
                    <div className="space-y-2">
                      {players.map(p=>{
                        const r = gameRatings.find(x=>x.playerId===p.id);
                        return (
                          <div key={p.id} className="bg-gray-50 rounded-xl px-3 py-2.5 flex items-center gap-3">
                            <div className="w-7 h-7 rounded-full flex items-center justify-center text-white text-[10px] font-bold flex-shrink-0" style={{background:p.color||'#CC0000'}}>
                              {p.number||initials(p.name)}
                            </div>
                            <div className="flex-1 min-w-0">
                              <div className="text-xs font-semibold truncate">{p.name}</div>
                              {r ? (
                                <div className="text-[11px] text-gray-500 mt-0.5">
                                  Ø <span className="font-bold text-red-600">{r.avg}</span>/5
                                  {r.notes && <span className="ml-1 text-gray-400 italic">· {r.notes.slice(0,40)}{r.notes.length>40?'…':''}</span>}
                                </div>
                              ) : <div className="text-[11px] text-gray-400">Noch kein Feedback</div>}
                            </div>
                            <button onClick={()=>openFeedback(p)}
                              className={`text-[11px] px-2.5 py-1 rounded-lg font-semibold flex-shrink-0 transition-colors ${r?'bg-red-100 text-red-700':'bg-gray-200 text-gray-600 hover:bg-red-100 hover:text-red-700'}`}>
                              {r?'Bearbeiten':'Bewerten'}
                            </button>
                          </div>
                        );
                      })}
                    </div>
                  </div>
                </>);
              })()}
            </div>
          </div>
        </div>
      )}

      {/* ── FEEDBACK-MODAL ── */}
      {feedbackPlayer && (
        <Modal title={`Feedback: ${feedbackPlayer.name}`} onClose={()=>setFeedbackPlayer(null)}>
          <div className="text-xs text-gray-400 mb-3">vs. {detailGame?.opponent} · {fmtDate(detailGame?.date)}</div>
          <form onSubmit={saveFeedback}>
            <div className="space-y-3 mb-4">
              {RATING_CATS.map(cat=>(
                <div key={cat} className="flex items-center justify-between">
                  <span className="text-sm text-gray-700 w-24">{cat}</span>
                  <Stars value={fbScores[cat]} onChange={v=>setFbScores(s=>({...s,[cat]:v}))}/>
                  <span className="text-sm font-bold text-red-600 w-6 text-right">{fbScores[cat]}</span>
                </div>
              ))}
            </div>
            <div className="text-xs text-gray-400 text-right mb-3">
              Ø {(Object.values(fbScores).reduce((a,b)=>a+b,0)/RATING_CATS.length).toFixed(1)}/5
            </div>
            <Txt label="Kommentar / Feedback" value={fbNotes} onChange={e=>setFbNotes(e.target.value)} rows={3} placeholder="z.B. Starke Leistung im Pressing, Pässe noch verbessern..."/>
            <div className="flex gap-2">
              <Btn type="button" variant="secondary" className="flex-1" onClick={()=>setFeedbackPlayer(null)}>Abbrechen</Btn>
              <Btn type="submit" className="flex-1" disabled={fbSaving}>{fbSaving?'Speichert…':'Speichern'}</Btn>
            </div>
            {gameRatings.find(r=>r.playerId===feedbackPlayer?.id) && (
              <button type="button"
                onClick={async()=>{
                  if(!window.confirm('Feedback für '+feedbackPlayer.name+' wirklich löschen?')) return;
                  const r = gameRatings.find(x=>x.playerId===feedbackPlayer.id);
                  if(r) { await col('ratings').doc(r.id).delete(); show('Feedback gelöscht'); }
                  setFeedbackPlayer(null);
                }}
                className="mt-2 w-full text-xs text-red-500 hover:text-red-700 py-1.5 rounded-lg hover:bg-red-50 transition-colors">
                🗑 Feedback löschen
              </button>
            )}
          </form>
        </Modal>
      )}

      {open && (
        <Modal title={editing?'Spiel bearbeiten':'Spiel eintragen'} onClose={()=>{setOpen(false);setEditing(null);}}>
          <form onSubmit={save}>
            <Inp label="Gegner" value={form.opponent} onChange={e=>setForm({...form,opponent:e.target.value})} placeholder="FC Musterstadt" required/>
            <div className="flex gap-2">
              <Inp label="Datum" type="date" value={form.date} onChange={e=>setForm({...form,date:e.target.value})} required/>
              <Inp label="Anstoß" type="time" value={form.time} onChange={e=>setForm({...form,time:e.target.value})}/>
              <Inp label="Treff" type="time" value={form.treffzeit} onChange={e=>setForm({...form,treffzeit:e.target.value})}/>
            </div>
            <Inp label="Treffpunkt" value={form.treffpunkt} onChange={e=>setForm({...form,treffpunkt:e.target.value})} placeholder="z.B. Vereinsheim Parkplatz"/>
            <Inp label="Ort / Stadion" value={form.location} onChange={e=>setForm({...form,location:e.target.value})} placeholder="Sportstadion"/>
            <Inp label="Trikotfarbe" value={form.trikot} onChange={e=>setForm({...form,trikot:e.target.value})} placeholder="z.B. Rot (Heim) oder Weiß (Auswärts)"/>
            <label className="flex items-center gap-2 text-sm text-gray-600 mb-3 cursor-pointer">
              <input type="checkbox" checked={form.home} onChange={e=>setForm({...form,home:e.target.checked})} className="accent-red-600"/> Heimspiel
            </label>
            <Txt label="Besonderheiten" value={form.besonderheiten} onChange={e=>setForm({...form,besonderheiten:e.target.value})} rows={2} placeholder="z.B. Wichtiges Derby, Ehrengast erwartet…"/>
            <div className="mb-3">
              <label className="block text-xs font-medium text-gray-600 mb-1">Ergebnis (nach dem Spiel)</label>
              <div className="flex items-center gap-2">
                <input type="number" min="0" placeholder="Heim" value={form.scoreHome} onChange={e=>setForm({...form,scoreHome:e.target.value})}
                  className="flex-1 border border-gray-200 rounded-lg px-3 py-2 text-sm text-center focus:outline-none focus:ring-2 focus:ring-red-500"/>
                <span className="text-gray-400 font-bold text-lg">:</span>
                <input type="number" min="0" placeholder="Gast" value={form.scoreAway} onChange={e=>setForm({...form,scoreAway:e.target.value})}
                  className="flex-1 border border-gray-200 rounded-lg px-3 py-2 text-sm text-center focus:outline-none focus:ring-2 focus:ring-red-500"/>
              </div>
            </div>
            <div className="flex gap-2">
              <Btn type="button" variant="secondary" className="flex-1" onClick={()=>{setOpen(false);setEditing(null);}}>Abbrechen</Btn>
              <Btn type="submit" className="flex-1">{editing?'Aktualisieren':'Speichern'}</Btn>
            </div>
          </form>
        </Modal>
      )}

      {games.length===0 ? (
        <div className="text-center text-gray-400 py-16"><div className="text-4xl mb-2">🏆</div><p className="text-sm">Noch keine Spiele eingetragen.</p></div>
      ) : (
        <div className="space-y-2">
          {upcoming.length>0&&<><div className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Bevorstehend</div>
            {upcoming.map(g=><GameCard key={g.id} g={g} badge={badge} onEdit={openEdit} onDelete={()=>setDelGame(g.id)} onLineup={()=>setLineup(g)} onDetail={()=>setDetailGame(g)}/>)}</>}
          {past.length>0&&<><div className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2 mt-4">Vergangen</div>
            {past.map(g=><GameCard key={g.id} g={g} badge={badge} faded onEdit={openEdit} onDelete={()=>setDelGame(g.id)} onLineup={()=>setLineup(g)} onDetail={()=>setDetailGame(g)}/>)}</>}
        </div>
      )}
    </div>
  );
}

const GameCard = ({g, badge, faded=false, onEdit, onDelete, onLineup, onDetail}) => (
  <div className={`border rounded-xl overflow-hidden ${faded?'bg-gray-50 border-gray-200 opacity-80':'bg-white border-gray-200'}`}>
    <div className="p-4 cursor-pointer hover:bg-gray-50 transition-colors" onClick={onDetail}>
      <div className="flex items-start justify-between gap-2">
        <div className="min-w-0">
          <div className="text-sm font-semibold">vs. {g.opponent}</div>
          <div className="text-xs text-gray-400 mt-0.5">{fmtDate(g.date)} · {g.time}{g.location?' · '+g.location:''} · {g.home?'🏠 Heim':'✈️ Auswärts'}</div>
          {g.notes&&<p className="text-xs text-gray-500 mt-1">{g.notes}</p>}
        </div>
        <div className="flex items-center gap-1.5 flex-shrink-0">
          {badge(g)}
        </div>
      </div>
    {g.lineup?.length>0 && (
      <div className="mt-2 flex gap-1 flex-wrap">
        {g.lineup.map((p,i)=>(
          <span key={i} className="text-[10px] bg-green-50 text-green-700 border border-green-200 px-1.5 py-0.5 rounded-full">{p.name}</span>
        ))}
      </div>
    )}
    </div>
    <div className="flex items-center gap-1.5 px-3 pb-3 pt-0" onClick={e=>e.stopPropagation()}>
      <button onClick={()=>onLineup(g)} title="Aufstellung" className="text-sm px-2 py-1 border border-gray-200 rounded-lg hover:border-red-400 hover:bg-red-50 transition-colors">🟢 Aufstellung</button>
      <button onClick={()=>onEdit(g)} className="text-xs text-gray-400 hover:text-red-600 px-2 py-1 rounded-lg hover:bg-red-50">✏️</button>
      <button onClick={onDelete} className="text-xs text-gray-400 hover:text-red-600 px-2 py-1 rounded-lg hover:bg-red-50">🗑</button>
    </div>
  </div>
);

// ═══════════════════════════════════════════════════════════════════
//  TRAINER — VERLETZUNGEN
// ═══════════════════════════════════════════════════════════════════
function TrainerVerletzungen({profile, show}) {
  const [injuries, setInjuries] = useState([]);
  const [players,  setPlayers]  = useState([]);
  const [open, setOpen] = useState(false);
  const [form, setForm] = useState({playerId:'',type:'',bodyPart:'',since:'',expectedReturn:'',notes:''});

  useEffect(()=>{
    const u1=col('injuries').where('teamId','==',profile.teamId).onSnapshot(s=>setInjuries(s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>b.since?.localeCompare(a.since||''))));
    const u2=col('users').where('teamId','==',profile.teamId).where('role','==','player').onSnapshot(s=>setPlayers(s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>{const ai=ALL_POSITIONS.indexOf(getPositions(a)[0]);const bi=ALL_POSITIONS.indexOf(getPositions(b)[0]);return (ai===-1?99:ai)-(bi===-1?99:bi)||(a.name||'').localeCompare(b.name||'');})));
    return ()=>{u1();u2();};
  },[]);

  const add = async (e) => {
    e.preventDefault();
    const player=players.find(p=>p.id===form.playerId);
    await col('injuries').add({...form,playerName:player?.name||'',teamId:profile.teamId,status:'aktiv',createdAt:ts()});
    show('Verletzung eingetragen ✅'); setForm({playerId:'',type:'',bodyPart:'',since:'',expectedReturn:'',notes:''}); setOpen(false);
  };

  const recover = async (id) => { await col('injuries').doc(id).update({status:'erholt'}); show('Als erholt markiert ✅'); };

  const active   = injuries.filter(i=>i.status==='aktiv');
  const recovered= injuries.filter(i=>i.status!=='aktiv');

  return (
    <div className="p-4">
      <div className="flex items-center justify-between mb-4">
        <div>
          <h1 className="text-lg font-semibold">Verletzungen</h1>
          {active.length>0&&<span className="text-xs bg-red-100 text-red-600 px-2 py-0.5 rounded-full">{active.length} aktiv</span>}
        </div>
        <Btn size="sm" onClick={()=>setOpen(true)}>+ Eintragen</Btn>
      </div>
      {open && (
        <Modal title="Verletzung eintragen" onClose={()=>setOpen(false)}>
          <form onSubmit={add}>
            <Sel label="Spieler" value={form.playerId} onChange={e=>setForm({...form,playerId:e.target.value})} required>
              <option value="">Spieler wählen…</option>
              {players.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
            </Sel>
            <div className="flex gap-2">
              <Inp label="Art" value={form.type} onChange={e=>setForm({...form,type:e.target.value})} placeholder="Muskelfaserriss" required/>
              <Inp label="Körperteil" value={form.bodyPart} onChange={e=>setForm({...form,bodyPart:e.target.value})} placeholder="Oberschenkel"/>
            </div>
            <div className="flex gap-2">
              <Inp label="Seit" type="date" value={form.since} onChange={e=>setForm({...form,since:e.target.value})}/>
              <Inp label="Voraus. Rückkehr" type="date" value={form.expectedReturn} onChange={e=>setForm({...form,expectedReturn:e.target.value})}/>
            </div>
            <Txt label="Notizen" value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} rows={2}/>
            <div className="flex gap-2"><Btn type="button" variant="secondary" className="flex-1" onClick={()=>setOpen(false)}>Abbrechen</Btn><Btn type="submit" className="flex-1">Speichern</Btn></div>
          </form>
        </Modal>
      )}
      {injuries.length===0 ? <div className="text-center text-gray-400 py-16"><div className="text-4xl mb-2">🩹</div><p className="text-sm">Keine Verletzungen eingetragen.</p></div> : (
        <div className="space-y-2">
          {active.length>0&&<><div className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Aktiv verletzt</div>
            {active.map(i=>(
              <div key={i.id} className="bg-white border border-red-200 rounded-xl p-4 flex items-start justify-between gap-3">
                <div>
                  <div className="text-sm font-semibold">{i.playerName}</div>
                  <div className="text-xs text-gray-500">{i.type}{i.bodyPart?' · '+i.bodyPart:''}</div>
                  <div className="text-xs text-gray-400">Seit {i.since}{i.expectedReturn?' · Rückkehr ~'+i.expectedReturn:''}</div>
                  {i.notes&&<p className="text-xs text-gray-500 mt-1">{i.notes}</p>}
                </div>
                <Btn size="sm" variant="secondary" onClick={()=>recover(i.id)}>Erholt ✓</Btn>
              </div>
            ))}
          </>}
          {recovered.length>0&&<><div className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2 mt-4">Erholt</div>
            {recovered.map(i=>(
              <div key={i.id} className="bg-gray-50 border border-gray-200 rounded-xl p-3 opacity-60 flex justify-between">
                <div><span className="text-sm font-medium">{i.playerName}</span> · <span className="text-sm text-gray-500">{i.type}</span><div className="text-xs text-gray-400">{i.since}</div></div>
              </div>
            ))}
          </>}
        </div>
      )}
    </div>
  );
}

//  TRAINER — BEURTEILUNGEN
// ═══════════════════════════════════════════════════════════════════
const RATING_CATS = ['Technik','Ausdauer','Taktik','Einsatz','Teamgeist'];

// ═══════════════════════════════════════════════════════════════════
//  TRAINER — SPIELER-STATISTIK
// ═══════════════════════════════════════════════════════════════════
function TrainerSpielerStatistik({profile}) {
  const [players,    setPlayers]    = useState([]);
  const [sessions,   setSessions]   = useState([]);
  const [attendance, setAttendance] = useState([]);
  const [games,      setGames]      = useState([]);
  const [gameAtt,    setGameAtt]    = useState([]);
  const [selected,   setSelected]   = useState(null); // player detail

  useEffect(()=>{
    const u1 = col('users').where('teamId','==',profile.teamId)
      .onSnapshot(s=>setPlayers(s.docs.map(d=>({id:d.id,...d.data()})).filter(p=>p.role==='player'||p.role==='dual').sort((a,b)=>a.name?.localeCompare(b.name||''))));
    const u2 = col('sessions').where('teamId','==',profile.teamId)
      .onSnapshot(s=>setSessions(s.docs.map(d=>({id:d.id,...d.data()}))));
    const u3 = col('attendance').where('teamId','==',profile.teamId)
      .onSnapshot(s=>setAttendance(s.docs.map(d=>({id:d.id,...d.data()}))));
    const u4 = col('games').where('teamId','==',profile.teamId)
      .onSnapshot(s=>setGames(s.docs.map(d=>({id:d.id,...d.data()}))));
    const u5 = col('gameAttendance').where('teamId','==',profile.teamId)
      .onSnapshot(s=>setGameAtt(s.docs.map(d=>({id:d.id,...d.data()}))));
    return ()=>{u1();u2();u3();u4();u5();};
  },[]);

  const statsFor = (p) => {
    const pAtt  = attendance.filter(a=>a.userId===p.id);
    const tYes  = pAtt.filter(a=>a.status==='yes'||a.status==='attend').length;
    const tNo   = pAtt.filter(a=>a.status==='no'||a.status==='cancel').length;
    const tMaybe= pAtt.filter(a=>a.status==='maybe'||a.status==='unsure').length;
    const tTotal= sessions.length;
    const tRate = tTotal>0 ? Math.round((tYes/tTotal)*100) : null;

    const pGame = gameAtt.filter(a=>a.userId===p.id);
    const gYes  = pGame.filter(a=>a.status==='yes').length;
    const gNo   = pGame.filter(a=>a.status==='no').length;
    const gMaybe= pGame.filter(a=>a.status==='maybe').length;
    const gTotal= games.length;
    const gRate = gTotal>0 ? Math.round((gYes/gTotal)*100) : null;

    return {tYes,tNo,tMaybe,tTotal,tRate,gYes,gNo,gMaybe,gTotal,gRate};
  };

  const MiniBar = ({pct, color='bg-red-500'}) => (
    <div className="flex-1 h-1.5 bg-gray-100 rounded-full overflow-hidden">
      <div className={`h-full ${color} rounded-full`} style={{width:`${pct||0}%`}}/>
    </div>
  );

  // Detail-Modal für einzelnen Spieler
  const DetailModal = ({p}) => {
    const s = statsFor(p);
    const pAtt  = attendance.filter(a=>a.userId===p.id);
    const pGame = gameAtt.filter(a=>a.userId===p.id);

    // letzte 5 Trainings
    const lastSessions = [...sessions].sort((a,b)=>b.date?.localeCompare(a.date||'')).slice(0,8);
    const lastGames    = [...games].sort((a,b)=>b.date?.localeCompare(a.date||'')).slice(0,8);

    const tIcon = (sessionId) => {
      const a = pAtt.find(x=>x.sessionId===sessionId);
      if(!a) return <span className="text-gray-200">—</span>;
      if(a.status==='yes'||a.status==='attend') return <span className="text-green-500">✓</span>;
      if(a.status==='no'||a.status==='cancel')  return <span className="text-red-500">✗</span>;
      return <span className="text-amber-400">?</span>;
    };
    const gIcon = (gameId) => {
      const a = pGame.find(x=>x.gameId===gameId);
      if(!a) return <span className="text-gray-200">—</span>;
      if(a.status==='yes')   return <span className="text-green-500">✓</span>;
      if(a.status==='no')    return <span className="text-red-500">✗</span>;
      return <span className="text-amber-400">?</span>;
    };

    return (
      <div className="fixed inset-0 bg-black/60 z-50 flex items-end md:items-center justify-center p-0 md:p-4" onClick={()=>setSelected(null)}>
        <div className="bg-white w-full md:max-w-md md:rounded-2xl rounded-t-2xl max-h-[85vh] flex flex-col shadow-2xl" onClick={e=>e.stopPropagation()}>
          <div className="flex items-center gap-3 px-5 py-4 border-b border-gray-100">
            <div className="w-10 h-10 rounded-full flex items-center justify-center text-white text-sm font-bold flex-shrink-0" style={{background:p.color||'#CC0000'}}>
              {p.number||initials(p.name)}
            </div>
            <div className="flex-1">
              <div className="font-bold">{p.name}</div>
              <div className="text-xs text-gray-400">{p.position||'Spieler'}</div>
            </div>
            <button onClick={()=>setSelected(null)} className="w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 text-gray-500">✕</button>
          </div>
          <div className="overflow-y-auto flex-1 p-5 space-y-5">
            {/* Zahlen-Übersicht */}
            <div className="grid grid-cols-2 gap-3">
              <div className="bg-blue-50 border border-blue-200 rounded-xl p-4 text-center">
                <div className="text-3xl font-bold text-blue-600">{s.tYes}</div>
                <div className="text-[10px] text-blue-500 font-semibold mt-0.5">Training zugesagt</div>
                <div className="text-[10px] text-blue-400">von {s.tTotal} Einheiten</div>
                {s.tRate!==null && <div className="text-xs font-bold text-blue-600 mt-1">{s.tRate}%</div>}
              </div>
              <div className="bg-green-50 border border-green-200 rounded-xl p-4 text-center">
                <div className="text-3xl font-bold text-green-600">{s.gYes}</div>
                <div className="text-[10px] text-green-500 font-semibold mt-0.5">Spiel zugesagt</div>
                <div className="text-[10px] text-green-400">von {s.gTotal} Spielen</div>
                {s.gRate!==null && <div className="text-xs font-bold text-green-600 mt-1">{s.gRate}%</div>}
              </div>
            </div>

            {/* Letzte Trainings */}
            {lastSessions.length>0 && (
              <div>
                <div className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">🏃 Letzte Trainings</div>
                <div className="space-y-1.5">
                  {lastSessions.map(se=>(
                    <div key={se.id} className="flex items-center gap-3 text-sm">
                      <div className="w-5 text-center text-base">{tIcon(se.id)}</div>
                      <div className="flex-1 text-xs text-gray-600">{fmtDate(se.date)}{se.time?' · '+se.time+' Uhr':''}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}

            {/* Letzte Spiele */}
            {lastGames.length>0 && (
              <div>
                <div className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">⚽ Letzte Spiele</div>
                <div className="space-y-1.5">
                  {lastGames.map(g=>(
                    <div key={g.id} className="flex items-center gap-3 text-sm">
                      <div className="w-5 text-center text-base">{gIcon(g.id)}</div>
                      <div className="flex-1 text-xs text-gray-600">vs. {g.opponent} · {fmtDate(g.date)}</div>
                    </div>
                  ))}
                </div>
              </div>
            )}
          </div>
        </div>
      </div>
    );
  };

  return (
    <div className="p-4">
      <h1 className="text-lg font-semibold mb-1">📊 Spieler-Statistik</h1>
      <p className="text-xs text-gray-400 mb-4">{sessions.length} Trainings · {games.length} Spiele</p>

      {players.length===0 ? (
        <div className="text-center text-gray-400 py-16">
          <div className="text-4xl mb-2">📊</div>
          <p className="text-sm">Noch keine Spieler im Team.</p>
        </div>
      ) : (
        <div className="space-y-2">
          {/* Spalten-Header */}
          <div className="flex items-center gap-2 px-1 pb-1 border-b border-gray-100">
            <div className="flex-1 text-[10px] text-gray-400 font-semibold uppercase">Spieler</div>
            <div className="w-24 text-center text-[10px] text-gray-400 font-semibold uppercase">🏃 Training</div>
            <div className="w-24 text-center text-[10px] text-gray-400 font-semibold uppercase">⚽ Spiel</div>
          </div>

          {players.map(p=>{
            const s = statsFor(p);
            return (
              <button key={p.id} onClick={()=>setSelected(p)}
                className="w-full bg-white border border-gray-200 rounded-xl p-3 flex items-center gap-3 text-left hover:border-red-300 transition-colors">
                <div className="w-8 h-8 rounded-full flex items-center justify-center text-white text-[10px] font-bold flex-shrink-0" style={{background:p.color||'#CC0000'}}>
                  {p.number||initials(p.name)}
                </div>
                <div className="flex-1 min-w-0">
                  <div className="text-sm font-semibold truncate">{p.name}</div>
                  <div className="text-[10px] text-gray-400">{p.position||''}</div>
                </div>
                {/* Training */}
                <div className="w-24 flex flex-col gap-1">
                  <div className="flex items-center gap-1.5">
                    <MiniBar pct={s.tRate} color="bg-blue-500"/>
                    <span className="text-[10px] font-bold text-blue-600 w-7 text-right">{s.tYes}/{s.tTotal}</span>
                  </div>
                  <div className="flex gap-1 justify-end">
                    <span className="text-[9px] text-green-600">✓{s.tYes}</span>
                    <span className="text-[9px] text-red-500">✗{s.tNo}</span>
                    <span className="text-[9px] text-amber-500">?{s.tMaybe}</span>
                  </div>
                </div>
                {/* Spiel */}
                <div className="w-24 flex flex-col gap-1">
                  <div className="flex items-center gap-1.5">
                    <MiniBar pct={s.gRate} color="bg-green-500"/>
                    <span className="text-[10px] font-bold text-green-600 w-7 text-right">{s.gYes}/{s.gTotal}</span>
                  </div>
                  <div className="flex gap-1 justify-end">
                    <span className="text-[9px] text-green-600">✓{s.gYes}</span>
                    <span className="text-[9px] text-red-500">✗{s.gNo}</span>
                    <span className="text-[9px] text-amber-500">?{s.gMaybe}</span>
                  </div>
                </div>
              </button>
            );
          })}
        </div>
      )}

      {selected && <DetailModal p={selected}/>}
    </div>
  );
}

function TrainerBeurteilungen({profile, show}) {
  const [players, setPlayers] = useState([]);
  const [ratings, setRatings] = useState([]);
  const [open, setOpen] = useState(false);
  const [sel, setSel] = useState('');
  const [scores, setScores] = useState({Technik:3,Ausdauer:3,Taktik:3,Einsatz:3,Teamgeist:3});
  const [notes, setNotes] = useState('');

  useEffect(()=>{
    const u1=col('users').where('teamId','==',profile.teamId).where('role','==','player').onSnapshot(s=>setPlayers(s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>{const ai=ALL_POSITIONS.indexOf(getPositions(a)[0]);const bi=ALL_POSITIONS.indexOf(getPositions(b)[0]);return (ai===-1?99:ai)-(bi===-1?99:bi)||(a.name||'').localeCompare(b.name||'');})));
    const u2=col('ratings').where('teamId','==',profile.teamId).onSnapshot(s=>setRatings(s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>b.createdAt?.seconds-a.createdAt?.seconds)));
    return ()=>{u1();u2();};
  },[]);

  const submit = async (e) => {
    e.preventDefault(); if(!sel) return;
    const player=players.find(p=>p.id===sel);
    const avg=(Object.values(scores).reduce((a,b)=>a+b,0)/RATING_CATS.length).toFixed(1);
    await col('ratings').add({playerId:sel,playerName:player?.name||'',scores,avg:Number(avg),notes,date:todayStr(),teamId:profile.teamId,createdAt:ts()});
    show('Beurteilung gespeichert ✅'); setSel(''); setScores({Technik:3,Ausdauer:3,Taktik:3,Einsatz:3,Teamgeist:3}); setNotes(''); setOpen(false);
  };

  const latest = {};
  ratings.forEach(r=>{ if(!latest[r.playerId]) latest[r.playerId]=r; });

  return (
    <div className="p-4">
      <div className="flex items-center justify-between mb-4"><h1 className="text-lg font-semibold">Beurteilungen</h1><Btn size="sm" onClick={()=>setOpen(true)}>+ Beurteilung</Btn></div>
      {open && (
        <Modal title="Spieler beurteilen" onClose={()=>setOpen(false)}>
          <form onSubmit={submit}>
            <Sel label="Spieler" value={sel} onChange={e=>setSel(e.target.value)} required>
              <option value="">Spieler wählen…</option>
              {players.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
            </Sel>
            <div className="space-y-3 mb-3">
              {RATING_CATS.map(cat=>(
                <div key={cat} className="flex items-center justify-between">
                  <span className="text-sm text-gray-700 w-24">{cat}</span>
                  <Stars value={scores[cat]} onChange={v=>setScores(s=>({...s,[cat]:v}))}/>
                </div>
              ))}
            </div>
            <Txt label="Kommentar (optional)" value={notes} onChange={e=>setNotes(e.target.value)} rows={2}/>
            <div className="flex gap-2"><Btn type="button" variant="secondary" className="flex-1" onClick={()=>setOpen(false)}>Abbrechen</Btn><Btn type="submit" className="flex-1">Speichern</Btn></div>
          </form>
        </Modal>
      )}
      {players.length===0 ? <div className="text-center text-gray-400 py-16"><div className="text-4xl mb-2">⭐</div><p className="text-sm">Keine Spieler im Kader.</p></div> : (
        <div className="space-y-2">
          {players.map(player=>{
            const r=latest[player.id];
            return (
              <div key={player.id} className="bg-white border border-gray-200 rounded-xl p-4">
                <div className="flex items-center justify-between gap-3">
                  <div className="flex items-center gap-3 min-w-0">
                    <Avatar name={player.name} color={player.color} size="sm"/>
                    <div className="min-w-0">
                      <div className="text-sm font-medium truncate">{player.name}</div>
                      <div className="text-xs text-gray-400">{r?`${r.date} · Ø ${r.avg}/5`:'Noch keine Beurteilung'}</div>
                    </div>
                  </div>
                  {r&&<div className="text-xl font-bold text-red-600 flex-shrink-0">{r.avg}</div>}
                </div>
                {r&&<div className="mt-2 flex gap-3">{RATING_CATS.map(cat=><div key={cat} className="text-center"><div className="text-xs font-bold">{r.scores[cat]}</div><div className="text-[9px] text-gray-400">{cat.slice(0,3)}</div></div>)}</div>}
                {r?.notes&&<p className="text-xs text-gray-500 mt-1 italic">{r.notes}</p>}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
//  CHAT (shared Trainer + Spieler)
// ═══════════════════════════════════════════════════════════════════
function ChatPage({profile, accent='red'}) {
  const [messages, setMessages] = useState([]);
  const [text, setText] = useState('');
  const bottomRef = useRef(null);
  const sendBtnColor = 'bg-red-600 hover:bg-red-700';
  const ringColor    = 'focus:ring-red-500';
  const bubbleColor  = 'bg-red-600';

  useEffect(()=>{
    return col('chat').where('teamId','==',profile.teamId)
      .onSnapshot(s=>{
        setMessages(s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>a.createdAt?.seconds-b.createdAt?.seconds));
        setTimeout(()=>bottomRef.current?.scrollIntoView({behavior:'smooth'}),50);
      });
  },[]);

  const send = async (e) => {
    e.preventDefault(); if(!text.trim()) return;
    await col('chat').add({text:text.trim(),senderId:profile.id,senderName:profile.name,senderRole:profile.role,teamId:profile.teamId,createdAt:ts()});
    setText('');
  };

  let lastDate = '';

  return (
    <div className="flex flex-col" style={{height:'calc(100vh - 56px)'}}>
      <div className="px-4 py-3 border-b border-gray-200 flex-shrink-0 bg-white">
        <h1 className="text-base font-semibold">💬 Teamchat</h1>
      </div>
      <div className="flex-1 overflow-y-auto px-4 py-3">
        {messages.length===0&&<div className="text-center text-gray-400 py-16 text-sm"><div className="text-3xl mb-2">💬</div>Noch keine Nachrichten.</div>}
        {messages.map(msg=>{
          const isMe=msg.senderId===profile.id;
          const dateStr=msg.createdAt?msg.createdAt.toDate?.().toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long'})||'':'';
          const showDate=dateStr&&dateStr!==lastDate;
          if(showDate) lastDate=dateStr;
          return (
            <div key={msg.id}>
              {showDate&&<div className="text-center text-xs text-gray-400 my-3">{dateStr}</div>}
              <div className={`flex ${isMe?'justify-end':'justify-start'} mb-1`}>
                <div className={`max-w-[75%] flex flex-col ${isMe?'items-end':'items-start'}`}>
                  {!isMe&&<span className="text-[11px] text-gray-400 mb-0.5 px-1">{msg.senderName}{msg.senderRole==='trainer'?' · Trainer':''}</span>}
                  <div className={`rounded-2xl px-3.5 py-2 text-sm leading-relaxed ${isMe?`${bubbleColor} text-white rounded-br-sm`:'bg-gray-100 text-gray-900 rounded-bl-sm'}`}>
                    {msg.text}
                  </div>
                  <span className="text-[10px] text-gray-400 mt-0.5 px-1">{fmtTime(msg.createdAt)}</span>
                </div>
              </div>
            </div>
          );
        })}
        <div ref={bottomRef}/>
      </div>
      <form onSubmit={send} className="flex gap-2 p-3 border-t border-gray-200 bg-white flex-shrink-0">
        <input value={text} onChange={e=>setText(e.target.value)} placeholder="Nachricht schreiben…"
          className={`flex-1 border border-gray-200 rounded-full px-4 py-2 text-sm focus:outline-none focus:ring-2 ${ringColor} bg-gray-50`}/>
        <button type="submit" disabled={!text.trim()}
          className={`w-9 h-9 ${sendBtnColor} rounded-full flex items-center justify-center text-white disabled:opacity-40 transition-colors flex-shrink-0`}>
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </form>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
//  MANNSCHAFTSKASSE — TRAINER
// ═══════════════════════════════════════════════════════════════════
function TrainerKasse({profile, show}) {
  const [tab,         setTab]         = useState('uebersicht'); // uebersicht|katalog|strafen|buch
  const [players,     setPlayers]     = useState([]);
  const [katalog,     setKatalog]     = useState([]);
  const [strafen,     setStrafen]     = useState([]);
  const [buch,        setBuch]        = useState([]);

  // Katalog-Formular
  const EK = {name:'', amount:'', description:''};
  const [katForm,     setKatForm]     = useState(EK);
  const [katEditing,  setKatEditing]  = useState(null);
  const [katOpen,     setKatOpen]     = useState(false);

  // Strafe zuweisen
  const ES = {playerId:'', fineName:'', amount:'', note:''};
  const [strafForm,   setStrafForm]   = useState(ES);
  const [strafOpen,   setStrafOpen]   = useState(false);

  // Kassenbuch-Eintrag
  const EB = {type:'einnahme', amount:'', description:'', date: new Date().toISOString().slice(0,10)};
  const [buchForm,    setBuchForm]    = useState(EB);
  const [buchOpen,    setBuchOpen]    = useState(false);

  // Filter Strafen
  const [filterSt, setFilterSt] = useState('offen'); // offen|bezahlt|alle

  useEffect(()=>{
    const u1 = col('users').where('teamId','==',profile.teamId)
      .onSnapshot(s=>setPlayers(s.docs.map(d=>({id:d.id,...d.data()})).filter(p=>p.role==='player'||p.role==='dual').sort((a,b)=>a.name?.localeCompare(b.name||''))));
    const u2 = col('fines').where('teamId','==',profile.teamId)
      .onSnapshot(s=>setKatalog(s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0))));
    const u3 = col('playerFines').where('teamId','==',profile.teamId)
      .onSnapshot(s=>setStrafen(s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.assignedAt?.seconds||0)-(a.assignedAt?.seconds||0))));
    const u4 = col('kassenbuch').where('teamId','==',profile.teamId)
      .onSnapshot(s=>setBuch(s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>b.date?.localeCompare(a.date||''))));
    return ()=>{u1();u2();u3();u4();};
  },[]);

  // Kassenstand berechnen
  const paid       = strafen.filter(s=>s.paid);
  const strafSum   = paid.reduce((s,x)=>s+Number(x.amount||0), 0);
  const einnahmen  = buch.filter(b=>b.type==='einnahme').reduce((s,x)=>s+Number(x.amount||0),0);
  const ausgaben   = buch.filter(b=>b.type==='ausgabe').reduce((s,x)=>s+Number(x.amount||0),0);
  const kassenstand = strafSum + einnahmen - ausgaben;
  const offenSum   = strafen.filter(s=>!s.paid).reduce((s,x)=>s+Number(x.amount||0),0);

  const fmt = (n) => Number(n).toFixed(2).replace('.',',') + ' €';

  // Katalog speichern
  const saveKat = async (e) => {
    e.preventDefault();
    const data = {teamId:profile.teamId, name:katForm.name, amount:Number(katForm.amount), description:katForm.description, createdAt:ts()};
    if(katEditing) await col('fines').doc(katEditing).update(data);
    else           await col('fines').add(data);
    show(katEditing?'Aktualisiert ✅':'Strafe hinzugefügt ✅');
    setKatForm(EK); setKatEditing(null); setKatOpen(false);
  };
  const deleteKat = async (id) => {
    if(!window.confirm('Strafe aus Katalog löschen?')) return;
    await col('fines').doc(id).delete();
    show('Gelöscht');
  };

  // Strafe zuweisen
  const saveStraf = async (e) => {
    e.preventDefault();
    const player = players.find(p=>p.id===strafForm.playerId);
    await col('playerFines').add({
      teamId: profile.teamId,
      playerId: strafForm.playerId,
      playerName: player?.name||'',
      fineName: strafForm.fineName,
      amount: Number(strafForm.amount),
      note: strafForm.note,
      paid: false,
      assignedAt: ts(),
      assignedBy: profile.name,
    });
    show('Strafe eingetragen ✅');
    setStrafForm(ES); setStrafOpen(false);
  };
  const togglePaid = async (straf) => {
    await col('playerFines').doc(straf.id).update({paid:!straf.paid, paidAt: !straf.paid ? ts() : null});
  };
  const deleteStraf = async (id) => {
    if(!window.confirm('Strafe wirklich löschen?')) return;
    await col('playerFines').doc(id).delete();
    show('Strafe gelöscht');
  };

  // Kassenbuch
  const saveBuch = async (e) => {
    e.preventDefault();
    await col('kassenbuch').add({
      teamId: profile.teamId,
      type: buchForm.type,
      amount: Number(buchForm.amount),
      description: buchForm.description,
      date: buchForm.date,
      createdAt: ts(),
      addedBy: profile.name,
    });
    show('Eintrag gespeichert ✅');
    setBuchForm(EB); setBuchOpen(false);
  };
  const deleteBuch = async (id) => {
    if(!window.confirm('Eintrag löschen?')) return;
    await col('kassenbuch').doc(id).delete();
    show('Gelöscht');
  };

  const TabBtn = ({id, label}) => (
    <button onClick={()=>setTab(id)}
      className={`flex-1 py-2 text-xs font-semibold rounded-lg transition-all ${tab===id?'bg-red-600 text-white':'text-gray-500 hover:text-gray-700'}`}>
      {label}
    </button>
  );

  const filteredStrafen = strafen.filter(s=>{
    if(filterSt==='offen')   return !s.paid;
    if(filterSt==='bezahlt') return s.paid;
    return true;
  });

  return (
    <div className="p-4">
      <h1 className="text-lg font-semibold mb-3">💰 Mannschaftskasse</h1>

      {/* Tab-Navigation */}
      <div className="flex gap-1 bg-gray-100 rounded-xl p-1 mb-4">
        <TabBtn id="uebersicht" label="Übersicht"/>
        <TabBtn id="katalog"   label="Katalog"/>
        <TabBtn id="strafen"   label="Strafen"/>
        <TabBtn id="buch"      label="Kassenbuch"/>
      </div>

      {/* ── ÜBERSICHT ── */}
      {tab==='uebersicht' && (
        <div className="space-y-4">
          {/* Kassenstand */}
          <div className={`rounded-2xl p-5 text-white text-center shadow-lg ${kassenstand>=0?'bg-gradient-to-br from-green-600 to-green-700':'bg-gradient-to-br from-red-600 to-red-700'}`}>
            <div className="text-xs font-semibold uppercase tracking-wider opacity-80 mb-1">Kassenstand</div>
            <div className="text-4xl font-bold">{fmt(kassenstand)}</div>
            <div className="text-xs opacity-70 mt-1">{kassenstand>=0?'✓ Positiver Saldo':'⚠ Negativer Saldo'}</div>
          </div>
          <div className="grid grid-cols-3 gap-2">
            <div className="bg-white border border-gray-200 rounded-xl p-3 text-center">
              <div className="text-lg font-bold text-green-600">{fmt(strafSum+einnahmen)}</div>
              <div className="text-[10px] text-gray-400 mt-0.5">Einnahmen gesamt</div>
            </div>
            <div className="bg-white border border-gray-200 rounded-xl p-3 text-center">
              <div className="text-lg font-bold text-red-500">{fmt(ausgaben)}</div>
              <div className="text-[10px] text-gray-400 mt-0.5">Ausgaben gesamt</div>
            </div>
            <div className="bg-amber-50 border border-amber-200 rounded-xl p-3 text-center">
              <div className="text-lg font-bold text-amber-600">{fmt(offenSum)}</div>
              <div className="text-[10px] text-amber-500 mt-0.5">Offen</div>
            </div>
          </div>

          {/* Offene Strafen Top */}
          {strafen.filter(s=>!s.paid).length>0 && (
            <div className="bg-white border border-gray-200 rounded-2xl p-4">
              <div className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">⚠️ Offene Strafen ({strafen.filter(s=>!s.paid).length})</div>
              <div className="space-y-2">
                {strafen.filter(s=>!s.paid).slice(0,5).map(s=>(
                  <div key={s.id} className="flex items-center gap-2 text-sm">
                    <div className="flex-1">
                      <span className="font-medium">{s.playerName}</span>
                      <span className="text-gray-400 ml-1">— {s.fineName}</span>
                    </div>
                    <span className="font-bold text-red-600">{fmt(s.amount)}</span>
                    <button onClick={()=>togglePaid(s)} className="text-[10px] bg-green-100 text-green-700 px-2 py-0.5 rounded-full font-semibold hover:bg-green-200">✓ Zahlt</button>
                  </div>
                ))}
                {strafen.filter(s=>!s.paid).length>5 && <div className="text-xs text-gray-400 text-center">+ {strafen.filter(s=>!s.paid).length-5} weitere</div>}
              </div>
            </div>
          )}

          <div className="flex gap-2">
            <Btn size="sm" className="flex-1" onClick={()=>{setStrafForm(ES);setStrafOpen(true)}}>+ Strafe eintragen</Btn>
            <Btn size="sm" variant="secondary" className="flex-1" onClick={()=>{setBuchForm(EB);setBuchOpen(true)}}>+ Kasseneintrag</Btn>
          </div>
        </div>
      )}

      {/* ── STRAFKATALOG ── */}
      {tab==='katalog' && (
        <div className="space-y-3">
          <Btn size="sm" onClick={()=>{setKatForm(EK);setKatEditing(null);setKatOpen(true)}}>+ Strafe anlegen</Btn>
          {katalog.length===0 && <div className="text-center text-gray-400 py-10 text-sm">Noch keine Strafen im Katalog.</div>}
          {katalog.map(k=>(
            <div key={k.id} className="bg-white border border-gray-200 rounded-xl p-3 flex items-start gap-3">
              <div className="flex-1">
                <div className="text-sm font-semibold">{k.name}</div>
                {k.description && <div className="text-xs text-gray-400 mt-0.5">{k.description}</div>}
              </div>
              <div className="text-sm font-bold text-red-600 flex-shrink-0">{fmt(k.amount)}</div>
              <div className="flex gap-1 flex-shrink-0">
                <button onClick={()=>{setKatForm({name:k.name,amount:String(k.amount),description:k.description||''});setKatEditing(k.id);setKatOpen(true)}}
                  className="text-xs text-gray-400 hover:text-red-600 px-1.5 py-0.5 rounded">✏️</button>
                <button onClick={()=>deleteKat(k.id)} className="text-xs text-gray-400 hover:text-red-600 px-1.5 py-0.5 rounded">🗑</button>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* ── STRAFEN ── */}
      {tab==='strafen' && (
        <div className="space-y-3">
          <div className="flex gap-2 items-center">
            <Btn size="sm" onClick={()=>{setStrafForm(ES);setStrafOpen(true)}}>+ Strafe eintragen</Btn>
            <div className="flex gap-1 ml-auto">
              {['offen','bezahlt','alle'].map(f=>(
                <button key={f} onClick={()=>setFilterSt(f)}
                  className={`text-[11px] px-2.5 py-1 rounded-lg font-semibold capitalize transition-all ${filterSt===f?'bg-red-600 text-white':'bg-gray-100 text-gray-500'}`}>{f}</button>
              ))}
            </div>
          </div>
          {filteredStrafen.length===0 && <div className="text-center text-gray-400 py-10 text-sm">Keine Einträge.</div>}
          {filteredStrafen.map(s=>(
            <div key={s.id} className={`bg-white border rounded-xl p-3 ${s.paid?'border-green-200 opacity-70':'border-gray-200'}`}>
              <div className="flex items-start gap-2">
                <div className="flex-1">
                  <div className="flex items-center gap-2">
                    <span className="text-sm font-semibold">{s.playerName}</span>
                    <span className={`text-[10px] px-1.5 py-0.5 rounded-full font-semibold ${s.paid?'bg-green-100 text-green-700':'bg-amber-100 text-amber-700'}`}>
                      {s.paid?'Bezahlt':'Offen'}
                    </span>
                  </div>
                  <div className="text-xs text-gray-500 mt-0.5">{s.fineName}{s.note?' · '+s.note:''}</div>
                  <div className="text-[10px] text-gray-400 mt-0.5">{s.assignedAt?.toDate?.()?.toLocaleDateString('de-DE')||''}  {s.assignedBy?'· von '+s.assignedBy:''}</div>
                </div>
                <div className="text-sm font-bold text-red-600 flex-shrink-0">{fmt(s.amount)}</div>
              </div>
              <div className="flex gap-2 mt-2">
                <button onClick={()=>togglePaid(s)}
                  className={`flex-1 text-xs py-1.5 rounded-lg font-semibold transition-all ${s.paid?'bg-gray-100 text-gray-500 hover:bg-amber-50 hover:text-amber-700':'bg-green-100 text-green-700 hover:bg-green-200'}`}>
                  {s.paid?'↩ Als offen markieren':'✓ Als bezahlt markieren'}
                </button>
                <button onClick={()=>deleteStraf(s.id)} className="text-xs px-3 py-1.5 rounded-lg bg-gray-100 text-gray-400 hover:bg-red-50 hover:text-red-600 transition-all">🗑</button>
              </div>
            </div>
          ))}
        </div>
      )}

      {/* ── KASSENBUCH ── */}
      {tab==='buch' && (
        <div className="space-y-3">
          <Btn size="sm" onClick={()=>{setBuchForm(EB);setBuchOpen(true)}}>+ Eintrag hinzufügen</Btn>
          {buch.length===0 && strafen.filter(s=>s.paid).length===0 && (
            <div className="text-center text-gray-400 py-10 text-sm">Noch keine Einträge.</div>
          )}
          {/* Bezahlte Strafen als Einnahmen */}
          {paid.map(s=>(
            <div key={'s-'+s.id} className="bg-green-50 border border-green-200 rounded-xl p-3 flex items-center gap-2">
              <div className="flex-1">
                <div className="text-xs font-semibold text-green-800">Strafe: {s.playerName}</div>
                <div className="text-[10px] text-green-600">{s.fineName}{s.note?' · '+s.note:''}</div>
              </div>
              <div className="text-sm font-bold text-green-700">+{fmt(s.amount)}</div>
            </div>
          ))}
          {/* Manuelle Kassenbuch-Einträge */}
          {buch.map(b=>(
            <div key={b.id} className={`border rounded-xl p-3 flex items-center gap-2 ${b.type==='einnahme'?'bg-green-50 border-green-200':'bg-red-50 border-red-200'}`}>
              <div className="flex-1">
                <div className={`text-xs font-semibold ${b.type==='einnahme'?'text-green-800':'text-red-800'}`}>{b.description}</div>
                <div className="text-[10px] text-gray-400">{b.date}{b.addedBy?' · '+b.addedBy:''}</div>
              </div>
              <div className={`text-sm font-bold flex-shrink-0 ${b.type==='einnahme'?'text-green-700':'text-red-600'}`}>
                {b.type==='einnahme'?'+':'-'}{fmt(b.amount)}
              </div>
              <button onClick={()=>deleteBuch(b.id)} className="text-gray-300 hover:text-red-500 text-xs px-1">🗑</button>
            </div>
          ))}
        </div>
      )}

      {/* ── MODAL: Katalog ── */}
      {katOpen && (
        <Modal title={katEditing?'Strafe bearbeiten':'Strafe anlegen'} onClose={()=>{setKatOpen(false);setKatEditing(null);}}>
          <form onSubmit={saveKat}>
            <Inp label="Bezeichnung" value={katForm.name} onChange={e=>setKatForm(f=>({...f,name:e.target.value}))} placeholder="z.B. Zu spät erschienen" required/>
            <Inp label="Betrag (€)" type="number" step="0.01" min="0" value={katForm.amount} onChange={e=>setKatForm(f=>({...f,amount:e.target.value}))} placeholder="5.00" required/>
            <Inp label="Beschreibung (optional)" value={katForm.description} onChange={e=>setKatForm(f=>({...f,description:e.target.value}))} placeholder="Details zur Strafe"/>
            <div className="flex gap-2">
              <Btn type="button" variant="secondary" className="flex-1" onClick={()=>{setKatOpen(false);setKatEditing(null);}}>Abbrechen</Btn>
              <Btn type="submit" className="flex-1">Speichern</Btn>
            </div>
          </form>
        </Modal>
      )}

      {/* ── MODAL: Strafe zuweisen ── */}
      {strafOpen && (
        <Modal title="Strafe eintragen" onClose={()=>setStrafOpen(false)}>
          <form onSubmit={saveStraf}>
            <div className="mb-3">
              <label className="block text-xs font-medium text-gray-600 mb-1">Spieler</label>
              <select value={strafForm.playerId} onChange={e=>setStrafForm(f=>({...f,playerId:e.target.value}))}
                className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-500" required>
                <option value="">Spieler wählen…</option>
                {players.map(p=><option key={p.id} value={p.id}>{p.name}</option>)}
              </select>
            </div>
            <div className="mb-3">
              <label className="block text-xs font-medium text-gray-600 mb-1">Strafe aus Katalog (oder manuell eingeben)</label>
              <select onChange={e=>{
                const k=katalog.find(x=>x.id===e.target.value);
                if(k) setStrafForm(f=>({...f,fineName:k.name,amount:String(k.amount)}));
              }} className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-500 mb-2">
                <option value="">Aus Katalog wählen…</option>
                {katalog.map(k=><option key={k.id} value={k.id}>{k.name} ({fmt(k.amount)})</option>)}
              </select>
            </div>
            <Inp label="Bezeichnung" value={strafForm.fineName} onChange={e=>setStrafForm(f=>({...f,fineName:e.target.value}))} placeholder="z.B. Zu spät erschienen" required/>
            <Inp label="Betrag (€)" type="number" step="0.01" min="0" value={strafForm.amount} onChange={e=>setStrafForm(f=>({...f,amount:e.target.value}))} placeholder="5.00" required/>
            <Inp label="Notiz (optional)" value={strafForm.note} onChange={e=>setStrafForm(f=>({...f,note:e.target.value}))} placeholder="z.B. 10 Min zu spät"/>
            <div className="flex gap-2">
              <Btn type="button" variant="secondary" className="flex-1" onClick={()=>setStrafOpen(false)}>Abbrechen</Btn>
              <Btn type="submit" className="flex-1">Eintragen</Btn>
            </div>
          </form>
        </Modal>
      )}

      {/* ── MODAL: Kassenbuch ── */}
      {buchOpen && (
        <Modal title="Kasseneintrag" onClose={()=>setBuchOpen(false)}>
          <form onSubmit={saveBuch}>
            <div className="mb-3">
              <label className="block text-xs font-medium text-gray-600 mb-1">Typ</label>
              <div className="flex gap-2">
                {[{v:'einnahme',l:'Einnahme'},{v:'ausgabe',l:'Ausgabe'}].map(({v,l})=>(
                  <button key={v} type="button" onClick={()=>setBuchForm(f=>({...f,type:v}))}
                    className={`flex-1 py-2 rounded-xl text-sm font-semibold transition-all ${buchForm.type===v?v==='einnahme'?'bg-green-600 text-white':'bg-red-600 text-white':'bg-gray-100 text-gray-500'}`}>{l}</button>
                ))}
              </div>
            </div>
            <Inp label="Beschreibung" value={buchForm.description} onChange={e=>setBuchForm(f=>({...f,description:e.target.value}))} placeholder="z.B. Trikots, Turnier-Startgeld…" required/>
            <Inp label="Betrag (€)" type="number" step="0.01" min="0" value={buchForm.amount} onChange={e=>setBuchForm(f=>({...f,amount:e.target.value}))} placeholder="0.00" required/>
            <Inp label="Datum" type="date" value={buchForm.date} onChange={e=>setBuchForm(f=>({...f,date:e.target.value}))} required/>
            <div className="flex gap-2">
              <Btn type="button" variant="secondary" className="flex-1" onClick={()=>setBuchOpen(false)}>Abbrechen</Btn>
              <Btn type="submit" className="flex-1">Speichern</Btn>
            </div>
          </form>
        </Modal>
      )}
    </div>
  );
}
