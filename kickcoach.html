// ═══════════════════════════════════════════════════════════════════
//  NACHRICHTEN VORSTAND → TRAINER (bidirektional)
// ═══════════════════════════════════════════════════════════════════
function VorstandNachrichten({profile}) {
  const [tab,      setTab]      = useState('chat'); // 'chat' | 'rund'
  const [sel,      setSel]      = useState(null);
  const [msgs,     setMsgs]     = useState([]);
  const [text,     setText]     = useState('');
  const [trainers, setTrainers] = useState([]);
  const [unread,   setUnread]   = useState({});
  const bottomRef = useRef(null);

  // ── Rundnachricht state ──
  const [runds,    setRunds]    = useState([]);
  const [allUsers, setAllUsers] = useState([]);
  const [rundText, setRundText] = useState('');
  const [rMode,    setRMode]    = useState('all');
  const [selR,     setSelR]     = useState([]);
  const [rundOpen, setRundOpen] = useState(false);
  const [rundExp,  setRundExp]  = useState({});

  useEffect(()=>{
    col('users').where('role','in',['trainer','dual']).onSnapshot(s=>setTrainers(s.docs.map(d=>({id:d.id,...d.data()}))));
    col('users').get().then(s=>setAllUsers(s.docs.map(d=>({id:d.id,...d.data()}))));
    return col('rundnachrichten').onSnapshot(s=>setRunds(
      s.docs.map(d=>({id:d.id,...d.data()}))
        .sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0))
    ));
  },[]);

  useEffect(()=>{
    if(!sel) return;
    return col('nachrichten')
      .where('threadId','==', [profile.id,sel.id].sort().join('_'))
      .onSnapshot(s=>{
        setMsgs(s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>a.createdAt?.seconds-b.createdAt?.seconds));
        setTimeout(()=>bottomRef.current?.scrollIntoView({behavior:'smooth'}),50);
      });
  },[sel]);

  useEffect(()=>{
    return col('nachrichten').where('receiverId','==',profile.id).where('read','==',false)
      .onSnapshot(s=>{
        const u={};
        s.docs.forEach(d=>{ const tid=d.data().senderId; u[tid]=(u[tid]||0)+1; });
        setUnread(u);
      });
  },[]);

  const send = async (e) => {
    e.preventDefault(); if(!text.trim()||!sel) return;
    const threadId=[profile.id,sel.id].sort().join('_');
    await col('nachrichten').add({
      threadId, text:text.trim(),
      senderId:profile.id, senderName:profile.name, senderRole:'vorstand',
      receiverId:sel.id, read:false, createdAt:ts()
    });
    const snap=await col('nachrichten').where('threadId','==',threadId).where('receiverId','==',profile.id).where('read','==',false).get();
    snap.forEach(d=>d.ref.update({read:true}));
    setText('');
  };

  const openThread = async (trainer) => {
    setSel(trainer);
    const threadId=[profile.id,trainer.id].sort().join('_');
    const snap=await col('nachrichten').where('threadId','==',threadId).where('receiverId','==',profile.id).where('read','==',false).get();
    snap.forEach(d=>d.ref.update({read:true}));
  };

  const ROLE_BTNS_R = [
    {v:'all',      l:'👥 Alle'},
    {v:'spieler',  l:'⚽ Spieler'},
    {v:'trainer',  l:'🏅 Trainer'},
    {v:'vorstand', l:'🏛 Vorstand'},
    {v:'select',   l:'✏️ Einzeln'},
  ];
  const ROLE_LABELS_R = {all:'Alle',spieler:'Spieler',trainer:'Trainer',vorstand:'Vorstand'};
  const getModeIdsR = (mode) => {
    if(mode==='all')      return [];
    if(mode==='spieler')  return allUsers.filter(u=>u.role==='player'||u.role==='dual').map(u=>u.id);
    if(mode==='trainer')  return allUsers.filter(u=>['trainer','dual','vorstand_trainer'].includes(u.role)).map(u=>u.id);
    if(mode==='vorstand') return allUsers.filter(u=>['vorstand','vorstand_trainer'].includes(u.role)).map(u=>u.id);
    return selR;
  };

  const sendRund = async (e) => {
    e.preventDefault(); if(!rundText.trim()) return;
    const recipientIds = getModeIdsR(rMode);
    const recipientLabel = rMode==='select' ? `${selR.length} Empfänger` : ROLE_LABELS_R[rMode]||'Alle';
    await col('rundnachrichten').add({
      text:rundText.trim(), authorId:profile.id, authorName:profile.name,
      recipientIds, recipientLabel, readBy:{}, createdAt:ts()
    });
    setRundText(''); setSelR([]); setRMode('all'); setRundOpen(false);
  };

  const delRund = async (id) => { if(!confirm('Rundnachricht löschen?')) return; await col('rundnachrichten').doc(id).delete(); };

  const getRundRecipients = (r) => r.recipientIds?.length ? allUsers.filter(u=>r.recipientIds.includes(u.id)) : allUsers;
  const toggleR = (uid) => setSelR(prev=>prev.includes(uid)?prev.filter(x=>x!==uid):[...prev,uid]);

  // ─── Chat-Ansicht (1:1) ───────────────────────────────────────────
  if(tab==='chat' && sel) return (
    <div className="flex flex-col" style={{height:'calc(100vh - 56px)'}}>
      <div className="px-4 py-3 border-b border-gray-200 flex items-center gap-3 flex-shrink-0 bg-white">
        <button onClick={()=>setSel(null)} className="text-gray-400 hover:text-gray-700 text-lg">←</button>
        <Avatar name={sel.name} color={sel.color} size="sm" photo={sel.photoUrl}/>
        <div><div className="text-sm font-semibold">{sel.name}</div><div className="text-xs text-gray-400">Trainer</div></div>
      </div>
      <div className="flex-1 overflow-y-auto px-4 py-3">
        {msgs.length===0&&<div className="text-center text-gray-400 py-16 text-sm">Noch keine Nachrichten.</div>}
        {msgs.map(m=>{
          const isMe=m.senderId===profile.id;
          return (
            <div key={m.id} className={`flex ${isMe?'justify-end':'justify-start'} mb-2`}>
              <div className={`max-w-[75%] rounded-2xl px-3.5 py-2 text-sm leading-relaxed ${isMe?'bg-red-600 text-white rounded-br-sm':'bg-gray-800 text-white rounded-bl-sm'}`}>
                <div>{m.text}</div>
                <div className={`text-[10px] mt-0.5 flex items-center justify-end gap-1 ${isMe?'text-red-200':'text-gray-400'}`}>
                  {fmtTime(m.createdAt)}
                  {isMe && <span>{m.read?'✓✓':'✓'}</span>}
                </div>
              </div>
            </div>
          );
        })}
        <div ref={bottomRef}/>
      </div>
      <form onSubmit={send} className="flex gap-2 p-3 border-t border-gray-200 bg-white flex-shrink-0">
        <input value={text} onChange={e=>setText(e.target.value)} placeholder="Nachricht schreiben…"
          className="flex-1 border border-gray-200 rounded-full px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-500 bg-gray-50"/>
        <button type="submit" disabled={!text.trim()}
          className="w-9 h-9 bg-red-600 hover:bg-red-700 rounded-full flex items-center justify-center text-white disabled:opacity-40 transition-colors flex-shrink-0">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </form>
    </div>
  );

  // ─── Hauptansicht ─────────────────────────────────────────────────
  return (
    <div className="p-4">
      <h1 className="text-lg font-bold text-white mb-3">💬 Nachrichten</h1>
      {/* Tabs */}
      <div className="flex gap-1 mb-4 bg-gray-100 rounded-xl p-1">
        {[{v:'chat',l:'1:1 Chat'},{ v:'rund',l:'📢 Rundnachricht'}].map(t=>(
          <button key={t.v} onClick={()=>{setTab(t.v);setSel(null);}}
            className={`flex-1 py-1.5 rounded-lg text-xs font-semibold transition-colors ${tab===t.v?'bg-white shadow-sm text-red-700':'text-gray-500'}`}>
            {t.l}
          </button>
        ))}
      </div>

      {/* ── Tab: 1:1 Chat ── */}
      {tab==='chat' && (
        trainers.length===0 ? (
          <div className="text-center text-gray-400 py-16"><div className="text-4xl mb-2">💬</div><p className="text-sm">Noch keine Trainer vorhanden.</p></div>
        ) : (
          <div className="space-y-2">
            {trainers.map(t=>(
              <button key={t.id} onClick={()=>openThread(t)}
                className="w-full flex items-center gap-3 bg-white border border-gray-200 hover:border-red-300 rounded-xl p-3.5 text-left transition-all">
                <div className="relative flex-shrink-0">
                  <Avatar name={t.name} color={t.color} size="sm" photo={t.photoUrl}/>
                  {unread[t.id]>0 && <div className="absolute -top-1 -right-1 w-4 h-4 bg-red-600 rounded-full text-white text-[9px] font-bold flex items-center justify-center">{unread[t.id]}</div>}
                </div>
                <div className="min-w-0">
                  <div className="text-sm font-semibold">{t.name}</div>
                  <div className="text-xs text-gray-400">{t.role==='dual'?'Trainer & Spieler':'Trainer'}</div>
                </div>
                <span className="ml-auto text-gray-300">›</span>
              </button>
            ))}
          </div>
        )
      )}

      {/* ── Tab: Rundnachricht ── */}
      {tab==='rund' && (
        <div>
          <div className="flex justify-end mb-3">
            <Btn size="sm" variant="primary" onClick={()=>setRundOpen(true)}>+ Rundnachricht</Btn>
          </div>
          {rundOpen && (
            <Modal title="Rundnachricht senden" onClose={()=>setRundOpen(false)}>
              <form onSubmit={sendRund}>
                <Txt label="Nachricht" value={rundText} onChange={e=>setRundText(e.target.value)} rows={4} required/>
                {/* Empfänger */}
                <div className="mb-3">
                  <div className="text-xs font-medium text-gray-700 mb-1.5">Empfänger</div>
                  <div className="flex flex-wrap gap-1.5 mb-2">
                    {ROLE_BTNS_R.map(({v,l})=>(
                      <button key={v} type="button" onClick={()=>setRMode(v)}
                        className={`px-2.5 py-1.5 rounded-lg text-xs font-semibold border transition-colors ${rMode===v?'bg-red-600 text-white border-red-600':'border-gray-200 text-gray-600 hover:bg-gray-50'}`}>
                        {v==='select'&&selR.length>0 ? `✏️ Einzeln (${selR.length})` : l}
                      </button>
                    ))}
                  </div>
                  {rMode==='select' && (
                    <div className="max-h-44 overflow-y-auto border border-gray-200 rounded-xl divide-y divide-gray-100">
                      {allUsers.sort((a,b)=>(a.name||'').localeCompare(b.name||'')).map(u=>(
                        <label key={u.id} className="flex items-center gap-2.5 px-3 py-2 cursor-pointer hover:bg-gray-50">
                          <input type="checkbox" checked={selR.includes(u.id)} onChange={()=>toggleR(u.id)} className="accent-red-600"/>
                          <Avatar name={u.name} color={u.color} size="xs" photo={u.photoUrl}/>
                          <span className="text-xs flex-1">{u.name}</span>
                          <span className="text-[10px] text-gray-400">{u.role}</span>
                        </label>
                      ))}
                    </div>
                  )}
                </div>
                <div className="flex gap-2">
                  <Btn type="button" variant="secondary" className="flex-1" onClick={()=>setRundOpen(false)}>Abbrechen</Btn>
                  <Btn type="submit" variant="primary" className="flex-1" disabled={rMode==='select'&&selR.length===0}>Senden</Btn>
                </div>
              </form>
            </Modal>
          )}
          {runds.length===0 ? (
            <div className="text-center text-gray-400 py-16"><div className="text-4xl mb-2">📢</div><p className="text-sm">Noch keine Rundnachrichten gesendet.</p></div>
          ) : (
            <div className="space-y-3">
              {runds.map(r=>{
                const recips = getRundRecipients(r);
                const readBy = r.readBy||{};
                const readList   = recips.filter(u=>readBy[u.id]);
                const unreadList = recips.filter(u=>!readBy[u.id]);
                const isExp = rundExp[r.id];
                return (
                  <div key={r.id} className="glass-card rounded-2xl p-4 group">
                    <div className="flex items-start justify-between gap-2 mb-2">
                      <div>
                        <span className="text-[10px] text-red-600 font-semibold bg-red-50 px-2 py-0.5 rounded-full">
                          📢 {r.recipientLabel||(r.recipientIds?.length ? `${r.recipientIds.length} Empfänger` : 'Alle')}
                        </span>
                      </div>
                      <div className="flex items-center gap-2">
                        <span className="text-xs text-gray-400">{fmtAgo(r.createdAt)}</span>
                        <button onClick={()=>delRund(r.id)} className="opacity-0 group-hover:opacity-100 text-gray-300 hover:text-red-500 transition-all">✕</button>
                      </div>
                    </div>
                    <p className="text-sm text-gray-800 leading-relaxed">{r.text}</p>
                    {/* Lesestatus */}
                    <button onClick={()=>setRundExp(e=>({...e,[r.id]:!e[r.id]}))}
                      className="w-full flex items-center gap-2 mt-2.5 pt-2.5 border-t border-gray-100 text-xs text-gray-500 hover:text-gray-700 transition-colors">
                      <span className="text-green-600 font-medium">✓ {readList.length} gelesen</span>
                      <span className="text-gray-300">·</span>
                      <span className="text-amber-500 font-medium">⏳ {unreadList.length} ausstehend</span>
                      <span className="ml-auto text-gray-400">{isExp?'▲':'▼'}</span>
                    </button>
                    {isExp && (
                      <div className="mt-2 space-y-1.5 max-h-52 overflow-y-auto">
                        {unreadList.map(u=>(
                          <div key={u.id} className="flex items-center gap-2">
                            <Avatar name={u.name} color={u.color} size="xs" photo={u.photoUrl}/>
                            <span className="text-xs text-gray-600 flex-1 truncate">{u.name}</span>
                            <span className="text-[10px] text-amber-500 flex-shrink-0">⏳ ausstehend</span>
                          </div>
                        ))}
                        {readList.map(u=>(
                          <div key={u.id} className="flex items-center gap-2">
                            <Avatar name={u.name} color={u.color} size="xs" photo={u.photoUrl}/>
                            <span className="text-xs text-gray-400 flex-1 truncate">{u.name}</span>
                            <span className="text-[10px] text-green-500 flex-shrink-0">✓ gelesen</span>
                          </div>
                        ))}
                      </div>
                    )}
                  </div>
                );
              })}
            </div>
          )}
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
//  NACHRICHTEN — TRAINER SCHREIBT AN VORSTAND
// ═══════════════════════════════════════════════════════════════════
function TrainerNachrichtAnVorstand({profile}) {
  const [vorstand, setVorstand] = useState([]);
  const [sel,      setSel]      = useState(null);
  const [msgs,     setMsgs]     = useState([]);
  const [text,     setText]     = useState('');
  const [unread,   setUnread]   = useState(0);
  const bottomRef = useRef(null);

  useEffect(()=>{
    col('users').where('role','==','vorstand').get().then(s=>setVorstand(s.docs.map(d=>({id:d.id,...d.data()}))));
  },[]);

  useEffect(()=>{
    if(!sel) return;
    const threadId=[profile.id,sel.id].sort().join('_');
    return col('nachrichten').where('threadId','==',threadId)
      .onSnapshot(s=>{
        setMsgs(s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>a.createdAt?.seconds-b.createdAt?.seconds));
        setTimeout(()=>bottomRef.current?.scrollIntoView({behavior:'smooth'}),50);
      });
  },[sel]);

  const openThread = async (v) => {
    setSel(v);
    const threadId=[profile.id,v.id].sort().join('_');
    const snap=await col('nachrichten').where('threadId','==',threadId).where('receiverId','==',profile.id).where('read','==',false).get();
    snap.forEach(d=>d.ref.update({read:true}));
  };

  const send = async (e) => {
    e.preventDefault(); if(!text.trim()||!sel) return;
    const threadId=[profile.id,sel.id].sort().join('_');
    await col('nachrichten').add({
      threadId, text:text.trim(),
      senderId:profile.id, senderName:profile.name, senderRole:'trainer',
      receiverId:sel.id, read:false, createdAt:ts()
    });
    setText('');
  };

  if(!sel) return (
    <div className="p-4">
      <h1 className="text-lg font-bold text-white mb-4">✉️ Nachricht an Vorstand</h1>
      {vorstand.length===0 ? <div className="text-center text-gray-400 py-16"><div className="text-4xl mb-2">✉️</div><p className="text-sm">Kein Vorstand gefunden.</p></div> : (
        <div className="space-y-2">
          {vorstand.map(v=>(
            <button key={v.id} onClick={()=>openThread(v)}
              className="w-full flex items-center gap-3 bg-white border border-gray-200 hover:border-red-300 rounded-xl p-3.5 text-left transition-all">
              <Avatar name={v.name} color={v.color||'#7c3aed'} size="sm" photo={v.photoUrl}/>
              <div><div className="text-sm font-semibold">{v.name}</div><div className="text-xs text-gray-400">Vorstand</div></div>
              <span className="ml-auto text-gray-300">›</span>
            </button>
          ))}
        </div>
      )}
    </div>
  );

  return (
    <div className="flex flex-col" style={{height:'calc(100vh - 56px)'}}>
      <div className="px-4 py-3 border-b border-gray-200 flex items-center gap-3 flex-shrink-0 bg-white">
        <button onClick={()=>setSel(null)} className="text-gray-400 hover:text-gray-700 text-lg">←</button>
        <Avatar name={sel.name} color={sel.color||'#7c3aed'} size="sm" photo={sel.photoUrl}/>
        <div><div className="text-sm font-semibold">{sel.name}</div><div className="text-xs text-gray-400">Vorstand</div></div>
      </div>
      <div className="flex-1 overflow-y-auto px-4 py-3">
        {msgs.length===0&&<div className="text-center text-gray-400 py-16 text-sm">Noch keine Nachrichten. Schreib dem Vorstand!</div>}
        {msgs.map(m=>{
          const isMe=m.senderId===profile.id;
          return (
            <div key={m.id} className={`flex ${isMe?'justify-end':'justify-start'} mb-2`}>
              <div className={`max-w-[75%] rounded-2xl px-3.5 py-2 text-sm leading-relaxed ${isMe?'bg-red-600 text-white rounded-br-sm':'bg-gray-800 text-white rounded-bl-sm'}`}>
                <div>{m.text}</div>
                <div className={`text-[10px] mt-0.5 ${isMe?'text-red-200':'text-gray-400'}`}>{fmtTime(m.createdAt)}</div>
              </div>
            </div>
          );
        })}
        <div ref={bottomRef}/>
      </div>
      <form onSubmit={send} className="flex gap-2 p-3 border-t border-gray-200 bg-white flex-shrink-0">
        <input value={text} onChange={e=>setText(e.target.value)} placeholder="Nachricht an Vorstand…"
          className="flex-1 border border-gray-200 rounded-full px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-500 bg-gray-50"/>
        <button type="submit" disabled={!text.trim()}
          className="w-9 h-9 bg-red-600 hover:bg-red-700 rounded-full flex items-center justify-center text-white disabled:opacity-40 transition-colors flex-shrink-0">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </form>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
//  ADMIN — TEAMVERWALTUNG (Spieler/Trainer zwischen Teams verschieben)
// ═══════════════════════════════════════════════════════════════════
function AdminTeamverwaltung({show}) {
  const [teams,      setTeams]      = useState([]);
  const [members,    setMembers]    = useState([]);
  const [moving,     setMoving]     = useState(null);
  const [targetTeam, setTargetTeam] = useState('');
  const [saving,     setSaving]     = useState(false);
  const [openTeams,  setOpenTeams]  = useState({});
  const [editTeam,   setEditTeam]   = useState(null);
  const [delTeam,    setDelTeam]    = useState(null);
  const [delMember,  setDelMember]  = useState(null); // {id, name} player to delete
  const [editName,   setEditName]   = useState('');
  const [editCat,    setEditCat]    = useState('');

  const toggleTeam = (id) => setOpenTeams(p=>({...p,[id]:!p[id]}));
  const [memberSort, setMemberSort] = useState('lastname'); // 'lastname' | 'firstname' | 'position'

  useEffect(()=>{
    const unsub1 = col('teams').onSnapshot(s=>
      setTeams(s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>a.name.localeCompare(b.name)))
    );
    const unsub2 = col('users').onSnapshot(s=>setMembers(s.docs.map(d=>({id:d.id,...d.data()}))));
    return ()=>{ unsub1(); unsub2(); };
  },[]);

  const startMove = (user, field) => {
    setMoving({uid:user.id, name:user.name, field, currentTeam: field==='teamId'?user.teamId:user.trainerTeamId});
    setTargetTeam('');
  };

  const doMove = async () => {
    if (!targetTeam || !moving) return;
    setSaving(true);
    try {
      await col('users').doc(moving.uid).update({ [moving.field]: targetTeam });
      show(`${moving.name} wurde verschoben ✅`);
      setMoving(null);
    } catch(e) { show(e.message,'error'); }
    setSaving(false);
  };

  const openEdit = (team, e) => {
    e.stopPropagation();
    setEditTeam(team);
    setEditName(team.name||'');
    setEditCat(team.category||'');
  };

  const saveEdit = async () => {
    if(!editName.trim()) return;
    setSaving(true);
    try {
      await col('teams').doc(editTeam.id).update({ name: editName.trim(), category: editCat.trim() });
      show('Team aktualisiert ✅');
      setEditTeam(null);
    } catch(e) { show(e.message,'error'); }
    setSaving(false);
  };

  const confirmDelete = (team, e) => {
    e.stopPropagation();
    setDelTeam(team);
  };

  const doDelete = async () => {
    setSaving(true);
    try {
      await col('teams').doc(delTeam.id).delete();
      show(`Team "${delTeam.name}" gelöscht ✅`);
      setDelTeam(null);
    } catch(e) { show(e.message,'error'); }
    setSaving(false);
  };

  const doDeleteMember = async () => {
    if(!delMember) return;
    setSaving(true);
    try {
      await col('users').doc(delMember.id).delete();
      show(`${delMember.name} entfernt`);
      setDelMember(null);
    } catch(e){ show(e.message,'error'); }
    setSaving(false);
  };

  const ROLE_LABEL = {player:'Spieler',trainer:'Trainer',dual:'Trainer+Spieler',vorstand:'Vorstand'};

  const delMembers = delTeam ? members.filter(m=>m.teamId===delTeam.id||m.trainerTeamId===delTeam.id) : [];

  return (
    <div className="p-4">
      <div className="mb-4">
        <h1 className="text-lg font-bold text-white">Teamverwaltung</h1>
        <p className="text-xs text-gray-400">Teams bearbeiten, löschen und Mitglieder verschieben</p>
      </div>

      {/* Modal: Team bearbeiten */}
      {editTeam && (
        <Modal title="Team bearbeiten" onClose={()=>setEditTeam(null)}>
          <Inp label="Teamname" value={editName} onChange={e=>setEditName(e.target.value)} placeholder="z.B. A-Jugend"/>
          <Inp label="Kategorie (optional)" value={editCat} onChange={e=>setEditCat(e.target.value)} placeholder="z.B. U19, Herren …"/>
          <div className="flex gap-2 mt-2">
            <Btn variant="secondary" className="flex-1" onClick={()=>setEditTeam(null)}>Abbrechen</Btn>
            <Btn className="flex-1" onClick={saveEdit} disabled={!editName.trim()||saving}>{saving?'…':'Speichern'}</Btn>
          </div>
        </Modal>
      )}

      {/* Modal: Team löschen */}
      {delTeam && (
        <Modal title="Team löschen?" onClose={()=>setDelTeam(null)}>
          <p className="text-sm text-gray-700 mb-2">
            Möchtest du das Team <strong>{delTeam.name}</strong> wirklich löschen?
          </p>
          {delMembers.length > 0 && (
            <div className="mb-3 bg-amber-50 border border-amber-200 rounded-lg px-3 py-2 text-xs text-amber-700">
              ⚠️ {delMembers.length} Mitglied{delMembers.length>1?'er sind':' ist'} noch diesem Team zugewiesen. Bitte vorher verschieben.
            </div>
          )}
          <div className="flex gap-2">
            <Btn variant="secondary" className="flex-1" onClick={()=>setDelTeam(null)}>Abbrechen</Btn>
            <button onClick={doDelete} disabled={saving||delMembers.length>0}
              className="flex-1 py-2 rounded-xl bg-red-600 text-white text-sm font-semibold disabled:opacity-40">
              {saving?'…':'Löschen'}
            </button>
          </div>
        </Modal>
      )}

      {/* Modal: Spieler löschen */}
      {delMember && (
        <Modal title="Spieler entfernen?" onClose={()=>setDelMember(null)}>
          <p className="text-sm text-gray-600 mb-4">
            <strong>{delMember.name}</strong> dauerhaft aus dem System entfernen?
          </p>
          <div className="flex gap-2">
            <Btn variant="secondary" className="flex-1" onClick={()=>setDelMember(null)}>Abbrechen</Btn>
            <button onClick={doDeleteMember} disabled={saving}
              className="flex-1 py-2 rounded-xl bg-red-600 text-white text-sm font-semibold disabled:opacity-40">
              {saving?'…':'Entfernen'}
            </button>
          </div>
        </Modal>
      )}

      {/* Modal: Mitglied verschieben */}
      {moving && (
        <Modal title={`${moving.name} verschieben`} onClose={()=>setMoving(null)}>
          <p className="text-sm text-gray-600 mb-3">
            {moving.field==='trainerTeamId'?'Trainer-Team':'Spieler-Team'} auswählen:
          </p>
          <div className="space-y-2 mb-4">
            {teams.filter(t=>t.id!==moving.currentTeam).map(t=>(
              <button key={t.id} onClick={()=>setTargetTeam(t.id)}
                className={`w-full text-left px-4 py-3 rounded-xl border-2 transition-all text-sm font-medium
                  ${targetTeam===t.id?'border-red-500 bg-red-50 text-red-700':'border-gray-200 hover:border-red-300'}`}>
                🏟️ {t.name} {t.category&&<span className="text-xs font-normal text-gray-400">({t.category})</span>}
              </button>
            ))}
          </div>
          <div className="flex gap-2">
            <Btn variant="secondary" className="flex-1" onClick={()=>setMoving(null)}>Abbrechen</Btn>
            <Btn className="flex-1" onClick={doMove} disabled={!targetTeam||saving}>{saving?'…':'Verschieben'}</Btn>
          </div>
        </Modal>
      )}

      {/* Teams — ausklappbar */}
      <div className="space-y-2">
        {teams.map(team => {
          const players  = members.filter(m=>m.teamId===team.id && (m.role==='player'||m.role==='dual'));
          const trainers = members.filter(m=>(m.teamId===team.id&&m.role==='trainer') || m.trainerTeamId===team.id);
          const total    = players.length + trainers.length;
          const isOpen   = !!openTeams[team.id];
          return (
            <div key={team.id} className="glass-card rounded-xl overflow-hidden">
              {/* Header */}
              <div className="flex items-center px-4 py-3 hover:bg-gray-50 transition-colors">
                <button onClick={()=>toggleTeam(team.id)} className="flex items-center gap-3 flex-1 text-left min-w-0">
                  <div className="w-8 h-8 rounded-full bg-red-600 flex items-center justify-center text-white text-xs font-bold flex-shrink-0">
                    {(team.name||'?')[0]}
                  </div>
                  <div className="min-w-0">
                    <div className="font-semibold text-sm">{team.name}</div>
                    <div className="text-[11px] text-gray-400">
                      {total===0 ? 'Keine Mitglieder' : `${players.length} Spieler · ${trainers.length} Trainer`}
                    </div>
                  </div>
                </button>
                <div className="flex items-center gap-1.5 flex-shrink-0 ml-2">
                  {team.category && <span className="text-[10px] bg-gray-100 text-gray-500 px-2 py-0.5 rounded-full">{team.category}</span>}
                  {/* Edit */}
                  <button onClick={e=>openEdit(team,e)}
                    className="p-1.5 rounded-lg hover:bg-blue-50 text-blue-500 hover:text-blue-700 transition-colors" title="Bearbeiten">
                    ✏️
                  </button>
                  {/* Delete */}
                  <button onClick={e=>confirmDelete(team,e)}
                    className="p-1.5 rounded-lg hover:bg-red-50 text-gray-400 hover:text-red-600 transition-colors" title="Löschen">
                    🗑
                  </button>
                  <button onClick={()=>toggleTeam(team.id)} className="p-1">
                    <span className="text-gray-400 text-sm transition-transform inline-block" style={{transform:isOpen?'rotate(180deg)':'rotate(0deg)'}}>▾</span>
                  </button>
                </div>
              </div>

              {/* Ausgeklappter Inhalt */}
              {isOpen && total > 0 && (
                <div className="border-t border-gray-100">
                  {/* Sortier-Chips */}
                  <div className="flex items-center gap-2 px-4 pt-3 pb-1">
                    <span className="text-[10px] text-gray-400 font-medium">Sortieren:</span>
                    {[['lastname','Nachname'],['firstname','Vorname'],['position','Position']].map(([v,l])=>(
                      <button key={v} onClick={()=>setMemberSort(v)}
                        className={`px-2.5 py-1 rounded-full text-[10px] font-semibold transition-colors ${memberSort===v?'bg-red-600 text-white':'bg-gray-100 text-gray-500 hover:bg-gray-200'}`}>
                        {l}
                      </button>
                    ))}
                  </div>
                  {trainers.length>0&&(
                    <div className="px-4 pt-2 pb-1">
                      <div className="text-[10px] font-semibold text-gray-400 uppercase tracking-wider mb-2">Trainer</div>
                      {[...trainers].sort(byLastName).map(m=>{
                        const field = m.trainerTeamId===team.id?'trainerTeamId':'teamId';
                        return (
                          <div key={m.id+field} className="flex items-center gap-3 py-2 border-b border-gray-100 last:border-0">
                            <Avatar name={m.name} color={m.color} size="sm" photo={m.photoUrl}/>
                            <div className="flex-1 min-w-0">
                              <div className="text-sm font-medium truncate">{m.name}</div>
                              <div className="text-[10px] text-gray-400">{ROLE_LABEL[m.role]||m.role}</div>
                            </div>
                            <div className="flex items-center gap-1.5 flex-shrink-0">
                              <button onClick={()=>startMove(m,field)} className="text-xs text-red-600 hover:text-red-800 px-2 py-1 border border-red-200 rounded-lg">
                                Team ändern
                              </button>
                              <button onClick={()=>setDelMember({id:m.id,name:m.name})}
                                className="text-gray-400 hover:text-red-600 p-1 rounded hover:bg-red-50" title="Entfernen">🗑</button>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                  {players.length>0&&(
                    <div className="px-4 pt-2 pb-3">
                      <div className="text-[10px] font-semibold text-gray-400 uppercase tracking-wider mb-2">Spieler</div>
                      {[...players].sort((a,b)=>{
                        if(memberSort==='position'){const ai=ALL_POSITIONS.indexOf(getPositions(a)[0]),bi=ALL_POSITIONS.indexOf(getPositions(b)[0]);return (ai===-1?99:ai)-(bi===-1?99:bi)||byLastName(a,b);}
                        if(memberSort==='firstname') return byFirstName(a,b);
                        return byLastName(a,b);
                      }).map(m=>{
                        const age = fmtAge(m.dob);
                        return (
                          <div key={m.id} className="flex items-center gap-3 py-2 border-b border-gray-100 last:border-0">
                            <Avatar name={m.name} color={m.color} size="sm" photo={m.photoUrl} number={m.number}/>
                            <div className="flex-1 min-w-0">
                              <div className="flex items-baseline gap-2">
                                <div className="text-sm font-medium truncate">{m.name}</div>
                                {m.dob && <span className="text-[10px] text-gray-400 flex-shrink-0">{fmtDob(m.dob)} ({age} J.)</span>}
                              </div>
                              <div className="text-[10px] text-gray-400">
                                {m.position||''}
                                {!m.claimed&&<span className="text-amber-500"> · ausstehend</span>}
                              </div>
                            </div>
                            <div className="flex items-center gap-1.5 flex-shrink-0">
                              <button onClick={()=>startMove(m,'teamId')} className="text-xs text-red-600 hover:text-red-800 px-2 py-1 border border-red-200 rounded-lg">
                                Team ändern
                              </button>
                              <button onClick={()=>setDelMember({id:m.id,name:m.name})}
                                className="text-gray-400 hover:text-red-600 p-1 rounded hover:bg-red-50" title="Entfernen">🗑</button>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              )}
              {isOpen && total === 0 && (
                <div className="border-t border-gray-100 px-4 py-3 text-xs text-gray-400">Noch keine Mitglieder in diesem Team.</div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
//  TRAINER — BUSPLANUNG
// ═══════════════════════════════════════════════════════════════════
function TrainerBusplanung({profile, show}) {
  const BUSES = [
    {id:'rot',    label:'Bus Rot',    emoji:'🚌', color:'#DC2626', bg:'#FEF2F2', border:'#FECACA'},
    {id:'silber', label:'Bus Silber', emoji:'🚎', color:'#4B5563', bg:'#F9FAFB', border:'#E5E7EB'},
  ];
  const [bookings,  setBookings]  = useState([]);
  const [teams,     setTeams]     = useState([]);
  const [month,     setMonth]     = useState(new Date().toISOString().slice(0,7));
  const [selBus,    setSelBus]    = useState('rot');
  const [selDate,   setSelDate]   = useState('');
  const [selFrom,   setSelFrom]   = useState('08:00');
  const [selTo,     setSelTo]     = useState('14:00');
  const [selTeam,   setSelTeam]   = useState('');
  const [saving,    setSaving]    = useState(false);
  const [delId,     setDelId]     = useState(null);

  useEffect(()=>{
    const [y,m] = month.split('-');
    const start = `${y}-${m}-01`;
    const end   = `${y}-${String(Number(m)%12+1).padStart(2,'0')}-01`;
    return col('bus_bookings')
      .where('date','>=',start).where('date','<',end)
      .onSnapshot(s=>setBookings(s.docs.map(d=>({id:d.id,...d.data()}))
        .sort((a,b)=>a.date.localeCompare(b.date)||( a.timeFrom||'').localeCompare(b.timeFrom||''))));
  },[month]);

  useEffect(()=>{
    col('teams').get().then(s=>{
      const list = s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a.name||'').localeCompare(b.name||'','de'));
      setTeams(list);
      // Pre-select trainer's own team if available
      if(!selTeam && profile.teamId) {
        const own = list.find(t=>t.id===profile.teamId||t.id===profile.trainerTeamId);
        if(own) setSelTeam(own.name);
      }
    });
  },[]);

  // Check time overlap for same bus on same day
  const hasTimeConflict = (busId, date, from, to) => {
    const same = bookings.filter(b=>b.busId===busId && b.date===date);
    if(!same.length) return null;
    // Parse HH:MM to minutes
    const toMin = t => { const [h,m]=(t||'00:00').split(':'); return Number(h)*60+Number(m); };
    const newFrom=toMin(from), newTo=toMin(to);
    return same.find(b=>{
      const bFrom=toMin(b.timeFrom), bTo=toMin(b.timeTo);
      return newFrom < bTo && newTo > bFrom; // overlap
    });
  };

  const durationLabel = (from, to) => {
    if(!from||!to) return '';
    const [fh,fm]=from.split(':').map(Number);
    const [th,tm]=to.split(':').map(Number);
    const mins = (th*60+tm)-(fh*60+fm);
    if(mins<=0) return '';
    const h=Math.floor(mins/60), m=mins%60;
    return h>0 ? `${h}h${m>0?` ${m}min`:''}` : `${m}min`;
  };

  const save = async () => {
    if(!selDate||!selTeam||!selFrom||!selTo) return;
    if(selFrom>=selTo){ show('Endzeit muss nach Startzeit liegen','error'); return; }
    const conflict = hasTimeConflict(selBus, selDate, selFrom, selTo);
    if(conflict){
      show(`Zeitkonflikt mit ${conflict.teamName||conflict.trainerName} (${conflict.timeFrom}–${conflict.timeTo})!`,'error');
      return;
    }
    setSaving(true);
    try {
      await col('bus_bookings').add({
        busId: selBus, date: selDate, teamName: selTeam,
        timeFrom: selFrom, timeTo: selTo,
        trainerName: profile.name, createdAt: ts()
      });
      show('Bus gebucht ✅'); setSelDate('');
    } catch(err) { show(err.message,'error'); }
    setSaving(false);
  };

  const doDelete = async () => {
    await col('bus_bookings').doc(delId).delete();
    show('Buchung storniert'); setDelId(null);
  };

  const prevMonth = () => { const d=new Date(month+'-01'); d.setMonth(d.getMonth()-1); setMonth(d.toISOString().slice(0,7)); };
  const nextMonth = () => { const d=new Date(month+'-01'); d.setMonth(d.getMonth()+1); setMonth(d.toISOString().slice(0,7)); };
  const monthLabel = new Date(month+'-01').toLocaleDateString('de-DE',{month:'long',year:'numeric'});

  // Group bookings by date for the timeline view
  const byDate = bookings.reduce((acc,b)=>{ (acc[b.date]=acc[b.date]||[]).push(b); return acc; },{});

  // Visual time bar: 06:00–22:00 = 960min span
  const DAY_START=6*60, DAY_END=22*60, SPAN=DAY_END-DAY_START;
  const toMin = t => { const [h,m]=(t||'00:00').split(':'); return Number(h)*60+Number(m); };
  const barLeft  = t => `${Math.max(0,Math.min(100,(toMin(t)-DAY_START)/SPAN*100))}%`;
  const barWidth = (f,t) => `${Math.max(2,(toMin(t)-toMin(f))/SPAN*100)}%`;

  const conflictCheck = selDate && selFrom && selTo && selFrom < selTo
    ? hasTimeConflict(selBus, selDate, selFrom, selTo) : null;

  return (
    <div className="p-4">
      {delId && (
        <Modal title="Buchung stornieren?" onClose={()=>setDelId(null)}>
          <p className="text-sm text-gray-600 mb-4">Diese Bus-Buchung wirklich stornieren?</p>
          <div className="flex gap-2">
            <button className="flex-1 py-2 rounded-lg border text-sm" onClick={()=>setDelId(null)}>Abbrechen</button>
            <button className="flex-1 py-2 rounded-lg bg-red-600 text-white text-sm" onClick={doDelete}>Stornieren</button>
          </div>
        </Modal>
      )}

      <h1 className="text-lg font-bold text-white mb-1">Busplanung</h1>
      <p className="text-xs text-gray-400 mb-4">Reserviere einen Bus mit Zeitfenster für dein Auswärtsspiel</p>

      {/* Bus-Status Cards */}
      <div className="grid grid-cols-2 gap-3 mb-5">
        {BUSES.map(bus=>{
          const upcoming = bookings.filter(b=>b.busId===bus.id && b.date>=todayStr());
          const next = upcoming[0];
          return (
            <div key={bus.id} className="glass-card rounded-xl p-3 text-center">
              <div className="text-2xl mb-1">{bus.emoji}</div>
              <div className="text-xs font-semibold mb-1.5" style={{color:bus.color}}>{bus.label}</div>
              {next ? (
                <div className="rounded-lg p-1.5" style={{background:bus.bg,border:`1px solid ${bus.border}`}}>
                  <div className="text-[10px] font-medium mb-0.5" style={{color:bus.color}}>Nächste Buchung</div>
                  <div className="text-[11px] font-semibold text-gray-800">{fmtDate(next.date)}</div>
                  {next.timeFrom && <div className="text-[11px] text-gray-600">{next.timeFrom} – {next.timeTo} Uhr</div>}
                  <div className="text-[10px] text-gray-500 truncate">{next.teamName}</div>
                </div>
              ) : (
                <div className="text-[10px] text-green-600 font-medium">✓ Verfügbar</div>
              )}
            </div>
          );
        })}
      </div>

      {/* Neue Buchung */}
      <div className="glass-card rounded-xl p-4 mb-5">
        <div className="text-sm font-semibold mb-3">🚌 Bus reservieren</div>
        <div className="grid grid-cols-2 gap-2 mb-3">
          {BUSES.map(bus=>(
            <button key={bus.id} onClick={()=>setSelBus(bus.id)}
              className={`py-2 rounded-lg border-2 text-xs font-semibold transition-all ${selBus===bus.id?'border-red-500 bg-red-50 text-red-700':'border-gray-200 text-gray-600 hover:border-gray-300'}`}>
              {bus.emoji} {bus.label}
            </button>
          ))}
        </div>
        <Inp label="Datum" type="date" value={selDate} onChange={e=>setSelDate(e.target.value)} min={todayStr()}/>
        <div className="mb-3">
          <label className="block text-xs font-medium text-gray-600 mb-1">Team</label>
          <select value={selTeam} onChange={e=>setSelTeam(e.target.value)}
            className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-500 bg-white">
            <option value="">— Team auswählen —</option>
            {teams.map(t=><option key={t.id} value={t.name}>{t.name}</option>)}
          </select>
        </div>
        <div className="flex gap-2 mb-3">
          <div className="flex-1">
            <label className="block text-xs font-medium text-gray-600 mb-1">Von</label>
            <input type="time" value={selFrom} onChange={e=>setSelFrom(e.target.value)}
              className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-500"/>
          </div>
          <div className="flex-1">
            <label className="block text-xs font-medium text-gray-600 mb-1">Bis</label>
            <input type="time" value={selTo} onChange={e=>setSelTo(e.target.value)}
              className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-500"/>
          </div>
          {selFrom && selTo && selFrom < selTo && (
            <div className="flex items-end pb-2">
              <span className="text-xs font-semibold text-gray-500 whitespace-nowrap">{durationLabel(selFrom,selTo)}</span>
            </div>
          )}
        </div>
        {conflictCheck && (
          <div className="mb-3 text-xs bg-amber-50 border border-amber-200 text-amber-700 rounded-lg px-3 py-2">
            ⚠️ Zeitüberschneidung mit <strong>{conflictCheck.teamName||conflictCheck.trainerName}</strong> ({conflictCheck.timeFrom}–{conflictCheck.timeTo} Uhr)
          </div>
        )}
        <button onClick={save} disabled={saving||!selDate||!selTeam||!selFrom||!selTo||selFrom>=selTo}
          className="w-full py-2.5 rounded-xl bg-red-600 hover:bg-red-700 text-white text-sm font-semibold disabled:opacity-40 transition-colors">
          {saving ? '⏳ Buchen…' : 'Bus reservieren'}
        </button>
      </div>

      {/* Kalender-Liste mit Timeline */}
      <div className="glass-card rounded-xl overflow-hidden">
        <div className="flex items-center justify-between px-4 py-3 border-b">
          <button onClick={prevMonth} className="p-1 rounded hover:bg-gray-100 text-gray-500">◀</button>
          <span className="text-sm font-semibold">{monthLabel}</span>
          <button onClick={nextMonth} className="p-1 rounded hover:bg-gray-100 text-gray-500">▶</button>
        </div>
        {Object.keys(byDate).length===0 ? (
          <div className="text-center text-gray-400 py-8 text-sm">Keine Buchungen in diesem Monat.</div>
        ) : (
          <div className="divide-y">
            {Object.entries(byDate).map(([date, dayBookings])=>(
              <div key={date} className="px-4 py-3">
                {/* Date header */}
                <div className="text-xs font-semibold text-gray-500 mb-2">{fmtDate(date)}</div>
                {/* Timeline bar */}
                <div className="relative h-7 bg-gray-100 rounded-lg mb-2 overflow-hidden">
                  {/* Hour markers */}
                  {[8,10,12,14,16,18,20].map(h=>(
                    <div key={h} className="absolute top-0 bottom-0 border-l border-gray-200 flex items-end pb-0.5"
                      style={{left:`${(h*60-DAY_START)/SPAN*100}%`}}>
                      <span className="text-[9px] text-gray-300 pl-0.5">{h}</span>
                    </div>
                  ))}
                  {/* Booking blocks */}
                  {dayBookings.map(b=>{
                    const bus = BUSES.find(x=>x.id===b.busId)||BUSES[0];
                    const from = b.timeFrom||'08:00', to = b.timeTo||'14:00';
                    return (
                      <div key={b.id} title={`${bus.label}: ${from}–${to} · ${b.teamName||b.opponent||''}`}
                        className="absolute top-1 bottom-1 rounded flex items-center justify-center overflow-hidden"
                        style={{left:barLeft(from),width:barWidth(from,to),background:bus.color,opacity:0.85}}>
                        <span className="text-[10px] text-white font-semibold px-1 truncate">{bus.emoji} {from}–{to}</span>
                      </div>
                    );
                  })}
                </div>
                {/* Booking entries */}
                {dayBookings.map(b=>{
                  const bus = BUSES.find(x=>x.id===b.busId)||BUSES[0];
                  const isOwn = b.trainerName===profile.name;
                  const dur = b.timeFrom&&b.timeTo ? durationLabel(b.timeFrom,b.timeTo) : '';
                  return (
                    <div key={b.id} className="flex items-center gap-2 py-1.5 border-b border-gray-50 last:border-0">
                      <span className="text-base flex-shrink-0">{bus.emoji}</span>
                      <div className="flex-1 min-w-0">
                        <div className="flex items-center gap-2 flex-wrap">
                          <span className="text-xs font-semibold" style={{color:bus.color}}>{bus.label}</span>
                          {b.timeFrom && (
                            <span className="text-xs bg-gray-100 text-gray-700 px-2 py-0.5 rounded-full font-medium">
                              {b.timeFrom} – {b.timeTo} Uhr{dur?` (${dur})`:''}
                            </span>
                          )}
                        </div>
                        <div className="text-xs text-gray-600 truncate">{b.teamName||b.opponent||'–'} · {b.trainerName}</div>
                      </div>
                      {isOwn && (
                        <button onClick={()=>setDelId(b.id)} className="text-gray-400 hover:text-red-600 p-1 rounded hover:bg-red-50 text-xs flex-shrink-0">🗑</button>
                      )}
                    </div>
                  );
                })}
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
//  ADMIN — SPIELERVERWALTUNG (Vorstand verwaltet Spieler & Profile)
// ═══════════════════════════════════════════════════════════════════
function AdminSpielerVerwaltung({profile: adminProfile, show}) {
  const [teams,      setTeams]      = useState([]);
  const [players,    setPlayers]    = useState([]);
  const [selTeam,    setSelTeam]    = useState('');
  const [detail,     setDetail]     = useState(null); // player being viewed
  const [addOpen,    setAddOpen]    = useState(false);
  const [delId,      setDelId]      = useState(null);
  const [saving,     setSaving]     = useState(false);
  const EMPTY_FORM = {vorname:'',nachname:'',positions:[],number:'',dob:'',spielStatus:'spielberechtigt',vereinsmitglied:false,zweitspielrecht:false};
  const [form, setForm] = useState(EMPTY_FORM);
  const [playerSort, setPlayerSort] = useState('lastname'); // 'lastname' | 'firstname' | 'position' | 'number'

  useEffect(()=>{
    return col('teams').onSnapshot(s=>{
      const ts2 = s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>a.name.localeCompare(b.name));
      setTeams(ts2);
      if(!selTeam && ts2.length>0) setSelTeam(ts2[0].id);
    });
  },[]);

  useEffect(()=>{
    if(!selTeam) return;
    return col('users').where('teamId','==',selTeam).where('role','==','player')
      .onSnapshot(s=>setPlayers(s.docs.map(d=>({id:d.id,...d.data()})).sort(byLastName)));
  },[selTeam]);

  const togglePosAdmin = (pos) => setForm(f=>({...f, positions: (f.positions||[]).includes(pos)?f.positions.filter(x=>x!==pos):[...(f.positions||[]),pos]}));

  const addPlayer = async (e) => {
    e.preventDefault(); setSaving(true);
    try {
      const positions = (form.positions||[]).length ? form.positions : ['offen'];
      const fullName = (form.vorname.trim() + ' ' + form.nachname.trim()).trim();
      await col('users').add({
        name: fullName, role:'player',
        teamId: selTeam, positions, position: positions[0],
        number: form.number, dob: form.dob,
        spielStatus: form.spielStatus||'spielberechtigt',
        vereinsmitglied: form.vereinsmitglied||false,
        zweitspielrecht: form.zweitspielrecht||false,
        color: randColor(), claimed: false, uid:'', email:'', createdAt: ts()
      });
      show('Spieler hinzugefügt ✅'); setForm(EMPTY_FORM); setAddOpen(false);
    } catch(err) { show(err.message,'error'); }
    setSaving(false);
  };

  const doDelete = async () => {
    await col('users').doc(delId).delete();
    show('Spieler entfernt'); setDelId(null);
  };

  return (
    <div className="p-4">
      {delId && (
        <Modal title="Spieler entfernen?" onClose={()=>setDelId(null)}>
          <p className="text-sm text-gray-600 mb-4">Spieler dauerhaft aus diesem Team entfernen?</p>
          <div className="flex gap-2">
            <button className="flex-1 py-2 rounded-lg border text-sm" onClick={()=>setDelId(null)}>Abbrechen</button>
            <button className="flex-1 py-2 rounded-lg bg-red-600 text-white text-sm" onClick={doDelete}>Entfernen</button>
          </div>
        </Modal>
      )}

      {addOpen && (
        <Modal title="Spieler hinzufügen" onClose={()=>{setAddOpen(false);setForm(EMPTY_FORM);}}>
          <p className="text-xs text-gray-500 bg-blue-50 border border-blue-100 rounded-lg px-3 py-2 mb-3">
            ℹ️ Der Spieler erhält einen Slot und kann sich dann selbst registrieren und verknüpfen.
          </p>
          <form onSubmit={addPlayer}>
            <div className="flex gap-2">
              <Inp label="Vorname" value={form.vorname} onChange={e=>setForm({...form,vorname:e.target.value})} placeholder="Max" required/>
              <Inp label="Nachname" value={form.nachname} onChange={e=>setForm({...form,nachname:e.target.value})} placeholder="Mustermann" required/>
            </div>
            <Inp label="Geburtsdatum" type="date" value={form.dob} onChange={e=>setForm({...form,dob:e.target.value})}/>
            <div className="mb-3">
              <label className="block text-xs font-medium text-gray-600 mb-1.5">Position(en)</label>
              <div className="flex flex-wrap gap-1.5">
                {ALL_POSITIONS.map(p=>{
                  const sel=(form.positions||[]).includes(p);
                  return <button key={p} type="button" onClick={()=>togglePosAdmin(p)}
                    className={`px-3 py-1.5 rounded-lg text-xs font-medium border-2 transition-all ${sel?'border-red-500 bg-red-50 text-red-700':'border-gray-200 text-gray-500 hover:border-gray-300'}`}>{p}</button>;
                })}
              </div>
            </div>
            <div className="w-24 mb-3">
              <label className="block text-xs font-medium text-gray-600 mb-1">Nr.</label>
              <input value={form.number} onChange={e=>setForm({...form,number:e.target.value})} placeholder="#"
                className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm text-center focus:outline-none focus:ring-2 focus:ring-red-500"/>
            </div>
            {/* Status */}
            <div className="mb-3">
              <label className="block text-xs font-medium text-gray-600 mb-1.5">Status</label>
              <div className="grid grid-cols-2 gap-2">
                <button type="button" onClick={()=>setForm(f=>({...f,spielStatus:'spielberechtigt'}))}
                  className={`py-2.5 rounded-xl border-2 text-xs font-semibold transition-all ${form.spielStatus==='spielberechtigt'?'border-green-500 bg-green-50 text-green-700':'border-gray-200 text-gray-500 hover:border-gray-300'}`}>
                  ✅ Spielberechtigt
                </button>
                <button type="button" onClick={()=>setForm(f=>({...f,spielStatus:'in_bearbeitung'}))}
                  className={`py-2.5 rounded-xl border-2 text-xs font-semibold transition-all ${form.spielStatus==='in_bearbeitung'?'border-red-500 bg-red-50 text-red-700':'border-gray-200 text-gray-500 hover:border-gray-300'}`}>
                  🔴 In Bearbeitung
                </button>
              </div>
            </div>
            {/* Mitgliedschaft */}
            <div className="mb-3">
              <label className="block text-xs font-medium text-gray-600 mb-1.5">Mitgliedschaft</label>
              <div className="grid grid-cols-2 gap-2">
                <label className={`flex items-center gap-2 cursor-pointer p-2.5 rounded-xl border-2 transition-all ${form.vereinsmitglied?'border-green-500 bg-green-50':'border-gray-200 hover:border-gray-300'}`}>
                  <input type="checkbox" checked={form.vereinsmitglied} onChange={e=>setForm(f=>({...f,vereinsmitglied:e.target.checked}))} className="accent-green-600 w-4 h-4"/>
                  <span className="text-xs font-semibold text-gray-700">🟢 Mitglied</span>
                </label>
                <label className={`flex items-center gap-2 cursor-pointer p-2.5 rounded-xl border-2 transition-all ${form.zweitspielrecht?'border-blue-500 bg-blue-50':'border-gray-200 hover:border-gray-300'}`}>
                  <input type="checkbox" checked={form.zweitspielrecht} onChange={e=>setForm(f=>({...f,zweitspielrecht:e.target.checked}))} className="accent-blue-600 w-4 h-4"/>
                  <span className="text-xs font-semibold text-gray-700">🔵 Zweitspielrecht</span>
                </label>
              </div>
            </div>
            <div className="flex gap-2 mt-1">
              <button type="button" className="flex-1 py-2 rounded-lg border text-sm" onClick={()=>{setAddOpen(false);setForm(EMPTY_FORM);}}>Abbrechen</button>
              <button type="submit" disabled={saving} className="flex-1 py-2 rounded-lg bg-red-600 text-white text-sm font-semibold disabled:opacity-40">{saving?'…':'Hinzufügen'}</button>
            </div>
          </form>
        </Modal>
      )}

      {detail && (
        <AdminPlayerDetail player={detail} onClose={()=>setDetail(null)} show={show}/>
      )}

      <div className="flex items-center justify-between mb-4">
        <div>
          <h1 className="text-lg font-bold text-white">Spielerverwaltung</h1>
          <p className="text-xs text-gray-400">{players.length} Spieler</p>
        </div>
        <button onClick={()=>setAddOpen(true)} className="px-3 py-1.5 rounded-lg bg-red-600 text-white text-xs font-semibold">+ Spieler</button>
      </div>

      {/* Team-Tabs */}
      {teams.length>0 && (
        <div className="flex gap-2 mb-4 overflow-x-auto pb-1">
          {teams.map(t=>(
            <button key={t.id} onClick={()=>setSelTeam(t.id)}
              className={`flex-shrink-0 px-3 py-1.5 rounded-full text-xs font-semibold transition-colors ${selTeam===t.id?'bg-red-600 text-white':'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>
              {t.name}
            </button>
          ))}
        </div>
      )}

      {/* Sortier-Buttons */}
      {players.length>0 && (
        <div className="flex items-center gap-2 mb-3">
          <span className="text-[10px] text-gray-400 font-medium">Sortieren:</span>
          {[['lastname','Nachname'],['firstname','Vorname'],['position','Position'],['number','Nr.']].map(([v,l])=>(
            <button key={v} onClick={()=>setPlayerSort(v)}
              className={`px-2.5 py-1 rounded-full text-[10px] font-semibold transition-colors ${playerSort===v?'bg-red-600 text-white':'bg-gray-100 text-gray-500 hover:bg-gray-200'}`}>
              {l}
            </button>
          ))}
        </div>
      )}

      {players.length===0 ? (
        <div className="text-center text-gray-400 py-12">
          <div className="text-4xl mb-2">👥</div>
          <p className="text-sm">Noch keine Spieler in diesem Team.</p>
        </div>
      ) : (
        <div className="space-y-1.5">
          {[...players].sort((a,b)=>{
            if(playerSort==='position'){const ai=ALL_POSITIONS.indexOf(getPositions(a)[0]),bi=ALL_POSITIONS.indexOf(getPositions(b)[0]);return (ai===-1?99:ai)-(bi===-1?99:bi)||byLastName(a,b);}
            if(playerSort==='number') return (Number(a.number)||999)-(Number(b.number)||999);
            if(playerSort==='firstname') return byFirstName(a,b);
            return byLastName(a,b);
          }).map(p=>(
            <div key={p.id} onClick={()=>setDetail(p)}
              className="flex items-center gap-3 glass-card rounded-xl px-3 py-2.5 cursor-pointer hover:border-red-200 hover:bg-red-50/30 transition-colors">
              <Avatar name={p.name} color={p.color} size="md8" photo={p.photoUrl} number={p.number}/>
              <div className="min-w-0 flex-1">
                <div className="text-sm font-medium truncate flex items-center gap-1.5">
                  <span className="truncate">{p.name}</span>
                  <span className="w-2.5 h-2.5 rounded-full flex-shrink-0 inline-block"
                    style={{background:p.zweitspielrecht?'#3b82f6':p.spielStatus==='in_bearbeitung'?'#ef4444':(p.vereinsmitglied&&p.spielStatus==='spielberechtigt')?'#22c55e':'#ef4444'}}
                    title={p.zweitspielrecht?'Zweitspielrecht':p.spielStatus==='in_bearbeitung'?'In Bearbeitung (Vorrang)':(p.vereinsmitglied&&p.spielStatus==='spielberechtigt')?'Mitglied & Spielberechtigt':'Unvollständig'}/>
                </div>
                <div className="text-xs text-gray-400 truncate">
                  {p.dob && <span>{fmtDob(p.dob)} · {fmtAge(p.dob)} J. · </span>}
                  {p.position}
                  {p.vereinsarbeit && <span className="text-green-600 ml-1">· ✓ Vereinsarbeit</span>}
                  {p.empfehlung?.team && <span className="text-blue-600 ml-1">· 📋 {p.empfehlung.team}</span>}
                </div>
              </div>
              <div className="flex items-center gap-1.5 flex-shrink-0">
                {!p.claimed && <span className="text-[10px] bg-amber-100 text-amber-600 px-1.5 py-0.5 rounded-full">Ausstehend</span>}
                <button onClick={e=>{e.stopPropagation();setDelId(p.id);}} className="text-gray-400 hover:text-red-600 p-1 rounded hover:bg-red-50 text-xs">🗑</button>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function AdminPlayerDetail({player, onClose, show}) {
  const nameParts = (player.name||'').trim().split(' ');
  const [vorname,        setVorname]        = useState(nameParts.length>1 ? nameParts.slice(0,-1).join(' ') : nameParts[0]||'');
  const [nachname,       setNachname]       = useState(nameParts.length>1 ? nameParts[nameParts.length-1] : '');
  const [dob,            setDob]            = useState(player.dob||'');
  const [number,         setNumber]         = useState(player.number||'');
  const [editPositions,  setEditPositions]  = useState(player.positions||[player.position||'offen']);
  const [notizen,        setNotizen]        = useState(player.vorstandNotizen||'');
  const [vereinsarbeit,  setVereinsarbeit]  = useState(player.vereinsarbeit||false);
  const [spielStatus,    setSpielStatus]    = useState(player.spielStatus||'spielberechtigt');
  const [vereinsmitglied,setVereinsmitglied]= useState(player.vereinsmitglied||false);
  const [zweitspielrecht,setZweitspielrecht]= useState(player.zweitspielrecht||false);
  const [checklist,      setChecklist]      = useState(player.checklist||{mga:false,spbe:false,foto:false,geburk:false,intfg:false,auw:false,mebe:false});
  const [saving,         setSaving]         = useState(false);
  const [uploadLabel,  setUploadLabel]  = useState('');
  const [uploading,    setUploading]    = useState(false);
  const [docs,         setDocs]         = useState([]);
  const fileRef = useRef(null);

  useEffect(()=>{
    return col('dokumente')
      .where('playerId','==',player.id)
      .onSnapshot(s=>setDocs(s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>{
        const ta=a.createdAt?.toDate?a.createdAt.toDate():new Date(0);
        const tb=b.createdAt?.toDate?b.createdAt.toDate():new Date(0);
        return tb-ta;
      })));
  },[player.id]);

  const saveNotes = async () => {
    setSaving(true);
    const fullName = (vorname.trim() + ' ' + nachname.trim()).trim();
    await col('users').doc(player.id).update({
      name: fullName||player.name,
      dob, number,
      positions: editPositions, position: editPositions[0]||'',
      vorstandNotizen: notizen, vereinsarbeit,
      spielStatus, vereinsmitglied, zweitspielrecht,
      checklist,
    });
    show('Gespeichert ✅'); setSaving(false); onClose();
  };

  const uploadDoc = async (e) => {
    const file = e.target.files[0]; if(!file) return;
    if(file.size > 700*1024) { show(`Datei zu groß (${Math.round(file.size/1024)} KB). Max. 700 KB.`,'error'); e.target.value=''; return; }
    setUploading(true);
    try {
      const fileData = await new Promise((res,rej)=>{
        const r = new FileReader(); r.onload=()=>res(r.result.split(',')[1]); r.onerror=rej; r.readAsDataURL(file);
      });
      await col('dokumente').add({
        playerId: player.id, playerName: player.name,
        name: file.name, fileData, fileType: file.type, size: file.size, createdAt: ts()
      });
      show('Dokument hochgeladen ✅');
    } catch(err) { show(err.message,'error'); }
    setUploading(false);
    e.target.value='';
  };

  const deleteDoc = async (doc) => {
    await col('dokumente').doc(doc.id).delete();
    show('Dokument gelöscht');
  };

  const empfehlung = player.empfehlung;

  return (
    <Modal title={`Spielerprofil: ${player.name}`} onClose={onClose} wide={true}>
      <div className="space-y-5">
        {/* Steckbrief */}
        <div className="flex items-center gap-4 bg-gray-50 rounded-xl p-4">
          {/* Avatar + Profilbild-Upload */}
          <div className="flex flex-col items-center gap-1 flex-shrink-0">
            <div className="relative group">
              {player.photoUrl
                ? <img src={player.photoUrl} className="w-14 h-14 rounded-full object-cover" alt={player.name}/>
                : <div className="w-14 h-14 rounded-full flex items-center justify-center text-white text-xl font-bold" style={{background:player.color||'#CC0000'}}>{player.number||initials(player.name)}</div>
              }
              <label className="absolute inset-0 rounded-full flex items-center justify-center bg-black/0 group-hover:bg-black/40 transition-all cursor-pointer">
                <span className="opacity-0 group-hover:opacity-100 text-white text-xs font-semibold">📷</span>
                <input type="file" accept="image/*" className="hidden" onChange={async e=>{
                  const file=e.target.files[0]; if(!file) return;
                  if(file.size>700*1024){show('Bild zu groß (max. 700 KB)','error');e.target.value='';return;}
                  const data=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(file);});
                  await col('users').doc(player.id).update({photoUrl:data});
                  show('Profilbild gespeichert ✅');
                  e.target.value='';
                }}/>
              </label>
            </div>
            {player.photoUrl && (
              <button onClick={async()=>{
                if(!window.confirm('Profilbild löschen?')) return;
                await col('users').doc(player.id).update({photoUrl: firebase.firestore.FieldValue.delete()});
                show('Profilbild gelöscht');
              }} className="text-[10px] text-red-400 hover:text-red-600 transition-colors leading-none">
                🗑 Löschen
              </button>
            )}
          </div>
          <div className="flex-1">
            <div className="flex gap-2 mb-1.5">
              <input value={vorname} onChange={e=>setVorname(e.target.value)}
                placeholder="Vorname"
                className="flex-1 text-sm font-semibold border border-gray-200 rounded-lg px-2 py-1 focus:outline-none focus:ring-2 focus:ring-red-400"/>
              <input value={nachname} onChange={e=>setNachname(e.target.value)}
                placeholder="Nachname"
                className="flex-1 text-sm font-semibold border border-gray-200 rounded-lg px-2 py-1 focus:outline-none focus:ring-2 focus:ring-red-400"/>
            </div>

              </div>
            </div>
            <div className="text-xs mt-0.5">
              {player.claimed

            <div className="text-[10px] text-gray-400 mt-0.5">📷 Auf Foto hovern zum Ändern</div>
          </div>

        {/* Trainer-Empfehlung (read-only) */}

            <span className="w-2.5 h-2.5 rounded-full inline-block"
              style={{background:zweitspielrecht?'#3b82f6':spielStatus==='in_bearbeitung'?'#ef4444':(vereinsmitglied&&spielStatus==='spielberechtigt')?'#22c55e':'#ef4444'}}
              title={zweitspielrecht?'Zweitspielrecht':spielStatus==='in_bearbeitung'?'In Bearbeitung (Vorrang)':(vereinsmitglied&&spielStatus==='spielberechtigt')?'Mitglied & Spielberechtigt':'Unvollständig'}/>

                      <input type="checkbox" checked={!!checklist[key]}
