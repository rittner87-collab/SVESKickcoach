//  SPIELER — FEEDBACK (Trainer-Bewertungen zu Spielen)
// ═══════════════════════════════════════════════════════════════════
function PlayerFeedback({profile}) {
  const [ratings, setRatings] = useState([]);
  const [detail,  setDetail]  = useState(null);

  useEffect(()=>{
    // Nur nach playerId filtern (kein Composite-Index nötig),
    // type-Filter und Sortierung im Client
    return col('ratings').where('playerId','==',profile.id)
      .onSnapshot(s=>{
        const all = s.docs.map(d=>({id:d.id,...d.data()}));
        const game = all
          .filter(r=>r.type==='game')
          .sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
        setRatings(game);
      });
  },[]);

  const StarRow = ({scores}) => (
    <div className="flex gap-3 flex-wrap mt-1.5">
      {RATING_CATS.map(cat=>(
        <div key={cat} className="text-center">
          <div className="text-sm font-bold text-red-600">{scores?.[cat]??'—'}</div>
          <div className="text-[9px] text-gray-400">{cat.slice(0,3)}</div>
        </div>
      ))}
    </div>
  );

  return (
    <div className="p-4">
      <h1 className="text-lg font-bold text-white mb-4">⭐ Trainer-Feedback</h1>

      {ratings.length===0 ? (
        <div className="text-center text-gray-400 py-16">
          <div className="text-4xl mb-2">⭐</div>
          <p className="text-sm">Noch kein Feedback vom Trainer.</p>
          <p className="text-xs mt-1 text-gray-300">Feedback wird nach Spielen vergeben.</p>
        </div>
      ) : (
        <div className="space-y-2">
          {ratings.map(r=>(
            <button key={r.id} onClick={()=>setDetail(r)}
              className="w-full glass-card rounded-2xl p-4 text-left hover:border-red-300 transition-colors">
              <div className="flex items-center justify-between mb-1">
                <div className="text-sm font-semibold">vs. {r.gameOpponent||'—'}</div>
                <div className="text-xl font-bold text-red-600">{r.avg}/5</div>
              </div>
              <div className="text-xs text-gray-400">{fmtDate(r.gameDate)}{r.trainerName?' · '+r.trainerName:''}</div>
              <StarRow scores={r.scores}/>
              {r.notes && <p className="text-xs text-gray-500 italic mt-2 line-clamp-2">{r.notes}</p>}
            </button>
          ))}
        </div>
      )}

      {/* Detail-Modal */}
      {detail && (
        <div className="fixed inset-0 bg-black/60 z-50 flex items-end md:items-center justify-center p-0 md:p-4" onClick={()=>setDetail(null)}>
          <div className="bg-white light-sheet w-full md:max-w-sm md:rounded-2xl rounded-t-2xl shadow-2xl" onClick={e=>e.stopPropagation()}>
            <div className="flex items-center justify-between px-5 py-4 border-b border-gray-100">
              <div>
                <div className="font-bold">vs. {detail.gameOpponent||'—'}</div>
                <div className="text-xs text-gray-400">{fmtDate(detail.gameDate)}{detail.trainerName?' · '+detail.trainerName:''}</div>
              </div>
              <button onClick={()=>setDetail(null)} className="w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 text-gray-500">✕</button>
            </div>
            <div className="px-5 py-4 space-y-4">
              {/* Gesamt */}
              <div className="text-center">
                <div className="text-5xl font-bold text-red-600">{detail.avg}</div>
                <div className="text-sm text-gray-400 mt-1">Gesamtbewertung / 5</div>
              </div>
              {/* Kategorien */}
              <div className="bg-gray-50 light-sheet rounded-xl p-4 space-y-2.5">
                {RATING_CATS.map(cat=>(
                  <div key={cat} className="flex items-center gap-3">
                    <span className="text-sm text-gray-600 w-20">{cat}</span>
                    <div className="flex-1 h-2 bg-gray-200 rounded-full overflow-hidden">
                      <div className="h-full bg-red-500 rounded-full" style={{width:`${((detail.scores?.[cat]||0)/5)*100}%`}}/>
                    </div>
                    <span className="text-sm font-bold text-gray-800 w-4 text-right">{detail.scores?.[cat]??'—'}</span>
                  </div>
                ))}
              </div>
              {/* Kommentar */}
              {detail.notes && (
                <div className="bg-blue-50 border border-blue-100 rounded-xl px-4 py-3">
                  <div className="text-xs font-semibold text-blue-600 mb-1">💬 Kommentar</div>
                  <p className="text-sm text-gray-700 leading-relaxed">{detail.notes}</p>
                </div>
              )}
              <Btn className="w-full" onClick={()=>setDetail(null)}>Schließen</Btn>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
//  SPIELER — NEWS
// ═══════════════════════════════════════════════════════════════════
function PlayerNews({profile}) {
  const [posts, setPosts] = useState([]);
  const [rnds,  setRnds]  = useState([]); // Rundnachrichten vom Vorstand
  const CAT_COLORS = {'Allgemein':'bg-gray-100 text-gray-600','Ankündigung':'bg-blue-100 text-blue-700','Wichtig':'bg-red-100 text-red-600','Veranstaltung':'bg-red-100 text-red-700'};

  useEffect(()=>{
    if(!profile?.id) return;
    return col('news').onSnapshot(s=>{
      const all = s.docs.map(d=>({id:d.id,...d.data()}))
        .sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
      const visible = all.filter(p=>!p.recipientIds?.length||p.recipientIds.includes(profile.id));
      setPosts(visible);
      // Automatisch als gelesen markieren
      visible.forEach(p=>{
        if(p.readBy&&p.readBy[profile.id]) return;
        col('news').doc(p.id).update({[`readBy.${profile.id}`]:true}).catch(()=>{});
      });
    });
  },[profile?.id]);

  useEffect(()=>{
    if(!profile?.id) return;
    return col('rundnachrichten').onSnapshot(s=>{
      const all = s.docs.map(d=>({id:d.id,...d.data()}))
        .sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
      const visible = all.filter(r=>!r.recipientIds?.length||r.recipientIds.includes(profile.id));
      setRnds(visible);
      visible.forEach(r=>{
        if(r.readBy&&r.readBy[profile.id]) return;
        col('rundnachrichten').doc(r.id).update({[`readBy.${profile.id}`]:true}).catch(()=>{});
      });
    });
  },[profile?.id]);

  const allItems = [
    ...posts.map(p=>({...p, _type:'news'})),
    ...rnds.map(r=>({...r, _type:'rund'})),
  ].sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));

  return (
    <div className="p-4">
      <h1 className="text-lg font-bold text-white mb-4">📢 Vereinsnews</h1>
      {allItems.length===0 ? <div className="text-center text-gray-400 py-16"><div className="text-4xl mb-2">📢</div><p className="text-sm">Noch keine News.</p></div> : (
        <div className="space-y-3">
          {allItems.map(p=>(
            <div key={p.id} className="glass-card rounded-2xl p-4">
              <div className="flex items-center justify-between mb-2">
                {p._type==='rund'
                  ? <span className="text-[11px] font-semibold px-2 py-0.5 rounded-full bg-red-50 text-red-700">💬 Nachricht</span>
                  : <span className={`text-[11px] font-semibold px-2 py-0.5 rounded-full ${CAT_COLORS[p.category]||CAT_COLORS['Allgemein']}`}>{p.category||'Allgemein'}</span>
                }
                <span className="text-xs text-gray-400">{fmtAgo(p.createdAt)}</span>
              </div>
              {p.title && <h3 className="text-sm font-semibold">{p.title}</h3>}
              <p className="text-sm text-gray-600 mt-1 leading-relaxed">{p.content||p.text}</p>
              {p.authorName&&<div className="text-xs text-gray-400 mt-2">— {p.authorName}</div>}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
//  ADMIN — TRAINER VERWALTEN
// ═══════════════════════════════════════════════════════════════════
function AdminTrainer({show}) {
  const [trainers,    setTrainers]    = useState([]);
  const [allUsers,    setAllUsers]    = useState([]);
  const [teams,       setTeams]       = useState([]);
  const [open,        setOpen]        = useState(false);
  const [editTeams,   setEditTeams]   = useState(null);
  const [editRole,    setEditRole]    = useState(null);
  const [delTrainer,  setDelTrainer]  = useState(null); // {id, name}
  const [form,        setForm]        = useState({vorname:'',nachname:'',email:'',pw:'',teamId:''});
  const [loading,     setLoading]     = useState(false);
  const [selRole,     setSelRole]     = useState('');

  const ROLES_ALL = [
    {v:'player',           l:'Spieler'},
    {v:'trainer',          l:'Trainer'},
    {v:'dual',             l:'Trainer & Spieler'},
    {v:'vorstand',         l:'Vorstand'},
    {v:'vorstand_trainer', l:'Vorstand & Trainer'},
  ];

  useEffect(()=>{
    const u1=col('users').where('role','in',['trainer','dual','vorstand','vorstand_trainer']).onSnapshot(s=>setTrainers(s.docs.map(d=>({id:d.id,...d.data()}))));
    const u2=col('users').onSnapshot(s=>setAllUsers(s.docs.map(d=>({id:d.id,...d.data()}))));
    const u3=col('teams').orderBy('name').onSnapshot(s=>setTeams(s.docs.map(d=>({id:d.id,...d.data()}))));
    return ()=>{u1();u2();u3();};
  },[]);

  const add = async (e) => {
    e.preventDefault(); setLoading(true);
    try {
      const trainerName = (form.vorname.trim() + ' ' + form.nachname.trim()).trim();
      await col('users').add({
        name: trainerName, role:'trainer',
        teamId: form.teamId, trainerTeamId: form.teamId,
        trainerTeamIds: form.teamId ? [form.teamId] : [],
        status:'active', color:randColor(),
        claimed:false, uid:'', email:'', createdAt:ts()
      });
      show('Trainer angelegt ✅'); setForm({vorname:'',nachname:'',teamId:''}); setOpen(false);
    } catch(err) { show(err.message,'error'); }
    setLoading(false);
  };

  // Save team assignments — handles both trainer and dual
  const saveTeams = async (userId, data) => {
    // data = { trainerTeamIds: [], playerTeamId: '' }  for dual
    //       = { trainerTeamIds: [] }                    for trainer
    const primary = data.trainerTeamIds[0]||'';
    const update = {
      trainerTeamId:  primary,
      trainerTeamIds: data.trainerTeamIds,
    };
    if (data.playerTeamId !== undefined) {
      update.teamId = data.playerTeamId;
    } else {
      update.teamId = primary; // trainer: teamId = primary trainer team
    }
    await col('users').doc(userId).update(update);
    show('Teams aktualisiert ✅');
    setEditTeams(null);
  };

  // Save role change
  const saveRole = async () => {
    if(!selRole || !editRole) return;
    setLoading(true);
    await col('users').doc(editRole.id).update({role: selRole, status:'active'});
    show('Rolle geändert ✅');
    setEditRole(null); setSelRole(''); setLoading(false);
  };

  const doDeleteTrainer = async () => {
    if(!delTrainer) return;
    setLoading(true);
    try {
      await col('users').doc(delTrainer.id).delete();
      show(`${delTrainer.name} entfernt`);
      setDelTrainer(null);
    } catch(e){ show(e.message,'error'); }
    setLoading(false);
  };

  const teamMap = Object.fromEntries(teams.map(t=>[t.id,t.name]));

  // All users sorted by team then name
  const allSorted = [...allUsers].sort((a,b)=>{
    const ta = teamMap[a.teamId||a.trainerTeamId||'']||'';
    const tb = teamMap[b.teamId||b.trainerTeamId||'']||'';
    return ta.localeCompare(tb)||(a.name||'').localeCompare(b.name||'');
  });
  const [expandedUsers, setExpandedUsers] = useState({});

  return (
    <div className="p-4">

      {/* Edit teams modal */}
      {editTeams && (
        <TrainerTeamsModal
          user={editTeams} teams={teams}
          onSave={data=>saveTeams(editTeams.id,data)}
          onClose={()=>setEditTeams(null)}
        />
      )}

      {/* Edit role modal */}
      {editRole && (
        <Modal title={`Rolle ändern: ${editRole.name}`} onClose={()=>{setEditRole(null);setSelRole('');}}>
          <p className="text-xs text-gray-500 mb-3">Aktuelle Rolle: <strong>{ROLES_ALL.find(r=>r.v===editRole.role)?.l || editRole.role}</strong></p>
          <div className="space-y-2 mb-4">
            {ROLES_ALL.map(r=>(
              <button key={r.v} onClick={()=>setSelRole(r.v)}
                className={`w-full text-left px-4 py-2.5 rounded-xl border-2 text-sm font-medium transition-all ${selRole===r.v?'border-red-500 bg-red-50 text-red-700':'border-gray-200 hover:border-gray-300'}`}>
                {r.l}
              </button>
            ))}
          </div>
          <div className="flex gap-2">
            <button className="flex-1 py-2 rounded-lg border text-sm" onClick={()=>{setEditRole(null);setSelRole('');}}>Abbrechen</button>
            <button onClick={saveRole} disabled={!selRole||loading}
              className="flex-1 py-2 rounded-lg bg-red-600 text-white text-sm font-semibold disabled:opacity-40">
              {loading?'…':'Speichern'}
            </button>
          </div>
        </Modal>
      )}

      {/* Add trainer modal */}
      {open && (
        <Modal title="Trainer anlegen" onClose={()=>setOpen(false)}>
          <p className="text-xs text-gray-500 bg-blue-50 border border-blue-100 rounded-lg px-3 py-2 mb-3">
            ℹ️ Name eintragen — der Trainer registriert sich selbst und sucht dann seinen Namen.
          </p>
          <form onSubmit={add}>
            <div className="flex gap-2">
              <Inp label="Vorname" value={form.vorname} onChange={e=>setForm({...form,vorname:e.target.value})} placeholder="Max" required/>
              <Inp label="Nachname" value={form.nachname} onChange={e=>setForm({...form,nachname:e.target.value})} placeholder="Mustermann" required/>
            </div>
            <Sel label="Team" value={form.teamId} onChange={e=>setForm({...form,teamId:e.target.value})} required>
              <option value="">Team wählen…</option>
              {teams.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}
            </Sel>
            <div className="flex gap-2 mt-1">
              <Btn type="button" variant="secondary" className="flex-1" onClick={()=>setOpen(false)}>Abbrechen</Btn>
              <Btn type="submit" variant="primary" className="flex-1" disabled={loading||!form.vorname.trim()||!form.nachname.trim()||!form.teamId}>{loading?'…':'Anlegen'}</Btn>
            </div>
          </form>
        </Modal>
      )}

      {/* Delete trainer modal */}
      {delTrainer && (
        <Modal title="Trainer entfernen?" onClose={()=>setDelTrainer(null)}>
          <p className="text-sm text-gray-600 mb-4"><strong>{delTrainer.name}</strong> dauerhaft aus dem System entfernen?</p>
          <div className="flex gap-2">
            <button className="flex-1 py-2 rounded-lg border text-sm" onClick={()=>setDelTrainer(null)}>Abbrechen</button>
            <button onClick={doDeleteTrainer} disabled={loading}
              className="flex-1 py-2 rounded-lg bg-red-600 text-white text-sm font-semibold disabled:opacity-40">
              {loading?'…':'Entfernen'}
            </button>
          </div>
        </Modal>
      )}

      {/* Trainer list */}
      <div className="flex items-center justify-between mb-4">
        <h1 className="text-lg font-bold text-white">Trainer & Rollen</h1>
        <Btn size="sm" variant="primary" onClick={()=>setOpen(true)}>+ Trainer</Btn>
      </div>

      {/* Trainer section — nach Team gruppiert, kollabiert */}
      <div className="mb-2 text-xs font-semibold text-gray-400 uppercase tracking-wider">Trainer / Vorstand</div>
      {trainers.length===0 ? (
        <div className="text-center text-gray-400 py-8 mb-4"><p className="text-sm">Noch keine Trainer.</p></div>
      ) : (
        <div className="mb-6">
          {(()=>{
            const sorted = [...trainers].sort(byLastName);
            // Group by primary trainer team
            const grouped = {};
            sorted.forEach(t=>{
              const tid = (t.trainerTeamIds?.[0])||t.trainerTeamId||'__none__';
              const tname = teamMap[tid]||'Kein Team';
              if(!grouped[tname]) grouped[tname]=[];
              grouped[tname].push(t);
            });
            return Object.entries(grouped).sort(([a],[b])=>a.localeCompare(b)).map(([tname,members])=>(
              <div key={tname} className="mb-3">
                <button onClick={()=>setExpandedUsers(e=>({...e,['t_'+tname]:!e['t_'+tname]}))}
                  className="w-full flex items-center justify-between px-3 py-2 bg-red-50 hover:bg-red-50 rounded-xl mb-1 transition-colors">
                  <span className="text-xs font-semibold text-red-700">{tname} ({members.length})</span>
                  <span className="text-red-400 text-xs">{expandedUsers['t_'+tname]?'▲':'▼'}</span>
                </button>
                {expandedUsers['t_'+tname] && (
                  <div className="space-y-2">
                    {members.map(t=>{
                      const tIds = t.trainerTeamIds?.length ? t.trainerTeamIds : (t.trainerTeamId ? [t.trainerTeamId] : []);
                      return (
                        <div key={t.id} className="glass-card rounded-xl p-3">
                          <div className="flex items-start gap-3">
                            <Avatar name={t.name} color={t.color} size="sm"/>
                            <div className="min-w-0 flex-1">
                              <div className="flex items-center gap-2 flex-wrap">
                                <div className="text-sm font-semibold">{t.name}</div>
                                <span className="text-[10px] bg-red-50 text-red-600 px-1.5 py-0.5 rounded-full font-semibold">
                                  {ROLES_ALL.find(r=>r.v===t.role)?.l||t.role}
                                </span>
                              </div>
                              <div className="text-xs text-gray-400 mb-1.5">{t.email}</div>
                              {tIds.length>0 ? (
                                <div className="flex flex-wrap gap-1">
                                  {tIds.map(id=>(
                                    <span key={id} className="text-[11px] bg-blue-50 text-blue-700 px-2 py-0.5 rounded-full border border-blue-100">
                                      {teamMap[id]||id}
                                    </span>
                                  ))}
                                </div>
                              ) : <span className="text-[11px] text-amber-500">Kein Team zugewiesen</span>}
                            </div>
                            <div className="flex flex-col gap-1 flex-shrink-0">
                              <button onClick={()=>setEditTeams(t)} className="text-xs px-2 py-1 rounded-lg border border-blue-200 text-blue-600 hover:bg-blue-50 transition-colors whitespace-nowrap">🏟️ Teams</button>
                              <button onClick={()=>{setEditRole(t);setSelRole(t.role);}} className="text-xs px-2 py-1 rounded-lg border border-gray-200 text-gray-600 hover:bg-gray-50 transition-colors whitespace-nowrap">🔄 Rolle</button>
                              <button onClick={()=>setDelTrainer({id:t.id,name:t.name})} className="text-xs px-2 py-1 rounded-lg border border-red-200 text-red-500 hover:bg-red-50 transition-colors whitespace-nowrap">🗑 Löschen</button>
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            ));
          })()}
        </div>
      )}

      {/* All users — role change, sorted by team, collapsed */}
      <div className="mb-2 text-xs font-semibold text-gray-400 uppercase tracking-wider">Alle Nutzer — Rolle ändern</div>
      {(()=>{
        const players = allSorted.filter(u=>!['trainer','dual','vorstand','vorstand_trainer'].includes(u.role));
        // Group by team
        const grouped = {};
        players.forEach(u=>{
          const tid = u.teamId||u.trainerTeamId||'__none__';
          const tname = teamMap[tid]||'Kein Team';
          if(!grouped[tname]) grouped[tname]=[];
          grouped[tname].push(u);
        });
        return Object.entries(grouped).sort(([a],[b])=>a.localeCompare(b)).map(([tname,users])=>(
          <div key={tname} className="mb-3">
            <button onClick={()=>setExpandedUsers(e=>({...e,[tname]:!e[tname]}))}
              className="w-full flex items-center justify-between px-3 py-2 bg-gray-100 hover:bg-gray-200 rounded-xl mb-1 transition-colors">
              <span className="text-xs font-semibold text-gray-600">{tname} ({users.length})</span>
              <span className="text-gray-400 text-xs">{expandedUsers[tname]?'▲':'▼'}</span>
            </button>
            {expandedUsers[tname] && (
              <div className="space-y-1.5">
                {[...users].sort(byLastName).map(u=>(
                  <div key={u.id} className="glass-card rounded-xl px-3 py-2 flex items-center gap-3">
                    <Avatar name={u.name} color={u.color} size="sm" photo={u.photoUrl}/>
                    <div className="min-w-0 flex-1">
                      <div className="text-sm font-medium truncate">{u.name}</div>
                      <div className="text-xs text-gray-400">{ROLES_ALL.find(r=>r.v===u.role)?.l||u.role}</div>
                    </div>
                    <button onClick={()=>{setEditRole(u);setSelRole(u.role);}}
                      className="text-xs px-2 py-1 rounded-lg border border-gray-200 text-gray-600 hover:bg-gray-50 transition-colors flex-shrink-0">
                      🔄 Rolle
                    </button>
                  </div>
                ))}
              </div>
            )}
          </div>
        ));
      })()}
    </div>
  );
}

function TrainerTeamsModal({user, teams, onSave, onClose}) {
  const isDual = user.role === 'dual';
  const existingTrainer = user.trainerTeamIds?.length ? user.trainerTeamIds : (user.trainerTeamId ? [user.trainerTeamId] : []);
  const existingPlayer  = user.teamId || '';

  const [trainerIds,  setTrainerIds]  = useState(existingTrainer);
  const [playerTeamId, setPlayerTeamId] = useState(existingPlayer);

  const toggleTrainer = (id) => setTrainerIds(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);

  const handleSave = () => {
    if (isDual) {
      onSave({ trainerTeamIds: trainerIds, playerTeamId });
    } else {
      onSave({ trainerTeamIds: trainerIds });
    }
  };

  return (
    <Modal title={`Teams für ${user.name}`} onClose={onClose}>

      {/* Trainer teams section */}
      <div className="mb-4">
        <div className="flex items-center gap-2 mb-2">
          <span className="text-sm font-semibold">📋 Als Trainer</span>
          <span className="text-[10px] text-gray-400">Mehrfachauswahl möglich</span>
        </div>
        <div className="space-y-1.5 max-h-48 overflow-y-auto">
          {teams.map(t=>{
            const sel = trainerIds.includes(t.id);
            const idx = trainerIds.indexOf(t.id);
            return (
              <button key={t.id} onClick={()=>toggleTrainer(t.id)}
                className={`w-full flex items-center gap-3 px-3 py-2 rounded-xl border-2 text-sm font-medium transition-all text-left ${sel?'border-blue-500 bg-blue-50':'border-gray-200 hover:border-gray-300'}`}>
                <span className={`w-5 h-5 rounded flex items-center justify-center text-xs font-bold flex-shrink-0 ${sel?'bg-blue-500 text-white':'bg-gray-100 text-gray-400'}`}>
                  {sel ? (idx===0?'★':idx+1) : ''}
                </span>
                <span className="flex-1">{t.name}</span>
                {sel && idx===0 && <span className="text-[10px] bg-blue-100 text-blue-600 px-1.5 py-0.5 rounded-full">Primär</span>}
              </button>
            );
          })}
        </div>
      </div>

      {/* Player team section — only for dual */}
      {isDual && (
        <div className="mb-4 border-t pt-4">
          <div className="flex items-center gap-2 mb-2">
            <span className="text-sm font-semibold">⚽ Als Spieler</span>
            <span className="text-[10px] text-gray-400">Ein Team wählen</span>
          </div>
          <div className="space-y-1.5 max-h-48 overflow-y-auto">
            {teams.map(t=>(
              <button key={t.id} onClick={()=>setPlayerTeamId(t.id)}
                className={`w-full flex items-center gap-3 px-3 py-2 rounded-xl border-2 text-sm font-medium transition-all text-left ${playerTeamId===t.id?'border-green-500 bg-green-50':'border-gray-200 hover:border-gray-300'}`}>
                <span className={`w-5 h-5 rounded-full flex items-center justify-center text-xs flex-shrink-0 ${playerTeamId===t.id?'bg-green-500 text-white':'bg-gray-100'}`}>
                  {playerTeamId===t.id?'✓':''}
                </span>
                <span>{t.name}</span>
              </button>
            ))}
          </div>
        </div>
      )}

      <div className="flex gap-2">
        <button className="flex-1 py-2 rounded-lg border text-sm" onClick={onClose}>Abbrechen</button>
        <button onClick={handleSave}
          className="flex-1 py-2 rounded-lg bg-blue-600 text-white text-sm font-semibold">
          Speichern
        </button>
      </div>
    </Modal>
  );
}

// ═══════════════════════════════════════════════════════════════════
//  ADMIN — PINNWAND
// ═══════════════════════════════════════════════════════════════════
function AdminPinnwand({profile, show}) {
  const [posts,     setPosts]     = useState([]);
  const [open,      setOpen]      = useState(false);
  const [form,      setForm]      = useState({title:'',content:'',category:'Allgemein'});
  const [allUsers,  setAllUsers]  = useState([]);
  const [rMode,     setRMode]     = useState('all');   // 'all' | 'select'
  const [selR,      setSelR]      = useState([]);      // selected recipient IDs
  const [expanded,  setExpanded]  = useState({});      // postId → true
  const CATS = ['Allgemein','Ankündigung','Wichtig','Veranstaltung'];
  const CAT_COLORS = {'Allgemein':'bg-gray-100 text-gray-600','Ankündigung':'bg-blue-100 text-blue-700','Wichtig':'bg-red-100 text-red-600','Veranstaltung':'bg-red-100 text-red-700'};

  useEffect(()=>{
    // No orderBy → client-side sort (avoid composite index)
    return col('news').onSnapshot(s=>setPosts(
      s.docs.map(d=>({id:d.id,...d.data()}))
        .sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0))
    ));
  },[]);

  useEffect(()=>{
    col('users').get().then(s=>setAllUsers(s.docs.map(d=>({id:d.id,...d.data()}))));
  },[]);

  const toggleUser = (uid) => setSelR(prev=>prev.includes(uid)?prev.filter(x=>x!==uid):[...prev,uid]);

  const ROLE_BTNS = [
    {v:'all',      l:'👥 Alle'},
    {v:'spieler',  l:'⚽ Spieler'},
    {v:'trainer',  l:'🏅 Trainer'},
    {v:'vorstand', l:'🏛 Vorstand'},
    {v:'select',   l:'✏️ Einzeln'},
  ];
  const ROLE_LABELS = {all:'Alle',spieler:'Spieler',trainer:'Trainer',vorstand:'Vorstand'};
  const getModeIds = (mode) => {
    if(mode==='all')      return [];
    if(mode==='spieler')  return allUsers.filter(u=>u.role==='player'||u.role==='dual').map(u=>u.id);
    if(mode==='trainer')  return allUsers.filter(u=>['trainer','dual','vorstand_trainer'].includes(u.role)).map(u=>u.id);
    if(mode==='vorstand') return allUsers.filter(u=>['vorstand','vorstand_trainer'].includes(u.role)).map(u=>u.id);
    return selR;
  };

  const add = async (e) => {
    e.preventDefault();
    const recipientIds = getModeIds(rMode);
    const recipientLabel = rMode==='select' ? `${selR.length} Empfänger` : ROLE_LABELS[rMode]||'Alle';
    await col('news').add({...form, recipientIds, recipientLabel, readBy:{}, authorId:profile.id, authorName:profile.name, createdAt:ts()});
    show('News veröffentlicht ✅');
    // Bell liest col('news') direkt — kein separater Notification-Write nötig
    setForm({title:'',content:'',category:'Allgemein'});
    setSelR([]); setRMode('all'); setOpen(false);
  };

  const del = async (id) => { if(!confirm('News löschen?')) return; await col('news').doc(id).delete(); show('Gelöscht'); };

  const getRecipients = (post) => {
    if(!post.recipientIds?.length) return allUsers;
    return allUsers.filter(u=>post.recipientIds.includes(u.id));
  };

  return (
    <div className="p-4">
      <div className="flex items-center justify-between mb-4">
        <h1 className="text-lg font-bold text-white">Vereins-Pinnwand</h1>
        <Btn size="sm" variant="primary" onClick={()=>setOpen(true)}>+ News</Btn>
      </div>
      {open && (
        <Modal title="News erstellen" onClose={()=>setOpen(false)}>
          <form onSubmit={add}>
            <Sel label="Kategorie" value={form.category} onChange={e=>setForm({...form,category:e.target.value})}>{CATS.map(c=><option key={c}>{c}</option>)}</Sel>
            <Inp label="Titel" value={form.title} onChange={e=>setForm({...form,title:e.target.value})} required/>
            <Txt label="Inhalt" value={form.content} onChange={e=>setForm({...form,content:e.target.value})} rows={4} required/>
            {/* Empfänger */}
            <div className="mb-3">
              <div className="text-xs font-medium text-gray-700 mb-1.5">Empfänger</div>
              <div className="flex flex-wrap gap-1.5 mb-2">
                {ROLE_BTNS.map(({v,l})=>(
                  <button key={v} type="button" onClick={()=>setRMode(v)}
                    className={`px-2.5 py-1.5 rounded-lg text-xs font-semibold border transition-colors ${rMode===v?'bg-red-600 text-white border-red-600':'border-gray-200 text-gray-600 hover:bg-gray-50'}`}>
                    {v==='select'&&selR.length>0 ? `✏️ Einzeln (${selR.length})` : l}
                  </button>
                ))}
              </div>
              {rMode==='select' && (
                <div className="max-h-40 overflow-y-auto border border-gray-200 rounded-xl divide-y divide-gray-100">
                  {allUsers.sort((a,b)=>(a.name||'').localeCompare(b.name||'')).map(u=>(
                    <label key={u.id} className="flex items-center gap-2.5 px-3 py-2 cursor-pointer hover:bg-gray-50">
                      <input type="checkbox" checked={selR.includes(u.id)} onChange={()=>toggleUser(u.id)} className="accent-red-600"/>
                      <Avatar name={u.name} color={u.color} size="xs" photo={u.photoUrl}/>
                      <span className="text-xs flex-1">{u.name}</span>
                      <span className="text-[10px] text-gray-400">{u.role}</span>
                    </label>
                  ))}
                </div>
              )}
            </div>
            <div className="flex gap-2">
              <Btn type="button" variant="secondary" className="flex-1" onClick={()=>setOpen(false)}>Abbrechen</Btn>
              <Btn type="submit" variant="primary" className="flex-1" disabled={rMode==='select'&&selR.length===0}>Veröffentlichen</Btn>
            </div>
          </form>
        </Modal>
      )}
      {posts.length===0 ? (
        <div className="text-center text-gray-400 py-16"><div className="text-4xl mb-2">📌</div><p className="text-sm">Noch keine News veröffentlicht.</p></div>
      ) : (
        <div className="space-y-3">
          {posts.map(p=>{
            const recipients = getRecipients(p);
            const readBy = p.readBy||{};
            const readList  = recipients.filter(u=>readBy[u.id]);
            const unreadList = recipients.filter(u=>!readBy[u.id]);
            const isExp = expanded[p.id];
            return (
              <div key={p.id} className="glass-card rounded-2xl p-4">
                <div className="flex items-center justify-between mb-2">
                  <div className="flex items-center gap-2 flex-wrap">
                    <span className={`text-[11px] font-semibold px-2 py-0.5 rounded-full ${CAT_COLORS[p.category]||CAT_COLORS['Allgemein']}`}>{p.category}</span>
                    {(p.recipientIds?.length>0||p.recipientLabel) && (
                      <span className="text-[10px] bg-red-50 text-red-600 px-1.5 py-0.5 rounded-full border border-red-100">
                        👥 {p.recipientLabel||(p.recipientIds?.length+' Empfänger')}
                      </span>
                    )}
                  </div>
                  <div className="flex items-center gap-2 flex-shrink-0">
                    <span className="text-xs text-gray-400">{fmtAgo(p.createdAt)}</span>
                    <button onClick={()=>del(p.id)} title="Eintrag löschen"
                      className="w-7 h-7 flex items-center justify-center rounded-full text-gray-400 hover:text-red-600 hover:bg-red-50 transition-colors text-sm">
                      🗑
                    </button>
                  </div>
                </div>
                <h3 className="text-sm font-semibold">{p.title}</h3>
                <p className="text-sm text-gray-600 mt-1 leading-relaxed">{p.content}</p>
                <div className="text-xs text-gray-400 mt-2">— {p.authorName}</div>
                {/* Lesestatus */}
                <button onClick={()=>setExpanded(e=>({...e,[p.id]:!e[p.id]}))}
                  className="w-full flex items-center gap-2 mt-2.5 pt-2.5 border-t border-gray-100 text-xs text-gray-500 hover:text-gray-700 transition-colors">
                  <span className="text-green-600 font-medium">✓ {readList.length} gelesen</span>
                  <span className="text-gray-300">·</span>
                  <span className="text-amber-500 font-medium">⏳ {unreadList.length} ausstehend</span>
                  <span className="ml-auto text-gray-400">{isExp?'▲':'▼'}</span>
                </button>
                {isExp && (
                  <div className="mt-2 space-y-1.5 max-h-52 overflow-y-auto">
                    {unreadList.map(u=>(
                      <div key={u.id} className="flex items-center gap-2">
                        <Avatar name={u.name} color={u.color} size="xs" photo={u.photoUrl}/>
                        <span className="text-xs text-gray-600 flex-1 truncate">{u.name}</span>
                        <span className="text-[10px] text-amber-500 flex-shrink-0">⏳ ausstehend</span>
                      </div>
                    ))}
                    {readList.map(u=>(
                      <div key={u.id} className="flex items-center gap-2">
                        <Avatar name={u.name} color={u.color} size="xs" photo={u.photoUrl}/>
                        <span className="text-xs text-gray-400 flex-1 truncate">{u.name}</span>
                        <span className="text-[10px] text-green-500 flex-shrink-0">✓ gelesen</span>
                      </div>
                    ))}
                  </div>
                )}
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function AdminOverview() {
  const [stats, setStats] = useState({trainers:0,players:0,teams:0,sponsoren:0,sponsorenWarn:0});
  useEffect(()=>{(async()=>{
    const [users,teams,spons]=await Promise.all([getDocs_(col('users')),getDocs_(col('teams')),getDocs_(col('sponsoren'))]);
    const now = new Date();
    const warn = spons.filter(s=>{ if(!s.vertragsEnde) return false; const d=Math.ceil((new Date(s.vertragsEnde)-now)/86400000); return d>=0&&d<=30; }).length;
    setStats({trainers:users.filter(u=>u.role==='trainer'||u.role==='dual'||u.role==='vorstand_trainer').length,players:users.filter(u=>u.role==='player'||u.role==='dual').length,teams:teams.length,sponsoren:spons.length,sponsorenWarn:warn});
  })();},[]);

  return (
    <div className="p-4">
      <h1 className="text-lg font-bold text-white mb-4">Vereinsübersicht</h1>
      <div className="grid grid-cols-2 gap-3 mb-4">
        {[
          {l:'Teams',     v:stats.teams,     i:'🏟️'},
          {l:'Trainer',   v:stats.trainers,  i:'👨‍💼'},
          {l:'Spieler',   v:stats.players,   i:'👤'},
          {l:'Sponsoren', v:stats.sponsoren, i:'🤝', warn:stats.sponsorenWarn>0, warnText:`${stats.sponsorenWarn} laufen ab`},
        ].map(s=>(
          <div key={s.l} className="glass-card rounded-2xl p-5">
            <div className="text-2xl mb-1">{s.i}</div>
            <div className="text-3xl font-bold text-red-600">{s.v}</div>
            <div className="text-sm text-gray-500 mt-0.5">{s.l}</div>
            {s.warn && <div className="text-[10px] text-amber-600 font-semibold mt-1">⚠️ {s.warnText}</div>}
          </div>
        ))}
      </div>
      <div className="bg-red-50 border border-red-200 rounded-xl p-4 text-sm text-red-700">
        <div className="font-semibold mb-1">🚀 Erste Schritte</div>
        <ol className="list-decimal list-inside space-y-1 text-xs">
          <li>Teams anlegen (z.B. "Herren 1", "Jugend U17")</li>
          <li>Trainer-Accounts erstellen und Teams zuweisen</li>
          <li>Trainer können dann ihre Spieler anlegen</li>
          <li>Spieler melden sich selbst an oder werden eingeladen</li>
        </ol>
      </div>
    </div>
  );
}

const FILE_ICONS = {
  'application/pdf':'📄', 'image/':'🖼️',
  'application/vnd.openxmlformats-officedocument.wordprocessingml':'📝',
  'application/vnd.openxmlformats-officedocument.spreadsheetml':'📊',
  'application/vnd.openxmlformats-officedocument.presentationml':'📊',
  'default':'📎'
};
const fileIcon = (type='') => {
  for(const [k,v] of Object.entries(FILE_ICONS)) if(type.startsWith(k)) return v;
  return FILE_ICONS.default;
};
const fmtSize = (b) => b>1048576 ? (b/1048576).toFixed(1)+' MB' : (b/1024).toFixed(0)+' KB';

  const [editing,     setEditing]     = useState(null);
  const [form,        setForm]        = useState(EMPTY);
  const [detail,      setDetail]      = useState(null);
  const [imgViewer,   setImgViewer]   = useState(null);
  const [uploading,   setUploading]   = useState(false);
  const [imgErr,      setImgErr]      = useState('');
  const imgRef = useRef();

  useEffect(()=>{
    return col('uebungen').orderBy('createdAt','desc')
      .onSnapshot(s=>setUebungen(s.docs.map(d=>({id:d.id,...d.data()}))));
  },[]);

  const openNew  = () => { setEditing(null); setForm(EMPTY); setImgErr(''); setOpen(true); };
  const openEdit = (u) => { setEditing(u.id); setForm({title:u.title||'',category:u.category||'Technik',ageRange:u.ageRange||'Alle',description:u.description||'',execution:u.execution||'',duration:u.duration||'',minPlayers:u.minPlayers||'',materials:u.materials||'',imageData:u.imageData||''}); setImgErr(''); setOpen(true); };

  const pickImage = async (e) => {
    const file = e.target.files?.[0]; if(!file) return;
    if(!file.type.startsWith('image/')) { setImgErr('Nur Bilder erlaubt.'); return; }
    if(file.size > 700*1024) { setImgErr(`Bild zu groß (${Math.round(file.size/1024)} KB). Max 700 KB.`); return; }
    setUploading(true); setImgErr('');
    const data = await new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(file); });
    setForm(f=>({...f,imageData:data}));
    setUploading(false);
    e.target.value='';
  };

  const save = async (e) => {
    e.preventDefault();
    const doc = {...form, uploadedBy:profile.name, uploadedByRole:profile.role, updatedAt:ts()};
    if(editing) {
      await col('uebungen').doc(editing).update(doc);
      show('Übung aktualisiert ✅');
    } else {
      await col('uebungen').add({...doc, createdAt:ts()});
      show('Übung gespeichert ✅');
    }
    setOpen(false); setEditing(null);
  };

  const del = async (u) => {
    if(!confirm(`"${u.title}" wirklich löschen?`)) return;
    await col('uebungen').doc(u.id).delete();
    show('Gelöscht');
  };

  const canEdit = (u) => profile.role==='vorstand'||profile.role==='vorstand_trainer'||u.uploadedBy===profile.name;

  const filtered = uebungen.filter(u=>{
    if(filterCat!=='Alle' && u.category!==filterCat) return false;
    if(filterAge!=='Alle' && u.ageRange!==filterAge && u.ageRange!=='Alle') return false;
    if(search && !(u.title||'').toLowerCase().includes(search.toLowerCase()) && !(u.description||'').toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });

  const CAT_COLOR = {Aufwärmen:'bg-orange-100 text-orange-700',Technik:'bg-blue-100 text-blue-700',Taktik:'bg-red-50 text-red-700',Kondition:'bg-green-100 text-green-700',Spielform:'bg-red-100 text-red-700',Abschluss:'bg-pink-100 text-pink-700',Sonstiges:'bg-gray-100 text-gray-600'};

  return (
    <div className="p-4">
      <div className="flex items-center justify-between mb-4">
        <div><h1 className="text-lg font-bold text-white">Übungsdatenbank</h1><p className="text-xs text-gray-400">{uebungen.length} Übungen gesamt</p></div>
        <Btn size="sm" onClick={openNew}>+ Übung</Btn>
      </div>

      {/* Suche + Filter */}
      <div className="space-y-2 mb-4">
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Suche…"
          className="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-500"/>
        <div className="flex gap-2 overflow-x-auto pb-1">
          {['Alle',...CATS].map(c=>(
            <button key={c} onClick={()=>setFilterCat(c)}
              className={`px-3 py-1.5 rounded-full text-xs font-semibold whitespace-nowrap transition-all ${filterCat===c?'bg-red-600 text-white':'bg-gray-100 text-gray-500 hover:bg-gray-200'}`}>{c}</button>
          ))}
        </div>
        <div className="flex gap-2 overflow-x-auto pb-1">
          {AGES.map(a=>(
            <button key={a} onClick={()=>setFilterAge(a)}
              className={`px-3 py-1.5 rounded-full text-xs font-semibold whitespace-nowrap transition-all ${filterAge===a?'bg-gray-700 text-white':'bg-gray-100 text-gray-500 hover:bg-gray-200'}`}>{a}</button>
          ))}
        </div>
      </div>

      {/* Detail-Modal */}
      {detail && (
        <div className="fixed inset-0 bg-black/60 z-50 flex items-end md:items-center justify-center p-0 md:p-4" onClick={()=>setDetail(null)}>
          <div className="bg-white light-sheet w-full md:max-w-lg md:rounded-2xl rounded-t-2xl max-h-[90vh] flex flex-col shadow-2xl" onClick={e=>e.stopPropagation()}>
            <div className="flex items-center justify-between px-5 py-4 border-b border-gray-100">
              <div>
                <div className="font-bold text-base">{detail.title}</div>
                <div className="flex gap-2 mt-1">
                  <span className={`text-[10px] px-2 py-0.5 rounded-full font-semibold ${CAT_COLOR[detail.category]||'bg-gray-100 text-gray-600'}`}>{detail.category}</span>
                  <span className="text-[10px] px-2 py-0.5 rounded-full font-semibold bg-gray-100 text-gray-600">{detail.ageRange}</span>
                </div>
              </div>
              <div className="flex gap-2">
                {canEdit(detail) && <button onClick={()=>{setDetail(null);openEdit(detail);}} className="text-xs text-gray-500 hover:text-red-600 px-2 py-1.5 border border-gray-200 rounded-lg">✏️</button>}
                <button onClick={()=>setDetail(null)} className="w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 text-gray-500">✕</button>
              </div>
            </div>
            <div className="overflow-y-auto flex-1 p-5 space-y-4">
              {detail.imageData && (
                <div className="relative cursor-zoom-in group" onClick={()=>setImgViewer(detail.imageData)}>
                  <img src={detail.imageData} alt={detail.title} className="w-full rounded-xl object-cover max-h-52"/>
                  <div className="absolute inset-0 bg-black/0 group-hover:bg-black/20 rounded-xl transition-all flex items-center justify-center">
                    <span className="opacity-0 group-hover:opacity-100 bg-black/60 text-white text-xs px-3 py-1.5 rounded-full transition-all">🔍 Vergrößern</span>
                  </div>
                </div>
              )}
              <div className="grid grid-cols-3 gap-2">
                <div className="bg-blue-50 rounded-xl p-3 text-center"><div className="text-lg font-bold text-blue-700">{detail.duration||'—'}'</div><div className="text-[10px] text-blue-500">Dauer</div></div>
                <div className="bg-green-50 rounded-xl p-3 text-center"><div className="text-lg font-bold text-green-700">{detail.minPlayers||'—'}</div><div className="text-[10px] text-green-500">Min. Spieler</div></div>
                <div className="bg-orange-50 rounded-xl p-3 text-center"><div className="text-[11px] font-bold text-orange-700 leading-tight">{detail.materials||'—'}</div><div className="text-[10px] text-orange-500">Material</div></div>
              </div>
              {detail.description && <div><div className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Beschreibung</div><p className="text-sm text-gray-700 leading-relaxed bg-gray-50 rounded-xl p-3">{detail.description}</p></div>}
              {detail.execution  && <div><div className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Durchführung</div><p className="text-sm text-gray-700 leading-relaxed bg-gray-50 rounded-xl p-3 whitespace-pre-line">{detail.execution}</p></div>}
              <div className="text-[11px] text-gray-400">Erstellt von {detail.uploadedBy||'—'}</div>
            </div>
          </div>
        </div>
      )}

      {/* Bild-Vollansicht */}
      {imgViewer && (
        <div className="fixed inset-0 bg-black z-[70] flex flex-col" onClick={()=>setImgViewer(null)}>
          <div className="flex items-center justify-between px-4 py-3 bg-black/60 flex-shrink-0">
            <span className="text-white text-sm">Bild vergrößert</span>
            <button onClick={()=>setImgViewer(null)} className="w-8 h-8 flex items-center justify-center rounded-full bg-white/10 text-white">✕</button>
          </div>
          <div className="flex-1 overflow-auto flex items-center justify-center p-4" onClick={e=>e.stopPropagation()}>
            <img src={imgViewer} alt="Vollansicht" className="max-w-full max-h-full object-contain rounded-xl"/>
          </div>
        </div>
      )}

      {/* Formular-Modal */}
      {open && (
        <Modal title={editing?'Übung bearbeiten':'Neue Übung'} onClose={()=>{setOpen(false);setEditing(null);}}>
          <form onSubmit={save} className="space-y-0">
            <Inp label="Titel *" value={form.title} onChange={e=>setForm({...form,title:e.target.value})} placeholder="z.B. Passdreiecke 3 gegen 1" required/>
            <div className="flex gap-2">
              <Sel label="Kategorie" value={form.category} onChange={e=>setForm({...form,category:e.target.value})}>
                {CATS.map(c=><option key={c}>{c}</option>)}
              </Sel>
              <Sel label="Altersbereich" value={form.ageRange} onChange={e=>setForm({...form,ageRange:e.target.value})}>
                {AGES.map(a=><option key={a}>{a}</option>)}
              </Sel>
            </div>
            <div className="flex gap-2">
              <Inp label="Dauer (Min)" type="number" min="1" value={form.duration} onChange={e=>setForm({...form,duration:e.target.value})} placeholder="15"/>
              <Inp label="Min. Spieler" type="number" min="1" value={form.minPlayers} onChange={e=>setForm({...form,minPlayers:e.target.value})} placeholder="6"/>
            </div>
            <Inp label="Materialien" value={form.materials} onChange={e=>setForm({...form,materials:e.target.value})} placeholder="z.B. 4 Hütchen, 1 Ball"/>
            <Txt label="Beschreibung (Was ist das für eine Übung?)" value={form.description} onChange={e=>setForm({...form,description:e.target.value})} rows={2} placeholder="Kurze Beschreibung der Übung…"/>
            <Txt label="Durchführung (Wie wird sie gemacht?)" value={form.execution} onChange={e=>setForm({...form,execution:e.target.value})} rows={3} placeholder="Schritt für Schritt…"/>
            {/* Bild */}
            <div className="mb-3">
              <label className="block text-xs font-medium text-gray-600 mb-1">Bild / Skizze (optional, max 700 KB)</label>
              {form.imageData ? (
                <div className="relative rounded-xl overflow-hidden border border-gray-200">
                  <img src={form.imageData} alt="Vorschau" className="w-full max-h-40 object-cover"/>
                  <button type="button" onClick={()=>setForm(f=>({...f,imageData:''}))}
                    className="absolute top-2 right-2 w-7 h-7 bg-black/50 text-white rounded-full text-xs flex items-center justify-center hover:bg-red-600">✕</button>
                </div>
              ) : (
                <div onClick={()=>imgRef.current?.click()}
                  className="border-2 border-dashed border-gray-200 rounded-xl p-4 text-center cursor-pointer hover:border-red-400 transition-colors">
                  <div className="text-2xl text-gray-300 mb-1">🖼️</div>
                  <div className="text-xs text-gray-400">{uploading?'⏳ Lädt…':'Klicken zum Hochladen'}</div>
                </div>
              )}
              <input ref={imgRef} type="file" accept="image/*" className="hidden" onChange={pickImage}/>
              {imgErr && <div className="text-xs text-red-600 mt-1">{imgErr}</div>}
            </div>
            <div className="flex gap-2 pt-1">
              <Btn type="button" variant="secondary" className="flex-1" onClick={()=>{setOpen(false);setEditing(null);}}>Abbrechen</Btn>
              <Btn type="submit" className="flex-1">{editing?'Aktualisieren':'Speichern'}</Btn>
            </div>
          </form>
        </Modal>
      )}

      {/* Liste */}
      {filtered.length===0 ? (
        <div className="text-center text-gray-400 py-16"><div className="text-4xl mb-2">📚</div><p className="text-sm">{uebungen.length===0?'Noch keine Übungen eingetragen.':'Keine Übungen gefunden.'}</p></div>
      ) : (
        <div className="space-y-2">
          {filtered.map(u=>(
            <div key={u.id} className="glass-card rounded-xl overflow-hidden cursor-pointer hover:border-red-300 transition-all"
              onClick={()=>setDetail(u)}>
              <div className="flex gap-3 p-3.5">
                {u.imageData
                  ? <img src={u.imageData} alt={u.title} className="w-16 h-16 rounded-xl object-cover flex-shrink-0"/>
                  : <div className="w-16 h-16 bg-gray-100 rounded-xl flex items-center justify-center text-2xl flex-shrink-0">📋</div>}
                <div className="flex-1 min-w-0">
                  <div className="text-sm font-semibold truncate">{u.title}</div>
                  <div className="flex gap-1.5 mt-1 flex-wrap">
                    <span className={`text-[10px] px-2 py-0.5 rounded-full font-semibold ${CAT_COLOR[u.category]||'bg-gray-100 text-gray-600'}`}>{u.category}</span>
                    <span className="text-[10px] px-2 py-0.5 rounded-full font-semibold bg-gray-100 text-gray-600">{u.ageRange}</span>
                  </div>
                  <div className="flex gap-3 mt-1.5 text-[11px] text-gray-400">
                    {u.duration&&<span>⏱ {u.duration} Min</span>}
                    {u.minPlayers&&<span>👥 min. {u.minPlayers}</span>}
                    {u.materials&&<span className="truncate">🎯 {u.materials}</span>}
                  </div>
                </div>
                {canEdit(u) && (
                  <div className="flex flex-col gap-1 flex-shrink-0" onClick={e=>e.stopPropagation()}>
                    <button onClick={()=>openEdit(u)} className="w-7 h-7 bg-gray-100 hover:bg-gray-200 rounded-lg flex items-center justify-center text-xs">✏️</button>
                    <button onClick={()=>del(u)} className="w-7 h-7 bg-gray-100 hover:bg-red-100 hover:text-red-600 rounded-lg flex items-center justify-center text-xs">🗑</button>
                  </div>
                )}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function AdminDokumente({profile, show}) {
  const [docs,     setDocs]     = useState([]);
  const [open,     setOpen]     = useState(false);
  const [file,     setFile]     = useState(null);
  const [form,     setForm]     = useState({name:'', category:'Allgemein', notes:''});
  const [uploading,setUploading]= useState(false);
  const [uploadErr,setUploadErr]= useState('');
  const [viewer,   setViewer]   = useState(null);
  const [allUsers, setAllUsers] = useState([]);
  const [rMode,    setRMode]    = useState('all');
  const [selR,     setSelR]     = useState([]);
  const fileRef = useRef(null);
  const CATS = ['Allgemein','Training','Verwaltung','Satzung','Finanzen','Sonstiges'];
  const DOK_ROLE_BTNS = [
    {v:'all',      l:'👥 Alle'},
    {v:'spieler',  l:'⚽ Spieler'},
    {v:'trainer',  l:'🏅 Trainer'},
    {v:'vorstand', l:'🏛 Vorstand'},
    {v:'select',   l:'✏️ Einzeln'},
  ];
  const DOK_ROLE_LABELS = {all:'Alle',spieler:'Spieler',trainer:'Trainer',vorstand:'Vorstand'};
  const getModeIds = (mode) => {
    if(mode==='all')      return [];
    if(mode==='spieler')  return allUsers.filter(u=>u.role==='player'||u.role==='dual').map(u=>u.id);
    if(mode==='trainer')  return allUsers.filter(u=>['trainer','dual','vorstand_trainer'].includes(u.role)).map(u=>u.id);
    if(mode==='vorstand') return allUsers.filter(u=>['vorstand','vorstand_trainer'].includes(u.role)).map(u=>u.id);
    return selR;
  };
  const toggleUser = (uid) => setSelR(prev=>prev.includes(uid)?prev.filter(x=>x!==uid):[...prev,uid]);

  // Allgemeine Vereinsdokumente laden (ohne Spieler-Docs, die haben playerId gesetzt)
  useEffect(()=>{ return col('dokumente').orderBy('createdAt','desc').onSnapshot(s=>setDocs(s.docs.map(d=>({id:d.id,...d.data()})).filter(d=>!d.playerId))); },[]);
  useEffect(()=>{ col('users').get().then(s=>setAllUsers(s.docs.map(d=>({id:d.id,...d.data()})))); },[]);

  const upload = async (e) => {
    e.preventDefault();
    if (!file) { show('Bitte eine Datei wählen','error'); return; }
    if (file.size > 700*1024) { setUploadErr(`Datei zu groß (${Math.round(file.size/1024)} KB). Max. 700 KB.`); return; }
    setUploading(true); setUploadErr('');
    try {
      const fileData = await new Promise((res,rej)=>{
        const r = new FileReader();
        r.onload = ()=>res(r.result.split(',')[1]);
        r.onerror = rej;
        r.readAsDataURL(file);
      });
      const recipientIds = getModeIds(rMode);
      const recipientLabel = rMode==='select' ? `${selR.length} Empfänger` : DOK_ROLE_LABELS[rMode]||'Alle';
      await col('dokumente').add({
        name: form.name || file.name,
        category: form.category,
        notes: form.notes,
        fileData,
        fileName: file.name,
        fileType: file.type,
        fileSize: file.size,
        uploadedBy: profile.name,
        recipientIds, recipientLabel,
        createdAt: ts()
      });
      show('Dokument hochgeladen ✅');
      col('notifBroadcasts').add({type:'dokument',title:'📁 Neues Dokument',body:form.name||file.name,authorId:profile.id,readBy:{},createdAt:ts()}).catch(()=>{});
      setForm({name:'',category:'Allgemein',notes:''}); setFile(null); setSelR([]); setRMode('all'); setOpen(false);
    } catch(err) { setUploadErr(err.message); }
    setUploading(false);
  };

  const del = async (doc) => {
    if(!confirm('Dokument löschen?')) return;
    await col('dokumente').doc(doc.id).delete();
    show('Gelöscht');
  };

  const blobUrlForViewer = React.useMemo(()=>{
    if(!viewer || !viewer.fileType?.includes('pdf')) return null;
    try {
      const bytes = atob(viewer.fileData);
      const arr = new Uint8Array(bytes.length);
      for(let i=0;i<bytes.length;i++) arr[i]=bytes.charCodeAt(i);
      return URL.createObjectURL(new Blob([arr],{type:'application/pdf'}));
    } catch(e){ return null; }
  },[viewer]);

  const grouped = CATS.reduce((a,c)=>{a[c]=docs.filter(d=>d.category===c);return a;},{});

  return (
    <div className="p-4">
      <div className="flex items-center justify-between mb-4">
        <div><h1 className="text-lg font-bold text-white">Dokumente</h1><p className="text-xs text-gray-400">{docs.length} Dateien</p></div>
        <Btn size="sm" variant="primary" onClick={()=>setOpen(true)}>+ Hochladen</Btn>
      </div>
      {open && (
        <Modal title="Dokument hochladen" onClose={()=>!uploading&&setOpen(false)}>
          <form onSubmit={upload}>
            <div className="mb-3">
              <label className="block text-xs font-medium text-gray-600 mb-1">Datei *</label>
              <div onClick={()=>fileRef.current?.click()}
                className={`border-2 border-dashed rounded-xl p-6 text-center cursor-pointer transition-colors ${file?'border-red-500 bg-red-50':'border-gray-200 hover:border-gray-300'}`}>
                {file ? (
                  <div><div className="text-3xl">{fileIcon(file.type)}</div><div className="text-sm font-medium mt-1">{file.name}</div><div className="text-xs text-gray-400">{fmtSize(file.size)}</div></div>
                ) : (
                  <div><div className="text-3xl text-gray-300">📎</div><div className="text-sm text-gray-400 mt-1">Klicken zum Auswählen</div></div>
                )}
                <input ref={fileRef} type="file" className="hidden" onChange={e=>setFile(e.target.files[0]||null)}/>
              </div>
            </div>
            <Inp label="Anzeigename (optional)" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Automatisch aus Dateiname"/>
            <Sel label="Kategorie" value={form.category} onChange={e=>setForm({...form,category:e.target.value})}>{CATS.map(c=><option key={c}>{c}</option>)}</Sel>
            <Txt label="Notiz (optional)" rows={2} value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})}/>
            {/* Empfänger */}
            <div className="mb-3">
              <div className="text-xs font-medium text-gray-700 mb-1.5">Empfänger</div>
              <div className="flex flex-wrap gap-1.5 mb-2">
                {DOK_ROLE_BTNS.map(({v,l})=>(
                  <button key={v} type="button" onClick={()=>setRMode(v)}
                    className={`px-2.5 py-1.5 rounded-lg text-xs font-semibold border transition-colors ${rMode===v?'bg-red-600 text-white border-red-600':'border-gray-200 text-gray-600 hover:bg-gray-50'}`}>
                    {v==='select'&&selR.length>0 ? `✏️ Einzeln (${selR.length})` : l}
                  </button>
                ))}
              </div>
              {rMode==='select' && (
                <div className="max-h-40 overflow-y-auto border border-gray-200 rounded-xl divide-y divide-gray-100">
                  {allUsers.sort((a,b)=>(a.name||'').localeCompare(b.name||'')).map(u=>(
                    <label key={u.id} className="flex items-center gap-2.5 px-3 py-2 cursor-pointer hover:bg-gray-50">
                      <input type="checkbox" checked={selR.includes(u.id)} onChange={()=>toggleUser(u.id)} className="accent-red-600"/>
                      <Avatar name={u.name} color={u.color} size="xs" photo={u.photoUrl}/>
                      <span className="text-xs flex-1">{u.name}</span>
                      <span className="text-[10px] text-gray-400">{u.role}</span>
                    </label>
                  ))}
                </div>
              )}
            </div>
            <p className="text-[11px] text-gray-400 mb-2">Maximale Dateigröße: 700 KB</p>
            {uploadErr && <div className="mb-2 text-xs text-red-600 bg-red-50 p-2 rounded-lg">{uploadErr}</div>}
            <div className="flex gap-2">
              <Btn type="button" variant="secondary" className="flex-1" onClick={()=>setOpen(false)} disabled={uploading}>Abbrechen</Btn>
              <Btn type="submit" variant="primary" className="flex-1" disabled={uploading||!file}>{uploading?'⏳ Lädt…':'Hochladen'}</Btn>
            </div>
          </form>
        </Modal>
      )}

      {/* Inline Viewer */}
      {viewer && (
        <div className="fixed inset-0 bg-black/80 z-[60] flex flex-col" onClick={()=>setViewer(null)}>
          <div className="flex items-center justify-between px-4 py-3 bg-black/60" onClick={e=>e.stopPropagation()}>
            <div className="text-white text-sm font-medium truncate flex-1">{viewer.name||viewer.fileName}</div>
            <button onClick={()=>setViewer(null)} className="w-8 h-8 flex items-center justify-center rounded-full bg-white/10 text-white ml-2">✕</button>
          </div>
          <div className="flex-1 overflow-auto flex items-center justify-center p-4" onClick={e=>e.stopPropagation()}>
            {viewer.fileType?.startsWith('image/') ? (
              <img src={`data:${viewer.fileType};base64,${viewer.fileData}`} alt={viewer.name} className="max-w-full max-h-full rounded-xl object-contain"/>
            ) : viewer.fileType?.includes('pdf') && blobUrlForViewer ? (
              <iframe src={blobUrlForViewer} className="w-full rounded-xl" style={{minHeight:'75vh'}} title={viewer.name}/>
            ) : (
              <div className="text-center text-white">
                <div className="text-5xl mb-4">📄</div>
                <p className="text-sm mb-4">Vorschau nicht möglich.</p>
                <a href={`data:${viewer.fileType};base64,${viewer.fileData}`} download={viewer.fileName}
                  className="px-4 py-2 bg-red-600 text-white rounded-xl text-sm font-semibold hover:bg-red-700">⬇️ Herunterladen</a>
              </div>
            )}
          </div>
        </div>
      )}

      {docs.length===0 ? (
        <div className="text-center text-gray-400 py-16"><div className="text-4xl mb-2">📁</div><p className="text-sm">Noch keine Dokumente hochgeladen.</p></div>
      ) : (
        <div className="space-y-5">
          {CATS.map(cat => grouped[cat].length>0 && (
            <div key={cat}>
              <div className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">{cat}</div>
              <div className="space-y-2">
                {grouped[cat].map(doc=>(
                  <div key={doc.id} className="glass-card rounded-xl p-3.5 flex items-center gap-3 group">
                    <div className="w-10 h-10 bg-gray-100 rounded-xl flex items-center justify-center text-xl flex-shrink-0">{fileIcon(doc.fileType)}</div>
                    <div className="flex-1 min-w-0">
                      <div className="text-sm font-medium truncate">{doc.name||doc.fileName}</div>
                      <div className="text-xs text-gray-400">{doc.fileName} · {fmtSize(doc.fileSize)} · {doc.uploadedBy}</div>
                      <div className="flex items-center gap-1.5 mt-0.5 flex-wrap">
                        {doc.notes&&<span className="text-xs text-gray-500 italic">{doc.notes}</span>}
                        {doc.recipientLabel && <span className="text-[10px] bg-red-50 text-red-700 px-1.5 py-0.5 rounded-full font-medium">👥 {doc.recipientLabel}</span>}
                      </div>
                    </div>
                    <div className="flex gap-1 flex-shrink-0">
                      <button onClick={()=>setViewer(doc)} className="w-8 h-8 bg-red-50 hover:bg-red-50 rounded-lg flex items-center justify-center text-red-600 transition-colors text-sm">👁</button>
                      <button onClick={()=>del(doc)} className="w-8 h-8 bg-gray-50 hover:bg-red-50 rounded-lg flex items-center justify-center text-gray-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all text-sm">✕</button>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

//  DOKUMENTE — TRAINER ANSICHT (nur lesen/anzeigen)
// ═══════════════════════════════════════════════════════════════════
function TrainerDokumente({profile}) {
  const [docs, setDocs] = useState([]);
  const [viewer, setViewer] = useState(null);
  useEffect(()=>{ return col('dokumente').orderBy('createdAt','desc').onSnapshot(s=>{
    const all = s.docs.map(d=>({id:d.id,...d.data()})).filter(d=>!d.playerId);
    // Show doc if no recipientIds (=all) or if profile.id is in the list
    setDocs(all.filter(d=>!d.recipientIds?.length || (profile && d.recipientIds.includes(profile.id))));
  }); },[]);
  const CATS = ['Allgemein','Training','Verwaltung','Satzung','Finanzen','Sonstiges'];
  const grouped = CATS.reduce((a,c)=>{a[c]=docs.filter(d=>d.category===c);return a;},{});
  const blobUrl = React.useMemo(()=>{
    if(!viewer||!viewer.fileType?.includes('pdf')) return null;
    try { const b=atob(viewer.fileData),a=new Uint8Array(b.length); for(let i=0;i<b.length;i++)a[i]=b.charCodeAt(i); return URL.createObjectURL(new Blob([a],{type:'application/pdf'})); } catch(e){return null;}
  },[viewer]);

  return (
    <div className="p-4">
      <h1 className="text-lg font-bold text-white mb-4">📁 Dokumente</h1>

      {viewer && (
        <div className="fixed inset-0 bg-black/80 z-[60] flex flex-col" onClick={()=>setViewer(null)}>
          <div className="flex items-center justify-between px-4 py-3 bg-black/60" onClick={e=>e.stopPropagation()}>
            <div className="text-white text-sm font-medium truncate flex-1">{viewer.name||viewer.fileName}</div>
            <button onClick={()=>setViewer(null)} className="w-8 h-8 flex items-center justify-center rounded-full bg-white/10 text-white ml-2">✕</button>
          </div>
          <div className="flex-1 overflow-auto flex items-center justify-center p-4" onClick={e=>e.stopPropagation()}>
            {viewer.fileType?.startsWith('image/') ? (
              <img src={`data:${viewer.fileType};base64,${viewer.fileData}`} alt={viewer.name} className="max-w-full max-h-full rounded-xl object-contain"/>
            ) : viewer.fileType?.includes('pdf') && blobUrl ? (
              <iframe src={blobUrl} className="w-full rounded-xl" style={{minHeight:'75vh'}} title={viewer.name}/>
            ) : (
              <div className="text-center text-white">
                <div className="text-5xl mb-4">📄</div>
                <p className="text-sm mb-4">Vorschau nicht möglich.</p>
                <a href={`data:${viewer.fileType};base64,${viewer.fileData}`} download={viewer.fileName}
                  className="px-4 py-2 bg-red-600 text-white rounded-xl text-sm font-semibold">⬇️ Herunterladen</a>
              </div>
            )}
          </div>
        </div>
      )}

      {docs.length===0 ? (
        <div className="text-center text-gray-400 py-16"><div className="text-4xl mb-2">📁</div><p className="text-sm">Noch keine Dokumente vom Vorstand.</p></div>
      ) : (
        <div className="space-y-5">
          {CATS.map(cat => grouped[cat].length>0 && (
            <div key={cat}>
              <div className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">{cat} ({grouped[cat].length})</div>
              <div className="space-y-2">
                {grouped[cat].map(doc=>(
                  <button key={doc.id} onClick={()=>setViewer(doc)}
                    className="w-full flex items-center gap-3 bg-white border border-gray-200 hover:border-red-300 hover:bg-red-50 rounded-xl p-3.5 transition-all group text-left">
                    <div className="w-10 h-10 bg-gray-100 rounded-xl flex items-center justify-center text-xl flex-shrink-0">{fileIcon(doc.fileType)}</div>
                    <div className="flex-1 min-w-0">
                      <div className="text-sm font-medium truncate">{doc.name||doc.fileName}</div>
                      <div className="text-xs text-gray-400">{fmtSize(doc.fileSize)} · {fmtAgo(doc.createdAt)}</div>
                      {doc.notes&&<div className="text-xs text-gray-500 italic mt-0.5">{doc.notes}</div>}
                    </div>
                    <span className="text-gray-300 group-hover:text-red-500 transition-colors text-lg flex-shrink-0">👁</span>
                  </button>
                ))}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
//  TRAINER — CONTAINERPLANUNG
// ═══════════════════════════════════════════════════════════════════
function TrainerContainerplanung({profile, show}) {
  const CONTAINERS = [
    {id:'container1', label:'Vereinscontainer', emoji:'📦', color:'#7C3AED', bg:'#F5F3FF', border:'#DDD6FE'},
  ];
  const [bookings,  setBookings]  = useState([]);
  const [month,     setMonth]     = useState(new Date().toISOString().slice(0,7));
  const selCont = 'container1';
  const [selDate,   setSelDate]   = useState('');
  const [selFrom,   setSelFrom]   = useState('14:00');
  const [selTo,     setSelTo]     = useState('20:00');
  const [eventName, setEventName] = useState('');
  const [saving,    setSaving]    = useState(false);
  const [delId,     setDelId]     = useState(null);

  useEffect(()=>{
    const [y,m] = month.split('-');
    const start = `${y}-${m}-01`;
    const end   = `${y}-${String(Number(m)%12+1).padStart(2,'0')}-01`;
    return col('containerplanung')
      .where('date','>=',start).where('date','<',end)
      .onSnapshot(s=>setBookings(s.docs.map(d=>({id:d.id,...d.data()}))
        .sort((a,b)=>a.date.localeCompare(b.date)||(a.timeFrom||'').localeCompare(b.timeFrom||''))));
  },[month]);

  const hasTimeConflict = (contId, date, from, to) => {
    const same = bookings.filter(b=>b.containerId===contId && b.date===date);
    if(!same.length) return null;
    const toMin = t => { const [h,m]=(t||'00:00').split(':'); return Number(h)*60+Number(m); };
    const newFrom=toMin(from), newTo=toMin(to);
    return same.find(b=>{ const bFrom=toMin(b.timeFrom), bTo=toMin(b.timeTo); return newFrom<bTo && newTo>bFrom; });
  };

  const durationLabel = (from, to) => {
    if(!from||!to) return '';
    const [fh,fm]=from.split(':').map(Number), [th,tm]=to.split(':').map(Number);
    const mins=(th*60+tm)-(fh*60+fm); if(mins<=0) return '';
    const h=Math.floor(mins/60), m=mins%60;
    return h>0 ? `${h}h${m>0?` ${m}min`:''}` : `${m}min`;
  };

  const save = async () => {
    if(!selDate||!eventName.trim()||!selFrom||!selTo) return;
    if(selFrom>=selTo){ show('Endzeit muss nach Startzeit liegen','error'); return; }
    const conflict = hasTimeConflict(selCont, selDate, selFrom, selTo);
    if(conflict){ show(`Zeitkonflikt mit ${conflict.trainerName} (${conflict.timeFrom}–${conflict.timeTo})!`,'error'); return; }
    setSaving(true);
    try {
      await col('containerplanung').add({
        containerId: selCont, date: selDate, eventName: eventName.trim(),
        timeFrom: selFrom, timeTo: selTo,
        teamId: profile.teamId, trainerName: profile.name, createdAt: ts()
      });
      show('Container gebucht ✅'); setEventName(''); setSelDate('');
    } catch(err) { show(err.message,'error'); }
    setSaving(false);
  };

  const doDelete = async () => { await col('containerplanung').doc(delId).delete(); show('Buchung storniert'); setDelId(null); };
  const prevMonth = () => { const d=new Date(month+'-01'); d.setMonth(d.getMonth()-1); setMonth(d.toISOString().slice(0,7)); };
  const nextMonth = () => { const d=new Date(month+'-01'); d.setMonth(d.getMonth()+1); setMonth(d.toISOString().slice(0,7)); };
  const monthLabel = new Date(month+'-01').toLocaleDateString('de-DE',{month:'long',year:'numeric'});
  const byDate = bookings.reduce((acc,b)=>{ (acc[b.date]=acc[b.date]||[]).push(b); return acc; },{});
  const DAY_START=6*60, DAY_END=22*60, SPAN=DAY_END-DAY_START;
  const toMin = t => { const [h,m]=(t||'00:00').split(':'); return Number(h)*60+Number(m); };
  const barLeft  = t => `${Math.max(0,Math.min(100,(toMin(t)-DAY_START)/SPAN*100))}%`;
  const barWidth = (f,t) => `${Math.max(2,(toMin(t)-toMin(f))/SPAN*100)}%`;
  const conflictCheck = selDate&&selFrom&&selTo&&selFrom<selTo ? hasTimeConflict(selCont,selDate,selFrom,selTo) : null;

  return (
    <div className="p-4">
      {delId && (
        <Modal title="Buchung stornieren?" onClose={()=>setDelId(null)}>
          <p className="text-sm text-gray-600 mb-4">Diese Container-Buchung wirklich stornieren?</p>
          <div className="flex gap-2">
            <button className="flex-1 py-2 rounded-lg border text-sm" onClick={()=>setDelId(null)}>Abbrechen</button>
            <button className="flex-1 py-2 rounded-lg bg-red-600 text-white text-sm" onClick={doDelete}>Stornieren</button>
          </div>
        </Modal>
      )}
      <h1 className="text-lg font-bold text-white mb-1">Containerplanung</h1>
      <p className="text-xs text-gray-400 mb-4">Reserviere einen Container für Teamveranstaltungen (Weihnachtsfeier, Abschlussfeier, …)</p>

      {/* Container-Status Card */}
      <div className="mb-5">
        {CONTAINERS.map(cont=>{
          const upcoming = bookings.filter(b=>b.containerId===cont.id && b.date>=todayStr());
          const next = upcoming[0];
          return (
            <div key={cont.id} className="glass-card rounded-xl p-3 text-center">
              <div className="text-2xl mb-1">{cont.emoji}</div>
              <div className="text-xs font-semibold mb-1.5" style={{color:cont.color}}>{cont.label}</div>
              {next ? (
                <div className="rounded-lg p-1.5" style={{background:cont.bg,border:`1px solid ${cont.border}`}}>
                  <div className="text-[10px] font-medium mb-0.5" style={{color:cont.color}}>Nächste Buchung</div>
                  <div className="text-[11px] font-semibold text-gray-800">{fmtDate(next.date)}</div>
                  {next.timeFrom && <div className="text-[11px] text-gray-600">{next.timeFrom} – {next.timeTo} Uhr</div>}
                  <div className="text-[10px] text-gray-500 truncate">{next.eventName}</div>
                </div>
              ) : (
                <div className="text-[10px] text-green-600 font-medium">✓ Verfügbar</div>
              )}
            </div>
          );
        })}
      </div>

      {/* Neue Buchung */}
      <div className="glass-card rounded-xl p-4 mb-5">
        <div className="text-sm font-semibold mb-3">📦 Vereinscontainer reservieren</div>
        <Inp label="Datum der Veranstaltung" type="date" value={selDate} onChange={e=>setSelDate(e.target.value)} min={todayStr()}/>
        <div className="flex gap-2 mb-3">
          <div className="flex-1">
            <label className="block text-xs font-medium text-gray-600 mb-1">Von</label>
            <input type="time" value={selFrom} onChange={e=>setSelFrom(e.target.value)}
              className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-500"/>
          </div>
          <div className="flex-1">
            <label className="block text-xs font-medium text-gray-600 mb-1">Bis</label>
            <input type="time" value={selTo} onChange={e=>setSelTo(e.target.value)}
              className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-500"/>
          </div>
          {selFrom && selTo && selFrom<selTo && (
            <div className="flex items-end pb-2">
              <span className="text-xs font-semibold text-gray-500 whitespace-nowrap">{durationLabel(selFrom,selTo)}</span>
            </div>
          )}
        </div>
        <Inp label="Veranstaltungsname" value={eventName} onChange={e=>setEventName(e.target.value)} placeholder="z.B. Weihnachtsfeier U19"/>
        {conflictCheck && (
          <div className="mb-3 text-xs bg-amber-50 border border-amber-200 text-amber-700 rounded-lg px-3 py-2">
            ⚠️ Zeitüberschneidung mit <strong>{conflictCheck.trainerName}</strong> ({conflictCheck.timeFrom}–{conflictCheck.timeTo} Uhr, {conflictCheck.eventName})
          </div>
        )}
        <button onClick={save} disabled={saving||!selDate||!eventName.trim()||!selFrom||!selTo||selFrom>=selTo}
          className="w-full py-2.5 rounded-xl bg-red-600 hover:bg-red-700 text-white text-sm font-semibold disabled:opacity-40 transition-colors">
          {saving ? '⏳ Buchen…' : 'Container reservieren'}
        </button>
      </div>

      {/* Monats-Kalender */}
      <div className="glass-card rounded-xl overflow-hidden">
        <div className="flex items-center justify-between px-4 py-3 border-b">
          <button onClick={prevMonth} className="p-1 rounded hover:bg-gray-100 text-gray-500">◀</button>
          <span className="text-sm font-semibold">{monthLabel}</span>
          <button onClick={nextMonth} className="p-1 rounded hover:bg-gray-100 text-gray-500">▶</button>
        </div>
        {Object.keys(byDate).length===0 ? (
          <div className="text-center text-gray-400 py-8 text-sm">Keine Buchungen in diesem Monat.</div>
        ) : (
          <div className="divide-y">
            {Object.entries(byDate).map(([date, dayBookings])=>(
              <div key={date} className="px-4 py-3">
                <div className="text-xs font-semibold text-gray-500 mb-2">{fmtDate(date)}</div>
                <div className="relative h-7 bg-gray-100 rounded-lg mb-2 overflow-hidden">
                  {[8,10,12,14,16,18,20].map(h=>(
                    <div key={h} className="absolute top-0 bottom-0 border-l border-gray-200 flex items-end pb-0.5"
                      style={{left:`${(h*60-DAY_START)/SPAN*100}%`}}>
                      <span className="text-[9px] text-gray-300 pl-0.5">{h}</span>
                    </div>
                  ))}
                  {dayBookings.map(b=>{
                    const cont=CONTAINERS.find(x=>x.id===b.containerId)||CONTAINERS[0];
                    const from=b.timeFrom||'14:00', to=b.timeTo||'20:00';
                    return (
                      <div key={b.id} title={`${cont.label}: ${from}–${to} · ${b.eventName}`}
                        className="absolute top-1 bottom-1 rounded flex items-center justify-center overflow-hidden"
                        style={{left:barLeft(from),width:barWidth(from,to),background:cont.color,opacity:0.85}}>
                        <span className="text-[10px] text-white font-semibold px-1 truncate">{cont.emoji} {from}–{to}</span>
                      </div>
                    );
                  })}
                </div>
                {dayBookings.map(b=>{
                  const cont=CONTAINERS.find(x=>x.id===b.containerId)||CONTAINERS[0];
                  const isOwn=b.trainerName===profile.name;
                  const dur=b.timeFrom&&b.timeTo ? durationLabel(b.timeFrom,b.timeTo) : '';
                  return (
                    <div key={b.id} className="flex items-center gap-2 py-1.5 border-b border-gray-50 last:border-0">
                      <span className="text-base flex-shrink-0">{cont.emoji}</span>
                      <div className="flex-1 min-w-0">
                        <div className="flex items-center gap-2 flex-wrap">
                          <span className="text-xs font-semibold" style={{color:cont.color}}>{cont.label}</span>
                          {b.timeFrom && (
                            <span className="text-xs bg-gray-100 text-gray-700 px-2 py-0.5 rounded-full font-medium">
                              {b.timeFrom} – {b.timeTo} Uhr{dur?` (${dur})`:''}
                            </span>
                          )}
                        </div>
                        <div className="text-xs text-gray-600 truncate">{b.eventName} · {b.trainerName}</div>
                      </div>
                      {isOwn && (
                        <button onClick={()=>setDelId(b.id)} className="text-gray-400 hover:text-red-600 p-1 rounded hover:bg-red-50 text-xs flex-shrink-0">🗑</button>
                      )}
                    </div>
                  );
                })}
              </div>
            ))}
          </div>
        )}
      </div>
    </div>
  );
}
