const FILE_ICONS = {
  'application/pdf':'📄', 'image/':'🖼️',
  'application/vnd.openxmlformats-officedocument.wordprocessingml':'📝',
  'application/vnd.openxmlformats-officedocument.spreadsheetml':'📊',
  'application/vnd.openxmlformats-officedocument.presentationml':'📊',
  'default':'📎'
};
const fileIcon = (type='') => {
  for(const [k,v] of Object.entries(FILE_ICONS)) if(type.startsWith(k)) return v;
  return FILE_ICONS.default;
};
const fmtSize = (b) => b>1048576 ? (b/1048576).toFixed(1)+' MB' : (b/1024).toFixed(0)+' KB';

// ═══════════════════════════════════════════════════════════════════
//  ÜBUNGSDATENBANK (Trainer + Vorstand)
// ═══════════════════════════════════════════════════════════════════
function UebungenDB({profile, show}) {
  const CATS   = ['Aufwärmen','Technik','Taktik','Kondition','Spielform','Abschluss','Sonstiges'];
  const AGES   = ['Alle','U8','U10','U12','U14','U16','U18','Senioren'];
  const EMPTY  = {title:'',category:'Technik',ageRange:'Alle',description:'',execution:'',duration:'',minPlayers:'',materials:'',imageData:''};

  const [uebungen,    setUebungen]    = useState([]);
  const [filterCat,   setFilterCat]   = useState('Alle');
  const [filterAge,   setFilterAge]   = useState('Alle');
  const [search,      setSearch]      = useState('');
  const [open,        setOpen]        = useState(false);
  const [editing,     setEditing]     = useState(null);
  const [form,        setForm]        = useState(EMPTY);
  const [detail,      setDetail]      = useState(null);
  const [imgViewer,   setImgViewer]   = useState(null);
  const [uploading,   setUploading]   = useState(false);
  const [imgErr,      setImgErr]      = useState('');
  const imgRef = useRef();

  useEffect(()=>{
    return col('uebungen').orderBy('createdAt','desc')
      .onSnapshot(s=>setUebungen(s.docs.map(d=>({id:d.id,...d.data()}))));
  },[]);

  const openNew  = () => { setEditing(null); setForm(EMPTY); setImgErr(''); setOpen(true); };
  const openEdit = (u) => { setEditing(u.id); setForm({title:u.title||'',category:u.category||'Technik',ageRange:u.ageRange||'Alle',description:u.description||'',execution:u.execution||'',duration:u.duration||'',minPlayers:u.minPlayers||'',materials:u.materials||'',imageData:u.imageData||''}); setImgErr(''); setOpen(true); };

  const pickImage = async (e) => {
    const file = e.target.files?.[0]; if(!file) return;
    if(!file.type.startsWith('image/')) { setImgErr('Nur Bilder erlaubt.'); return; }
    if(file.size > 700*1024) { setImgErr(`Bild zu groß (${Math.round(file.size/1024)} KB). Max 700 KB.`); return; }
    setUploading(true); setImgErr('');
    const data = await new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result); r.onerror=rej; r.readAsDataURL(file); });
    setForm(f=>({...f,imageData:data}));
    setUploading(false);
    e.target.value='';
  };

  const save = async (e) => {
    e.preventDefault();
    const doc = {...form, uploadedBy:profile.name, uploadedByRole:profile.role, updatedAt:ts()};
    if(editing) {
      await col('uebungen').doc(editing).update(doc);
      show('Übung aktualisiert ✅');
    } else {
      await col('uebungen').add({...doc, createdAt:ts()});
      show('Übung gespeichert ✅');
    }
    setOpen(false); setEditing(null);
  };

  const del = async (u) => {
    if(!confirm(`"${u.title}" wirklich löschen?`)) return;
    await col('uebungen').doc(u.id).delete();
    show('Gelöscht');
  };

  const canEdit = (u) => profile.role==='vorstand'||profile.role==='vorstand_trainer'||u.uploadedBy===profile.name;

  const filtered = uebungen.filter(u=>{
    if(filterCat!=='Alle' && u.category!==filterCat) return false;
    if(filterAge!=='Alle' && u.ageRange!==filterAge && u.ageRange!=='Alle') return false;
    if(search && !(u.title||'').toLowerCase().includes(search.toLowerCase()) && !(u.description||'').toLowerCase().includes(search.toLowerCase())) return false;
    return true;
  });

  const CAT_COLOR = {Aufwärmen:'bg-orange-100 text-orange-700',Technik:'bg-blue-100 text-blue-700',Taktik:'bg-purple-100 text-purple-700',Kondition:'bg-green-100 text-green-700',Spielform:'bg-red-100 text-red-700',Abschluss:'bg-pink-100 text-pink-700',Sonstiges:'bg-gray-100 text-gray-600'};

  return (
    <div className="p-4">
      <div className="flex items-center justify-between mb-4">
        <div><h1 className="text-lg font-semibold">Übungsdatenbank</h1><p className="text-xs text-gray-400">{uebungen.length} Übungen gesamt</p></div>
        <Btn size="sm" onClick={openNew}>+ Übung</Btn>
      </div>

      {/* Suche + Filter */}
      <div className="space-y-2 mb-4">
        <input value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍 Suche…"
          className="w-full border border-gray-200 rounded-xl px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-500"/>
        <div className="flex gap-2 overflow-x-auto pb-1">
          {['Alle',...CATS].map(c=>(
            <button key={c} onClick={()=>setFilterCat(c)}
              className={`px-3 py-1.5 rounded-full text-xs font-semibold whitespace-nowrap transition-all ${filterCat===c?'bg-red-600 text-white':'bg-gray-100 text-gray-500 hover:bg-gray-200'}`}>{c}</button>
          ))}
        </div>
        <div className="flex gap-2 overflow-x-auto pb-1">
          {AGES.map(a=>(
            <button key={a} onClick={()=>setFilterAge(a)}
              className={`px-3 py-1.5 rounded-full text-xs font-semibold whitespace-nowrap transition-all ${filterAge===a?'bg-gray-700 text-white':'bg-gray-100 text-gray-500 hover:bg-gray-200'}`}>{a}</button>
          ))}
        </div>
      </div>

      {/* Detail-Modal */}
      {detail && (
        <div className="fixed inset-0 bg-black/60 z-50 flex items-end md:items-center justify-center p-0 md:p-4" onClick={()=>setDetail(null)}>
          <div className="bg-white w-full md:max-w-lg md:rounded-2xl rounded-t-2xl max-h-[90vh] flex flex-col shadow-2xl" onClick={e=>e.stopPropagation()}>
            <div className="flex items-center justify-between px-5 py-4 border-b border-gray-100">
              <div>
                <div className="font-bold text-base">{detail.title}</div>
                <div className="flex gap-2 mt-1">
                  <span className={`text-[10px] px-2 py-0.5 rounded-full font-semibold ${CAT_COLOR[detail.category]||'bg-gray-100 text-gray-600'}`}>{detail.category}</span>
                  <span className="text-[10px] px-2 py-0.5 rounded-full font-semibold bg-gray-100 text-gray-600">{detail.ageRange}</span>
                </div>
              </div>
              <div className="flex gap-2">
                {canEdit(detail) && <button onClick={()=>{setDetail(null);openEdit(detail);}} className="text-xs text-gray-500 hover:text-red-600 px-2 py-1.5 border border-gray-200 rounded-lg">✏️</button>}
                <button onClick={()=>setDetail(null)} className="w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 text-gray-500">✕</button>
              </div>
            </div>
            <div className="overflow-y-auto flex-1 p-5 space-y-4">
              {detail.imageData && (
                <div className="relative cursor-zoom-in group" onClick={()=>setImgViewer(detail.imageData)}>
                  <img src={detail.imageData} alt={detail.title} className="w-full rounded-xl object-cover max-h-52"/>
                  <div className="absolute inset-0 bg-black/0 group-hover:bg-black/20 rounded-xl transition-all flex items-center justify-center">
                    <span className="opacity-0 group-hover:opacity-100 bg-black/60 text-white text-xs px-3 py-1.5 rounded-full transition-all">🔍 Vergrößern</span>
                  </div>
                </div>
              )}
              <div className="grid grid-cols-3 gap-2">
                <div className="bg-blue-50 rounded-xl p-3 text-center"><div className="text-lg font-bold text-blue-700">{detail.duration||'—'}'</div><div className="text-[10px] text-blue-500">Dauer</div></div>
                <div className="bg-green-50 rounded-xl p-3 text-center"><div className="text-lg font-bold text-green-700">{detail.minPlayers||'—'}</div><div className="text-[10px] text-green-500">Min. Spieler</div></div>
                <div className="bg-orange-50 rounded-xl p-3 text-center"><div className="text-[11px] font-bold text-orange-700 leading-tight">{detail.materials||'—'}</div><div className="text-[10px] text-orange-500">Material</div></div>
              </div>
              {detail.description && <div><div className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Beschreibung</div><p className="text-sm text-gray-700 leading-relaxed bg-gray-50 rounded-xl p-3">{detail.description}</p></div>}
              {detail.execution  && <div><div className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-1">Durchführung</div><p className="text-sm text-gray-700 leading-relaxed bg-gray-50 rounded-xl p-3 whitespace-pre-line">{detail.execution}</p></div>}
              <div className="text-[11px] text-gray-400">Erstellt von {detail.uploadedBy||'—'}</div>
            </div>
          </div>
        </div>
      )}

      {/* Bild-Vollansicht */}
      {imgViewer && (
        <div className="fixed inset-0 bg-black z-[70] flex flex-col" onClick={()=>setImgViewer(null)}>
          <div className="flex items-center justify-between px-4 py-3 bg-black/60 flex-shrink-0">
            <span className="text-white text-sm">Bild vergrößert</span>
            <button onClick={()=>setImgViewer(null)} className="w-8 h-8 flex items-center justify-center rounded-full bg-white/10 text-white">✕</button>
          </div>
          <div className="flex-1 overflow-auto flex items-center justify-center p-4" onClick={e=>e.stopPropagation()}>
            <img src={imgViewer} alt="Vollansicht" className="max-w-full max-h-full object-contain rounded-xl"/>
          </div>
        </div>
      )}

      {/* Formular-Modal */}
      {open && (
        <Modal title={editing?'Übung bearbeiten':'Neue Übung'} onClose={()=>{setOpen(false);setEditing(null);}}>
          <form onSubmit={save} className="space-y-0">
            <Inp label="Titel *" value={form.title} onChange={e=>setForm({...form,title:e.target.value})} placeholder="z.B. Passdreiecke 3 gegen 1" required/>
            <div className="flex gap-2">
              <Sel label="Kategorie" value={form.category} onChange={e=>setForm({...form,category:e.target.value})}>
                {CATS.map(c=><option key={c}>{c}</option>)}
              </Sel>
              <Sel label="Altersbereich" value={form.ageRange} onChange={e=>setForm({...form,ageRange:e.target.value})}>
                {AGES.map(a=><option key={a}>{a}</option>)}
              </Sel>
            </div>
            <div className="flex gap-2">
              <Inp label="Dauer (Min)" type="number" min="1" value={form.duration} onChange={e=>setForm({...form,duration:e.target.value})} placeholder="15"/>
              <Inp label="Min. Spieler" type="number" min="1" value={form.minPlayers} onChange={e=>setForm({...form,minPlayers:e.target.value})} placeholder="6"/>
            </div>
            <Inp label="Materialien" value={form.materials} onChange={e=>setForm({...form,materials:e.target.value})} placeholder="z.B. 4 Hütchen, 1 Ball"/>
            <Txt label="Beschreibung (Was ist das für eine Übung?)" value={form.description} onChange={e=>setForm({...form,description:e.target.value})} rows={2} placeholder="Kurze Beschreibung der Übung…"/>
            <Txt label="Durchführung (Wie wird sie gemacht?)" value={form.execution} onChange={e=>setForm({...form,execution:e.target.value})} rows={3} placeholder="Schritt für Schritt…"/>
            {/* Bild */}
            <div className="mb-3">
              <label className="block text-xs font-medium text-gray-600 mb-1">Bild / Skizze (optional, max 700 KB)</label>
              {form.imageData ? (
                <div className="relative rounded-xl overflow-hidden border border-gray-200">

function AdminDokumente({profile, show}) {
  const [docs,     setDocs]     = useState([]);
  const [open,     setOpen]     = useState(false);
  const [file,     setFile]     = useState(null);
  const [form,     setForm]     = useState({name:'', category:'Allgemein', notes:''});
  const [uploading,setUploading]= useState(false);
  const [uploadErr,setUploadErr]= useState('');
  const [viewer,   setViewer]   = useState(null);
  const fileRef = useRef(null);
  const CATS = ['Allgemein','Training','Verwaltung','Satzung','Finanzen','Sonstiges'];

  // Allgemeine Vereinsdokumente laden (ohne Spieler-Docs, die haben playerId gesetzt)
  useEffect(()=>{ return col('dokumente').orderBy('createdAt','desc').onSnapshot(s=>setDocs(s.docs.map(d=>({id:d.id,...d.data()})).filter(d=>!d.playerId))); },[]);

  const upload = async (e) => {
    e.preventDefault();
    if (!file) { show('Bitte eine Datei wählen','error'); return; }
    if (file.size > 700*1024) { setUploadErr(`Datei zu groß (${Math.round(file.size/1024)} KB). Max. 700 KB.`); return; }
    setUploading(true); setUploadErr('');
    try {
      const fileData = await new Promise((res,rej)=>{
        const r = new FileReader();
        r.onload = ()=>res(r.result.split(',')[1]);
        r.onerror = rej;
        r.readAsDataURL(file);
      });
      await col('dokumente').add({
        name: form.name || file.name,
        category: form.category,
        notes: form.notes,
        fileData,
        fileName: file.name,
        fileType: file.type,
        fileSize: file.size,
        uploadedBy: profile.name,
        createdAt: ts()
      });
      show('Dokument hochgeladen ✅');
      setForm({name:'',category:'Allgemein',notes:''}); setFile(null); setOpen(false);
    } catch(err) { setUploadErr(err.message); }
    setUploading(false);
  };

  const del = async (doc) => {
    if(!confirm('Dokument löschen?')) return;
    await col('dokumente').doc(doc.id).delete();
    show('Gelöscht');
  };

  const blobUrlForViewer = React.useMemo(()=>{
    if(!viewer || !viewer.fileType?.includes('pdf')) return null;
    try {
      const bytes = atob(viewer.fileData);
      const arr = new Uint8Array(bytes.length);
      for(let i=0;i<bytes.length;i++) arr[i]=bytes.charCodeAt(i);
      return URL.createObjectURL(new Blob([arr],{type:'application/pdf'}));
    } catch(e){ return null; }
  },[viewer]);

  const grouped = CATS.reduce((a,c)=>{a[c]=docs.filter(d=>d.category===c);return a;},{});

  return (
    <div className="p-4">
      <div className="flex items-center justify-between mb-4">
        <div><h1 className="text-lg font-semibold">Dokumente</h1><p className="text-xs text-gray-400">{docs.length} Dateien</p></div>
        <Btn size="sm" variant="purple" onClick={()=>setOpen(true)}>+ Hochladen</Btn>
      </div>
      {open && (
        <Modal title="Dokument hochladen" onClose={()=>!uploading&&setOpen(false)}>
          <form onSubmit={upload}>
            <div className="mb-3">
              <label className="block text-xs font-medium text-gray-600 mb-1">Datei *</label>
              <div onClick={()=>fileRef.current?.click()}
                className={`border-2 border-dashed rounded-xl p-6 text-center cursor-pointer transition-colors ${file?'border-purple-400 bg-purple-50':'border-gray-200 hover:border-gray-300'}`}>
                {file ? (
                  <div><div className="text-3xl">{fileIcon(file.type)}</div><div className="text-sm font-medium mt-1">{file.name}</div><div className="text-xs text-gray-400">{fmtSize(file.size)}</div></div>
                ) : (
                  <div><div className="text-3xl text-gray-300">📎</div><div className="text-sm text-gray-400 mt-1">Klicken zum Auswählen</div></div>
                )}
                <input ref={fileRef} type="file" className="hidden" onChange={e=>setFile(e.target.files[0]||null)}/>
              </div>
            </div>
            <Inp label="Anzeigename (optional)" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Automatisch aus Dateiname"/>
            <Sel label="Kategorie" value={form.category} onChange={e=>setForm({...form,category:e.target.value})}>{CATS.map(c=><option key={c}>{c}</option>)}</Sel>
            <Txt label="Notiz (optional)" rows={2} value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})}/>
            <p className="text-[11px] text-gray-400 mb-2">Maximale Dateigröße: 700 KB</p>
            {uploadErr && <div className="mb-2 text-xs text-red-600 bg-red-50 p-2 rounded-lg">{uploadErr}</div>}
            <div className="flex gap-2">
              <Btn type="button" variant="secondary" className="flex-1" onClick={()=>setOpen(false)} disabled={uploading}>Abbrechen</Btn>
              <Btn type="submit" variant="purple" className="flex-1" disabled={uploading||!file}>{uploading?'⏳ Lädt…':'Hochladen'}</Btn>
            </div>
          </form>
        </Modal>
      )}

      {/* Inline Viewer */}
      {viewer && (
        <div className="fixed inset-0 bg-black/80 z-[60] flex flex-col" onClick={()=>setViewer(null)}>
          <div className="flex items-center justify-between px-4 py-3 bg-black/60" onClick={e=>e.stopPropagation()}>
            <div className="text-white text-sm font-medium truncate flex-1">{viewer.name||viewer.fileName}</div>
            <button onClick={()=>setViewer(null)} className="w-8 h-8 flex items-center justify-center rounded-full bg-white/10 text-white ml-2">✕</button>
          </div>
          <div className="flex-1 overflow-auto flex items-center justify-center p-4" onClick={e=>e.stopPropagation()}>
            {viewer.fileType?.startsWith('image/') ? (
              <img src={`data:${viewer.fileType};base64,${viewer.fileData}`} alt={viewer.name} className="max-w-full max-h-full rounded-xl object-contain"/>
            ) : viewer.fileType?.includes('pdf') && blobUrlForViewer ? (
              <iframe src={blobUrlForViewer} className="w-full rounded-xl" style={{minHeight:'75vh'}} title={viewer.name}/>
            ) : (
              <div className="text-center text-white">
                <div className="text-5xl mb-4">📄</div>
                <p className="text-sm mb-4">Vorschau nicht möglich.</p>
                <a href={`data:${viewer.fileType};base64,${viewer.fileData}`} download={viewer.fileName}
                  className="px-4 py-2 bg-purple-600 text-white rounded-xl text-sm font-semibold hover:bg-purple-700">⬇️ Herunterladen</a>
              </div>
            )}
          </div>
        </div>
      )}

      {docs.length===0 ? (
        <div className="text-center text-gray-400 py-16"><div className="text-4xl mb-2">📁</div><p className="text-sm">Noch keine Dokumente hochgeladen.</p></div>
      ) : (
        <div className="space-y-5">
          {CATS.map(cat => grouped[cat].length>0 && (
            <div key={cat}>
              <div className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">{cat}</div>
              <div className="space-y-2">
                {grouped[cat].map(doc=>(
                  <div key={doc.id} className="bg-white border border-gray-200 rounded-xl p-3.5 flex items-center gap-3 group">
                    <div className="w-10 h-10 bg-gray-100 rounded-xl flex items-center justify-center text-xl flex-shrink-0">{fileIcon(doc.fileType)}</div>
                    <div className="flex-1 min-w-0">
                      <div className="text-sm font-medium truncate">{doc.name||doc.fileName}</div>
                      <div className="text-xs text-gray-400">{doc.fileName} · {fmtSize(doc.fileSize)} · {doc.uploadedBy}</div>
                      {doc.notes&&<div className="text-xs text-gray-500 mt-0.5 italic">{doc.notes}</div>}
                    </div>
                    <div className="flex gap-1 flex-shrink-0">
                      <button onClick={()=>setViewer(doc)} className="w-8 h-8 bg-purple-50 hover:bg-purple-100 rounded-lg flex items-center justify-center text-purple-600 transition-colors text-sm">👁</button>
                      <button onClick={()=>del(doc)} className="w-8 h-8 bg-gray-50 hover:bg-red-50 rounded-lg flex items-center justify-center text-gray-300 hover:text-red-500 opacity-0 group-hover:opacity-100 transition-all text-sm">✕</button>
                    </div>
                  </div>
                ))}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

//  NACHRICHTEN VORSTAND → TRAINER (bidirektional)
// ═══════════════════════════════════════════════════════════════════
function VorstandNachrichten({profile}) {
  const [threads,  setThreads]  = useState([]);  // je Trainer eine Konversation
  const [sel,      setSel]      = useState(null); // ausgewählter Trainer
  const [msgs,     setMsgs]     = useState([]);
  const [text,     setText]     = useState('');
  const bottomRef = useRef(null);

  // Alle Trainer laden
  const [trainers, setTrainers] = useState([]);
  useEffect(()=>{
    col('users').where('role','in',['trainer','dual']).onSnapshot(s=>setTrainers(s.docs.map(d=>({id:d.id,...d.data()}))));
  },[]);

  // Nachrichten für den ausgewählten Trainer
  useEffect(()=>{
    if(!sel) return;
    return col('nachrichten')
      .where('threadId','==', [profile.id,sel.id].sort().join('_'))
      .orderBy('createdAt')
      .onSnapshot(s=>{
        setMsgs(s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>a.createdAt?.seconds-b.createdAt?.seconds));
        setTimeout(()=>bottomRef.current?.scrollIntoView({behavior:'smooth'}),50);
      });
  },[sel]);

  // Ungelesene pro Trainer zählen
  const [unread, setUnread] = useState({});
  useEffect(()=>{
    return col('nachrichten').where('receiverId','==',profile.id).where('read','==',false)
      .onSnapshot(s=>{
        const u={};
        s.docs.forEach(d=>{ const tid=d.data().senderId; u[tid]=(u[tid]||0)+1; });
        setUnread(u);
      });
  },[]);

  const send = async (e) => {
    e.preventDefault(); if(!text.trim()||!sel) return;
    const threadId=[profile.id,sel.id].sort().join('_');
    await col('nachrichten').add({
      threadId, text:text.trim(),
      senderId:profile.id, senderName:profile.name, senderRole:'vorstand',
      receiverId:sel.id, read:false, createdAt:ts()
    });
    // Empfänger-Nachrichten als gelesen markieren
    const unreadSnap=await col('nachrichten').where('threadId','==',threadId).where('receiverId','==',profile.id).where('read','==',false).get();
    unreadSnap.forEach(d=>d.ref.update({read:true}));
    setText('');
  };

  const openThread = async (trainer) => {
    setSel(trainer);
    // Als gelesen markieren
    const threadId=[profile.id,trainer.id].sort().join('_');
    const snap=await col('nachrichten').where('threadId','==',threadId).where('receiverId','==',profile.id).where('read','==',false).get();
    snap.forEach(d=>d.ref.update({read:true}));
  };

  if(!sel) return (
    <div className="p-4">
      <h1 className="text-lg font-semibold mb-4">💬 Nachrichten</h1>
      {trainers.length===0 ? <div className="text-center text-gray-400 py-16"><div className="text-4xl mb-2">💬</div><p className="text-sm">Noch keine Trainer vorhanden.</p></div> : (
        <div className="space-y-2">
          {trainers.map(t=>(
            <button key={t.id} onClick={()=>openThread(t)}
              className="w-full flex items-center gap-3 bg-white border border-gray-200 hover:border-purple-300 rounded-xl p-3.5 text-left transition-all">
              <div className="relative flex-shrink-0">
                <Avatar name={t.name} color={t.color} size="sm"/>
                {unread[t.id]>0 && <div className="absolute -top-1 -right-1 w-4 h-4 bg-red-600 rounded-full text-white text-[9px] font-bold flex items-center justify-center">{unread[t.id]}</div>}
              </div>
              <div className="min-w-0">
                <div className="text-sm font-semibold">{t.name}</div>
                <div className="text-xs text-gray-400">{t.role==='dual'?'Trainer & Spieler':'Trainer'}</div>
              </div>
              <span className="ml-auto text-gray-300">›</span>
            </button>
          ))}
        </div>
      )}
    </div>
  );

  return (
    <div className="flex flex-col" style={{height:'calc(100vh - 56px)'}}>
      <div className="px-4 py-3 border-b border-gray-200 flex items-center gap-3 flex-shrink-0 bg-white">
        <button onClick={()=>setSel(null)} className="text-gray-400 hover:text-gray-700 text-lg">←</button>
        <Avatar name={sel.name} color={sel.color} size="sm"/>
        <div><div className="text-sm font-semibold">{sel.name}</div><div className="text-xs text-gray-400">Trainer</div></div>
      </div>
      <div className="flex-1 overflow-y-auto px-4 py-3">
        {msgs.length===0&&<div className="text-center text-gray-400 py-16 text-sm">Noch keine Nachrichten.</div>}
        {msgs.map(m=>{
          const isMe=m.senderId===profile.id;
          return (
            <div key={m.id} className={`flex ${isMe?'justify-end':'justify-start'} mb-2`}>
              <div className={`max-w-[75%] rounded-2xl px-3.5 py-2 text-sm leading-relaxed ${isMe?'bg-purple-600 text-white rounded-br-sm':'bg-gray-100 text-gray-900 rounded-bl-sm'}`}>
                <div>{m.text}</div>
                <div className={`text-[10px] mt-0.5 ${isMe?'text-purple-200':'text-gray-400'}`}>{fmtTime(m.createdAt)}</div>
              </div>
            </div>
          );
        })}
        <div ref={bottomRef}/>
      </div>
      <form onSubmit={send} className="flex gap-2 p-3 border-t border-gray-200 bg-white flex-shrink-0">
        <input value={text} onChange={e=>setText(e.target.value)} placeholder="Nachricht schreiben…"
          className="flex-1 border border-gray-200 rounded-full px-4 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-purple-500 bg-gray-50"/>
        <button type="submit" disabled={!text.trim()}
          className="w-9 h-9 bg-purple-600 hover:bg-purple-700 rounded-full flex items-center justify-center text-white disabled:opacity-40 transition-colors flex-shrink-0">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </form>
    </div>
  );
}
