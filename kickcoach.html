//  PROFIL VERVOLLSTÄNDIGEN (Auth vorhanden, aber kein Firestore-Doc)
// ═══════════════════════════════════════════════════════════════════
function CompleteProfile({user, onDone}) {
  const ADMIN_EMAIL = 'finanzmakler.rittner@gmail.com';
  const ROLES = [
    {v:'player',           l:'Spieler',            icon:'⚽', desc:'Training, Wellness, Chat'},
    {v:'trainer',          l:'Trainer',            icon:'📋', desc:'Kader, Training, Taktik'},
    {v:'dual',             l:'Trainer & Spieler',  icon:'🔄', desc:'Zwei Teams, zwei Rollen'},
    {v:'vorstand',         l:'Vorstand',           icon:'🏟️',desc:'Genehmigung erforderlich 🔒'},
    {v:'vorstand_trainer', l:'Vorstand & Trainer', icon:'🎯', desc:'Genehmigung erforderlich 🔒', wide:true},
  ];

  // step: 'role' | 'team' | 'name' | 'trainer_team' | 'trainer_name' | 'dual_player_team' | 'dual_player_name' | 'nonplayer'
  const [step,             setStep]           = useState('role');
  const [role,             setRole]           = useState('player');
  const [teams,            setTeams]          = useState([]);
  const [selectedTeam,     setSelectedTeam]   = useState(null); // for player / dual-player
  const [trainerTeam,      setTrainerTeam]    = useState(null); // for trainer/dual/vt
  const [slots,            setSlots]          = useState([]);
  const [playerSlots,      setPlayerSlots]    = useState([]);
  const [loadingSlots,     setLoadingSlots]   = useState(false);
  const [loadingPSlots,    setLoadingPSlots]  = useState(false);
  const [selectedSlot,     setSelectedSlot]   = useState(null);
  const [dualTrainerSlot,  setDualTrainerSlot]= useState(null); // claimed trainer slot for dual
  const [dob,              setDob]            = useState('');
  const [name,             setName]           = useState(user.displayName||'');
  const [npDob,            setNpDob]          = useState('');
  const [saving,           setSaving]         = useState(false);
  const [msg,              setMsg]            = useState('');

  // Load teams once
  useEffect(()=>{
    col('teams').orderBy('name').get().then(s=>setTeams(s.docs.map(d=>({id:d.id,...d.data()}))));
  },[]);

  // Load player slots when player team selected (Spieler-only flow)
  useEffect(()=>{
    if(!selectedTeam) return;
    setLoadingSlots(true); setSlots([]);
    const unsub = col('users')
      .where('teamId','==',selectedTeam.id)
      .onSnapshot(s=>{
        const unclaimed = s.docs.map(d=>({id:d.id,...d.data()}))
          .filter(u=>u.role==='player' && u.claimed===false && u.id!==user.uid)
          .sort((a,b)=>(a.name||'').localeCompare(b.name||''));
        setSlots(unclaimed);
        setLoadingSlots(false);
      });
    return ()=>unsub();
  },[selectedTeam?.id]);

  // Load player slots for dual-player step
  useEffect(()=>{
    if(step!=='dual_player_name' || !selectedTeam) return;
    setLoadingPSlots(true); setPlayerSlots([]);
    const unsub = col('users')
      .where('teamId','==',selectedTeam.id)
      .onSnapshot(s=>{
        const unclaimed = s.docs.map(d=>({id:d.id,...d.data()}))
          .filter(u=>u.role==='player' && u.claimed===false && u.id!==user.uid)
          .sort((a,b)=>(a.name||'').localeCompare(b.name||''));
        setPlayerSlots(unclaimed);
        setLoadingPSlots(false);
      });
    return ()=>unsub();
  },[step, selectedTeam?.id]);

  // Load trainer slots when trainer team selected
  useEffect(()=>{
    if(!trainerTeam) return;
    setLoadingSlots(true); setSlots([]);
    const unsub = col('users')
      .where('trainerTeamId','==',trainerTeam.id)
      .onSnapshot(s=>{
        setSlots(s.docs.map(d=>({id:d.id,...d.data()})));
        setLoadingSlots(false);
      });
    return ()=>unsub();
  },[trainerTeam?.id]);

  const savePlayer = async (slot) => {
    const s = slot || selectedSlot;
    if(!s) return;
    setSaving(true);
    try {
      // Slot-Daten ins Auth-UID-Dokument übertragen
      await col('users').doc(user.uid).set({
        name:      s.name,
        email:     user.email||'',
        role:      'player',
        status:    'active',
        teamId:    selectedTeam.id,
        trainerTeamId: '',
        position:  s.position||'',
        number:    s.number||'',
        color:     s.color||randColor(),
        dob:       s.dob||'',
        mitgliedStatus: s.mitgliedStatus||'',
        claimed:   true,
        claimedAt: ts(),
        createdAt: ts(),
      });
      // Alten Slot löschen → kein doppelter Eintrag
      await col('users').doc(s.id).delete();
      onDone();
    } catch(e){ setMsg(e.message); }
    setSaving(false);
  };

  const saveNonPlayer = async (e) => {
    e.preventDefault(); setSaving(true); setMsg('');
    try {
      const email = user.email||'';
      const existing = await col('users').limit(2).get();
      const isFirst  = existing.docs.filter(d=>d.id!==user.uid).length === 0;
      const isAdmin2 = isFirst || email.toLowerCase()===ADMIN_EMAIL;
      const finalRole = isAdmin2 ? 'vorstand' : role;
      const needsApproval2 = !isAdmin2 && (finalRole==='vorstand'||finalRole==='vorstand_trainer');
      await col('users').doc(user.uid).set({
        name, email, role: finalRole,
        status: needsApproval2 ? 'pending' : 'active',
        teamId: '',
        trainerTeamId: trainerTeam?.id || '',
        dob: '',
        color: randColor(), createdAt: ts(),
        claimed: true,
      });
      onDone();
    } catch(err){ setMsg(err.message); }
    setSaving(false);
  };

  const bg = {background:'linear-gradient(160deg,#1a0505 0%,#0d0d0d 45%,#0a0a0a 100%)'};
  const cardCls = "w-full max-w-sm rounded-2xl overflow-hidden shadow-2xl p-5 space-y-3";
  const cardStyle = {background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.08)'};
  const inputCls2 = "w-full rounded-xl px-4 py-3 text-sm bg-white/5 border border-white/10 text-white placeholder-gray-500 focus:outline-none focus:border-red-500 focus:ring-1 focus:ring-red-500 transition-colors";
  const labelCls2 = "block text-xs font-medium text-gray-400 mb-1.5";
  const btnPrimary = "w-full py-3 rounded-xl font-bold text-sm text-white transition-all disabled:opacity-40";
  const btnPrimaryStyle = {background:'linear-gradient(135deg,#CC0000,#990000)',boxShadow:'0 4px 20px rgba(204,0,0,0.3)'};

  const Header = ({icon,title,sub}) => (
    <div className="text-center mb-5">
      <div className="text-4xl mb-2">{icon}</div>
      <h1 className="text-xl font-black text-white">{title}</h1>
      {sub&&<p className="text-xs mt-1" style={{color:'rgba(255,255,255,0.35)'}}>{sub}</p>}
    </div>
  );

  // ── STEP: role ──────────────────────────────────────────────────
  if(step==='role') return (
    <div className="min-h-screen flex flex-col items-center justify-center p-4" style={bg}>
      <Header icon="⚽" title="Willkommen!" sub={user.email}/>
      <div className={cardCls} style={cardStyle}>
        <p className={labelCls2}>Ich bin…</p>
        <div className="grid grid-cols-2 gap-2">
          {ROLES.map(r=>(
            <button key={r.v} type="button"
              onClick={()=>{
                setRole(r.v);
                if(r.v==='player') setStep('team');
                else if(r.v==='trainer'||r.v==='dual'||r.v==='vorstand_trainer') setStep('trainer_team');
                else setStep('nonplayer');
              }}
              className={`flex flex-col items-center gap-1 py-3 px-2 rounded-xl border text-center transition-all ${r.wide?'col-span-2':''}`}
              style={{borderColor:'rgba(255,255,255,0.08)',background:'rgba(255,255,255,0.03)'}}>
              <span className="text-lg">{r.icon}</span>
              <span className="text-xs font-semibold text-white">{r.l}</span>
              <span className="text-[9px] leading-tight" style={{color:'rgba(255,255,255,0.4)'}}>{r.desc}</span>
            </button>
          ))}
        </div>
        <button onClick={()=>auth.signOut()} className="w-full text-xs text-center pt-1" style={{color:'rgba(255,255,255,0.25)'}}>Abmelden</button>
      </div>
    </div>
  );

  // ── STEP: team (player only) ─────────────────────────────────────
  if(step==='team') return (
    <div className="min-h-screen flex flex-col items-center justify-center p-4" style={bg}>
      <Header icon="🏟️" title="Dein Team" sub="Wähle das Team aus, in dem du spielst"/>
      <div className={cardCls} style={cardStyle}>
        {teams.length===0
          ? <div className="text-center py-6 text-gray-400 text-sm">Noch keine Teams angelegt.</div>
          : <div className="space-y-2">
              {teams.map(t=>(
                <button key={t.id} onClick={()=>{setSelectedTeam(t);setSelectedSlot(null);setStep('name');}}
                  className="w-full flex items-center gap-3 rounded-xl px-4 py-3 text-left transition-all"
                  style={{border:'1px solid rgba(255,255,255,0.1)',background:'rgba(255,255,255,0.04)'}}>
                  <span className="text-2xl">⚽</span>
                  <div>
                    <div className="text-sm font-semibold text-white">{t.name}</div>
                    {t.category&&<div className="text-xs" style={{color:'rgba(255,255,255,0.4)'}}>{t.category}</div>}
                  </div>
                </button>
              ))}
            </div>
        }
        <button onClick={()=>setStep('role')} className="w-full text-xs text-center pt-1" style={{color:'rgba(255,255,255,0.3)'}}>← Zurück</button>
      </div>
    </div>
  );

  // ── STEP: name (player picks from slot list) ─────────────────────
  if(step==='name') return (
    <div className="min-h-screen flex flex-col items-center justify-center p-4" style={bg}>
      <Header icon="🔍" title="Wähle deinen Namen" sub={`Team: ${selectedTeam?.name}`}/>
      <div className={cardCls} style={cardStyle}>
        {loadingSlots ? <Spinner/> : slots.length===0 ? (
          <div className="text-center py-6">
            <div className="text-3xl mb-2">🤔</div>
            <p className="text-sm text-gray-400 mb-1">Noch kein Name für dich angelegt.</p>
            <p className="text-xs" style={{color:'rgba(255,255,255,0.3)'}}>Bitte den Trainer, deinen Namen im Kader einzutragen.</p>
          </div>
        ) : (
          <div className="space-y-2 max-h-72 overflow-y-auto">
            {slots.map(s=>(
              <button key={s.id} onClick={()=>savePlayer(s)}
                className="w-full flex items-center gap-3 rounded-xl px-4 py-3 text-left transition-all"
                style={{border:'1px solid rgba(255,255,255,0.1)',background:'rgba(255,255,255,0.04)'}}>
                <Avatar name={s.name} color={s.color} size="md" photo={s.photoUrl} number={s.number}/>
                <div>
                  <div className="text-sm font-semibold text-white">{s.name}</div>
                  <div className="text-xs" style={{color:'rgba(255,255,255,0.4)'}}>{s.position||'—'}</div>
                </div>
              </button>
            ))}
          </div>
        )}
        <button onClick={()=>setStep('team')} className="w-full text-xs text-center pt-2" style={{color:'rgba(255,255,255,0.3)'}}>← Zurück</button>
      </div>
    </div>
  );

  // ── STEP: dob (confirm identity) ─────────────────────────────────
  // ── STEP: trainer_team (trainer / dual / vorstand_trainer) ─────────
  if(step==='trainer_team') return (
    <div className="min-h-screen flex flex-col items-center justify-center p-4" style={bg}>
      <Header icon="📋" title="Dein Trainer-Team"
        sub={role==='dual'?'Welches Team trainierst du?':role==='vorstand_trainer'?'Welches Team betreust du?':'Welches Team trainierst du?'}/>
      <div className={cardCls} style={cardStyle}>
        {teams.length===0
          ? <div className="text-center py-6 text-gray-400 text-sm">Noch keine Teams angelegt.</div>
          : <div className="space-y-2">
              {teams.map(t=>(
                <button key={t.id} onClick={()=>{setTrainerTeam(t);setStep((role==='trainer'||role==='dual')?'trainer_name':'nonplayer');}}
                  className="w-full flex items-center gap-3 rounded-xl px-4 py-3 text-left transition-all"
                  style={{border:'1px solid rgba(255,255,255,0.1)',background:'rgba(255,255,255,0.04)'}}>
                  <span className="text-2xl">📋</span>
                  <div>
                    <div className="text-sm font-semibold text-white">{t.name}</div>
                    {t.category&&<div className="text-xs" style={{color:'rgba(255,255,255,0.4)'}}>{t.category}</div>}
                  </div>
                </button>
              ))}
            </div>
        }
        <button onClick={()=>setStep('role')} className="w-full text-xs text-center pt-1" style={{color:'rgba(255,255,255,0.3)'}}>← Zurück</button>
      </div>
    </div>
  );

  // ── STEP: trainer_name (trainer / dual picks from trainer slot list) ───────────
  if(step==='trainer_name') {
    const trainerSlots = slots.filter(s=>s.role==='trainer'&&s.claimed===false&&s.id!==user.uid);

    const handleTrainerSlotPick = async (s) => {
      if(role==='dual') {
        // Dual: merke Trainer-Slot, gehe weiter zu Spieler-Team-Auswahl
        setDualTrainerSlot(s);
        setSelectedTeam(null);
        setStep('dual_player_team');
        return;
      }
      // Trainer only: direkt speichern
      setSaving(true);
      try {
        await col('users').doc(user.uid).set({
          name:          s.name,
          email:         user.email||'',
          role:          'trainer',
          status:        'active',
          teamId:        trainerTeam.id,
          trainerTeamId: trainerTeam.id,
          trainerTeamIds:[trainerTeam.id],
          color:         s.color||randColor(),
          claimed:       true,
          slotId:        s.id,
          claimedAt:     ts(),
          createdAt:     ts(),
        });
        await col('users').doc(s.id).delete();
        onDone();
      } catch(e){ setMsg(e.message); }
      setSaving(false);
    };

    return (
      <div className="min-h-screen flex flex-col items-center justify-center p-4" style={bg}>
        <Header icon="📋" title="Wähle deinen Trainer-Namen"
          sub={role==='dual'?`Schritt 1/3 · Team: ${trainerTeam?.name}`:`Team: ${trainerTeam?.name}`}/>
        <div className={cardCls} style={cardStyle}>
          {loadingSlots ? <Spinner/> : trainerSlots.length===0 ? (
            <div className="text-center py-6">
              <div className="text-3xl mb-2">🤔</div>
              <p className="text-sm text-gray-400 mb-1">Noch kein Trainer-Eintrag für dieses Team.</p>
              <p className="text-xs" style={{color:'rgba(255,255,255,0.3)'}}>Bitte den Vorstand, deinen Namen einzutragen.</p>
            </div>
          ) : (
            <div className="space-y-2 max-h-72 overflow-y-auto">
              {trainerSlots.map(s=>(
                <button key={s.id} onClick={()=>handleTrainerSlotPick(s)} disabled={saving}
                  className="w-full flex items-center gap-3 rounded-xl px-4 py-3 text-left transition-all disabled:opacity-50"
                  style={{border:'1px solid rgba(255,255,255,0.1)',background:'rgba(255,255,255,0.04)'}}>
                  <Avatar name={s.name} color={s.color} size="md" photo={s.photoUrl}/>
                  <div className="text-sm font-semibold text-white">{s.name}</div>
                </button>
              ))}
            </div>
          )}
          {msg&&<p className="text-xs rounded-xl px-4 py-2.5 mt-2" style={{background:'rgba(204,0,0,0.15)',border:'1px solid rgba(204,0,0,0.3)',color:'#ff8080'}}>{msg}</p>}
          <button onClick={()=>setStep('trainer_team')} className="w-full text-xs text-center pt-2" style={{color:'rgba(255,255,255,0.3)'}}>← Zurück</button>
        </div>
      </div>
    );
  }

  // ── STEP: dual_player_team (dual: welches Team spielst du?) ─────────
  if(step==='dual_player_team') return (
    <div className="min-h-screen flex flex-col items-center justify-center p-4" style={bg}>
      <Header icon="⚽" title="Dein Spieler-Team" sub="Schritt 2/3 · In welchem Team spielst du?"/>
      <div className={cardCls} style={cardStyle}>
        {teams.length===0
          ? <div className="text-center py-6 text-gray-400 text-sm">Noch keine Teams angelegt.</div>
          : <div className="space-y-2">
              {teams.map(t=>(
                <button key={t.id} onClick={()=>{setSelectedTeam(t);setStep('dual_player_name');}}
                  className="w-full flex items-center gap-3 rounded-xl px-4 py-3 text-left transition-all"
                  style={{border:'1px solid rgba(255,255,255,0.1)',background:'rgba(255,255,255,0.04)'}}>
                  <span className="text-2xl">⚽</span>
                  <div>
                    <div className="text-sm font-semibold text-white">{t.name}</div>
                    {t.category&&<div className="text-xs" style={{color:'rgba(255,255,255,0.4)'}}>{t.category}</div>}
                  </div>
                </button>
              ))}
            </div>
        }
        <button onClick={()=>setStep('trainer_name')} className="w-full text-xs text-center pt-1" style={{color:'rgba(255,255,255,0.3)'}}>← Zurück</button>
      </div>
    </div>
  );

  // ── STEP: dual_player_name (dual: wähle Spieler-Name) ───────────────
  if(step==='dual_player_name') {
    const saveDual = async (playerSlot) => {
      if(!dualTrainerSlot) { setMsg('Trainer-Slot fehlt – bitte neu starten.'); return; }
      setSaving(true);
      try {
        await col('users').doc(user.uid).set({
          name:           dualTrainerSlot.name,
          email:          user.email||'',
          role:           'dual',
          status:         'active',
          teamId:         selectedTeam.id,
          trainerTeamId:  trainerTeam.id,
          trainerTeamIds: [trainerTeam.id],
          position:       playerSlot.position||'',
          number:         playerSlot.number||'',
          color:          dualTrainerSlot.color||randColor(),
          dob:            playerSlot.dob||dualTrainerSlot.dob||'',
          mitgliedStatus: playerSlot.mitgliedStatus||'',
          claimed:        true,
          claimedAt:      ts(),
          createdAt:      ts(),
        });
        // Beide alten Slots löschen
        await col('users').doc(dualTrainerSlot.id).delete();
        await col('users').doc(playerSlot.id).delete();
        onDone();
      } catch(e){ setMsg(e.message); }
      setSaving(false);
    };

    return (
      <div className="min-h-screen flex flex-col items-center justify-center p-4" style={bg}>
        <Header icon="🔍" title="Wähle deinen Spieler-Namen"
          sub={`Schritt 3/3 · Team: ${selectedTeam?.name}`}/>
        <div className={cardCls} style={cardStyle}>
          {loadingPSlots ? <Spinner/> : playerSlots.length===0 ? (
            <div className="text-center py-6">
              <div className="text-3xl mb-2">🤔</div>
              <p className="text-sm text-gray-400 mb-1">Noch kein Spieler-Eintrag für dieses Team.</p>
              <p className="text-xs" style={{color:'rgba(255,255,255,0.3)'}}>Bitte den Vorstand, deinen Namen einzutragen.</p>
            </div>
          ) : (
            <div className="space-y-2 max-h-72 overflow-y-auto">
              {playerSlots.map(s=>(
                <button key={s.id} onClick={()=>saveDual(s)} disabled={saving}
                  className="w-full flex items-center gap-3 rounded-xl px-4 py-3 text-left transition-all disabled:opacity-50"
                  style={{border:'1px solid rgba(255,255,255,0.1)',background:'rgba(255,255,255,0.04)'}}>
                  <Avatar name={s.name} color={s.color} size="md" photo={s.photoUrl} number={s.number}/>
                  <div>
                    <div className="text-sm font-semibold text-white">{s.name}</div>
                    <div className="text-xs" style={{color:'rgba(255,255,255,0.4)'}}>{s.position||'—'}</div>
                  </div>
                </button>
              ))}
            </div>
          )}
          {msg&&<p className="text-xs rounded-xl px-4 py-2.5 mt-2" style={{background:'rgba(204,0,0,0.15)',border:'1px solid rgba(204,0,0,0.3)',color:'#ff8080'}}>{msg}</p>}
          <button onClick={()=>setStep('dual_player_team')} className="w-full text-xs text-center pt-2" style={{color:'rgba(255,255,255,0.3)'}}>← Zurück</button>
        </div>
      </div>
    );
  }

  // ── STEP: nonplayer (vorstand / dual / vorstand_trainer) ─────────
  return (
    <div className="min-h-screen flex flex-col items-center justify-center p-4" style={bg}>
      <Header icon={role==='trainer'?'📋':role==='dual'?'🔄':'🏟️'} title="Profil einrichten" sub={user.email}/>
      <div className={cardCls} style={cardStyle}>
        <form onSubmit={saveNonPlayer} className="space-y-3">
          <div>
            <label className={labelCls2}>Vollständiger Name</label>
            <input className={inputCls2} value={name} onChange={e=>setName(e.target.value)} placeholder="Max Mustermann" required/>
          </div>
          {msg&&<p className="text-xs rounded-xl px-4 py-2.5" style={{background:'rgba(204,0,0,0.15)',border:'1px solid rgba(204,0,0,0.3)',color:'#ff8080'}}>{msg}</p>}
          <button type="submit" disabled={saving||!name.trim()}
            className={btnPrimary} style={btnPrimaryStyle}>
            {saving?'⏳ Speichern…':'Profil speichern'}
          </button>
          <button type="button"
            onClick={()=>setStep(role==='trainer'||role==='dual'||role==='vorstand_trainer'?'trainer_team':'role')}
            className="w-full text-xs text-center" style={{color:'rgba(255,255,255,0.25)'}}>← Zurück</button>
        </form>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
//  SPIELER VERKNÜPFEN (Fallback für alte Accounts ohne teamId)
// ═══════════════════════════════════════════════════════════════════
function ClaimPlayer({authUser, profile, onClaimed}) {
  const [teams,       setTeams]       = useState([]);
  const [selectedTeam,setSelectedTeam]= useState(null);
  const [slots,       setSlots]       = useState([]);
  const [loading,     setLoading]     = useState(false);
  const [saving,      setSaving]      = useState(false);
  const [pendingSlot, setPendingSlot] = useState(null);

  useEffect(()=>{
    col('teams').orderBy('name').get().then(s=>setTeams(s.docs.map(d=>({id:d.id,...d.data()}))));
  },[]);

  useEffect(()=>{
    if(!selectedTeam) return;
    setLoading(true);
    const unsub = col('users').where('teamId','==',selectedTeam.id).onSnapshot(s=>{
      const unclaimed = s.docs.map(d=>({id:d.id,...d.data()}))
        .filter(u=>u.role==='player'&&u.claimed===false&&u.id!==authUser.uid)
        .sort((a,b)=>(a.name||'').localeCompare(b.name||''));
      setSlots(unclaimed); setLoading(false);
    });
    return ()=>unsub();
  },[selectedTeam?.id]);

  const claim = async (slot) => {
    const s = slot || pendingSlot;
    if(!s) return;
    setSaving(true);
    try {
      // Slot-Daten ins bestehende Auth-UID-Dokument übertragen
      await col('users').doc(authUser.uid).update({
        name:s.name, position:s.position||'',
        number:s.number||'', color:s.color||randColor(),
        teamId:selectedTeam.id, dob:s.dob||'',
        mitgliedStatus:s.mitgliedStatus||'',
        claimed:true, claimedAt:ts(),
      });
      // Alten Slot löschen → kein doppelter Eintrag
      await col('users').doc(s.id).delete();
      onClaimed();
    } catch(e){alert(e.message);}
    setSaving(false);
  };

  return (
    <div className="min-h-screen bg-gradient-to-br from-red-900 to-gray-950 flex items-center justify-center p-4">
      <div className="w-full max-w-sm">
        <div className="text-center mb-6">
          <div className="text-5xl mb-2">🔗</div>
          <h1 className="text-2xl font-bold text-white">Account verknüpfen</h1>
          <p className="text-red-200 text-sm mt-1">Wähle zuerst dein Team, dann deinen Namen.</p>
        </div>
        <div className="bg-white rounded-2xl shadow-2xl p-5 space-y-3">
          {/* Team picker */}
          {!selectedTeam ? (
            <>
              <p className="text-xs font-semibold text-gray-500 uppercase tracking-wider">Dein Team</p>
              <div className="space-y-2">
                {teams.map(t=>(
                  <button key={t.id} onClick={()=>{setSelectedTeam(t);setSlots([]);setPendingSlot(null);}}
                    className="w-full flex items-center gap-3 border border-gray-200 hover:border-red-500 hover:bg-red-50 rounded-xl px-4 py-3 text-left transition-all">
                    <span className="text-xl">⚽</span>
                    <div>
                      <div className="text-sm font-semibold">{t.name}</div>
                      {t.category&&<div className="text-xs text-gray-400">{t.category}</div>}
                    </div>
                  </button>
                ))}
              </div>
            </>
          ) : (
            <>
              <div className="flex items-center justify-between">
                <p className="text-xs font-semibold text-gray-500 uppercase tracking-wider">Team: {selectedTeam.name}</p>
                <button onClick={()=>setSelectedTeam(null)} className="text-xs text-red-500 hover:underline">Ändern</button>
              </div>
              {loading ? <Spinner/> : slots.length===0 ? (
                <div className="text-center py-6">
                  <div className="text-3xl mb-2">🤔</div>
                  <p className="text-sm text-gray-600">Noch keine freien Plätze in diesem Team.</p>
                  <p className="text-xs text-gray-400 mt-1">Bitte den Trainer, deinen Namen anzulegen.</p>
                </div>
              ) : (
                <div className="space-y-2">
                  {slots.map(s=>(
                    <button key={s.id} onClick={()=>claim(s)} disabled={saving}
                      className="w-full flex items-center gap-3 border border-gray-200 hover:border-red-500 hover:bg-red-50 rounded-xl px-4 py-3 text-left transition-all disabled:opacity-50">
                      <Avatar name={s.name} color={s.color} size="md" photo={s.photoUrl} number={s.number}/>
                      <div><div className="text-sm font-semibold">{s.name}</div>
                        <div className="text-xs text-gray-400">{s.position||'—'}</div>
                      </div>
                    </button>
                  ))}
                </div>
              )}
            </>
          )}
          <button onClick={()=>auth.signOut()} className="w-full text-xs text-gray-400 hover:text-gray-600 text-center pt-1">Abmelden</button>
        </div>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
//  PENDING APPROVAL SCREEN
// ═══════════════════════════════════════════════════════════════════
function PendingApproval({profile}) {
  return (
    <div className="min-h-screen flex flex-col items-center justify-center p-4"
      style={{background:'linear-gradient(160deg,#1a0505 0%,#0d0d0d 45%,#0a0a0a 100%)'}}>
      <div className="w-full max-w-sm text-center">
        <div className="text-6xl mb-4">⚽</div>
        <div className="text-4xl mb-4">⏳</div>
        <h1 className="text-2xl font-black text-white mb-2">Genehmigung ausstehend</h1>
        <p className="text-sm mb-6" style={{color:'rgba(255,255,255,0.5)'}}>
          Hallo <strong className="text-white">{profile.name}</strong>, dein Antrag als <strong className="text-white">{profile.role === 'vorstand_trainer' ? 'Vorstand & Trainer' : 'Vorstand'}</strong> wird geprüft. Der Administrator wird deinen Zugang freischalten.
        </p>
        <div className="rounded-2xl p-4 text-left text-sm mb-6" style={{background:'rgba(255,255,255,0.04)',border:'1px solid rgba(255,255,255,0.08)'}}>
          <div className="font-semibold text-white mb-2 text-xs uppercase tracking-widest">Deine Angaben</div>
          <div style={{color:'rgba(255,255,255,0.5)'}} className="text-xs space-y-1">
            <div>Name: <span className="text-white">{profile.name}</span></div>
            <div>E-Mail: <span className="text-white">{profile.email}</span></div>
          </div>
        </div>
        <button onClick={()=>auth.signOut()} className="text-xs" style={{color:'rgba(255,255,255,0.25)'}}>Abmelden</button>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
//  ADMIN — GENEHMIGUNGEN
// ═══════════════════════════════════════════════════════════════════
function AdminGenehmigungen({show}) {
  const [pending, setPending] = useState([]);
  const [loading, setLoading] = useState(true);

  useEffect(()=>{
    return col('users').where('status','==','pending')
      .onSnapshot(s=>{
        setPending(s.docs.map(d=>({id:d.id,...d.data()})));
        setLoading(false);
      });
  },[]);

  const approve = async (u) => {
    await col('users').doc(u.id).update({status:'active'});
    show(`${u.name} genehmigt ✅`);
  };
  const reject = async (u) => {
    await col('users').doc(u.id).update({status:'rejected', role:'player'});
    show(`${u.name} abgelehnt`,'error');
  };

  if(loading) return <Spinner/>;

  return (
    <div className="p-4">
      <div className="mb-4">
        <h1 className="text-lg font-bold text-white">Registrierungs-Anfragen</h1>
        <p className="text-xs text-gray-400">Vorstand- und Trainer-Accounts müssen genehmigt werden</p>
      </div>
      {pending.length===0 ? (
        <div className="text-center text-gray-400 py-16">
          <div className="text-4xl mb-2">✅</div>
          <p className="text-sm">Keine ausstehenden Anfragen.</p>
        </div>
      ) : (
        <div className="space-y-3">
          {pending.map(u=>(
            <div key={u.id} className="bg-white border border-amber-200 rounded-xl p-4 shadow-sm">
              <div className="flex items-start gap-3 mb-3">
                <Avatar name={u.name} color={u.color} size="md10" photo={u.photoUrl}/>
                <div className="flex-1 min-w-0">
                  <div className="font-semibold text-sm">{u.name}</div>
                  <div className="text-xs text-gray-400">{u.email}</div>
                  <div className="text-xs text-amber-600 font-medium mt-0.5">
                    {u.role==='vorstand_trainer'?'Vorstand & Trainer':'Vorstand'}
                  </div>
                </div>
                <span className="text-xs bg-amber-100 text-amber-700 px-2 py-0.5 rounded-full font-medium">Ausstehend</span>
              </div>
              <div className="flex gap-2">
                <button onClick={()=>reject(u)} className="flex-1 py-2 rounded-lg border border-gray-200 text-xs font-medium text-gray-600 hover:bg-gray-50 transition-colors">
                  ✕ Ablehnen
                </button>
                <button onClick={()=>approve(u)} className="flex-1 py-2 rounded-lg bg-green-600 hover:bg-green-700 text-white text-xs font-medium transition-colors">
                  ✓ Genehmigen
                </button>
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
//  PROFIL-SEITE (Passwort & E-Mail ändern — für alle Nutzer)
// ═══════════════════════════════════════════════════════════════════
function ProfilPage({profile}) {
  const user = firebase.auth().currentUser;
  const [emailForm,  setEmailForm]  = useState({newEmail:'', currentPw:''});
  const [pwForm,     setPwForm]     = useState({currentPw:'', newPw:'', confirmPw:''});
  const [emailMsg,   setEmailMsg]   = useState(null); // {ok, text}
  const [pwMsg,      setPwMsg]      = useState(null);
  const [emailBusy,  setEmailBusy]  = useState(false);
  const [pwBusy,     setPwBusy]     = useState(false);

  const reauth = async (pw) => {
    const cred = firebase.auth.EmailAuthProvider.credential(user.email, pw);
    await user.reauthenticateWithCredential(cred);
  };

  const changeEmail = async (e) => {
    e.preventDefault(); setEmailMsg(null); setEmailBusy(true);
    try {
      await reauth(emailForm.currentPw);
      await user.updateEmail(emailForm.newEmail);
      await col('users').doc(user.uid).update({email: emailForm.newEmail});
      setEmailMsg({ok:true, text:'E-Mail erfolgreich geändert ✅'});
      setEmailForm({newEmail:'', currentPw:''});
    } catch(err) {
      const msg = err.code==='auth/wrong-password' ? 'Falsches aktuelles Passwort.'
                : err.code==='auth/email-already-in-use' ? 'Diese E-Mail wird bereits verwendet.'
                : err.code==='auth/invalid-email' ? 'Ungültige E-Mail-Adresse.'
                : err.message;
      setEmailMsg({ok:false, text:msg});
    }
    setEmailBusy(false);
  };

  const changePassword = async (e) => {
    e.preventDefault(); setPwMsg(null);
    if(pwForm.newPw !== pwForm.confirmPw) { setPwMsg({ok:false, text:'Passwörter stimmen nicht überein.'}); return; }
    if(pwForm.newPw.length < 6) { setPwMsg({ok:false, text:'Passwort muss mindestens 6 Zeichen haben.'}); return; }
    setPwBusy(true);
    try {
      await reauth(pwForm.currentPw);
      await user.updatePassword(pwForm.newPw);
      setPwMsg({ok:true, text:'Passwort erfolgreich geändert ✅'});
      setPwForm({currentPw:'', newPw:'', confirmPw:''});
    } catch(err) {
      const msg = err.code==='auth/wrong-password' ? 'Falsches aktuelles Passwort.' : err.message;
      setPwMsg({ok:false, text:msg});
    }
    setPwBusy(false);
  };

  const MsgBox = ({msg}) => msg ? (
    <div className={`text-xs rounded-lg px-3 py-2 mb-3 ${msg.ok?'bg-green-50 text-green-700':'bg-red-50 text-red-700'}`}>{msg.text}</div>
  ) : null;

  const PwInp = ({label, field, form, setForm}) => (
    <div>
      <label className="block text-xs font-medium text-gray-600 mb-1">{label}</label>
      <input type="password" value={form[field]} onChange={e=>setForm(f=>({...f,[field]:e.target.value}))}
        className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-500" required/>
    </div>
  );

  return (
    <div className="p-4 max-w-md space-y-5">
      <h1 className="text-lg font-bold text-white">👤 Profil</h1>

      {/* Info */}
      <div className="glass-card rounded-2xl p-4">
        <div className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Konto-Info</div>
        <div className="space-y-1.5 text-sm">
          <div className="flex gap-2"><span className="text-gray-400 w-16">Name</span><span className="font-medium">{profile.name}</span></div>
          <div className="flex gap-2"><span className="text-gray-400 w-16">E-Mail</span><span className="font-medium">{user?.email}</span></div>
          <div className="flex gap-2"><span className="text-gray-400 w-16">Rolle</span><span className="font-medium capitalize">{profile.role}</span></div>
        </div>
      </div>

      {/* E-Mail ändern */}
      <div className="glass-card rounded-2xl p-4">
        <div className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">E-Mail ändern</div>
        <MsgBox msg={emailMsg}/>
        <form onSubmit={changeEmail} className="space-y-3">
          <div>
            <label className="block text-xs font-medium text-gray-600 mb-1">Neue E-Mail-Adresse</label>
            <input type="email" value={emailForm.newEmail} onChange={e=>setEmailForm(f=>({...f,newEmail:e.target.value}))}
              className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-red-500" required/>
          </div>
          <PwInp label="Aktuelles Passwort zur Bestätigung" field="currentPw" form={emailForm} setForm={setEmailForm}/>
          <Btn type="submit" className="w-full" disabled={emailBusy}>{emailBusy?'Speichert…':'E-Mail ändern'}</Btn>
        </form>
      </div>

      {/* Passwort ändern */}
      <div className="glass-card rounded-2xl p-4">
        <div className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Passwort ändern</div>
        <MsgBox msg={pwMsg}/>
        <form onSubmit={changePassword} className="space-y-3">
          <PwInp label="Aktuelles Passwort" field="currentPw" form={pwForm} setForm={setPwForm}/>
          <PwInp label="Neues Passwort (min. 6 Zeichen)" field="newPw" form={pwForm} setForm={setPwForm}/>
          <PwInp label="Neues Passwort bestätigen" field="confirmPw" form={pwForm} setForm={setPwForm}/>
          <Btn type="submit" className="w-full" disabled={pwBusy}>{pwBusy?'Speichert…':'Passwort ändern'}</Btn>
        </form>
      </div>
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
//  COOKIE BANNER
// ═══════════════════════════════════════════════════════════════════
function CookieBanner() {
  const KEY = 'kickcoach_cookie_consent';
  const [visible, setVisible] = React.useState(()=> !localStorage.getItem(KEY));
  const [showDs, setShowDs] = React.useState(false);
  const accept = () => { localStorage.setItem(KEY,'accepted'); setVisible(false); };
  const decline = () => { localStorage.setItem(KEY,'declined'); setVisible(false); };
  if (!visible) return null;
  return (
    <>
    {showDs && <DatenschutzModal onClose={()=>setShowDs(false)}/>}
    <div className="fixed bottom-0 inset-x-0 z-[200] p-3 sm:p-4">
      <div className="max-w-2xl mx-auto bg-gray-900 text-white rounded-2xl shadow-2xl p-4 flex flex-col sm:flex-row gap-3 items-start sm:items-center">
        <div className="flex-1 text-sm text-gray-200 leading-relaxed">
          <span className="font-semibold text-white">🍪 Cookie-Hinweis</span><br/>
          Diese App verwendet technisch notwendige Cookies und lokalen Speicher. Es werden keine Tracking- oder Werbe-Cookies gesetzt. <button onClick={()=>setShowDs(true)} className="underline text-red-300 hover:text-white">Datenschutzerklärung</button>
        </div>
        <div className="flex gap-2 flex-shrink-0 w-full sm:w-auto">
          <button onClick={decline} className="flex-1 sm:flex-none px-4 py-2 rounded-xl text-sm border border-gray-600 text-gray-300 hover:bg-gray-700 transition-colors">Ablehnen</button>
          <button onClick={accept} className="flex-1 sm:flex-none px-4 py-2 rounded-xl text-sm bg-red-600 hover:bg-red-500 font-semibold transition-colors">Akzeptieren</button>
        </div>
      </div>
    </div>
    </>
  );
}

// ═══════════════════════════════════════════════════════════════════
//  ROOT APP
// ═══════════════════════════════════════════════════════════════════
function App() {
  const [profile,   setProfile]   = useState(undefined);
  const [authUser,  setAuthUser]  = useState(null);
  const [noProfile, setNoProfile] = useState(false);

  useEffect(()=>{
    return auth.onAuthStateChanged(async (user) => {
      if (user) {
        setAuthUser(user);
        const snap = await col('users').doc(user.uid).get();
        if (snap.exists) {
          setProfile({id:user.uid, ...snap.data()});
          setNoProfile(false);
        } else {
          // Auth vorhanden, aber kein Firestore-Profil → Profil anlegen lassen
          setProfile(null);
          setNoProfile(true);
        }
      } else {
        setAuthUser(null);
        setProfile(null);
        setNoProfile(false);
      }
    });
  },[]);

  if (profile === undefined) return (
    <div className="min-h-screen bg-gradient-to-br from-red-800 to-gray-950 flex items-center justify-center">
      <div className="text-center text-white">
        <div className="text-5xl mb-4">⚽</div>
        <div className="w-8 h-8 border-4 border-white/30 border-t-red-600 rounded-full animate-spin mx-auto"/>
        <p className="text-red-200 text-sm mt-3">KickCoach lädt…</p>
      </div>
    </div>
  );

  // Auth vorhanden aber kein Profil → Profil einrichten
  if (noProfile && authUser) return (
    <CompleteProfile user={authUser} onDone={async ()=>{
      const snap = await col('users').doc(authUser.uid).get();
      if (snap.exists) { setProfile({id:authUser.uid,...snap.data()}); setNoProfile(false); }
    }}/>
  );

  if (!profile) return <LoginPage/>;

  // Vorstand-Account wartet auf Genehmigung
  if (profile.status === 'pending') return <PendingApproval profile={profile}/>;
  if (profile.status === 'rejected') return (
    <div className="min-h-screen bg-gradient-to-br from-red-800 to-gray-950 flex items-center justify-center p-4">
      <div className="text-center">
        <div className="text-4xl mb-4">❌</div>
        <h2 className="text-xl font-bold text-white mb-2">Anfrage abgelehnt</h2>
        <p className="text-red-200 text-sm mb-4">Deine Registrierung als Vorstand wurde nicht genehmigt. Bitte wende dich an den Administrator.</p>
        <button onClick={()=>auth.signOut()} className="text-xs text-red-300 hover:text-white underline">Abmelden</button>
      </div>
    </div>
  );

  // Team-Auswahl nötig wenn noch kein Team gesetzt
  const needsTeam    = (profile.role === 'trainer' || profile.role === 'player') && !profile.teamId;
  const needsDualTeam= profile.role === 'dual' && (!profile.teamId || !profile.trainerTeamId);
  const needsVTTeam  = profile.role === 'vorstand_trainer' && !profile.trainerTeamId;
  if (needsTeam || needsDualTeam || needsVTTeam) return (
    <TeamPicker profile={profile} onTeamSelected={(teams)=>setProfile(p=>({...p,...teams}))}/>
  );

  // Spieler hat Team gewählt aber noch keinen Slot verknüpft
  const needsClaim = profile.role === 'player' && profile.claimed === false && profile.teamId;
  if (needsClaim) return (
    <ClaimPlayer
      authUser={authUser}
      profile={profile}
      onClaimed={async ()=>{
        const snap = await col('users').doc(authUser.uid).get();
        if (snap.exists) setProfile({id:authUser.uid,...snap.data()});
      }}
    />
  );

  if (profile.role === 'vorstand')         return <AdminApp            profile={profile}/>;
  if (profile.role === 'trainer')          return <TrainerApp          profile={profile}/>;
  if (profile.role === 'player')           return <PlayerApp           profile={profile}/>;
  if (profile.role === 'dual')             return <DualApp             profile={profile}/>;
  if (profile.role === 'vorstand_trainer') return <VorstandTrainerApp  profile={profile}/>;

  return (
    <div className="min-h-screen flex items-center justify-center p-8 text-center">
      <div>
        <div className="text-4xl mb-4">⚠️</div>
        <p className="text-gray-600 mb-4">Unbekannte Benutzerrolle.<br/>Bitte Vorstand kontaktieren.</p>
        <button onClick={()=>auth.signOut()} className="text-sm text-gray-500 underline">Abmelden</button>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<><App/><CookieBanner/></>);
</script>
</body>
