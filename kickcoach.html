const col      = (n) => db.collection(n);
const getDocs_ = async (ref) => { const s=await ref.get(); return s.docs.map(d=>({id:d.id,...d.data()})); };

const todayStr = () => new Date().toISOString().split('T')[0];
const fmtDate  = (s) => s ? new Date(s+'T12:00:00').toLocaleDateString('de-DE',{weekday:'short',day:'numeric',month:'short'}) : '';
const fmtTime  = (ts) => {
  if(!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'});
};
const fmtAgo   = (ts) => {
  if(!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  const h = Math.floor((Date.now()-d.getTime())/3600000);
  if(h<1) return 'Gerade eben'; if(h<24) return `vor ${h}h`;
  return d.toLocaleDateString('de-DE',{day:'numeric',month:'long'});
};

async function createNotificationsForTeam(teamId, {type, title, body}, excludeUid=null) {
  try {
    const [players, trainers] = await Promise.all([
      col('users').where('teamId','==',teamId).get(),
      col('users').where('trainerTeamId','==',teamId).get(),
    ]);
    const seen = new Set();
    const docs = [...players.docs, ...trainers.docs].filter(d=>{
      if(seen.has(d.id)||d.id===excludeUid) return false;
      seen.add(d.id); return true;
    });
    await Promise.all(docs.map(d=>col('notifications').add({
      userId:d.id, type, title, body, read:false, createdAt:ts()
    })));
  } catch(e){ console.warn('Notification error', e); }
}

async function createNotificationsForAll({type, title, body}, excludeUid=null) {
  try {
    const snap = await col('users').get();
    await Promise.all(snap.docs.filter(d=>d.id!==excludeUid).map(d=>col('notifications').add({
      userId:d.id, type, title, body, read:false, createdAt:ts()
    })));
  } catch(e){ console.warn('Notification error', e); }
}

// ─── Toast ──────────────────────────────────────────────────────────
function Toast({msg, type='success', onClose}) {
  useEffect(() => { const t=setTimeout(onClose,3200); return ()=>clearTimeout(t); }, []);
  const c = {success:'bg-red-600', error:'bg-red-600', info:'bg-blue-600', warning:'bg-amber-500'};
  return (
    <div className={`${c[type]||c.info} text-white px-4 py-3 rounded-xl shadow-lg text-sm flex items-center gap-3`}>
      <span className="flex-1">{msg}</span>
      <button onClick={onClose} className="opacity-70 hover:opacity-100 flex-shrink-0">✕</button>
    </div>
  );
}
function useToast() {
  const [toasts, setToasts] = useState([]);
  const show = useCallback((msg, type='success') => setToasts(t=>[...t,{id:Date.now(),msg,type}]), []);
  const rm   = useCallback((id) => setToasts(t=>t.filter(x=>x.id!==id)), []);
  const Container = () => (
    <div className="fixed bottom-5 right-5 z-[100] flex flex-col gap-2 max-w-xs">
      {toasts.map(t=><Toast key={t.id} msg={t.msg} type={t.type} onClose={()=>rm(t.id)}/>)}
    </div>
  );
  return {show, Container};
}

// ═══════════════════════════════════════════════════════════════════
//  TEAM AUSWAHL (nach Registrierung / wenn kein Team zugewiesen)
// ═══════════════════════════════════════════════════════════════════
function TeamPicker({profile, onTeamSelected}) {
  const [teams,          setTeams]          = useState([]);
  const [loading,        setLoading]        = useState(true);
  const [saving,         setSaving]         = useState(false);
  // Für Dual-Rolle: Schritt 1 = Spieler-Team, Schritt 2 = Trainer-Team
  const [step,           setStep]           = useState(1);
  const [playerTeamId,   setPlayerTeamId]   = useState('');

  const isDual   = profile.role === 'dual';
  const isVT     = profile.role === 'vorstand_trainer';

  useEffect(()=>{ getDocs_(col('teams').orderBy('name')).then(t=>{ setTeams(t); setLoading(false); }); },[]);

  const pick = async (teamId) => {
    if (isDual && step === 1) {
      setPlayerTeamId(teamId);
      setStep(2);
      return;
    }
    setSaving(true);
    if (isDual) {
      const trainerTeamId = teamId;
      await col('users').doc(profile.id).update({ teamId: playerTeamId, trainerTeamId });
      onTeamSelected({ teamId: playerTeamId, trainerTeamId });
    } else if (isVT) {
      // Vorstand & Trainer: nur trainerTeamId nötig
      await col('users').doc(profile.id).update({ trainerTeamId: teamId });
      onTeamSelected({ trainerTeamId: teamId });
    } else {
      await col('users').doc(profile.id).update({ teamId });
      onTeamSelected({ teamId });
    }
    setSaving(false);
  };

  const ROLE_LABEL = {player:'Spieler', trainer:'Trainer', vorstand:'Vorstand', dual:'Trainer & Spieler', vorstand_trainer:'Vorstand & Trainer'};
  const stepLabel  = isDual
    ? (step===1 ? '⚽ Als welches Team spielst du selbst?' : '📋 Welches Team trainierst du?')
    : isVT ? '🎯 Welches Team trainierst du?'
    : 'Welchem Team gehörst du an?';
  const stepHint   = isDual && step===2 ? `Spieler bei: ${teams.find(t=>t.id===playerTeamId)?.name||''}` : null;

  return (
    <div className="min-h-screen bg-gradient-to-br from-red-800 to-gray-950 flex items-center justify-center p-4">
      <div className="w-full max-w-sm">
        <div className="text-center mb-6">
          <div className="text-5xl mb-2">⚽</div>
          <h1 className="text-2xl font-bold text-white">Team wählen</h1>
          <p className="text-red-200 text-sm mt-1">Hallo {profile.name} · {ROLE_LABEL[profile.role]||profile.role}</p>
          {isDual && (
            <div className="flex justify-center gap-1.5 mt-3">
              {[1,2].map(s=>(
                <div key={s} className={`h-1.5 w-8 rounded-full transition-all ${step>=s?'bg-red-400':'bg-white/20'}`}/>
              ))}
            </div>
          )}
        </div>
        <div className="bg-white rounded-2xl shadow-2xl p-5">
          {loading ? <Spinner/> : teams.length === 0 ? (
            <div className="text-center py-8">
              <div className="text-4xl mb-3">🏟️</div>
              <p className="text-sm text-gray-600 mb-2">Noch keine Teams vorhanden.</p>
              <p className="text-xs text-gray-400">Der Vorstand muss zuerst Teams anlegen.</p>
              <button onClick={()=>auth.signOut()} className="mt-4 text-xs text-gray-400 underline">Abmelden</button>
            </div>
          ) : (
            <>
              <p className="text-sm font-medium text-gray-700 mb-1">{stepLabel}</p>
              {stepHint && <p className="text-xs text-red-500 mb-3">✓ {stepHint}</p>}
              <div className="space-y-2 mt-3">
                {teams.map(t=>(
                  <button key={t.id} onClick={()=>pick(t.id)} disabled={saving || (isDual && step===2 && t.id===playerTeamId)}
                    className="w-full flex items-center gap-3 border-2 border-gray-200 hover:border-red-500 hover:bg-red-50 rounded-xl px-4 py-3.5 text-left transition-all disabled:opacity-30">
                    <div className="w-10 h-10 rounded-xl bg-red-100 flex items-center justify-center text-lg flex-shrink-0">🏟️</div>
                    <div>
                      <div className="text-sm font-semibold">{t.name}</div>
                      {t.category&&<div className="text-xs text-gray-400">{t.category}</div>}
                      {isDual && step===2 && t.id===playerTeamId && <div className="text-xs text-gray-300">Bereits als Spieler gewählt</div>}
                    </div>
                  </button>
                ))}
              </div>
              {isDual && step===2 && (
                <button onClick={()=>setStep(1)} className="mt-3 text-xs text-gray-400 hover:text-gray-600">← Zurück</button>
              )}
              <button onClick={()=>auth.signOut()} className="mt-4 w-full text-xs text-gray-400 hover:text-gray-600 text-center">Abmelden</button>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

function NotificationBell({profile}) {
  const [notifs, setNotifs] = useState([]);
  const [open, setOpen] = useState(false);

  useEffect(()=>{
    if(!profile?.id) return;
    return col('notifications').where('userId','==',profile.id)
      .orderBy('createdAt','desc').limit(30)
      .onSnapshot(s=>setNotifs(s.docs.map(d=>({id:d.id,...d.data()}))));
  },[profile?.id]);

  const unread = notifs.filter(n=>!n.read).length;

  const markAllRead = async () => {
    const unreadDocs = notifs.filter(n=>!n.read);
    await Promise.all(unreadDocs.map(n=>col('notifications').doc(n.id).update({read:true})));
  };

  const deleteNotif = async (id, e) => {
    e.stopPropagation();
    await col('notifications').doc(id).delete();
  };

  const handleOpen = () => {
    setOpen(o=>!o);
    if(!open && unread>0) markAllRead();
  };

  const TYPE_ICON = {training:'🏃', spiel:'⚽', news:'📢'};

  return (
    <div className="relative">
      <button onClick={handleOpen}
        className="relative flex items-center justify-center w-8 h-8 rounded-lg text-white/40 hover:text-white hover:bg-white/10 transition-colors">
        🔔
        {unread>0 && (
          <span className="absolute -top-0.5 -right-0.5 w-4 h-4 bg-red-500 rounded-full text-[10px] font-bold text-white flex items-center justify-center">
            {unread>9?'9+':unread}
          </span>
        )}
      </button>
      {open && (
        <div className="absolute bottom-10 left-0 w-72 bg-gray-900 border border-white/10 rounded-xl shadow-2xl overflow-hidden z-50"
          style={{maxHeight:'360px'}}>
          <div className="flex items-center justify-between px-3 py-2 border-b border-white/10">
            <span className="text-xs font-semibold text-white">Benachrichtigungen</span>
            {notifs.length>0 && (
              <button onClick={async()=>{
                if(confirm('Alle löschen?'))
                  await Promise.all(notifs.map(n=>col('notifications').doc(n.id).delete()));
              }} className="text-[10px] text-white/30 hover:text-white/60">Alle löschen</button>
            )}
          </div>
          <div className="overflow-y-auto" style={{maxHeight:'300px'}}>
            {notifs.length===0 && (
              <div className="px-4 py-6 text-center text-white/30 text-xs">Keine Benachrichtigungen</div>
            )}
            {notifs.map(n=>(
              <div key={n.id} className={`flex items-start gap-2 px-3 py-2.5 border-b border-white/5 hover:bg-white/5 ${!n.read?'bg-white/5':''}`}>
                <span className="text-base flex-shrink-0 mt-0.5">{TYPE_ICON[n.type]||'🔔'}</span>
                <div className="flex-1 min-w-0">
                  <div className={`text-xs font-semibold truncate ${n.read?'text-white/50':'text-white'}`}>{n.title}</div>
                  <div className="text-[11px] text-white/40 leading-snug mt-0.5">{n.body}</div>
                  {n.createdAt && <div className="text-[10px] text-white/20 mt-0.5">{fmtAgo(n.createdAt)}</div>}
                </div>
                <button onClick={e=>deleteNotif(n.id,e)} className="text-white/20 hover:text-white/60 text-xs flex-shrink-0">✕</button>
              </div>
            ))}
          </div>
        </div>
      )}
      {open && <div className="fixed inset-0 z-40" onClick={()=>setOpen(false)}/>}
    </div>
  );
}

const fmtAge = (dob) => {
  if(!dob) return null;
  const today = new Date(), birth = new Date(dob);
  let age = today.getFullYear() - birth.getFullYear();
  const m = today.getMonth() - birth.getMonth();
  if(m<0||(m===0&&today.getDate()<birth.getDate())) age--;
  return age;
};
const fmtDob = (dob) => {
  if(!dob) return '';
  const d = new Date(dob+'T12:00:00');
  return d.toLocaleDateString('de-DE',{day:'2-digit',month:'2-digit',year:'numeric'});
};

const ALL_POSITIONS = ['Torwart','Abwehr','Mittelfeld','Sturm','offen'];
const getPositions = (p) => {
  if(p.positions?.length) return p.positions;
  if(p.position) return [p.position];
  return ['offen'];
};

function TrainerKader({profile, show}) {
  const EMPTY = {name:'',positions:[],number:'',dob:''};
  const [players,  setPlayers]  = useState([]);
  const [open,     setOpen]     = useState(false);
  const [editing,  setEditing]  = useState(null);
  const [form,     setForm]     = useState(EMPTY);
  const [loading,  setLoading]  = useState(false);
  const [delId,    setDelId]    = useState(null);
  const [detail,   setDetail]   = useState(null); // player for recommendation modal

  useEffect(()=>{
    return col('users').where('teamId','==',profile.teamId).where('role','==','player')
      .onSnapshot(s=>setPlayers(s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>{const ai=ALL_POSITIONS.indexOf(getPositions(a)[0]);const bi=ALL_POSITIONS.indexOf(getPositions(b)[0]);return (ai===-1?99:ai)-(bi===-1?99:bi)||(a.name||'').localeCompare(b.name||'');})));
  },[]);

  const openNew  = () => { setEditing(null); setForm(EMPTY); setOpen(true); };
  const openEdit = (p) => { setEditing(p.id); setForm({name:p.name||'',positions:getPositions(p),number:p.number||'',dob:p.dob||''}); setOpen(true); };
  const togglePos = (pos) => setForm(f=>({...f, positions: f.positions.includes(pos)?f.positions.filter(x=>x!==pos):[...f.positions,pos]}));

  const save = async (e) => {
    e.preventDefault(); setLoading(true);
    try {
      const positions = form.positions.length ? form.positions : ['offen'];
      if (editing) {
        await col('users').doc(editing).update({
          name: form.name.trim(), positions, position: positions[0],
          number: form.number, dob: form.dob,
        });
        show('Spieler aktualisiert ✅');
      } else {
        await col('users').add({
          name: form.name.trim(), role: 'player',
          teamId: profile.teamId, positions, position: positions[0],
          number: form.number, dob: form.dob,
          color: randColor(), claimed: false, uid: '', email: '', createdAt: ts()
        });
        show('Spieler angelegt ✅ — Spieler muss sich noch registrieren und verknüpfen.');
      }
      setForm(EMPTY); setOpen(false); setEditing(null);
    } catch(err) { show(err.message,'error'); }
    setLoading(false);
  };

  const doDelete = async () => {
    await col('users').doc(delId).delete();
    show('Spieler entfernt'); setDelId(null);
  };

  return (
    <div className="p-4">
      <div className="flex items-center justify-between mb-4">
        <div>
          <h1 className="text-lg font-semibold">Kader</h1>
          <p className="text-xs text-gray-400">{players.filter(p=>p.claimed).length}/{players.length} Spieler verknüpft</p>
        </div>
        <Btn size="sm" onClick={openNew}>+ Spieler</Btn>
      </div>

      {delId && (
        <Modal title="Spieler entfernen?" onClose={()=>setDelId(null)}>
          <p className="text-sm text-gray-600 mb-4">Diesen Spieler aus dem Kader entfernen?</p>
          <div className="flex gap-2">
            <Btn variant="secondary" className="flex-1" onClick={()=>setDelId(null)}>Abbrechen</Btn>
            <Btn className="flex-1 bg-red-700" onClick={doDelete}>Entfernen</Btn>
          </div>
        </Modal>
      )}

      {detail && (
        <TrainerPlayerDetail
          player={{...detail, _trainerName: profile.name}}
          onClose={()=>setDetail(null)}
          show={show}
        />
      )}

      {open && (
        <Modal title={editing ? 'Spieler bearbeiten' : 'Spieler anlegen'} onClose={()=>{setOpen(false);setEditing(null);}}>
          {!editing && (
            <p className="text-xs text-gray-500 mb-3 bg-blue-50 border border-blue-100 rounded-lg px-3 py-2">
              ℹ️ Nur Name und Position eintragen. Der Spieler registriert sich selbst und sucht dann seinen Namen.
            </p>
          )}
          <form onSubmit={save}>
            <Inp label="Name" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Max Mustermann" required/>
            <Inp label="Geburtsdatum" type="date" value={form.dob} onChange={e=>setForm({...form,dob:e.target.value})}/>
            <div className="mb-3">
              <label className="block text-xs font-medium text-gray-600 mb-1.5">Position(en)</label>
              <div className="flex flex-wrap gap-1.5">
                {ALL_POSITIONS.map(p=>{
                  const sel=(form.positions||[]).includes(p);
                  return <button key={p} type="button" onClick={()=>togglePos(p)}
                    className={`px-3 py-1.5 rounded-lg text-xs font-medium border-2 transition-all ${sel?'border-red-500 bg-red-50 text-red-700':'border-gray-200 text-gray-500 hover:border-gray-300'}`}>{p}</button>;
                })}
              </div>
            </div>
            <div className="w-24 mb-3">
              <label className="block text-xs font-medium text-gray-600 mb-1">Nr.</label>
              <input value={form.number} onChange={e=>setForm({...form,number:e.target.value})} placeholder="#"

            </div>
            <div className="flex gap-2 mt-1">
              <Btn type="button" variant="secondary" className="flex-1" onClick={()=>{setOpen(false);setEditing(null);}}>Abbrechen</Btn>
              <Btn type="submit" className="flex-1" disabled={loading}>{loading?'…':editing?'Speichern':'Anlegen'}</Btn>

        <div className="text-center text-gray-400 py-16"><div className="text-4xl mb-2">👥</div><p className="text-sm">Noch keine Spieler im Kader.</p></div>
      ) : (
        <div className="space-y-1.5">
          {players.map(p=>{
            const pos = getPositions(p);
            return (
              <div key={p.id} onClick={()=>setDetail(p)}

                  {p.number||initials(p.name)}

                <div className="min-w-0 flex-1">
                  <div className="text-sm font-medium truncate">{p.name}</div>
                  <div className="flex flex-wrap gap-1 mt-0.5">
                    {pos.map(po=><span key={po} className="text-[10px] bg-gray-100 text-gray-500 px-1.5 py-0.5 rounded">{po}</span>)}
                    {p.dob && <span className="text-[10px] text-gray-400">{fmtAge(p.dob)} J.</span>}
                    {p.empfehlung?.team && <span className="text-[10px] text-blue-600">📋 {p.empfehlung.team}</span>}
                  </div>
                </div>
                <div className="flex gap-1 flex-shrink-0 items-center">

                  <button onClick={e=>{e.stopPropagation();setDelId(p.id);}} className="text-gray-400 hover:text-red-600 px-1.5 py-1 rounded-lg hover:bg-red-50 text-xs">🗑</button>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

function TrainerTraining({profile, show}) {
  const EMPTY = {date:'',time:'18:00',duration:'90',location:'',notes:'',drillIds:[],uebungIds:[]};
  const [sessions,   setSessions]  = useState([]);
  const [drills,     setDrills]    = useState([]);
  const [uebungen,   setUebungen]  = useState([]);
  const [players,    setPlayers]   = useState([]);
  const [attMap,     setAttMap]    = useState({});
  const [open,       setOpen]      = useState(false);
  const [editing,    setEditing]   = useState(null);
  const [form,       setForm]      = useState(EMPTY);
  const [deleting,   setDeleting]  = useState(null);
  const [detail,     setDetail]    = useState(null);
  const [uebSearch,  setUebSearch] = useState('');

  useEffect(()=>{
    const u1=col('sessions').where('teamId','==',profile.teamId)
      .onSnapshot(s=>setSessions(s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>a.date?.localeCompare(b.date||''))));
    const u2=col('drills').where('teamId','==',profile.teamId)
      .onSnapshot(s=>setDrills(s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a.name||'').localeCompare(b.name||''))));
    const u3=col('users').where('teamId','==',profile.teamId)
      .onSnapshot(s=>setPlayers(s.docs.map(d=>({id:d.id,...d.data()})).filter(p=>p.role==='player'||p.role==='dual')));
    const u4=col('attendance').where('teamId','==',profile.teamId)
      .onSnapshot(s=>{
        const map={};
        s.docs.forEach(d=>{
          const {sessionId,userId,status}=d.data();
          if(!map[sessionId]) map[sessionId]={yes:0,no:0,maybe:0,byPlayer:{}};
          if(status==='yes')   map[sessionId].yes++;
          if(status==='no')    map[sessionId].no++;
          if(status==='maybe') map[sessionId].maybe++;
          map[sessionId].byPlayer[userId]=status;
        });
        setAttMap(map);
      });
    const u5=col('uebungen').orderBy('title')
      .onSnapshot(s=>setUebungen(s.docs.map(d=>({id:d.id,...d.data()}))));
    return ()=>{u1();u2();u3();u4();u5();};
  },[]);

  const openNew  = () => { setEditing(null); setForm(EMPTY); setUebSearch(''); setOpen(true); };
  const openEdit = (s) => { setEditing(s.id); setForm({date:s.date||'',time:s.time||'18:00',duration:s.duration||'90',location:s.location||'',notes:s.notes||'',drillIds:s.drillIds||[],uebungIds:s.uebungIds||[]}); setUebSearch(''); setOpen(true); };

  const save = async (e) => {
    e.preventDefault();
    if (editing) {
      await col('sessions').doc(editing).update({...form});
      show('Trainingseinheit aktualisiert ✅');
    } else {
      const ref = await col('sessions').add({...form, teamId:profile.teamId, createdAt:ts()});
      show('Trainingseinheit gespeichert ✅');
      // E-Mail-Benachrichtigung (im Hintergrund, kein await um UI nicht zu blockieren)
      notifyNewTraining({...form, teamId:profile.teamId, id:ref.id}).catch(()=>{});
    }
    setForm(EMPTY); setOpen(false); setEditing(null);
  };

  const doDelete = async (id) => {
    await col('sessions').doc(id).delete();
    show('Einheit gelöscht'); setDeleting(null);
  };

  // Trainer setzt Status für einen Spieler
  const setPlayerStatus = async (sessionId, playerId, playerName, status) => {
    const existing = await col('attendance')
      .where('sessionId','==',sessionId).where('userId','==',playerId).limit(1).get();
    if (existing.empty) {
      await col('attendance').add({sessionId, userId:playerId, playerName, status, teamId:profile.teamId, setByTrainer:true, updatedAt:ts()});
    } else {
      await existing.docs[0].ref.update({status, setByTrainer:true, updatedAt:ts()});
    }
  };

  const toggleDrill   = (id) => setForm(f=>({...f, drillIds:  f.drillIds.includes(id) ?f.drillIds.filter(x=>x!==id) :[...f.drillIds,id]}));
  const toggleUebung  = (id) => setForm(f=>({...f, uebungIds: f.uebungIds.includes(id)?f.uebungIds.filter(x=>x!==id):[...f.uebungIds,id]}));
  const drillMap    = Object.fromEntries(drills.map(d=>[d.id,d]));
  const uebungenMap = Object.fromEntries(uebungen.map(u=>[u.id,u]));
  const filteredUeb = uebungen.filter(u=>!uebSearch||(u.title||'').toLowerCase().includes(uebSearch.toLowerCase())||(u.category||'').toLowerCase().includes(uebSearch.toLowerCase()));
  const upcoming = sessions.filter(s=>s.date>=todayStr());
  const past     = sessions.filter(s=>s.date<todayStr());

  return (
    <div className="p-4">
      <div className="flex items-center justify-between mb-4">
        <h1 className="text-lg font-semibold">Trainingsplan</h1>
        <Btn size="sm" onClick={openNew}>+ Einheit</Btn>
      </div>

      {deleting && (
        <Modal title="Einheit löschen?" onClose={()=>setDeleting(null)}>
          <p className="text-sm text-gray-600 mb-4">Diese Trainingseinheit wirklich löschen?</p>
          <div className="flex gap-2">
            <Btn variant="secondary" className="flex-1" onClick={()=>setDeleting(null)}>Abbrechen</Btn>
            <Btn className="flex-1 bg-red-700" onClick={()=>doDelete(deleting)}>Löschen</Btn>
          </div>
        </Modal>
      )}

      {/* Detailansicht */}
      {detail && (
        <SessionDetail
          session={detail}
          drillMap={drillMap}
          uebungenMap={uebungenMap}
          players={players}
          att={attMap[detail.id]||{yes:0,no:0,maybe:0,byPlayer:{}}}
          onSetStatus={setPlayerStatus}
          onEdit={(s)=>{setDetail(null);openEdit(s);}}
          onClose={()=>setDetail(null)}
          show={show}
        />
      )}

      {open && (
        <Modal title={editing ? 'Einheit bearbeiten' : 'Trainingseinheit'} onClose={()=>{setOpen(false);setEditing(null);}}>
          <form onSubmit={save}>
            <div className="flex gap-2">
              <Inp label="Datum" type="date" value={form.date} onChange={e=>setForm({...form,date:e.target.value})} required/>
              <Inp label="Zeit" type="time" value={form.time} onChange={e=>setForm({...form,time:e.target.value})}/>
            </div>
            <div className="flex gap-2">
              <Inp label="Dauer (Min)" value={form.duration} onChange={e=>setForm({...form,duration:e.target.value})}/>
              <Inp label="Ort" value={form.location} onChange={e=>setForm({...form,location:e.target.value})} placeholder="Platz 1"/>
            </div>
            <Txt label="Notizen / Inhalte" value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})}/>
            {drills.length>0 && (
              <div className="mb-3">
                <label className="block text-xs font-medium text-gray-600 mb-2">Taktik-Übungen (Taktikboard)</label>
                <div className="space-y-1 max-h-28 overflow-y-auto border border-gray-100 rounded-lg p-2">
                  {drills.map(d=>(
                    <label key={d.id} className="flex items-center gap-2 text-xs cursor-pointer hover:bg-gray-50 rounded px-1 py-0.5">
                      <input type="checkbox" checked={form.drillIds.includes(d.id)} onChange={()=>toggleDrill(d.id)} className="accent-red-600"/>
                      {d.imageData && <img src={d.imageData} className="w-8 h-5 object-cover rounded" alt=""/>}
                      <span>{d.name}</span>
                    </label>
                  ))}
                </div>
              </div>
            )}
            {uebungen.length>0 && (
              <div className="mb-3">
                <label className="block text-xs font-medium text-gray-600 mb-2">
                  Übungsdatenbank {form.uebungIds.length>0 && <span className="text-red-600">({form.uebungIds.length} gewählt)</span>}
                </label>
                <input value={uebSearch} onChange={e=>setUebSearch(e.target.value)} placeholder="🔍 Suche…"
                  className="w-full border border-gray-100 rounded-lg px-2 py-1.5 text-xs mb-2 focus:outline-none focus:ring-1 focus:ring-red-500"/>
                <div className="space-y-1 max-h-36 overflow-y-auto border border-gray-100 rounded-lg p-2">
                  {filteredUeb.map(u=>(
                    <label key={u.id} className={`flex items-center gap-2 text-xs cursor-pointer rounded px-1 py-1 transition-colors ${form.uebungIds.includes(u.id)?'bg-red-50':'hover:bg-gray-50'}`}>
                      <input type="checkbox" checked={form.uebungIds.includes(u.id)} onChange={()=>toggleUebung(u.id)} className="accent-red-600 flex-shrink-0"/>
                      {u.imageData && <img src={u.imageData} className="w-8 h-6 object-cover rounded flex-shrink-0" alt=""/>}
                      <div className="min-w-0">
                        <div className="font-medium truncate">{u.title}</div>
                        <div className="text-gray-400">{u.category} · {u.ageRange}{u.duration?' · '+u.duration+' Min':''}</div>
                      </div>
                    </label>
                  ))}
                  {filteredUeb.length===0 && <div className="text-xs text-gray-400 text-center py-2">Keine Übungen gefunden</div>}
                </div>
              </div>
            )}
            <div className="flex gap-2">
              <Btn type="button" variant="secondary" className="flex-1" onClick={()=>{setOpen(false);setEditing(null);}}>Abbrechen</Btn>
              <Btn type="submit" className="flex-1">{editing?'Aktualisieren':'Speichern'}</Btn>
            </div>
          </form>
        </Modal>
      )}

      {sessions.length===0 ? (
        <div className="text-center text-gray-400 py-16"><div className="text-4xl mb-2">📅</div><p className="text-sm">Noch keine Einheiten geplant.</p></div>
      ) : (
        <div className="space-y-2">
          {upcoming.length>0 && <>
            <div className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Bevorstehend</div>
            {upcoming.map(s=><SessionCard key={s.id} s={s} drillMap={drillMap} att={attMap[s.id]} onDetail={()=>setDetail(s)} onEdit={openEdit} onDelete={()=>setDeleting(s.id)}/>)}
          </>}
          {past.length>0 && <>
            <div className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2 mt-4">Vergangen</div>
            {past.map(s=><SessionCard key={s.id} s={s} drillMap={drillMap} att={attMap[s.id]} faded onDetail={()=>setDetail(s)} onEdit={openEdit} onDelete={()=>setDeleting(s.id)}/>)}
          </>}
        </div>
      )}
    </div>
  );
}

const SessionCard = ({s, drillMap, att, faded=false, onDetail, onEdit, onDelete}) => (
  <div className={`border rounded-xl overflow-hidden ${faded?'bg-gray-50 border-gray-200 opacity-80':'bg-white border-gray-200'}`}>
    {/* Anklickbarer Hauptbereich */}
    <div className="p-4 cursor-pointer hover:bg-gray-50 transition-colors" onClick={onDetail}>
      <div className="flex items-start justify-between gap-2">
        <div>
          <div className="font-semibold text-sm">{fmtDate(s.date)} · {s.time} Uhr</div>
          <div className="text-xs text-gray-400 mt-0.5">{s.duration} Min{s.location?' · '+s.location:''}</div>
        </div>
        {/* Zusagen-Badges */}
        <div className="flex gap-1 flex-shrink-0">
          {att && (att.yes>0||att.no>0||att.maybe>0) ? <>
            <span className="text-[11px] bg-green-100 text-green-700 px-2 py-0.5 rounded-full font-medium">✅ {att.yes}</span>
            <span className="text-[11px] bg-red-100 text-red-600 px-2 py-0.5 rounded-full font-medium">❌ {att.no}</span>
            <span className="text-[11px] bg-amber-100 text-amber-600 px-2 py-0.5 rounded-full font-medium">❓ {att.maybe}</span>
          </> : <span className="text-[10px] text-gray-300">Keine Zusagen</span>}
        </div>
      </div>
      {s.notes && <p className="text-xs text-gray-600 mt-1.5 leading-relaxed line-clamp-2">{s.notes}</p>}
      {s.drillIds?.length>0 && (
        <div className="flex gap-1.5 mt-2 flex-wrap">
          {s.drillIds.slice(0,3).map(id=>drillMap[id]&&(
            <span key={id} className="text-[10px] bg-blue-50 text-blue-600 border border-blue-100 rounded px-1.5 py-0.5">{drillMap[id].name}</span>
          ))}
          {s.drillIds.length>3&&<span className="text-[10px] text-gray-400">+{s.drillIds.length-3} weitere</span>}
        </div>
      )}
    </div>
    {/* Aktionen */}
    <div className="flex border-t border-gray-100">
      <button onClick={onDetail} className="flex-1 py-2 text-xs text-gray-500 hover:bg-gray-50 hover:text-red-600 transition-colors">👁 Details</button>
      <button onClick={()=>onEdit(s)} className="flex-1 py-2 text-xs text-gray-500 hover:bg-gray-50 hover:text-red-600 transition-colors border-l border-gray-100">✏️ Bearbeiten</button>
      <button onClick={onDelete} className="flex-1 py-2 text-xs text-gray-500 hover:bg-red-50 hover:text-red-600 transition-colors border-l border-gray-100">🗑 Löschen</button>
    </div>
  </div>
);

function SessionDetail({session, drillMap, uebungenMap={}, players, att, onSetStatus, onEdit, onClose, show, readOnly=false}) {
  const [saving,    setSaving]   = useState({});
  const [media,     setMedia]    = useState([]);
  const [uploading, setUploading]= useState(false);
  const [uploadErr, setUploadErr]= useState('');
  const [viewer,    setViewer]   = useState(null); // {name, type, data} inline viewer
  const [uebImgViewer, setUebImgViewer] = useState(null); // fullscreen exercise image
  const fileRef = useRef();

  // Lade Anhänge aus Firestore-Subcollection (kein Firebase Storage nötig)
  useEffect(()=>{
    return col('sessionMedia').where('sessionId','==',session.id)
      .onSnapshot(s=>setMedia(s.docs.map(d=>({id:d.id,...d.data()}))));
  },[session.id]);

  const setStatus = async (player, status) => {
    setSaving(v=>({...v,[player.id]:true}));
    await onSetStatus(session.id, player.id, player.name, status);
    setSaving(v=>({...v,[player.id]:false}));
  };

  // Upload: Datei → Base64 → Firestore (max 700KB, kein Firebase Storage)
  const uploadFile = async (e) => {
    const file = e.target.files?.[0]; if(!file) return;
    if(file.size > 700*1024) {
      setUploadErr(`Datei zu groß (${Math.round(file.size/1024)} KB). Maximal 700 KB erlaubt.`);
      e.target.value=''; return;
    }
    setUploading(true); setUploadErr('');
    try {
      const data = await new Promise((res,rej)=>{
        const r = new FileReader();
        r.onload = ()=>res(r.result.split(',')[1]);
        r.onerror = rej;
        r.readAsDataURL(file);
      });
      await col('sessionMedia').add({
        sessionId: session.id,
        teamId: session.teamId||'',
        name: file.name,
        type: file.type,
        data,
        size: file.size,
        uploadedAt: new Date().toISOString(),
      });
      if(show) show('Datei hochgeladen ✅');
    } catch(err){ setUploadErr(err.message||'Upload fehlgeschlagen'); }
    setUploading(false);
    e.target.value='';
  };

  const deleteFile = async (m) => {
    if(!window.confirm(`"${m.name}" wirklich löschen?`)) return;
    await col('sessionMedia').doc(m.id).delete();
  };

  // Inline-Viewer öffnen
  const openViewer = (m) => setViewer(m);

  // Base64 → Blob-URL für iframe (PDF)
  const blobUrl = React.useMemo(()=>{
    if(!viewer || !viewer.type.includes('pdf')) return null;
    try {
      const bytes = atob(viewer.data);
      const arr = new Uint8Array(bytes.length);
      for(let i=0;i<bytes.length;i++) arr[i]=bytes.charCodeAt(i);
      return URL.createObjectURL(new Blob([arr],{type:'application/pdf'}));
    } catch(e){ return null; }
  },[viewer]);

  const fileIcon = (type='') => {
    if(type.startsWith('image/')) return '🖼️';
    if(type.includes('pdf'))      return '📄';
    if(type.includes('word')||type.includes('document')) return '📝';
    return '📎';
  };

  const images = media.filter(m=>m.type?.startsWith('image/'));
  const docs   = media.filter(m=>!m.type?.startsWith('image/'));

  const STATUS_OPTS = [
    {v:'yes',   icon:'✅', on:'bg-green-600 text-white', off:'bg-gray-100 text-gray-500 hover:bg-green-50'},
    {v:'maybe', icon:'❓', on:'bg-amber-500 text-white', off:'bg-gray-100 text-gray-500 hover:bg-amber-50'},
    {v:'no',    icon:'❌', on:'bg-red-600 text-white',   off:'bg-gray-100 text-gray-500 hover:bg-red-50'},
  ];

  return (
    <>
    <div className="fixed inset-0 bg-black/60 z-50 flex items-end md:items-center justify-center p-0 md:p-4" onClick={onClose}>
      <div className="bg-white w-full md:max-w-lg md:rounded-2xl rounded-t-2xl max-h-[90vh] flex flex-col shadow-2xl" onClick={e=>e.stopPropagation()}>
        {/* Header */}
        <div className="flex items-center justify-between px-5 py-4 border-b border-gray-100">
          <div>
            <div className="font-bold text-base">{fmtDate(session.date)} · {session.time} Uhr</div>
            <div className="text-xs text-gray-400">{session.duration} Min{session.location?' · '+session.location:''}</div>
          </div>
          <div className="flex gap-2">
            {!readOnly && <button onClick={()=>onEdit(session)} className="text-xs text-gray-500 hover:text-red-600 px-2 py-1.5 border border-gray-200 rounded-lg">✏️ Bearbeiten</button>}
            <button onClick={onClose} className="w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 text-gray-500 hover:bg-gray-200">✕</button>
          </div>
        </div>

        <div className="overflow-y-auto flex-1 p-5 space-y-5">
          {/* Rückmeldungen — nur für Trainer */}
          {!readOnly && (
            <div>
              <div className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Rückmeldungen</div>
              <div className="flex gap-3 mb-4">
                <div className="flex-1 bg-green-50 border border-green-200 rounded-xl p-3 text-center">
                  <div className="text-2xl font-bold text-green-600">{att.yes}</div>
                  <div className="text-[10px] text-green-500 font-medium">Zusagen</div>
                </div>
                <div className="flex-1 bg-amber-50 border border-amber-200 rounded-xl p-3 text-center">
                  <div className="text-2xl font-bold text-amber-500">{att.maybe}</div>
                  <div className="text-[10px] text-amber-400 font-medium">Vielleicht</div>
                </div>
                <div className="flex-1 bg-red-50 border border-red-200 rounded-xl p-3 text-center">
                  <div className="text-2xl font-bold text-red-600">{att.no}</div>
                  <div className="text-[10px] text-red-400 font-medium">Absagen</div>
                </div>
              </div>
              <div className="space-y-2">
                {players.map(p=>{
                  const cur = att.byPlayer?.[p.id]||null;
                  return (
                    <div key={p.id} className="flex items-center gap-2">
                      <div className="w-7 h-7 rounded-full flex items-center justify-center text-white text-[10px] font-bold flex-shrink-0" style={{background:p.color||'#CC0000'}}>
                        {p.number||initials(p.name)}
                      </div>
                      <div className="flex-1 min-w-0"><div className="text-xs font-medium truncate">{p.name}</div></div>
                      <div className="flex gap-1">
                        {STATUS_OPTS.map(opt=>(
                          <button key={opt.v} onClick={()=>setStatus(p,opt.v)} disabled={saving[p.id]}
                            className={`text-[10px] px-2 py-1 rounded-lg font-medium transition-all ${cur===opt.v?opt.on:opt.off}`}>{opt.icon}</button>
                        ))}
                      </div>
                    </div>
                  );
                })}
                {players.length===0 && <p className="text-xs text-gray-400">Keine Spieler im Team.</p>}
              </div>
            </div>
          )}

          {/* Notizen */}
          {session.notes && (
            <div>
              <div className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Notizen</div>
              <p className="text-sm text-gray-700 leading-relaxed bg-gray-50 rounded-xl p-3">{session.notes}</p>
            </div>
          )}

          {/* Übungen */}
          {session.drillIds?.length>0 && (
            <div>
              <div className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">Übungen ({session.drillIds.length})</div>
              <div className="space-y-3">
                {session.drillIds.map(id=>drillMap[id]&&(
                  <div key={id} className="border border-gray-200 rounded-xl overflow-hidden">
                    {drillMap[id].imageData && <img src={drillMap[id].imageData} className="w-full object-cover" style={{maxHeight:'180px'}} alt={drillMap[id].name}/>}
                    <div className="px-3 py-2">
                      <div className="text-sm font-semibold">{drillMap[id].name}</div>
                      {drillMap[id].fieldType && <div className="text-xs text-gray-400">{drillMap[id].fieldType}</div>}
                    </div>
                  </div>
                ))}
              </div>
            </div>
          )}

          {/* Übungen aus Datenbank */}
          {session.uebungIds?.length>0 && (
            <div>
              <div className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">📚 Übungsdatenbank ({session.uebungIds.length})</div>
              <div className="space-y-3">
                {session.uebungIds.map(id=>{
                  const u = uebungenMap[id]; if(!u) return null;
                  const CAT_COLOR = {Aufwärmen:'bg-orange-100 text-orange-700',Technik:'bg-blue-100 text-blue-700',Taktik:'bg-purple-100 text-purple-700',Kondition:'bg-green-100 text-green-700',Spielform:'bg-red-100 text-red-700',Abschluss:'bg-pink-100 text-pink-700',Sonstiges:'bg-gray-100 text-gray-600'};
                  return (
                    <div key={id} className="border border-gray-200 rounded-xl overflow-hidden">
                      {u.imageData && <div className="cursor-zoom-in relative group" onClick={()=>setUebImgViewer(u.imageData)}>
                        <img src={u.imageData} className="w-full object-cover" style={{maxHeight:'180px'}} alt={u.title}/>
                        <div className="absolute inset-0 group-hover:bg-black/20 transition-colors flex items-center justify-center">
                          <span className="opacity-0 group-hover:opacity-100 transition-opacity bg-black/60 text-white text-xs px-2 py-1 rounded-full">🔍 Vergrößern</span>
                        </div>
                      </div>}
                      <div className="px-3 py-2.5">
                        <div className="flex items-start gap-2 mb-1.5">
                          <div className="font-semibold text-sm flex-1">{u.title}</div>
                          <span className={`text-[10px] px-2 py-0.5 rounded-full font-semibold flex-shrink-0 ${CAT_COLOR[u.category]||'bg-gray-100 text-gray-600'}`}>{u.category}</span>
                        </div>
                        <div className="flex gap-3 text-[11px] text-gray-400 mb-1.5">
                          {u.duration&&<span>⏱ {u.duration} Min</span>}
                          {u.minPlayers&&<span>👥 min. {u.minPlayers}</span>}
                          {u.ageRange&&<span>🎯 {u.ageRange}</span>}
                        </div>
                        {u.materials&&<div className="text-[11px] text-gray-500 mb-1">🎒 {u.materials}</div>}
                        {u.description&&<p className="text-xs text-gray-600 leading-relaxed">{u.description}</p>}
                        {u.execution&&<p className="text-xs text-gray-500 mt-1 leading-relaxed whitespace-pre-line">{u.execution}</p>}
                      </div>
                    </div>
                  );
                })}
              </div>
            </div>
          )}

          {/* ── ANHÄNGE — nur für Trainer sichtbar ── */}
          {!readOnly && <div>
            <div className="flex items-center justify-between mb-3">
              <div className="text-xs font-semibold text-gray-400 uppercase tracking-wider">
                Anhänge {media.length>0?`(${media.length})`:''}
              </div>
              {!readOnly && (
                <>
                  <button onClick={()=>fileRef.current?.click()} disabled={uploading}
                    className="flex items-center gap-1 px-3 py-1.5 rounded-lg bg-red-600 text-white text-xs font-semibold hover:bg-red-700 disabled:opacity-50">
                    {uploading ? '⏳ Lädt…' : '📎 Hochladen'}
                  </button>
                  <input ref={fileRef} type="file" accept="image/*,.pdf,.doc,.docx,.txt"
                    className="hidden" onChange={uploadFile}/>
                </>
              )}
            </div>

            {uploadErr && <div className="mb-3 p-3 bg-red-50 border border-red-200 rounded-xl text-xs text-red-600">{uploadErr}</div>}

            {media.length===0 && (
              <div className="text-center py-6 text-gray-300 text-sm border-2 border-dashed border-gray-200 rounded-xl">
                {readOnly ? 'Keine Anhänge vorhanden' : 'Noch keine Dateien · max. 700 KB pro Datei'}
              </div>
            )}

            {/* Bilder als Grid */}
            {images.length>0 && (
              <div className="grid grid-cols-2 gap-2 mb-3">
                {images.map(m=>(
                  <div key={m.id} className="relative rounded-xl overflow-hidden border border-gray-200 group cursor-pointer"
                    onClick={()=>openViewer(m)}>
                    <img src={`data:${m.type};base64,${m.data}`} alt={m.name} className="w-full h-32 object-cover"/>
                    <div className="absolute inset-0 bg-black/40 opacity-0 group-hover:opacity-100 transition-opacity flex items-center justify-center gap-2">
                      <span className="p-2 bg-white rounded-full text-gray-700 text-sm">🔍</span>
                      {!readOnly && <button onClick={e=>{e.stopPropagation();deleteFile(m);}}
                        className="p-2 bg-white rounded-full text-gray-700 hover:text-red-600 text-sm">🗑</button>}
                    </div>
                    <div className="absolute bottom-0 left-0 right-0 bg-black/50 px-2 py-1">
                      <div className="text-[10px] text-white truncate">{m.name}</div>
                    </div>
                  </div>
                ))}
              </div>
            )}

            {/* Dokumente als Liste */}
            {docs.length>0 && (
              <div className="space-y-1.5">
                {docs.map(m=>(
                  <div key={m.id} className="flex items-center gap-3 bg-gray-50 border border-gray-200 rounded-xl px-3 py-2.5">
                    <span className="text-xl flex-shrink-0">{fileIcon(m.type)}</span>
                    <div className="flex-1 min-w-0">
                      <div className="text-xs font-medium text-gray-700 truncate">{m.name}</div>
                      <div className="text-[10px] text-gray-400">{m.uploadedAt?new Date(m.uploadedAt).toLocaleDateString('de-DE'):''} · {Math.round((m.size||0)/1024)} KB</div>
                    </div>
                    <div className="flex gap-1.5 flex-shrink-0">
                      <button onClick={()=>openViewer(m)}
                        className="px-2 py-1 rounded-lg bg-blue-50 text-blue-600 text-[10px] font-semibold hover:bg-blue-100">
                        Öffnen
                      </button>
                      {!readOnly && <button onClick={()=>deleteFile(m)}
                        className="px-2 py-1 rounded-lg bg-red-50 text-red-500 text-[10px] font-semibold hover:bg-red-100">
                        🗑
                      </button>}
                    </div>
                  </div>
                ))}
              </div>
            )}
          </div>}
        </div>
      </div>
    </div>

    {/* ── ÜBUNGSBILD FULLSCREEN ── */}
    {uebImgViewer && (
      <div className="fixed inset-0 bg-black z-[70] flex flex-col" onClick={()=>setUebImgViewer(null)}>
        <div className="flex items-center justify-between px-4 py-3 bg-black/60 flex-shrink-0" onClick={e=>e.stopPropagation()}>
          <span className="text-white text-sm">Übungsbild</span>
          <button onClick={()=>setUebImgViewer(null)} className="w-8 h-8 flex items-center justify-center rounded-full bg-white/10 text-white text-lg">✕</button>
        </div>
        <div className="flex-1 overflow-auto flex items-center justify-center p-4">
          <img src={uebImgViewer} alt="Vollansicht" className="max-w-full max-h-full object-contain rounded-xl"/>
        </div>
      </div>
    )}

    {/* ── INLINE VIEWER MODAL ── */}
    {viewer && (
      <div className="fixed inset-0 bg-black/80 z-[60] flex flex-col" onClick={()=>setViewer(null)}>
        <div className="flex items-center justify-between px-4 py-3 bg-black/60" onClick={e=>e.stopPropagation()}>
          <div className="text-white text-sm font-medium truncate flex-1">{viewer.name}</div>
          <button onClick={()=>setViewer(null)} className="w-8 h-8 flex items-center justify-center rounded-full bg-white/10 text-white ml-2">✕</button>
        </div>
        <div className="flex-1 overflow-auto flex items-center justify-center p-4" onClick={e=>e.stopPropagation()}>
          {viewer.type.startsWith('image/') ? (
            <img src={`data:${viewer.type};base64,${viewer.data}`} alt={viewer.name}
              className="max-w-full max-h-full rounded-xl shadow-2xl object-contain"/>
          ) : viewer.type.includes('pdf') && blobUrl ? (
            <iframe src={blobUrl} className="w-full h-full rounded-xl" style={{minHeight:'70vh'}} title={viewer.name}/>
          ) : (
            <div className="text-center text-white">
              <div className="text-5xl mb-4">📄</div>
              <p className="text-sm mb-4">Dieses Dateiformat kann nicht direkt angezeigt werden.</p>
              <a href={`data:${viewer.type};base64,${viewer.data}`} download={viewer.name}
                className="px-4 py-2 bg-red-600 text-white rounded-xl text-sm font-semibold hover:bg-red-700">
                ⬇️ Herunterladen
              </a>
            </div>
          )}
        </div>
      </div>
    )}
    </>
  );
}

// ═══════════════════════════════════════════════════════════════════
//  TRAINER — TAKTIKBOARD (HTML5 Canvas)
// ═══════════════════════════════════════════════════════════════════
function Taktikboard({profile, show}) {
  const canvasRef  = useRef(null);
  const [tool,      setTool]     = useState('draw');
  const [color,     setColor]    = useState('#ffffff');
  const [lineSize,  setLineSize] = useState(4);
  const [field,     setField]    = useState('full');
  const [history,   setHistory]  = useState([]);
  const [drawing,   setDrawing]  = useState(false);
  const [startPos,  setStartPos] = useState({x:0,y:0});
  const [drillName, setDrillName]= useState('');
  const [btnSaved,  setBtnSaved] = useState(false);
  const [savedDrills, setSavedDrills] = useState([]);
  const [showDrills,  setShowDrills]  = useState(false);
  const [delDrill,    setDelDrill]    = useState(null);
  const [textOverlay, setTextOverlay] = useState(null); // {x,y,canvasX,canvasY}
  const [textVal,     setTextVal]     = useState('');
  const textInputRef = useRef(null);

  useEffect(()=>{
    return col('drills').where('teamId','==',profile.teamId)
      .onSnapshot(s=>setSavedDrills(s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(a.name||'').localeCompare(b.name||''))));
  },[]);

  const TOOLS  = [{id:'draw',icon:'✏️',label:'Freihand'},{id:'arrow',icon:'↗️',label:'Laufweg'},{id:'dashed',icon:'⤏',label:'Passweg'},{id:'player',icon:'👤',label:'Spieler'},{id:'cone',icon:'△',label:'Hütchen'},{id:'ball',icon:'○',label:'Ball'},{id:'text',icon:'T',label:'Text'},{id:'erase',icon:'⌫',label:'Radieren'}];
  const COLORS = ['#ffffff','#f59e0b','#ef4444','#3b82f6','#f97316','#22c55e'];
  const FIELDS = [{v:'full',l:'Ganzes Feld'},{v:'half',l:'Hälfte'},{v:'third',l:'Drittel'},{v:'blank',l:'Leer'}];

  useEffect(()=>{
    const canvas=canvasRef.current; if(!canvas) return;
    const parent=canvas.parentElement;
    canvas.width=parent.clientWidth; canvas.height=parent.clientHeight;
    drawField(field);
  },[]);

  const getPos=(e)=>{
    const canvas=canvasRef.current, rect=canvas.getBoundingClientRect();
    const sx=canvas.width/rect.width, sy=canvas.height/rect.height;
    const cx=e.touches?e.touches[0].clientX:e.clientX, cy=e.touches?e.touches[0].clientY:e.clientY;
    return {x:(cx-rect.left)*sx, y:(cy-rect.top)*sy};
  };
  const saveSnap=()=>{const c=canvasRef.current; setHistory(h=>[...h.slice(-24),c.toDataURL()]);};
  const drawField=(type)=>{
    const canvas=canvasRef.current; if(!canvas) return;
    const ctx=canvas.getContext('2d'), W=canvas.width, H=canvas.height, p=16;
    // Grüner Rasen
    const grad=ctx.createLinearGradient(0,0,0,H);
    grad.addColorStop(0,'#2e7d32'); grad.addColorStop(0.5,'#388e3c'); grad.addColorStop(1,'#2e7d32');
    ctx.fillStyle=grad; ctx.fillRect(0,0,W,H);
    if(type==='blank') return;
    ctx.save();
    const lc='rgba(255,255,255,0.9)';
    ctx.strokeStyle=lc; ctx.lineWidth=2; ctx.lineCap='round'; ctx.lineJoin='round';
    if(type==='full'){
      // Alternating stripes
      for(let i=0;i<8;i++){
        ctx.fillStyle=i%2===0?'rgba(0,0,0,0.04)':'rgba(255,255,255,0.04)';
        ctx.fillRect(p+i*(W-p*2)/8,p,(W-p*2)/8,H-p*2);
      }
      const fw=W-p*2,fh=H-p*2;
      ctx.strokeStyle=lc; ctx.lineWidth=2;
      ctx.strokeRect(p,p,fw,fh);
      // Mittellinie
      ctx.beginPath();ctx.moveTo(W/2,p);ctx.lineTo(W/2,p+fh);ctx.stroke();
      // Mittelkreis
      ctx.beginPath();ctx.arc(W/2,H/2,fh*0.17,0,Math.PI*2);ctx.stroke();
      // Mittelpunkt
      ctx.fillStyle=lc;ctx.beginPath();ctx.arc(W/2,H/2,3,0,Math.PI*2);ctx.fill();
      // Strafräume
      const bw=fw*0.2,bh=fh*0.38,gw=fw*0.08,gh=fh*0.19;
      ctx.strokeRect(p,H/2-bh/2,bw,bh); ctx.strokeRect(W-p-bw,H/2-bh/2,bw,bh);
      ctx.strokeRect(p,H/2-gh/2,gw,gh); ctx.strokeRect(W-p-gw,H/2-gh/2,gw,gh);
      // Ecken-Bögen
      [[p,p,0,Math.PI/2],[W-p,p,Math.PI/2,Math.PI],[W-p,H-p,Math.PI,3*Math.PI/2],[p,H-p,3*Math.PI/2,2*Math.PI]].forEach(([cx,cy,sa,ea])=>{
        ctx.beginPath();ctx.arc(cx,cy,fh*0.04,sa,ea);ctx.stroke();
      });
      // Strafstoß-Punkte
      ctx.fillStyle=lc;
      ctx.beginPath();ctx.arc(p+bw*0.55,H/2,3,0,Math.PI*2);ctx.fill();
      ctx.beginPath();ctx.arc(W-p-bw*0.55,H/2,3,0,Math.PI*2);ctx.fill();
    } else if(type==='half'){
      for(let i=0;i<6;i++){
        ctx.fillStyle=i%2===0?'rgba(0,0,0,0.04)':'rgba(255,255,255,0.04)';
        ctx.fillRect(p+i*(W-p*2)/6,p,(W-p*2)/6,H-p*2);
      }
      const fw=W-p*2,fh=H-p*2;
      ctx.strokeStyle=lc;ctx.lineWidth=2;
      ctx.strokeRect(p,p,fw,fh);
      const bw=fw*0.5,bh=fh*0.36,gw=fw*0.2,gh=fh*0.14;
      ctx.strokeRect(p+(fw-bw)/2,p,bw,bh);
      ctx.strokeRect(p+(fw-gw)/2,p,gw,gh);
      ctx.beginPath();ctx.arc(W/2,p+bh,fh*0.2,Math.PI,2*Math.PI);ctx.stroke();
      ctx.fillStyle=lc;ctx.beginPath();ctx.arc(W/2,p+fh*0.3,3,0,Math.PI*2);ctx.fill();
      [[p,p,0,Math.PI/2],[W-p,p,Math.PI/2,Math.PI]].forEach(([cx,cy,sa,ea])=>{
        ctx.beginPath();ctx.arc(cx,cy,fh*0.05,sa,ea);ctx.stroke();
      });
    } else {
      for(let i=0;i<4;i++){
        ctx.fillStyle=i%2===0?'rgba(0,0,0,0.04)':'rgba(255,255,255,0.04)';
        ctx.fillRect(p+i*(W-p*2)/4,p,(W-p*2)/4,H-p*2);
      }
      const fw=W-p*2,fh=H-p*2;
      ctx.strokeStyle=lc;ctx.lineWidth=2;
      ctx.strokeRect(p,p,fw,fh);
      [0.33,0.66].forEach(f=>{ctx.beginPath();ctx.moveTo(p,p+fh*f);ctx.lineTo(W-p,p+fh*f);ctx.stroke();});
    }
    ctx.restore();
  };
  const drawArrow=(ctx,x1,y1,x2,y2,dashed=false)=>{
    ctx.save(); ctx.strokeStyle=color; ctx.lineWidth=lineSize; ctx.lineCap='round';
    if(dashed) ctx.setLineDash([10,6]);
    ctx.beginPath();ctx.moveTo(x1,y1);ctx.lineTo(x2,y2);ctx.stroke();
    const ang=Math.atan2(y2-y1,x2-x1),hw=Math.max(lineSize*3,10);
    ctx.setLineDash([]); ctx.fillStyle=color;
    ctx.beginPath();ctx.moveTo(x2,y2);
    ctx.lineTo(x2-hw*Math.cos(ang-0.4),y2-hw*Math.sin(ang-0.4));
    ctx.lineTo(x2-hw*Math.cos(ang+0.4),y2-hw*Math.sin(ang+0.4));
    ctx.closePath();ctx.fill();ctx.restore();
  };
  const commitText=(cpos)=>{
    if(!textVal.trim()||!cpos) return;
    const canvas=canvasRef.current,ctx=canvas.getContext('2d');
    saveSnap();
    ctx.save();
    ctx.fillStyle=color; ctx.font=`bold ${lineSize*4+10}px sans-serif`;
    ctx.shadowColor='rgba(0,0,0,0.6)'; ctx.shadowBlur=4;
    ctx.fillText(textVal,cpos.canvasX,cpos.canvasY);
    ctx.restore();
    setTextOverlay(null); setTextVal('');
  };

  const onStart=(e)=>{
    e.preventDefault();
    const canvas=canvasRef.current,ctx=canvas.getContext('2d'),p=getPos(e);
    if(tool==='text'){
      // Commit vorherigen Text falls noch aktiv
      if(textOverlay) commitText(textOverlay);
      const rect=canvas.getBoundingClientRect();
      const cx=e.touches?e.touches[0].clientX:e.clientX;
      const cy=e.touches?e.touches[0].clientY:e.clientY;
      const overlay={x:cx-rect.left,y:cy-rect.top,canvasX:p.x,canvasY:p.y};
      setTextOverlay(overlay); setTextVal('');
      setTimeout(()=>textInputRef.current?.focus(),50);
      return;
    }
    if(tool==='player'){
      saveSnap(); ctx.save();ctx.fillStyle=color;ctx.strokeStyle='rgba(0,0,0,0.4)';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(p.x,p.y,14,0,Math.PI*2);ctx.fill();ctx.stroke();
      ctx.fillStyle=color==='#ffffff'?'#1a1a1a':'#fff';ctx.font='bold 10px sans-serif';ctx.textAlign='center';ctx.textBaseline='middle';
      ctx.fillText('S',p.x,p.y);ctx.restore(); return;
    }
    if(tool==='cone'){
      saveSnap(); ctx.save();ctx.fillStyle=color;ctx.strokeStyle='rgba(0,0,0,0.3)';ctx.lineWidth=1;
      ctx.beginPath();ctx.moveTo(p.x,p.y-14);ctx.lineTo(p.x-10,p.y+8);ctx.lineTo(p.x+10,p.y+8);ctx.closePath();ctx.fill();ctx.stroke();ctx.restore(); return;
    }
    if(tool==='ball'){
      saveSnap(); ctx.save();ctx.fillStyle='#fff';ctx.strokeStyle='#444';ctx.lineWidth=1.5;
      ctx.beginPath();ctx.arc(p.x,p.y,9,0,Math.PI*2);ctx.fill();ctx.stroke();ctx.restore(); return;
    }
    setStartPos(p); setDrawing(true);
    if(tool==='draw'||tool==='erase'){saveSnap();ctx.beginPath();ctx.moveTo(p.x,p.y);}
    if(tool==='arrow'||tool==='dashed') saveSnap();
  };
  const onMove=(e)=>{
    e.preventDefault(); if(!drawing) return;
    const canvas=canvasRef.current,ctx=canvas.getContext('2d'),p=getPos(e);
    if(tool==='draw'){
      ctx.save();ctx.strokeStyle=color;ctx.lineWidth=lineSize;ctx.lineCap='round';ctx.lineJoin='round';
      ctx.lineTo(p.x,p.y);ctx.stroke();ctx.restore();
    } else if(tool==='erase'){
      ctx.save();ctx.globalCompositeOperation='destination-out';ctx.lineWidth=lineSize*5;ctx.lineCap='round';
      ctx.lineTo(p.x,p.y);ctx.stroke();ctx.restore();
    } else if(tool==='arrow'||tool==='dashed'){
      const snap=history[history.length-1];
      if(snap){const img=new Image();img.src=snap;img.onload=()=>{ctx.clearRect(0,0,canvas.width,canvas.height);ctx.drawImage(img,0,0);drawArrow(ctx,startPos.x,startPos.y,p.x,p.y,tool==='dashed');};}
    }
  };
  const onEnd=(e)=>{
    e.preventDefault(); if(!drawing) return; setDrawing(false);
    const canvas=canvasRef.current,ctx=canvas.getContext('2d');
    const p=getPos(e.changedTouches?{clientX:e.changedTouches[0].clientX,clientY:e.changedTouches[0].clientY}:e);
    if(tool==='arrow'||tool==='dashed'){saveSnap();drawArrow(ctx,startPos.x,startPos.y,p.x,p.y,tool==='dashed');}
  };
  const undo=()=>{
    if(!history.length) return;
    const canvas=canvasRef.current,prev=history[history.length-1];
    setHistory(h=>h.slice(0,-1));
    const img=new Image();img.src=prev;img.onload=()=>canvas.getContext('2d').drawImage(img,0,0);
  };
  const clear=()=>{setHistory([]);drawField(field);};
  const changeField=(v)=>{setField(v);saveSnap();drawField(v);};
  const saveDrill=async()=>{
    if(!drillName.trim()){show('Bitte Übungsname eingeben','error');return;}
    const img=canvasRef.current.toDataURL('image/png');
    await col('drills').add({name:drillName,imageData:img,fieldType:field,teamId:profile.teamId,createdAt:ts()});
    show('Übung gespeichert ✅'); setDrillName(''); setBtnSaved(true); setTimeout(()=>setBtnSaved(false),2000);
  };

  const loadDrill=(drill)=>{
    const canvas=canvasRef.current; if(!canvas) return;
    const ctx=canvas.getContext('2d');
    const img=new Image(); img.src=drill.imageData;
    img.onload=()=>{
      saveSnap();
      ctx.clearRect(0,0,canvas.width,canvas.height);
      ctx.drawImage(img,0,0,canvas.width,canvas.height);
    };
    setField(drill.fieldType||'full');
    setDrillName(drill.name);
    setShowDrills(false);
    show(`"${drill.name}" geladen`);
  };

  const deleteDrill=async(id)=>{
    await col('drills').doc(id).delete();
    show('Übung gelöscht'); setDelDrill(null);
  };

  return (
    <div className="flex flex-col" style={{height:'calc(100vh - 56px)'}}>
      {/* Löschen-Bestätigung */}
      {delDrill && (
        <Modal title="Übung löschen?" onClose={()=>setDelDrill(null)}>
          <p className="text-sm text-gray-600 mb-4">„{savedDrills.find(d=>d.id===delDrill)?.name}" wirklich löschen?</p>
          <div className="flex gap-2">
            <Btn variant="secondary" className="flex-1" onClick={()=>setDelDrill(null)}>Abbrechen</Btn>
            <Btn className="flex-1 bg-red-700" onClick={()=>deleteDrill(delDrill)}>Löschen</Btn>
          </div>
        </Modal>
      )}

      {/* Toolbar */}
      <div className="flex items-center gap-1.5 px-3 py-2 border-b border-gray-200 bg-gray-50 flex-shrink-0 flex-wrap">
        <div className="flex gap-1">
          {TOOLS.map(t=>(
            <button key={t.id} onClick={()=>setTool(t.id)} title={t.label}
              className={`w-7 h-7 rounded text-sm flex items-center justify-center transition-all ${tool===t.id?'bg-white border border-gray-300 shadow-sm':'hover:bg-white text-gray-500'}`}>
              {t.icon}
            </button>
          ))}
        </div>
        <div className="w-px h-5 bg-gray-300 mx-0.5"/>
        <div className="flex gap-1.5">
          {COLORS.map(c=>(
            <div key={c} onClick={()=>setColor(c)}
              className={`w-5 h-5 rounded-full cursor-pointer transition-all ${color===c?'ring-2 ring-offset-1 ring-gray-700':''}`}
              style={{background:c,border:c==='#ffffff'?'1px solid #ddd':'none'}}/>
          ))}
        </div>
        <div className="w-px h-5 bg-gray-300 mx-0.5"/>
        <select value={lineSize} onChange={e=>setLineSize(Number(e.target.value))} className="text-xs border border-gray-200 rounded px-1.5 py-1 bg-white">
          <option value={2}>Dünn</option><option value={4}>Normal</option><option value={8}>Dick</option>
        </select>
        <select value={field} onChange={e=>changeField(e.target.value)} className="text-xs border border-gray-200 rounded px-1.5 py-1 bg-white">
          {FIELDS.map(f=><option key={f.v} value={f.v}>{f.l}</option>)}
        </select>
        <button onClick={undo} title="Rückgängig" className="w-7 h-7 rounded text-sm flex items-center justify-center hover:bg-white text-gray-500">↩</button>
        <button onClick={clear} title="Alles löschen" className="w-7 h-7 rounded text-sm flex items-center justify-center hover:bg-white text-gray-500">🗑</button>
      </div>

      {/* Name + Save + Übungen-Bibliothek */}
      <div className="flex gap-2 px-3 py-2 border-b border-gray-200 bg-white flex-shrink-0">
        <input value={drillName} onChange={e=>setDrillName(e.target.value)} placeholder="Übungsname eingeben…"
          className="flex-1 border border-gray-200 rounded-lg px-3 py-1.5 text-xs focus:outline-none focus:ring-2 focus:ring-red-500"/>
        <Btn size="sm" onClick={saveDrill} className={btnSaved?'bg-red-800':''}>
          {btnSaved?'✓ Gespeichert':'💾 Speichern'}
        </Btn>
        <button onClick={()=>setShowDrills(v=>!v)}
          className={`px-2.5 py-1.5 rounded-lg text-xs font-medium border transition-all flex-shrink-0
            ${showDrills?'bg-red-600 text-white border-red-600':'border-gray-200 text-gray-600 hover:border-red-400'}`}
          title="Gespeicherte Übungen">
          📋 {savedDrills.length}
        </button>
      </div>

      {/* Übungen-Bibliothek Panel */}
      {showDrills && (
        <div className="border-b border-gray-200 bg-gray-50 flex-shrink-0 overflow-x-auto">
          {savedDrills.length===0 ? (
            <p className="text-xs text-gray-400 px-4 py-3">Noch keine Übungen gespeichert.</p>
          ) : (
            <div className="flex gap-2 px-3 py-2">
              {savedDrills.map(d=>(
                <div key={d.id} className="flex-shrink-0 w-28 bg-white border border-gray-200 rounded-xl overflow-hidden shadow-sm hover:shadow-md transition-shadow">
                  {d.imageData
                    ? <img src={d.imageData} className="w-full h-16 object-cover cursor-pointer" alt={d.name} onClick={()=>loadDrill(d)}/>
                    : <div className="w-full h-16 bg-gray-100 flex items-center justify-center text-gray-300 cursor-pointer" onClick={()=>loadDrill(d)}>🖼</div>
                  }
                  <div className="px-1.5 py-1 flex items-center justify-between gap-1">
                    <span className="text-[10px] font-medium text-gray-700 truncate cursor-pointer" onClick={()=>loadDrill(d)}>{d.name}</span>
                    <button onClick={()=>setDelDrill(d.id)} className="text-gray-300 hover:text-red-500 text-xs flex-shrink-0">✕</button>
                  </div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {/* Canvas */}
      <div className="flex-1 overflow-hidden relative" style={{background:'#2e7d32'}}>
        <canvas ref={canvasRef}
          style={{width:'100%',height:'100%',cursor:tool==='text'?'text':'crosshair',display:'block',touchAction:'none'}}
          onMouseDown={onStart} onMouseMove={onMove} onMouseUp={onEnd} onMouseLeave={onEnd}
          onTouchStart={onStart} onTouchMove={onMove} onTouchEnd={onEnd}/>
        {/* Text-Eingabe Overlay */}
        {textOverlay && (
          <div style={{position:'absolute',left:textOverlay.x,top:textOverlay.y,transform:'translateY(-100%)',zIndex:10}}>
            <input
              ref={textInputRef}
              value={textVal}
              onChange={e=>setTextVal(e.target.value)}
              onKeyDown={e=>{
                if(e.key==='Enter'){commitText(textOverlay);}
                if(e.key==='Escape'){setTextOverlay(null);setTextVal('');}
              }}
              onBlur={()=>commitText(textOverlay)}
              placeholder="Text eingeben…"
              className="px-2 py-1 text-sm font-bold rounded shadow-lg border-2 border-white bg-black/70 text-white placeholder-white/50 focus:outline-none"
              style={{minWidth:'120px'}}
            />
            <div className="text-[9px] text-white/60 mt-0.5 text-center">Enter = einfügen · Esc = abbrechen</div>
          </div>
        )}
      </div>
      <div className="px-3 py-1 border-t bg-gray-50 text-[10px] text-gray-400 flex-shrink-0 hidden md:block">
        ✏️ Freihand · ↗️ Laufweg · ⤏ Passweg · 👤 Spieler platzieren · △ Hütchen · ○ Ball · ⌫ Radieren
      </div>
    </div>
  );
}
