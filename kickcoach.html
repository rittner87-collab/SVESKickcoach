//  MANNSCHAFTSKASSE — SPIELER
// ═══════════════════════════════════════════════════════════════════
function PlayerKasse({profile}) {
  const [katalog,    setKatalog]    = useState([]);
  const [strafen,    setStrafen]    = useState([]);
  const [allStrafen, setAllStrafen] = useState([]); // alle Team-Strafen für Kassenstand
  const [buch,       setBuch]       = useState([]);

  useEffect(()=>{
    const u1 = col('fines').where('teamId','==',profile.teamId)
      .onSnapshot(s=>setKatalog(s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0))));
    const u2 = col('playerFines').where('playerId','==',profile.id)
      .onSnapshot(s=>setStrafen(s.docs.map(d=>({id:d.id,...d.data()}))
        .filter(x=>x.teamId===profile.teamId)
        .sort((a,b)=>(b.assignedAt?.seconds||0)-(a.assignedAt?.seconds||0))));
    // Alle bezahlten Team-Strafen für Gesamtkassenstand
    const u3 = col('playerFines').where('teamId','==',profile.teamId)
      .onSnapshot(s=>setAllStrafen(s.docs.map(d=>({id:d.id,...d.data()}))));
    const u4 = col('kassenbuch').where('teamId','==',profile.teamId)
      .onSnapshot(s=>setBuch(s.docs.map(d=>({id:d.id,...d.data()}))));
    return ()=>{u1();u2();u3();u4();};
  },[]);

  const strafSum  = allStrafen.filter(s=>s.paid).reduce((s,x)=>s+Number(x.amount||0),0);
  const einnahmen = buch.filter(b=>b.type==='einnahme').reduce((s,x)=>s+Number(x.amount||0),0);
  const ausgaben  = buch.filter(b=>b.type==='ausgabe').reduce((s,x)=>s+Number(x.amount||0),0);
  const kassenstand = strafSum + einnahmen - ausgaben;

  const fmt = (n) => Number(n).toFixed(2).replace('.',',') + ' €';
  const offen   = strafen.filter(s=>!s.paid);
  const bezahlt = strafen.filter(s=>s.paid);
  const offenSum = offen.reduce((s,x)=>s+Number(x.amount||0),0);

  return (
    <div className="p-4 space-y-4">
      <h1 className="text-lg font-semibold">💰 Mannschaftskasse</h1>

      {/* Kassenstand */}
      <div className={`rounded-2xl p-5 text-white text-center shadow-lg ${kassenstand>=0?'bg-gradient-to-br from-green-600 to-green-700':'bg-gradient-to-br from-red-600 to-red-700'}`}>
        <div className="text-xs font-semibold uppercase tracking-wider opacity-80 mb-1">Aktueller Kassenstand</div>
        <div className="text-4xl font-bold">{fmt(kassenstand)}</div>
        <div className="text-xs opacity-70 mt-1">{kassenstand>=0?'✓ Positiver Saldo':'⚠ Negativer Saldo'}</div>
      </div>

      {/* Meine offenen Strafen prominent */}
      {offen.length>0 && (
        <div className="bg-amber-50 border border-amber-300 rounded-2xl p-4">
          <div className="text-xs font-semibold text-amber-700 uppercase tracking-wider mb-3">⚠️ Meine offenen Strafen</div>
          <div className="space-y-2">
            {offen.map(s=>(
              <div key={s.id} className="flex items-center justify-between text-sm">
                <div>
                  <div className="font-semibold text-amber-900">{s.fineName}</div>
                  {s.note && <div className="text-xs text-amber-600">{s.note}</div>}
                  <div className="text-[10px] text-amber-500">{s.assignedAt?.toDate?.()?.toLocaleDateString('de-DE')||''}</div>
                </div>
                <div className="font-bold text-red-600">{fmt(s.amount)}</div>
              </div>
            ))}
            <div className="border-t border-amber-200 pt-2 flex justify-between text-sm font-bold">
              <span className="text-amber-800">Gesamt offen</span>
              <span className="text-red-600">{fmt(offenSum)}</span>
            </div>
          </div>
        </div>
      )}

      {offen.length===0 && (
        <div className="bg-green-50 border border-green-200 rounded-2xl p-4 text-center">
          <div className="text-2xl mb-1">✅</div>
          <div className="text-sm font-semibold text-green-700">Keine offenen Strafen!</div>
        </div>
      )}

      {/* Strafkatalog */}
      <div className="bg-white border border-gray-200 rounded-2xl p-4">
        <div className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">📋 Strafkatalog</div>
        {katalog.length===0 ? (
          <p className="text-xs text-gray-400">Noch kein Strafkatalog vorhanden.</p>
        ) : (
          <div className="space-y-2">
            {katalog.map(k=>(
              <div key={k.id} className="flex items-center justify-between">
                <div>
                  <div className="text-sm font-medium">{k.name}</div>
                  {k.description && <div className="text-xs text-gray-400">{k.description}</div>}
                </div>
                <div className="text-sm font-bold text-red-600">{fmt(k.amount)}</div>
              </div>
            ))}
          </div>
        )}
      </div>

      {/* Bezahlte Strafen */}
      {bezahlt.length>0 && (
        <div className="bg-white border border-gray-200 rounded-2xl p-4">
          <div className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">✅ Bezahlte Strafen</div>
          <div className="space-y-2">
            {bezahlt.map(s=>(
              <div key={s.id} className="flex items-center justify-between text-sm opacity-70">
                <div>
                  <div className="font-medium line-through">{s.fineName}</div>
                  <div className="text-[10px] text-gray-400">{s.assignedAt?.toDate?.()?.toLocaleDateString('de-DE')||''}</div>
                </div>
                <div className="font-bold text-green-600">{fmt(s.amount)}</div>
              </div>
            ))}
          </div>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
//  TRAINER — BENACHRICHTIGUNGEN
// ═══════════════════════════════════════════════════════════════════
function TrainerBenachrichtigungen({profile}) {
  const [notifs, setNotifs] = useState([]);

  useEffect(()=>{
    return col('benachrichtigungen')
      .onSnapshot(s=>setNotifs(
        s.docs.map(d=>({id:d.id,...d.data()}))
          .sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0))
      ));
  },[]);

  const markRead = async (n) => {
    if((n.gelesenVon||[]).includes(profile.uid)) return;
    await col('benachrichtigungen').doc(n.id).update({
      gelesenVon: firebase.firestore.FieldValue.arrayUnion(profile.uid)
    });
  };

  const unread = notifs.filter(n=>!(n.gelesenVon||[]).includes(profile.uid));

  return (
    <div className="p-4">
      <h1 className="text-lg font-semibold mb-1">Benachrichtigungen</h1>
      <p className="text-xs text-gray-400 mb-4">{unread.length} ungelesen</p>
      {notifs.length===0 ? (
        <div className="text-center text-gray-400 py-12 text-sm">Keine Benachrichtigungen.</div>
      ) : (
        <div className="space-y-3">
          {notifs.map(n=>{
            const isRead = (n.gelesenVon||[]).includes(profile.uid);
            return (
              <div key={n.id} onClick={()=>markRead(n)}
                className={`bg-white border rounded-xl p-4 cursor-pointer transition-all ${isRead?'border-gray-200 opacity-70':'border-purple-300 shadow-sm'}`}>
                <div className="flex items-start gap-2">
                  {!isRead && <div className="w-2 h-2 rounded-full bg-purple-500 mt-1.5 flex-shrink-0"/>}
                  <div className="flex-1 min-w-0">
                    <div className={`text-sm font-semibold ${isRead?'text-gray-600':'text-gray-900'}`}>{n.titel}</div>
                    {n.nachricht && <div className="text-xs text-gray-500 mt-0.5">{n.nachricht}</div>}
                    <div className="flex flex-wrap gap-3 mt-1.5 text-[11px] text-gray-400">
                      {n.frist && <span>📅 Frist: {fmtDate(n.frist)}</span>}
                      {n.verantwortlicherName && <span>👤 {n.verantwortlicherName}</span>}
                      {n.createdBy && <span>Von: {n.createdBy}</span>}
                    </div>
                  </div>
                </div>
              </div>
            );
          })}
        </div>
      )}
    </div>
  );
}

//  TRAINER APP
// ═══════════════════════════════════════════════════════════════════
function TrainerApp({profile}) {
  const [page, setPage] = useState('kader');
  const {show, Container} = useToast();

  // Multi-team support: use trainerTeamIds if available, else fall back to single trainerTeamId
  const trainerTeamIds = profile.trainerTeamIds?.length ? profile.trainerTeamIds
    : (profile.trainerTeamId ? [profile.trainerTeamId] : (profile.teamId ? [profile.teamId] : []));
  const [activeTeamId, setActiveTeamId] = useState(trainerTeamIds[0]||profile.teamId||'');
  const activeProfile = {...profile, teamId: activeTeamId};

  const nav = [
    {section:'Team',    items:[{id:'kader',icon:'👥',label:'Kader'},{id:'spiele',icon:'🏆',label:'Spiele'},{id:'kasse',icon:'💰',label:'Mannschaftskasse'}]},
    {section:'Training',items:[{id:'training',icon:'📅',label:'Trainingsplan'},{id:'taktikboard',icon:'🎨',label:'Taktikboard'},{id:'uebungen',icon:'📚',label:'Übungsdatenbank'},{id:'verletzungen',icon:'🩹',label:'Verletzungen'}]},
    {section:'Spieler', items:[{id:'beurteilungen',icon:'⭐',label:'Beurteilungen'},{id:'spielerstats',icon:'📊',label:'Spieler-Stats'},{id:'chat',icon:'💬',label:'Teamchat'}]},
    {section:'Verein',  items:[{id:'busplanung',icon:'🚌',label:'Busplanung'},{id:'kalender',icon:'📆',label:'Vereinskalender'},{id:'platz',icon:'🏟️',label:'Platzverwaltung'},{id:'dokumente',icon:'📁',label:'Dokumente'},{id:'vorstand',icon:'✉️',label:'An Vorstand'},{id:'benachrichtigungen',icon:'🔔',label:'Benachrichtigungen'}]},
    {section:'Konto',   items:[{id:'profil',icon:'👤',label:'Profil'}]},
  ];

  // Team name lookup
  const [teamNames, setTeamNames] = useState({});
  useEffect(()=>{
    if(trainerTeamIds.length<2) return;
    getDocs_(col('teams')).then(ts=>setTeamNames(Object.fromEntries(ts.map(t=>[t.id,t.name]))));
  },[]);

  const TeamSwitcher = () => {
    if(trainerTeamIds.length < 2) return null;
    return (
      <div className="flex gap-1.5 px-4 py-2 overflow-x-auto border-b border-gray-100 bg-white">
        {trainerTeamIds.map(id=>(
          <button key={id} onClick={()=>setActiveTeamId(id)}
            className={`flex-shrink-0 px-3 py-1 rounded-full text-xs font-semibold transition-colors ${activeTeamId===id?'bg-red-600 text-white':'bg-gray-100 text-gray-600 hover:bg-gray-200'}`}>
            {teamNames[id]||id}
          </button>
        ))}
      </div>
    );
  };

  const content = {
    kader:         <><TeamSwitcher/><TrainerKader         key={activeTeamId} profile={activeProfile} show={show}/></>,
    spiele:        <><TeamSwitcher/><TrainerSpiele        key={activeTeamId} profile={activeProfile} show={show}/></>,
    training:      <><TeamSwitcher/><TrainerTraining      key={activeTeamId} profile={activeProfile} show={show}/></>,
    taktikboard:   <><TeamSwitcher/><Taktikboard          key={activeTeamId} profile={activeProfile} show={show}/></>,
    uebungen:      <UebungenDB profile={profile} show={show}/>,
    verletzungen:  <><TeamSwitcher/><TrainerVerletzungen  key={activeTeamId} profile={activeProfile} show={show}/></>,
    beurteilungen: <><TeamSwitcher/><TrainerBeurteilungen key={activeTeamId} profile={activeProfile} show={show}/></>,
    chat:          <><TeamSwitcher/><ChatPage             key={activeTeamId} profile={activeProfile} accent="red"/></>,
    busplanung:         <TrainerBusplanung profile={activeProfile} show={show}/>,
    kalender:           <Vereinskalender profile={profile} canEdit={false}/>,
    platz:              <TrainerPlatzverwaltung profile={activeProfile} show={show}/>,
    dokumente:          <TrainerDokumente/>,
    vorstand:           <TrainerNachrichtAnVorstand profile={profile}/>,
    benachrichtigungen: <TrainerBenachrichtigungen profile={profile}/>,
    spielerstats:       <TrainerSpielerStatistik profile={activeProfile}/>,
    kasse:              <TrainerKasse profile={activeProfile} show={show}/>,
    profil:             <ProfilPage profile={profile}/>,
  };

  return (
    <Layout profile={profile} nav={nav} page={page} setPage={setPage} onLogout={()=>auth.signOut()} accent="red">
      {content[page]||null}
      <Container/>
    </Layout>
  );
}

// ═══════════════════════════════════════════════════════════════════
//  SPIELER — TRAINING
// ═══════════════════════════════════════════════════════════════════
function PlayerTraining({profile}) {
  const [sessions,   setSessions]   = useState([]);
  const [attendance, setAttendance] = useState({});
  const [detailSession, setDetailSession] = useState(null);

  useEffect(()=>{
    return col('sessions').where('teamId','==',profile.teamId)
      .onSnapshot(async s=>{
        const sess=s.docs.map(d=>({id:d.id,...d.data()}));
        setSessions(sess);
        const att={};
        await Promise.all(sess.filter(x=>x.date>=todayStr()).map(async s=>{
          const snap=await col('attendance').where('sessionId','==',s.id).where('userId','==',profile.id).limit(1).get();
          att[s.id]=snap.empty?null:snap.docs[0].data().status;
        }));
        setAttendance(att);
      });
  },[]);

  const setStatus = async (sessionId, status) => {
    const existing=await col('attendance').where('sessionId','==',sessionId).where('userId','==',profile.id).limit(1).get();
    if(existing.empty) await col('attendance').add({sessionId,userId:profile.id,playerName:profile.name,status,teamId:profile.teamId,updatedAt:ts()});
    else await existing.docs[0].ref.update({status,updatedAt:ts()});
    setAttendance(a=>({...a,[sessionId]:status}));
  };

  const upcoming = sessions.filter(s=>s.date>=todayStr());
  const past     = sessions.filter(s=>s.date<todayStr());

  return (
    <div className="p-4">
      <h1 className="text-lg font-semibold mb-4">Meine Trainings</h1>

      {/* Detail-Modal (read-only) für Spieler */}
      {detailSession && (
        <SessionDetail
          session={detailSession}
          drillMap={{}}
          players={[]}
          att={{yes:0,no:0,maybe:0,byPlayer:{}}}
          onSetStatus={()=>{}}
          onEdit={()=>{}}
          onClose={()=>setDetailSession(null)}
          readOnly={true}
        />
      )}

      {sessions.length===0 ? <div className="text-center text-gray-400 py-16"><div className="text-4xl mb-2">📅</div><p className="text-sm">Noch keine Trainings geplant.</p></div> : (
        <div className="space-y-2">
          {upcoming.length>0&&<><div className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Bevorstehend</div>
            {upcoming.map(s=>(
              <div key={s.id} className="bg-white border border-gray-200 rounded-xl overflow-hidden">
                <div className="p-4 cursor-pointer hover:bg-gray-50 transition-colors" onClick={()=>setDetailSession(s)}>
                  <div className="text-sm font-semibold">{fmtDate(s.date)} · {s.time} Uhr</div>
                  <div className="text-xs text-gray-400">{s.duration} Min{s.location?' · '+s.location:''}</div>
                  {s.notes&&<p className="text-xs text-gray-500 mt-1 line-clamp-2">{s.notes}</p>}
                  <div className="text-[10px] text-gray-400 mt-1.5">📎 Tippen für Details & Anhänge</div>
                </div>
                <div className="flex gap-2 px-4 pb-3" onClick={e=>e.stopPropagation()}>
                  {[
                    {st:'attend',icon:'✓',label:'Zusagen',on:'bg-red-600 text-white shadow-sm',off:'bg-gray-100 text-gray-500 hover:bg-red-50 hover:text-red-700'},
                    {st:'cancel',icon:'✕',label:'Absagen',on:'bg-red-500 text-white shadow-sm',off:'bg-gray-100 text-gray-500 hover:bg-red-50 hover:text-red-600'},
                    {st:'unsure',icon:'?', label:'Unsicher',on:'bg-amber-500 text-white shadow-sm',off:'bg-gray-100 text-gray-500 hover:bg-amber-50 hover:text-amber-600'},
                  ].map(({st,icon,label,on,off})=>(
                    <button key={st} onClick={()=>setStatus(s.id,st)}
                      className={`flex-1 flex flex-col items-center gap-0.5 py-2.5 rounded-xl font-bold transition-all ${attendance[s.id]===st?on:off}`}>
                      <span className="text-lg leading-none">{icon}</span>
                      <span className="text-[10px] font-medium">{label}</span>
                    </button>
                  ))}
                </div>
              </div>
            ))}
          </>}
          {past.length>0&&<><div className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2 mt-4">Vergangen</div>
            {past.map(s=>(
              <div key={s.id} className="bg-gray-50 border border-gray-200 rounded-xl p-3 opacity-60 text-sm cursor-pointer hover:opacity-80"
                onClick={()=>setDetailSession(s)}>
                {fmtDate(s.date)} · {s.time} · <span className="text-xs text-gray-400">📎 Anhänge</span>
              </div>
            ))}
          </>}
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
//  SPIELER — SPIELTAGE (RSVP + MITFAHRT)
// ═══════════════════════════════════════════════════════════════════
function PlayerSpiele({profile}) {
  const [games,     setGames]     = useState([]);
  const [myRsvp,    setMyRsvp]    = useState({}); // gameId → {status, mitfahrt}
  const [myRatings, setMyRatings] = useState({}); // gameId → rating doc
  const [saving,    setSaving]    = useState({});
  const [detailRating, setDetailRating] = useState(null);

  useEffect(()=>{
    const u1 = col('games').where('teamId','==',profile.teamId)
      .onSnapshot(s=>setGames(s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>a.date?.localeCompare(b.date||''))));
    const u2 = col('gameAttendance').where('teamId','==',profile.teamId).where('userId','==',profile.id)
      .onSnapshot(s=>{
        const map={};
        s.docs.forEach(d=>{const r=d.data(); map[r.gameId]={status:r.status,mitfahrt:r.mitfahrt,docId:d.id};});
        setMyRsvp(map);
      });
    // Trainer-Feedback für diesen Spieler laden (kein Composite-Index nötig)
    const u3 = col('ratings').where('playerId','==',profile.id)
      .onSnapshot(s=>{
        const map={};
        s.docs.forEach(d=>{const r={id:d.id,...d.data()}; if(r.type==='game'&&r.gameId) map[r.gameId]=r;});
        setMyRatings(map);
      });
    return ()=>{u1();u2();u3();};
  },[]);

  const saveRsvp = async (gameId, patch) => {
    setSaving(v=>({...v,[gameId]:true}));
    const existing = myRsvp[gameId];
    const data = {gameId,userId:profile.id,playerName:profile.name,teamId:profile.teamId,updatedAt:ts(),...(existing||{}), ...patch};
    delete data.docId;
    if(existing?.docId) await col('gameAttendance').doc(existing.docId).update(patch);
    else                await col('gameAttendance').add(data);
    setSaving(v=>({...v,[gameId]:false}));
  };

  const upcoming = games.filter(g=>g.date>=todayStr());
  const past     = games.filter(g=>g.date<todayStr());

  const GameRsvpCard = ({g}) => {
    const rsvp = myRsvp[g.id]||{};
    return (
      <div className="bg-white border border-gray-200 rounded-xl p-4">
        <div className="mb-3">
          <div className="flex items-center gap-2 mb-1">
            <span className="font-semibold text-sm">vs. {g.opponent}</span>
            <span className="text-xs text-gray-400">{g.home?'🏠 Heim':'✈️ Auswärts'}</span>
          </div>
          <div className="grid grid-cols-2 gap-x-3 gap-y-1 text-xs text-gray-600 mt-1.5">
            <div><span className="text-gray-400">📅 Datum:</span> {fmtDate(g.date)}</div>
            <div><span className="text-gray-400">⚽ Anstoß:</span> {g.time||'—'} Uhr</div>
            {g.treffzeit&&<div><span className="text-gray-400">🕐 Treff:</span> {g.treffzeit} Uhr</div>}
            {g.treffpunkt&&<div className="col-span-2"><span className="text-gray-400">📍 Treffpunkt:</span> {g.treffpunkt}</div>}
            {g.location&&<div className="col-span-2"><span className="text-gray-400">🏟 Ort:</span> {g.location}</div>}
            {g.trikot&&<div className="col-span-2"><span className="text-gray-400">👕 Trikot:</span> {g.trikot}</div>}
          </div>
          {g.besonderheiten&&<div className="mt-2 text-xs bg-amber-50 border border-amber-200 rounded-lg px-2.5 py-1.5 text-amber-800">
            <span className="font-semibold">⚠️ Besonderheiten:</span> {g.besonderheiten}
          </div>}
        </div>
        {/* RSVP */}
        <div className="mb-3">
          <div className="text-[10px] font-semibold text-gray-400 uppercase tracking-wider mb-1.5">Deine Rückmeldung</div>
          <div className="flex gap-2">
            {[
              {st:'yes',   icon:'✓', label:'Zusagen', on:'bg-green-600 text-white', off:'bg-gray-100 text-gray-500 hover:bg-green-50 hover:text-green-700'},
              {st:'no',    icon:'✕', label:'Absagen',  on:'bg-red-600 text-white',   off:'bg-gray-100 text-gray-500 hover:bg-red-50 hover:text-red-600'},
              {st:'maybe', icon:'?', label:'Unsicher', on:'bg-amber-500 text-white', off:'bg-gray-100 text-gray-500 hover:bg-amber-50 hover:text-amber-600'},
            ].map(({st,icon,label,on,off})=>(
              <button key={st} disabled={saving[g.id]} onClick={()=>saveRsvp(g.id,{status:st})}
                className={`flex-1 flex flex-col items-center gap-0.5 py-2.5 rounded-xl font-bold transition-all ${rsvp.status===st?on:off}`}>
                <span className="text-lg leading-none">{icon}</span>
                <span className="text-[10px] font-medium">{label}</span>
              </button>
            ))}
          </div>
        </div>
        {/* Mitfahrgelegenheit */}
        <div className="border-t border-gray-100 pt-3">
          <div className="text-[10px] font-semibold text-gray-400 uppercase tracking-wider mb-1.5">🚗 Mitfahrgelegenheit</div>
          <div className="flex gap-2">
            {[
              {v:false, label:'Nicht nötig', on:'bg-blue-600 text-white', off:'bg-gray-100 text-gray-500 hover:bg-blue-50 hover:text-blue-600'},
              {v:true,  label:'Ich benötige eine', on:'bg-orange-500 text-white', off:'bg-gray-100 text-gray-500 hover:bg-orange-50 hover:text-orange-600'},
            ].map(({v,label,on,off})=>(
              <button key={String(v)} disabled={saving[g.id]} onClick={()=>saveRsvp(g.id,{mitfahrt:v})}
                className={`flex-1 py-2 rounded-xl text-xs font-semibold transition-all ${rsvp.mitfahrt===v?on:off}`}>
                {label}
              </button>
            ))}
          </div>
        </div>
      </div>
    );
  };

  return (
    <div className="p-4">
      <h1 className="text-lg font-semibold mb-4">Spieltage</h1>
      {games.length===0 ? (
        <div className="text-center text-gray-400 py-16"><div className="text-4xl mb-2">🏆</div><p className="text-sm">Noch keine Spiele eingetragen.</p></div>
      ) : (
        <div className="space-y-2">
          {upcoming.length>0&&<>
            <div className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Bevorstehend</div>
            {upcoming.map(g=><GameRsvpCard key={g.id} g={g}/>)}
          </>}
          {past.length>0&&<>
            <div className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2 mt-4">Vergangen</div>
            {past.map(g=>{
              const fb = myRatings[g.id];
              return (
                <div key={g.id} className={`bg-white border rounded-xl overflow-hidden ${fb?'border-amber-200':'border-gray-200'}`}>
                  <div className="p-3 flex items-center justify-between">
                    <div>
                      <div className="text-sm font-semibold">vs. {g.opponent}</div>
                      <div className="text-xs text-gray-400">{fmtDate(g.date)}{g.ergebnis?' · '+g.ergebnis:''}</div>
                    </div>
                    {fb ? (
                      <button onClick={()=>setDetailRating(fb)}
                        className="flex items-center gap-1.5 bg-amber-50 border border-amber-200 rounded-lg px-3 py-1.5 hover:bg-amber-100 transition-colors">
                        <span className="text-amber-500 text-base">★</span>
                        <span className="text-sm font-bold text-amber-600">{fb.avg}</span>
                        <span className="text-[10px] text-amber-500 font-semibold">Feedback</span>
                      </button>
                    ) : (
                      <span className="text-[10px] text-gray-300">kein Feedback</span>
                    )}
                  </div>
                  {fb && (
                    <div className="px-3 pb-3 flex gap-3 border-t border-amber-100 pt-2">
                      {RATING_CATS.map(cat=>(
                        <div key={cat} className="flex-1 text-center">
                          <div className="text-xs font-bold text-amber-600">{fb.scores?.[cat]??'—'}</div>
                          <div className="text-[9px] text-gray-400">{cat.slice(0,3)}</div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
              );
            })}
          </>}
        </div>
      )}

      {/* Feedback-Detail-Modal */}
      {detailRating && (
        <div className="fixed inset-0 bg-black/60 z-50 flex items-end md:items-center justify-center p-0 md:p-4" onClick={()=>setDetailRating(null)}>
          <div className="bg-white w-full md:max-w-sm md:rounded-2xl rounded-t-2xl shadow-2xl" onClick={e=>e.stopPropagation()}>
            <div className="flex items-center justify-between px-5 py-4 border-b border-gray-100">
              <div>
                <div className="font-bold">vs. {detailRating.gameOpponent||'—'}</div>
                <div className="text-xs text-gray-400">{fmtDate(detailRating.gameDate)}{detailRating.trainerName?' · '+detailRating.trainerName:''}</div>
              </div>
              <button onClick={()=>setDetailRating(null)} className="w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 text-gray-500">✕</button>
            </div>
            <div className="px-5 py-4 space-y-4">
              <div className="text-center">
                <div className="text-5xl font-bold text-amber-500">{detailRating.avg}</div>
                <div className="flex justify-center gap-0.5 my-1">
                  {[1,2,3,4,5].map(i=><span key={i} className={`text-xl ${i<=Math.round(detailRating.avg)?'text-amber-400':'text-gray-200'}`}>★</span>)}
                </div>
                <div className="text-sm text-gray-400">Gesamtbewertung / 5</div>
              </div>
              <div className="bg-gray-50 rounded-xl p-4 space-y-2.5">
                {RATING_CATS.map(cat=>(
                  <div key={cat} className="flex items-center gap-3">
                    <span className="text-sm text-gray-600 w-20">{cat}</span>
                    <div className="flex-1 h-2 bg-gray-200 rounded-full overflow-hidden">
                      <div className="h-full bg-amber-400 rounded-full" style={{width:`${((detailRating.scores?.[cat]||0)/5)*100}%`}}/>
                    </div>
                    <span className="text-sm font-bold text-gray-800 w-4 text-right">{detailRating.scores?.[cat]??'—'}</span>
                  </div>
                ))}
              </div>
              {detailRating.notes && (
                <div className="bg-blue-50 border border-blue-100 rounded-xl px-4 py-3">
                  <div className="text-xs font-semibold text-blue-600 mb-1">💬 Kommentar</div>
                  <p className="text-sm text-gray-700 leading-relaxed">{detailRating.notes}</p>
                </div>
              )}
              <Btn className="w-full" onClick={()=>setDetailRating(null)}>Schließen</Btn>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
//  SPIELER — WELLNESS
// ═══════════════════════════════════════════════════════════════════
function PlayerWellness({profile}) {
  const [vals,    setVals]    = useState({mood:3,energy:3,sleep:3,soreness:3});
  const [notes,   setNotes]   = useState('');
  const [saved,   setSaved]   = useState(false);
  const [history, setHistory] = useState([]);

  const METRICS = [
    {key:'mood',    label:'Stimmung',    low:'😔',high:'😄'},
    {key:'energy',  label:'Energie',     low:'🪫',high:'⚡'},
    {key:'sleep',   label:'Schlaf',      low:'😪',high:'😌'},
    {key:'soreness',label:'Muskelkater', low:'😖',high:'✅'},
  ];

  useEffect(()=>{
    return col('wellness').where('userId','==',profile.id).limit(20)
      .onSnapshot(s=>setHistory(s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>b.createdAt?.seconds-a.createdAt?.seconds)));
  },[]);

  const todayEntry = history.find(h=>h.date===todayStr());

  const submit = async (e) => {
    e.preventDefault();
    await col('wellness').add({...vals,notes,userId:profile.id,playerName:profile.name,teamId:profile.teamId,date:todayStr(),createdAt:ts()});
    setSaved(true); setNotes(''); setTimeout(()=>setSaved(false),2000);
  };

  return (
    <div className="p-4">
      <h1 className="text-lg font-semibold mb-1">Wellness Check-In</h1>
      <p className="text-xs text-gray-400 mb-4">Wie geht's dir heute?</p>
      {todayEntry ? (
        <div className="bg-red-50 border border-red-200 rounded-2xl p-5 text-center mb-4">
          <div className="text-3xl mb-1">✅</div>
          <div className="text-sm font-semibold text-red-800">Heute bereits eingecheckt!</div>
          <div className="text-xs text-red-600 mt-1">Ø {((todayEntry.mood+todayEntry.energy+todayEntry.sleep+todayEntry.soreness)/4).toFixed(1)}/5</div>
        </div>
      ) : (
        <form onSubmit={submit} className="mb-4">
          <div className="bg-white border border-gray-200 rounded-2xl p-5 mb-3">
            {METRICS.map(m=>(
              <div key={m.key} className="mb-4">
                <div className="flex justify-between items-center mb-1.5">
                  <span className="text-sm font-medium text-gray-700">{m.label}</span>
                  <span className="text-sm font-bold text-red-600">{vals[m.key]}/5</span>
                </div>
                <div className="flex items-center gap-2">
                  <span className="text-base">{m.low}</span>
                  <input type="range" min={1} max={5} value={vals[m.key]} onChange={e=>setVals(v=>({...v,[m.key]:Number(e.target.value)}))} className="flex-1 accent-red-600"/>
                  <span className="text-base">{m.high}</span>
                </div>
              </div>
            ))}
            <textarea rows={2} placeholder="Notiz (optional)" value={notes} onChange={e=>setNotes(e.target.value)}
              className="w-full border border-gray-200 rounded-lg px-3 py-2 text-sm resize-none focus:outline-none focus:ring-2 focus:ring-red-500"/>
          </div>
          <Btn type="submit" size="lg" className={`w-full ${saved?'bg-red-800':''}`}>{saved?'✓ Gespeichert!':'Check-In senden'}</Btn>
        </form>
      )}
      {history.length>0&&(
        <div>
          <div className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-2">Verlauf</div>
          {history.slice(0,7).map(h=>(
            <div key={h.id} className="bg-white border border-gray-200 rounded-xl px-4 py-3 flex justify-between items-center mb-1.5">
              <span className="text-sm text-gray-600">{h.date}</span>
              <div className="flex gap-4">
                {METRICS.map(m=><div key={m.key} className="text-center"><div className="text-xs font-bold text-gray-800">{h[m.key]}</div><div className="text-[9px] text-gray-400">{m.label.slice(0,3)}</div></div>)}
              </div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
//  SPIELER — STATS
// ═══════════════════════════════════════════════════════════════════
function PlayerStats({profile}) {
  const [ratings,        setRatings]        = useState([]);
  const [gameRsvps,      setGameRsvps]      = useState([]);
  const [games,          setGames]          = useState([]);
  const [trainingAtt,    setTrainingAtt]    = useState([]);
  const [sessions,       setSessions]       = useState([]);

  useEffect(()=>{
    const u1 = col('ratings').where('playerId','==',profile.id)
      .onSnapshot(s=>setRatings(s.docs.map(d=>({id:d.id,...d.data()})).sort((a,b)=>b.createdAt?.seconds-a.createdAt?.seconds)));
    const u2 = col('gameAttendance').where('userId','==',profile.id)
      .onSnapshot(s=>setGameRsvps(s.docs.map(d=>({id:d.id,...d.data()}))));
    const u3 = col('games').where('teamId','==',profile.teamId)
      .onSnapshot(s=>setGames(s.docs.map(d=>({id:d.id,...d.data()}))));
    const u4 = col('attendance').where('userId','==',profile.id)
      .onSnapshot(s=>setTrainingAtt(s.docs.map(d=>({id:d.id,...d.data()}))));
    const u5 = col('sessions').where('teamId','==',profile.teamId)
      .onSnapshot(s=>setSessions(s.docs.map(d=>({id:d.id,...d.data()}))));
    return ()=>{u1();u2();u3();u4();u5();};
  },[]);

  // Spiel-Statistik
  const totalGames   = games.length;
  const gYes   = gameRsvps.filter(r=>r.status==='yes').length;
  const gNo    = gameRsvps.filter(r=>r.status==='no').length;
  const gMaybe = gameRsvps.filter(r=>r.status==='maybe').length;
  const gNone  = totalGames - gameRsvps.length;
  const gRate  = totalGames>0 ? Math.round((gYes/totalGames)*100) : null;

  // Training-Statistik (Spieler nutzt 'attend'/'cancel'/'unsure', Trainer 'yes'/'no'/'maybe')
  const totalSessions   = sessions.length;
  const tYes   = trainingAtt.filter(a=>a.status==='yes'||a.status==='attend').length;
  const tNo    = trainingAtt.filter(a=>a.status==='no'||a.status==='cancel').length;
  const tMaybe = trainingAtt.filter(a=>a.status==='maybe'||a.status==='unsure').length;
  const tNone  = totalSessions - trainingAtt.length;
  const tRate  = totalSessions>0 ? Math.round((tYes/totalSessions)*100) : null;

  // Bewertungen aufteilen: Spiel-Feedback vs. allgemeine Beurteilungen
  const gameRatings    = ratings.filter(r=>r.type==='game');
  const generalRatings = ratings.filter(r=>r.type!=='game');

  // Gesamtbewertung Spiel-Feedback
  const gameAvg = gameRatings.length>0 ? (gameRatings.reduce((s,r)=>s+r.avg,0)/gameRatings.length).toFixed(1) : null;
  const gameCatAvgs = RATING_CATS.map(cat=>({cat,val:gameRatings.length>0?(gameRatings.reduce((s,r)=>s+(r.scores?.[cat]||0),0)/gameRatings.length).toFixed(1):null}));

  // Allgemeine Trainer-Bewertungen
  const avg = generalRatings.length>0 ? (generalRatings.reduce((s,r)=>s+r.avg,0)/generalRatings.length).toFixed(2) : null;
  const catAvgs = RATING_CATS.map(cat=>({cat,val:generalRatings.length>0?(generalRatings.reduce((s,r)=>s+(r.scores?.[cat]||0),0)/generalRatings.length).toFixed(1):null}));

  const StatBar = ({pct, color='bg-red-500'}) => (
    <div className="flex-1 h-2 bg-gray-100 rounded-full overflow-hidden">
      <div className={`h-full ${color} rounded-full transition-all`} style={{width:`${pct}%`}}/>
    </div>
  );

  const BigNum = ({value, label, sub, color='text-red-600'}) => (
    <div className="flex-1 text-center">
      <div className={`text-3xl font-bold ${color}`}>{value??'—'}</div>
      <div className="text-xs font-semibold text-gray-700 mt-0.5">{label}</div>
      {sub && <div className="text-[10px] text-gray-400">{sub}</div>}
    </div>
  );

  return (
    <div className="p-4 space-y-4">
      <h1 className="text-lg font-semibold">📊 Meine Statistiken</h1>

      {/* ── SPIELTAGE ── */}
      <div className="bg-white border border-gray-200 rounded-2xl p-4">
        <div className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">⚽ Spieltage</div>
        <div className="flex gap-2 mb-4">
          <BigNum value={gYes}   label="Zugesagt"  color="text-green-600"/>
          <BigNum value={gNo}    label="Abgesagt"  color="text-red-500"/>
          <BigNum value={gMaybe} label="Vielleicht" color="text-amber-500"/>
          <BigNum value={gNone}  label="Offen"     color="text-gray-400"/>
        </div>
        {gRate !== null && (
          <div className="flex items-center gap-2">
            <span className="text-xs text-gray-500 w-20">Zusagequote</span>
            <StatBar pct={gRate} color="bg-green-500"/>
            <span className="text-xs font-bold text-gray-700 w-8 text-right">{gRate}%</span>
          </div>
        )}
        <div className="text-[11px] text-gray-400 mt-2">{totalGames} Spieltage insgesamt</div>
      </div>

      {/* ── TRAININGS ── */}
      <div className="bg-white border border-gray-200 rounded-2xl p-4">
        <div className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">🏃 Training</div>
        <div className="flex gap-2 mb-4">
          <BigNum value={tYes}   label="Zugesagt"  color="text-green-600"/>
          <BigNum value={tNo}    label="Abgesagt"  color="text-red-500"/>
          <BigNum value={tMaybe} label="Vielleicht" color="text-amber-500"/>
          <BigNum value={tNone}  label="Offen"     color="text-gray-400"/>
        </div>
        {tRate !== null && (
          <div className="flex items-center gap-2">
            <span className="text-xs text-gray-500 w-20">Anwesenheit</span>
            <StatBar pct={tRate} color="bg-blue-500"/>
            <span className="text-xs font-bold text-gray-700 w-8 text-right">{tRate}%</span>
          </div>
        )}
        <div className="text-[11px] text-gray-400 mt-2">{totalSessions} Trainingseinheiten insgesamt</div>
      </div>

      {/* ── SPIEL-FEEDBACK GESAMTBEWERTUNG ── */}
      {gameRatings.length>0 && (
        <div className="bg-white border border-gray-200 rounded-2xl p-4">
          <div className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">🏆 Spiel-Feedback Gesamtbewertung</div>
          <div className="text-center mb-4">
            <div className="text-4xl font-bold text-amber-500">{gameAvg}</div>
            <div className="flex justify-center gap-0.5 my-1">
              {[1,2,3,4,5].map(i=>(
                <span key={i} className={`text-lg ${i<=Math.round(gameAvg)?'text-amber-400':'text-gray-200'}`}>★</span>
              ))}
            </div>
            <div className="text-xs text-gray-400">{gameRatings.length} Spiel{gameRatings.length!==1?'e':''} bewertet · Schnitt /5</div>
          </div>
          {gameCatAvgs.map(({cat,val})=>(
            <div key={cat} className="flex items-center gap-3 mb-2">
              <div className="w-20 text-xs text-gray-600">{cat}</div>
              <StatBar pct={(val/5)*100} color="bg-amber-400"/>
              <div className="text-xs font-bold text-gray-800 w-6 text-right">{val}</div>
            </div>
          ))}
        </div>
      )}

      {/* ── ALLGEMEINE TRAINER-BEWERTUNGEN ── */}
      {generalRatings.length>0 && (
        <div className="bg-white border border-gray-200 rounded-2xl p-4">
          <div className="text-xs font-semibold text-gray-400 uppercase tracking-wider mb-3">⭐ Trainer-Beurteilungen</div>
          <div className="text-center mb-4">
            <div className="text-4xl font-bold text-red-600">{avg}</div>
            <div className="text-xs text-gray-400 mt-1">{generalRatings.length} Beurteilung{generalRatings.length!==1?'en':''} · Schnitt /5</div>
          </div>
          {catAvgs.map(({cat,val})=>(
            <div key={cat} className="flex items-center gap-3 mb-2">
              <div className="w-20 text-xs text-gray-600">{cat}</div>
              <StatBar pct={(val/5)*100}/>
              <div className="text-xs font-bold text-gray-800 w-6 text-right">{val}</div>
            </div>
          ))}
          <div className="mt-3 border-t border-gray-100 pt-3 space-y-1">
            {generalRatings.slice(0,5).map(r=>(
              <div key={r.id} className="flex justify-between items-center text-xs">
                <span className="text-gray-500">{r.date}</span>
                {r.notes&&<span className="text-gray-400 italic truncate mx-2 flex-1">{r.notes}</span>}
                <span className="font-bold text-red-600">{r.avg}/5</span>
              </div>
            ))}
          </div>
        </div>
      )}

      {gameRatings.length===0 && generalRatings.length===0 && totalGames===0 && totalSessions===0 && (
        <div className="text-center text-gray-400 py-16">
          <div className="text-4xl mb-2">📊</div>
          <p className="text-sm">Noch keine Daten vorhanden.</p>
        </div>
      )}
    </div>
  );
}

// ═══════════════════════════════════════════════════════════════════
//  SPIELER — FEEDBACK (Trainer-Bewertungen zu Spielen)
// ═══════════════════════════════════════════════════════════════════
function PlayerFeedback({profile}) {
  const [ratings, setRatings] = useState([]);
  const [detail,  setDetail]  = useState(null);

  useEffect(()=>{
    // Nur nach playerId filtern (kein Composite-Index nötig),
    // type-Filter und Sortierung im Client
    return col('ratings').where('playerId','==',profile.id)
      .onSnapshot(s=>{
        const all = s.docs.map(d=>({id:d.id,...d.data()}));
        const game = all
          .filter(r=>r.type==='game')
          .sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));
        setRatings(game);
      });
  },[]);

  const StarRow = ({scores}) => (
    <div className="flex gap-3 flex-wrap mt-1.5">
      {RATING_CATS.map(cat=>(
        <div key={cat} className="text-center">
          <div className="text-sm font-bold text-red-600">{scores?.[cat]??'—'}</div>
          <div className="text-[9px] text-gray-400">{cat.slice(0,3)}</div>
        </div>
      ))}
    </div>
  );

  return (
    <div className="p-4">
      <h1 className="text-lg font-semibold mb-4">⭐ Trainer-Feedback</h1>

      {ratings.length===0 ? (
        <div className="text-center text-gray-400 py-16">
          <div className="text-4xl mb-2">⭐</div>
          <p className="text-sm">Noch kein Feedback vom Trainer.</p>
          <p className="text-xs mt-1 text-gray-300">Feedback wird nach Spielen vergeben.</p>
        </div>
      ) : (
        <div className="space-y-2">
          {ratings.map(r=>(
            <button key={r.id} onClick={()=>setDetail(r)}
              className="w-full bg-white border border-gray-200 rounded-2xl p-4 text-left hover:border-red-300 transition-colors">
              <div className="flex items-center justify-between mb-1">
                <div className="text-sm font-semibold">vs. {r.gameOpponent||'—'}</div>
                <div className="text-xl font-bold text-red-600">{r.avg}/5</div>
              </div>
              <div className="text-xs text-gray-400">{fmtDate(r.gameDate)}{r.trainerName?' · '+r.trainerName:''}</div>
              <StarRow scores={r.scores}/>
              {r.notes && <p className="text-xs text-gray-500 italic mt-2 line-clamp-2">{r.notes}</p>}
            </button>
          ))}
        </div>
      )}

      {/* Detail-Modal */}
      {detail && (
        <div className="fixed inset-0 bg-black/60 z-50 flex items-end md:items-center justify-center p-0 md:p-4" onClick={()=>setDetail(null)}>
          <div className="bg-white w-full md:max-w-sm md:rounded-2xl rounded-t-2xl shadow-2xl" onClick={e=>e.stopPropagation()}>
            <div className="flex items-center justify-between px-5 py-4 border-b border-gray-100">
              <div>
                <div className="font-bold">vs. {detail.gameOpponent||'—'}</div>
                <div className="text-xs text-gray-400">{fmtDate(detail.gameDate)}{detail.trainerName?' · '+detail.trainerName:''}</div>
              </div>
              <button onClick={()=>setDetail(null)} className="w-8 h-8 flex items-center justify-center rounded-full bg-gray-100 text-gray-500">✕</button>
            </div>
            <div className="px-5 py-4 space-y-4">
              {/* Gesamt */}
              <div className="text-center">
                <div className="text-5xl font-bold text-red-600">{detail.avg}</div>
                <div className="text-sm text-gray-400 mt-1">Gesamtbewertung / 5</div>
              </div>
              {/* Kategorien */}
              <div className="bg-gray-50 rounded-xl p-4 space-y-2.5">
                {RATING_CATS.map(cat=>(
                  <div key={cat} className="flex items-center gap-3">
                    <span className="text-sm text-gray-600 w-20">{cat}</span>
                    <div className="flex-1 h-2 bg-gray-200 rounded-full overflow-hidden">
                      <div className="h-full bg-red-500 rounded-full" style={{width:`${((detail.scores?.[cat]||0)/5)*100}%`}}/>
                    </div>
                    <span className="text-sm font-bold text-gray-800 w-4 text-right">{detail.scores?.[cat]??'—'}</span>
                  </div>
                ))}
              </div>
              {/* Kommentar */}
              {detail.notes && (
                <div className="bg-blue-50 border border-blue-100 rounded-xl px-4 py-3">
                  <div className="text-xs font-semibold text-blue-600 mb-1">💬 Kommentar</div>
                  <p className="text-sm text-gray-700 leading-relaxed">{detail.notes}</p>
                </div>
              )}
              <Btn className="w-full" onClick={()=>setDetail(null)}>Schließen</Btn>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

            <div key={p.id} className="bg-white border border-gray-200 rounded-2xl p-4">

                <span className={`text-[11px] font-semibold px-2 py-0.5 rounded-full ${CAT_COLORS[p.category]||CAT_COLORS['Allgemein']}`}>{p.category||'Allgemein'}</span>

}

//  ADMIN — TEAMS
// ═══════════════════════════════════════════════════════════════════
function AdminTeams({show}) {
  const [teams, setTeams] = useState([]);
  const [open, setOpen] = useState(false);
  const [form, setForm] = useState({name:'',category:''});

  useEffect(()=>{ return col('teams').orderBy('name').onSnapshot(s=>setTeams(s.docs.map(d=>({id:d.id,...d.data()})))); },[]);

  const add = async (e) => {
    e.preventDefault();
    await col('teams').add({...form, createdAt:ts()});
    show('Team angelegt ✅'); setForm({name:'',category:''}); setOpen(false);
  };

  return (
    <div className="p-4">
      <div className="flex items-center justify-between mb-4">
        <h1 className="text-lg font-semibold">Teams ({teams.length})</h1>
        <Btn size="sm" variant="purple" onClick={()=>setOpen(true)}>+ Team</Btn>
      </div>
      {open && (
        <Modal title="Team anlegen" onClose={()=>setOpen(false)}>
          <form onSubmit={add}>
            <Inp label="Teamname" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Herren 1" required/>
            <Inp label="Kategorie (optional)" value={form.category} onChange={e=>setForm({...form,category:e.target.value})} placeholder="Herren, Jugend U17…"/>
            <div className="flex gap-2"><Btn type="button" variant="secondary" className="flex-1" onClick={()=>setOpen(false)}>Abbrechen</Btn><Btn type="submit" variant="purple" className="flex-1">Anlegen</Btn></div>
          </form>
        </Modal>
      )}
      {teams.length===0 ? <div className="text-center text-gray-400 py-16"><div className="text-4xl mb-2">🏟️</div><p className="text-sm">Noch keine Teams vorhanden.<br/>Lege zuerst Teams an, dann können sich Trainer & Spieler zuordnen.</p></div> : (
        <div className="space-y-2">
          {teams.map(t=>(
            <div key={t.id} className="bg-white border border-gray-200 rounded-xl p-4 flex items-center gap-3">
              <div className="w-10 h-10 rounded-xl bg-purple-100 flex items-center justify-center text-xl flex-shrink-0">🏟️</div>
              <div>
                <div className="text-sm font-semibold">{t.name}</div>
                {t.category&&<div className="text-xs text-gray-400">{t.category}</div>}

}

// ═══════════════════════════════════════════════════════════════════
//  ADMIN — TRAINER VERWALTEN
// ═══════════════════════════════════════════════════════════════════
function AdminTrainer({show}) {
  const [trainers,    setTrainers]    = useState([]);
  const [allUsers,    setAllUsers]    = useState([]);
  const [teams,       setTeams]       = useState([]);
  const [open,        setOpen]        = useState(false);
  const [editTeams,   setEditTeams]   = useState(null);
  const [editRole,    setEditRole]    = useState(null);
  const [delTrainer,  setDelTrainer]  = useState(null); // {id, name}
  const [form,        setForm]        = useState({name:'',email:'',pw:'',teamId:''});
  const [loading,     setLoading]     = useState(false);
  const [selRole,     setSelRole]     = useState('');

  const ROLES_ALL = [
    {v:'player',           l:'Spieler'},
    {v:'trainer',          l:'Trainer'},
    {v:'dual',             l:'Trainer & Spieler'},
    {v:'vorstand',         l:'Vorstand'},
    {v:'vorstand_trainer', l:'Vorstand & Trainer'},
  ];

  useEffect(()=>{
    const u1=col('users').where('role','in',['trainer','dual','vorstand','vorstand_trainer']).onSnapshot(s=>setTrainers(s.docs.map(d=>({id:d.id,...d.data()}))));
    const u2=col('users').onSnapshot(s=>setAllUsers(s.docs.map(d=>({id:d.id,...d.data()}))));
    const u3=col('teams').orderBy('name').onSnapshot(s=>setTeams(s.docs.map(d=>({id:d.id,...d.data()}))));
    return ()=>{u1();u2();u3();};
  },[]);

  const add = async (e) => {
    e.preventDefault(); setLoading(true);
    try {
      await col('users').add({
        name: form.name.trim(), role:'trainer',
        teamId: form.teamId, trainerTeamId: form.teamId,
        trainerTeamIds: form.teamId ? [form.teamId] : [],
        status:'active', color:randColor(),
        claimed:false, uid:'', email:'', createdAt:ts()
      });
      show('Trainer angelegt ✅'); setForm({name:'',teamId:''}); setOpen(false);
    } catch(err) { show(err.message,'error'); }
    setLoading(false);
  };

  // Save team assignments — handles both trainer and dual
  const saveTeams = async (userId, data) => {
    // data = { trainerTeamIds: [], playerTeamId: '' }  for dual
    //       = { trainerTeamIds: [] }                    for trainer
    const primary = data.trainerTeamIds[0]||'';
    const update = {
      trainerTeamId:  primary,
      trainerTeamIds: data.trainerTeamIds,
    };
    if (data.playerTeamId !== undefined) {
      update.teamId = data.playerTeamId;
    } else {
      update.teamId = primary; // trainer: teamId = primary trainer team
    }
    await col('users').doc(userId).update(update);
    show('Teams aktualisiert ✅');
    setEditTeams(null);
  };

  // Save role change
  const saveRole = async () => {
    if(!selRole || !editRole) return;
    setLoading(true);
    await col('users').doc(editRole.id).update({role: selRole, status:'active'});
    show('Rolle geändert ✅');
    setEditRole(null); setSelRole(''); setLoading(false);
  };

  const doDeleteTrainer = async () => {
    if(!delTrainer) return;
    setLoading(true);
    try {
      await col('users').doc(delTrainer.id).delete();
      show(`${delTrainer.name} entfernt`);
      setDelTrainer(null);
    } catch(e){ show(e.message,'error'); }
    setLoading(false);
  };

  const teamMap = Object.fromEntries(teams.map(t=>[t.id,t.name]));

  // All users sorted by team then name
  const allSorted = [...allUsers].sort((a,b)=>{
    const ta = teamMap[a.teamId||a.trainerTeamId||'']||'';
    const tb = teamMap[b.teamId||b.trainerTeamId||'']||'';
    return ta.localeCompare(tb)||(a.name||'').localeCompare(b.name||'');
  });
  const [expandedUsers, setExpandedUsers] = useState({});

  return (
    <div className="p-4">

      {/* Edit teams modal */}
      {editTeams && (
        <TrainerTeamsModal
          user={editTeams} teams={teams}
          onSave={data=>saveTeams(editTeams.id,data)}
          onClose={()=>setEditTeams(null)}
        />
      )}

      {/* Edit role modal */}
      {editRole && (
        <Modal title={`Rolle ändern: ${editRole.name}`} onClose={()=>{setEditRole(null);setSelRole('');}}>
          <p className="text-xs text-gray-500 mb-3">Aktuelle Rolle: <strong>{ROLES_ALL.find(r=>r.v===editRole.role)?.l || editRole.role}</strong></p>
          <div className="space-y-2 mb-4">
            {ROLES_ALL.map(r=>(
              <button key={r.v} onClick={()=>setSelRole(r.v)}
                className={`w-full text-left px-4 py-2.5 rounded-xl border-2 text-sm font-medium transition-all ${selRole===r.v?'border-red-500 bg-red-50 text-red-700':'border-gray-200 hover:border-gray-300'}`}>
                {r.l}
              </button>
            ))}
          </div>
          <div className="flex gap-2">
            <button className="flex-1 py-2 rounded-lg border text-sm" onClick={()=>{setEditRole(null);setSelRole('');}}>Abbrechen</button>
            <button onClick={saveRole} disabled={!selRole||loading}
              className="flex-1 py-2 rounded-lg bg-red-600 text-white text-sm font-semibold disabled:opacity-40">
              {loading?'…':'Speichern'}
            </button>
          </div>
        </Modal>
      )}

      {/* Add trainer modal */}
      {open && (
        <Modal title="Trainer anlegen" onClose={()=>setOpen(false)}>
          <p className="text-xs text-gray-500 bg-blue-50 border border-blue-100 rounded-lg px-3 py-2 mb-3">
            ℹ️ Name eintragen — der Trainer registriert sich selbst und sucht dann seinen Namen.
          </p>
          <form onSubmit={add}>
            <Inp label="Name" value={form.name} onChange={e=>setForm({...form,name:e.target.value})} placeholder="Max Mustermann" required/>
            <Sel label="Team" value={form.teamId} onChange={e=>setForm({...form,teamId:e.target.value})} required>
              <option value="">Team wählen…</option>
              {teams.map(t=><option key={t.id} value={t.id}>{t.name}</option>)}
            </Sel>
            <div className="flex gap-2 mt-1">
              <Btn type="button" variant="secondary" className="flex-1" onClick={()=>setOpen(false)}>Abbrechen</Btn>
              <Btn type="submit" variant="purple" className="flex-1" disabled={loading||!form.name.trim()||!form.teamId}>{loading?'…':'Anlegen'}</Btn>
            </div>
          </form>
        </Modal>
      )}

      {/* Delete trainer modal */}
      {delTrainer && (
        <Modal title="Trainer entfernen?" onClose={()=>setDelTrainer(null)}>
          <p className="text-sm text-gray-600 mb-4"><strong>{delTrainer.name}</strong> dauerhaft aus dem System entfernen?</p>
          <div className="flex gap-2">
            <button className="flex-1 py-2 rounded-lg border text-sm" onClick={()=>setDelTrainer(null)}>Abbrechen</button>
            <button onClick={doDeleteTrainer} disabled={loading}
              className="flex-1 py-2 rounded-lg bg-red-600 text-white text-sm font-semibold disabled:opacity-40">
              {loading?'…':'Entfernen'}
            </button>
          </div>
        </Modal>
      )}

      {/* Trainer list */}
      <div className="flex items-center justify-between mb-4">
        <h1 className="text-lg font-semibold">Trainer & Rollen</h1>
        <Btn size="sm" variant="purple" onClick={()=>setOpen(true)}>+ Trainer</Btn>
      </div>

      {/* Trainer section — nach Team gruppiert, kollabiert */}
      <div className="mb-2 text-xs font-semibold text-gray-400 uppercase tracking-wider">Trainer / Vorstand</div>
      {trainers.length===0 ? (
        <div className="text-center text-gray-400 py-8 mb-4"><p className="text-sm">Noch keine Trainer.</p></div>
      ) : (
        <div className="mb-6">
          {(()=>{
            const sorted = [...trainers].sort((a,b)=>(a.name||'').localeCompare(b.name||''));
            // Group by primary trainer team
            const grouped = {};
            sorted.forEach(t=>{
              const tid = (t.trainerTeamIds?.[0])||t.trainerTeamId||'__none__';
              const tname = teamMap[tid]||'Kein Team';
              if(!grouped[tname]) grouped[tname]=[];
              grouped[tname].push(t);
            });
            return Object.entries(grouped).sort(([a],[b])=>a.localeCompare(b)).map(([tname,members])=>(
              <div key={tname} className="mb-3">
                <button onClick={()=>setExpandedUsers(e=>({...e,['t_'+tname]:!e['t_'+tname]}))}
                  className="w-full flex items-center justify-between px-3 py-2 bg-purple-50 hover:bg-purple-100 rounded-xl mb-1 transition-colors">
                  <span className="text-xs font-semibold text-purple-700">{tname} ({members.length})</span>
                  <span className="text-purple-400 text-xs">{expandedUsers['t_'+tname]?'▲':'▼'}</span>
                </button>
                {expandedUsers['t_'+tname] && (
                  <div className="space-y-2">
                    {members.map(t=>{
                      const tIds = t.trainerTeamIds?.length ? t.trainerTeamIds : (t.trainerTeamId ? [t.trainerTeamId] : []);
                      return (
                        <div key={t.id} className="bg-white border border-gray-200 rounded-xl p-3">
                          <div className="flex items-start gap-3">
                            <Avatar name={t.name} color={t.color} size="sm"/>
                            <div className="min-w-0 flex-1">
                              <div className="flex items-center gap-2 flex-wrap">
                                <div className="text-sm font-semibold">{t.name}</div>
                                <span className="text-[10px] bg-purple-100 text-purple-600 px-1.5 py-0.5 rounded-full font-semibold">
                                  {ROLES_ALL.find(r=>r.v===t.role)?.l||t.role}
                                </span>
                              </div>
                              <div className="text-xs text-gray-400 mb-1.5">{t.email}</div>
                              {tIds.length>0 ? (
                                <div className="flex flex-wrap gap-1">
                                  {tIds.map(id=>(
                                    <span key={id} className="text-[11px] bg-blue-50 text-blue-700 px-2 py-0.5 rounded-full border border-blue-100">
                                      {teamMap[id]||id}
                                    </span>
                                  ))}
                                </div>
                              ) : <span className="text-[11px] text-amber-500">Kein Team zugewiesen</span>}
                            </div>
                            <div className="flex flex-col gap-1 flex-shrink-0">
                              <button onClick={()=>setEditTeams(t)} className="text-xs px-2 py-1 rounded-lg border border-blue-200 text-blue-600 hover:bg-blue-50 transition-colors whitespace-nowrap">🏟️ Teams</button>
                              <button onClick={()=>{setEditRole(t);setSelRole(t.role);}} className="text-xs px-2 py-1 rounded-lg border border-gray-200 text-gray-600 hover:bg-gray-50 transition-colors whitespace-nowrap">🔄 Rolle</button>
                              <button onClick={()=>setDelTrainer({id:t.id,name:t.name})} className="text-xs px-2 py-1 rounded-lg border border-red-200 text-red-500 hover:bg-red-50 transition-colors whitespace-nowrap">🗑 Löschen</button>
                            </div>
                          </div>
                        </div>
                      );
                    })}
                  </div>
                )}
              </div>
            ));
          })()}
        </div>
      )}

      {/* All users — role change, sorted by team, collapsed */}
      <div className="mb-2 text-xs font-semibold text-gray-400 uppercase tracking-wider">Alle Nutzer — Rolle ändern</div>
      {(()=>{
        const players = allSorted.filter(u=>!['trainer','dual','vorstand','vorstand_trainer'].includes(u.role));
        // Group by team
        const grouped = {};
        players.forEach(u=>{
          const tid = u.teamId||u.trainerTeamId||'__none__';
          const tname = teamMap[tid]||'Kein Team';
          if(!grouped[tname]) grouped[tname]=[];
          grouped[tname].push(u);
        });
        return Object.entries(grouped).sort(([a],[b])=>a.localeCompare(b)).map(([tname,users])=>(
          <div key={tname} className="mb-3">
            <button onClick={()=>setExpandedUsers(e=>({...e,[tname]:!e[tname]}))}
              className="w-full flex items-center justify-between px-3 py-2 bg-gray-100 hover:bg-gray-200 rounded-xl mb-1 transition-colors">
              <span className="text-xs font-semibold text-gray-600">{tname} ({users.length})</span>
              <span className="text-gray-400 text-xs">{expandedUsers[tname]?'▲':'▼'}</span>
            </button>
            {expandedUsers[tname] && (
              <div className="space-y-1.5">
                {users.map(u=>(
                  <div key={u.id} className="bg-white border border-gray-200 rounded-xl px-3 py-2 flex items-center gap-3">
                    <Avatar name={u.name} color={u.color} size="sm"/>
                    <div className="min-w-0 flex-1">
                      <div className="text-sm font-medium truncate">{u.name}</div>
                      <div className="text-xs text-gray-400">{ROLES_ALL.find(r=>r.v===u.role)?.l||u.role}</div>
                    </div>
                    <button onClick={()=>{setEditRole(u);setSelRole(u.role);}}
                      className="text-xs px-2 py-1 rounded-lg border border-gray-200 text-gray-600 hover:bg-gray-50 transition-colors flex-shrink-0">
                      🔄 Rolle
                    </button>
                  </div>
                ))}
              </div>
            )}
          </div>
        ));
      })()}
    </div>
  );
}

function TrainerTeamsModal({user, teams, onSave, onClose}) {
  const isDual = user.role === 'dual';
  const existingTrainer = user.trainerTeamIds?.length ? user.trainerTeamIds : (user.trainerTeamId ? [user.trainerTeamId] : []);
  const existingPlayer  = user.teamId || '';

  const [trainerIds,  setTrainerIds]  = useState(existingTrainer);
  const [playerTeamId, setPlayerTeamId] = useState(existingPlayer);

  const toggleTrainer = (id) => setTrainerIds(p=>p.includes(id)?p.filter(x=>x!==id):[...p,id]);

  const handleSave = () => {
    if (isDual) {
      onSave({ trainerTeamIds: trainerIds, playerTeamId });
    } else {
      onSave({ trainerTeamIds: trainerIds });
    }
  };

  return (
    <Modal title={`Teams für ${user.name}`} onClose={onClose}>

      {/* Trainer teams section */}
      <div className="mb-4">
        <div className="flex items-center gap-2 mb-2">
          <span className="text-sm font-semibold">📋 Als Trainer</span>
          <span className="text-[10px] text-gray-400">Mehrfachauswahl möglich</span>
        </div>
        <div className="space-y-1.5 max-h-48 overflow-y-auto">
          {teams.map(t=>{
            const sel = trainerIds.includes(t.id);
            const idx = trainerIds.indexOf(t.id);
            return (
              <button key={t.id} onClick={()=>toggleTrainer(t.id)}
                className={`w-full flex items-center gap-3 px-3 py-2 rounded-xl border-2 text-sm font-medium transition-all text-left ${sel?'border-blue-500 bg-blue-50':'border-gray-200 hover:border-gray-300'}`}>
                <span className={`w-5 h-5 rounded flex items-center justify-center text-xs font-bold flex-shrink-0 ${sel?'bg-blue-500 text-white':'bg-gray-100 text-gray-400'}`}>
                  {sel ? (idx===0?'★':idx+1) : ''}
                </span>
                <span className="flex-1">{t.name}</span>
                {sel && idx===0 && <span className="text-[10px] bg-blue-100 text-blue-600 px-1.5 py-0.5 rounded-full">Primär</span>}
              </button>
            );
          })}
        </div>
      </div>

      {/* Player team section — only for dual */}
      {isDual && (
        <div className="mb-4 border-t pt-4">
          <div className="flex items-center gap-2 mb-2">
            <span className="text-sm font-semibold">⚽ Als Spieler</span>
            <span className="text-[10px] text-gray-400">Ein Team wählen</span>
          </div>
          <div className="space-y-1.5 max-h-48 overflow-y-auto">
            {teams.map(t=>(
              <button key={t.id} onClick={()=>setPlayerTeamId(t.id)}
                className={`w-full flex items-center gap-3 px-3 py-2 rounded-xl border-2 text-sm font-medium transition-all text-left ${playerTeamId===t.id?'border-green-500 bg-green-50':'border-gray-200 hover:border-gray-300'}`}>
                <span className={`w-5 h-5 rounded-full flex items-center justify-center text-xs flex-shrink-0 ${playerTeamId===t.id?'bg-green-500 text-white':'bg-gray-100'}`}>
                  {playerTeamId===t.id?'✓':''}
                </span>
                <span>{t.name}</span>
              </button>
            ))}
          </div>
        </div>
      )}

      <div className="flex gap-2">
        <button className="flex-1 py-2 rounded-lg border text-sm" onClick={onClose}>Abbrechen</button>
        <button onClick={handleSave}
          className="flex-1 py-2 rounded-lg bg-blue-600 text-white text-sm font-semibold">
          Speichern
        </button>
      </div>
    </Modal>
  );
}

function AdminPinnwand({profile, show}) {
  const [posts, setPosts] = useState([]);
  const [open, setOpen] = useState(false);
  const [form, setForm] = useState({title:'',content:'',category:'Allgemein'});
  const CATS = ['Allgemein','Ankündigung','Wichtig','Veranstaltung'];
  const CAT_COLORS = {'Allgemein':'bg-gray-100 text-gray-600','Ankündigung':'bg-blue-100 text-blue-700','Wichtig':'bg-red-100 text-red-600','Veranstaltung':'bg-red-100 text-red-700'};

  useEffect(()=>{ return col('news').orderBy('createdAt','desc').onSnapshot(s=>setPosts(s.docs.map(d=>({id:d.id,...d.data()})))); },[]);

  const add = async (e) => {
    e.preventDefault();
    await col('news').add({...form,authorId:profile.id,authorName:profile.name,createdAt:ts()});
    show('News veröffentlicht ✅');
    notifyAnnouncement(form.title, form.content).catch(()=>{});
    setForm({title:'',content:'',category:'Allgemein'}); setOpen(false);
  };

  const del = async (id) => { if(!confirm('News löschen?')) return; await col('news').doc(id).delete(); show('Gelöscht'); };

  return (
    <div className="p-4">
      <div className="flex items-center justify-between mb-4">
        <h1 className="text-lg font-semibold">Vereins-Pinnwand</h1>
        <Btn size="sm" variant="purple" onClick={()=>setOpen(true)}>+ News</Btn>
      </div>
      {open && (
        <Modal title="News erstellen" onClose={()=>setOpen(false)}>
          <form onSubmit={add}>
            <Sel label="Kategorie" value={form.category} onChange={e=>setForm({...form,category:e.target.value})}>{CATS.map(c=><option key={c}>{c}</option>)}</Sel>
            <Inp label="Titel" value={form.title} onChange={e=>setForm({...form,title:e.target.value})} required/>
            <Txt label="Inhalt" value={form.content} onChange={e=>setForm({...form,content:e.target.value})} rows={4} required/>
            <div className="flex gap-2"><Btn type="button" variant="secondary" className="flex-1" onClick={()=>setOpen(false)}>Abbrechen</Btn><Btn type="submit" variant="purple" className="flex-1">Veröffentlichen</Btn></div>
          </form>
        </Modal>
      )}
      {posts.length===0 ? <div className="text-center text-gray-400 py-16"><div className="text-4xl mb-2">📌</div><p className="text-sm">Noch keine News veröffentlicht.</p></div> : (
        <div className="space-y-3">
          {posts.map(p=>(
            <div key={p.id} className="bg-white border border-gray-200 rounded-2xl p-4 group">
              <div className="flex items-center justify-between mb-2">
                <span className={`text-[11px] font-semibold px-2 py-0.5 rounded-full ${CAT_COLORS[p.category]||CAT_COLORS['Allgemein']}`}>{p.category}</span>
                <div className="flex items-center gap-2">
                  <span className="text-xs text-gray-400">{fmtAgo(p.createdAt)}</span>
                  <button onClick={()=>del(p.id)} className="opacity-0 group-hover:opacity-100 text-gray-300 hover:text-red-500 transition-all">✕</button>
                </div>
              </div>
              <h3 className="text-sm font-semibold">{p.title}</h3>
              <p className="text-sm text-gray-600 mt-1 leading-relaxed">{p.content}</p>
              <div className="text-xs text-gray-400 mt-2">— {p.authorName}</div>
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function AdminOverview() {
  const [stats, setStats] = useState({trainers:0,players:0,teams:0,sponsoren:0,sponsorenWarn:0});
  useEffect(()=>{(async()=>{
    const [users,teams,spons]=await Promise.all([getDocs_(col('users')),getDocs_(col('teams')),getDocs_(col('sponsoren'))]);
    const now = new Date();
    const warn = spons.filter(s=>{ if(!s.vertragsEnde) return false; const d=Math.ceil((new Date(s.vertragsEnde)-now)/86400000); return d>=0&&d<=30; }).length;
    setStats({trainers:users.filter(u=>u.role==='trainer'||u.role==='dual'||u.role==='vorstand_trainer').length,players:users.filter(u=>u.role==='player'||u.role==='dual').length,teams:teams.length,sponsoren:spons.length,sponsorenWarn:warn});
  })();},[]);

  return (
    <div className="p-4">
      <h1 className="text-lg font-semibold mb-4">Vereinsübersicht</h1>
      <div className="grid grid-cols-2 gap-3 mb-4">
        {[
          {l:'Teams',     v:stats.teams,     i:'🏟️'},
          {l:'Trainer',   v:stats.trainers,  i:'👨‍💼'},
          {l:'Spieler',   v:stats.players,   i:'👤'},
          {l:'Sponsoren', v:stats.sponsoren, i:'🤝', warn:stats.sponsorenWarn>0, warnText:`${stats.sponsorenWarn} laufen ab`},
        ].map(s=>(
          <div key={s.l} className="bg-white border border-gray-200 rounded-2xl p-5">
            <div className="text-2xl mb-1">{s.i}</div>
            <div className="text-3xl font-bold text-purple-600">{s.v}</div>
            <div className="text-sm text-gray-500 mt-0.5">{s.l}</div>
            {s.warn && <div className="text-[10px] text-amber-600 font-semibold mt-1">⚠️ {s.warnText}</div>}
          </div>
        ))}
      </div>
      <div className="bg-purple-50 border border-purple-200 rounded-xl p-4 text-sm text-purple-700">
        <div className="font-semibold mb-1">🚀 Erste Schritte</div>
        <ol className="list-decimal list-inside space-y-1 text-xs">
          <li>Teams anlegen (z.B. "Herren 1", "Jugend U17")</li>
          <li>Trainer-Accounts erstellen und Teams zuweisen</li>
          <li>Trainer können dann ihre Spieler anlegen</li>
          <li>Spieler melden sich selbst an oder werden eingeladen</li>
        </ol>
      </div>
    </div>
  );
}
